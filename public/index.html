<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Room v5</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text2: #a1a1aa;
      --text3: #52525b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    html, body, #root {
      height: 100%;
      width: 100%;
    }

    .app-wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .sidebar-header i {
      font-size: 24px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .sidebar-section {
      padding: 0;
    }

    .sidebar-section-title {
      padding: 16px 20px 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text3);
      letter-spacing: 0.5px;
    }

    .sidebar-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text2);
      font-size: 13px;
    }

    .sidebar-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
    }

    .sidebar-item.active {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 17px;
      font-weight: 600;
    }

    .sidebar-item i {
      width: 16px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-selector {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .project-selector:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .topbar-domain {
      color: var(--text2);
      font-size: 13px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-subtitle {
      color: var(--text2);
      font-size: 14px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-success {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    .btn-success:hover:not(:disabled) {
      background: #16a34a;
    }

    .btn-danger {
      background: transparent;
      color: var(--error);
      border-color: var(--error);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text2);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-critical {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .badge-medium {
      background: rgba(245, 158, 11, 0.2);
      color: #fed7aa;
    }

    .badge-low {
      background: rgba(59, 130, 246, 0.2);
      color: #bfdbfe;
    }

    .badge-pending {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
    }

    .badge-approved {
      background: rgba(59, 130, 246, 0.2);
      color: #bfdbfe;
    }

    .badge-in-progress {
      background: rgba(245, 158, 11, 0.2);
      color: #fed7aa;
    }

    .badge-done {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table th {
      background: var(--bg);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }

    .table th:hover {
      color: var(--text);
    }

    .table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      width: 90%;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 20px;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #bfdbfe;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .spinner-large {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .audit-loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .audit-loading-overlay .spinner-large {
      width: 48px;
      height: 48px;
      border-width: 4px;
    }

    .audit-loading-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .audit-loading-sub {
      font-size: 13px;
      color: var(--text3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .gap-8 {
      gap: 8px;
    }

    .gap-16 {
      gap: 16px;
    }

    .flex {
      display: flex;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .mt-24 {
      margin-top: 24px;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    .mb-24 {
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        position: absolute;
        height: 100%;
        transition: width 0.3s;
      }

      .sidebar.mobile-open {
        width: 280px;
      }

      .main-content {
        width: 100%;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        max-width: 95%;
      }
    }

    .login-page {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text2);
      font-size: 14px;
    }

    .toggle-auth {
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      margin-top: 16px;
    }

    .toggle-auth button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-auth button:hover {
      text-decoration: underline;
    }

    .finding-card {
      background: var(--bg);
      border-left: 4px solid;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .finding-card.critical {
      border-left-color: var(--error);
    }

    .finding-card.medium {
      border-left-color: var(--warning);
    }

    .finding-card.low {
      border-left-color: var(--info);
    }

    .finding-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .finding-card-title {
      font-weight: 600;
      color: var(--text);
    }

    .finding-card-description {
      color: var(--text2);
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .finding-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
      padding: 8px;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 4px;
      font-size: 12px;
    }

    .finding-value {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .finding-value-label {
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 11px;
    }

    .finding-value-content {
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
    }

    .finding-actions {
      display: flex;
      gap: 8px;
    }

    .kanban-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .kanban-column {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
      overflow-y: auto;
    }

    .kanban-column-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(99, 102, 241, 0.05);
    }

    .kanban-column-count {
      background: var(--card);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text2);
    }

    .kanban-items {
      padding: 12px;
      flex: 1;
    }

    .kanban-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: move;
    }

    .kanban-card-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .kanban-card-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .kanban-card-actions {
      display: flex;
      gap: 6px;
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox input {
      cursor: pointer;
    }

    .integration-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .integration-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .integration-title {
      font-size: 15px;
      font-weight: 600;
    }

    .integration-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: var(--success);
    }

    .status-dot.disconnected {
      background: var(--text3);
    }

    .integration-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 480px;
    }

    .integration-fields .btn-group {
      display: flex;
      gap: 8px;
    }

    .integration-fields .btn-group .btn {
      flex: none;
      min-width: 100px;
    }

    .project-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-info {
      flex: 1;
    }

    .project-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .project-domain {
      color: var(--text2);
      font-size: 13px;
    }

    .maps-table-wrapper {
      overflow-x: auto;
    }

    .maps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .maps-table th {
      background: var(--bg);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .maps-table th:hover {
      color: var(--text);
    }

    .maps-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .maps-table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .visibility-bar {
      width: 100%;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .visibility-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--warning), var(--error));
      transition: width 0.3s;
    }

    .expand-icon {
      cursor: pointer;
      color: var(--text2);
    }

    .expand-icon:hover {
      color: var(--text);
    }

    .action-panel {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }

    .action-panel-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .action-panel-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-footer {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .metric-footer-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .metric-footer dl {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric-footer dt {
      font-weight: 600;
      color: var(--text);
    }

    .metric-footer dd {
      color: var(--text2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const API_BASE = window.location.origin + '/api';

    const api = async (path, opts = {}) => {
      const token = localStorage.getItem('token');
      const res = await fetch(`${API_BASE}${path}`, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          ...(token && { Authorization: `Bearer ${token}` }),
          ...opts.headers,
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });

      if (res.status === 401) {
        console.warn('[api] 401 on', path);
        return { error: 'Not authenticated' };
      }

      const contentType = res.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) {
        console.warn('[api] Non-JSON response on', path, contentType);
        throw new Error('Server returned non-JSON response — deploy may be pending');
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    };

    function LoginPage({ onLogin }) {

      const [password, setPassword] = useState('');
      const [isRegister, setIsRegister] = useState(false);
      const [error, setError] = useState('');

        setLoading(true);

        try {
          const endpoint = isRegister ? '/auth/register' : '/auth/login';
          const data = await api(endpoint, {
            method: 'POST',

          setPassword('');
          onLogin(data.user);

      return (

        </div>
      );

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>

    // ============ GBP AUDIT PAGE ============
    // ============ GBP AUDIT PAGE (v4-style table) ============
    // ============ EXTERNAL GBP AUDIT SUB-PAGE ============
    function ExternalGBPAuditPage({ project, section }) {
      const [report, setReport] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [addedActions, setAddedActions] = useState({});
      const [addingAction, setAddingAction] = useState(null);

      useEffect(() => { if (project) checkStatus(); }, [project?.id]);

      const checkStatus = async () => {
        try {
          const data = await api(`/projects/${project.id}/audits/gbp-external/status`);
          if (data.status === 'running') {
            setLoading(true);
            startPolling();
          } else if (data.status === 'completed' && data.report) {
            setReport(data.report);
          } else if (data.status === 'failed' && data.error) {
            setError(data.error);
          }
        } catch (e) {}
      };

      const startPolling = () => {
        const pollInterval = setInterval(async () => {
          try {
            const data = await api(`/projects/${project.id}/audits/gbp-external/status`);
            if (data.status === 'completed') {
              clearInterval(pollInterval);
              if (data.report) setReport(data.report);
              setLoading(false);
            } else if (data.status === 'failed') {
              clearInterval(pollInterval);
              setError(data.error || 'Audit failed');
              setLoading(false);
            }
          } catch (e) { clearInterval(pollInterval); setLoading(false); }
        }, 5000);
      };

      const runAudit = async () => {
        setLoading(true); setError(''); setReport('');
        try {
          await api(`/projects/${project.id}/audits/gbp-external/run`, { method: 'POST' });
          startPolling();
        } catch (err) { setError(err.message); setLoading(false); }
      };

      // Parse report into sections — only split on numbered headers
      const parseReportSections = (text) => {
        if (!text) return [];
        const lines = text.split('\n');
        const rawSections = [];
        let current = null;

        for (let i = 0; i < lines.length; i++) {
          const trimmed = lines[i].trim();
          const match = trimmed.match(/^#{2,3}\s+(?:\d+\.\s+)?(.+)/);
          if (match) {
            const title = match[1].replace(/\*\*/g, '').trim();
            if (title.length > 3) {
              if (current) rawSections.push(current);
              current = { title, content: [] };
              continue;
            }
          }
          if (current) {
            current.content.push(lines[i]);
          } else {
            current = { title: 'Overview', content: [lines[i]] };
          }
        }
        if (current) rawSections.push(current);

        // Filter out unwanted sections
        const skipPatterns = [/houseworks/i, /plumbing.*gas/i, /^summary$/i, /^audit conclusion$/i];
        const filtered = rawSections.filter(s => !skipPatterns.some(p => p.test(s.title)));

        // Merge directory sections
        const presenceIdx = filtered.findIndex(s => /directory presence/i.test(s.title));
        const registrationIdx = filtered.findIndex(s => /directory registration/i.test(s.title));
        if (presenceIdx !== -1 && registrationIdx !== -1) {
          filtered[presenceIdx].title = 'DIRECTORY AUDIT & ACTIONS';
          filtered[presenceIdx].content = [
            ...filtered[presenceIdx].content,
            '',
            '---',
            '',
            '#### Registration Recommendations',
            '',
            ...filtered[registrationIdx].content
          ];
          filtered.splice(registrationIdx, 1);
        }

        return filtered;
      };

      // Detect execution type from action text
      const detectExecType = (text) => {
        const t = text.toLowerCase();
        if (/\b(gbp|google business|profile description|business description|categor|google posts?|q&a|owner.?seeded|service menu)\b/.test(t)) return { type: 'extension', label: 'Extension', icon: 'fas fa-puzzle-piece', color: '#8b5cf6' };
        if (/\b(search console|gsc|api|pagespeed|indexing)\b/.test(t)) return { type: 'api', label: 'API', icon: 'fas fa-plug', color: '#3b82f6' };
        if (/\b(schema|structured data|website|landing page|code|html|css|wordpress|elementor|refresh|implement|redesign)\b/.test(t)) return { type: 'plugin', label: 'Plugin', icon: 'fas fa-wrench', color: '#f59e0b' };
        if (/\b(register|directory|listing|create.*account|sign.?up|claim|social media|facebook|instagram)\b/.test(t)) return { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280' };
        return { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280' };
      };

      // Render a section's content — tables with optional inline action buttons
      // actionMode: { onAdd, addedKeys, addingKey } — adds inline action buttons to table rows
      const renderSectionContent = (lines, actionMode) => {
        const elements = [];
        let tableRows = [];
        let inTable = false;
        let tableCounter = 0;

        const flushTable = () => {
          if (tableRows.length < 2) {
            tableRows.forEach((row, i) => elements.push(
              <div key={`t${elements.length}_${i}`} style={{ fontSize: 14, color: 'var(--text2)', lineHeight: 1.7 }}>{row.join(' | ')}</div>
            ));
          } else {
            const headers = tableRows[0];
            const rows = tableRows.slice(1);
            const tblIdx = tableCounter++;

            // Detect action/fix column
            const actionColIdx = headers.findIndex(h => /fix|action|recommend|resolution/i.test(h));
            const sevColIdx = headers.findIndex(h => /priority|severity|gap|coverage/i.test(h));
            const notesColIdx = headers.findIndex(h => /notes|explanation|details|status/i.test(h));
            const hasActions = actionMode && actionColIdx !== -1;

            elements.push(
              <div key={`tbl${elements.length}`} style={{ marginBottom: 16, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                  <thead>
                    <tr style={{ background: 'var(--bg)' }}>
                      {headers.map((h, i) => (
                        <th key={i} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '2px solid var(--border)' }}>{h}</th>
                      ))}
                      {hasActions && (
                        <th style={{ padding: '12px 16px', textAlign: 'center', fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', width: 120 }}>PLAN</th>
                      )}
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((row, ri) => {
                      const actionKey = `t${tblIdx}_r${ri}`;
                      const actionText = actionColIdx !== -1 ? (row[actionColIdx] || '').replace(/\*\*/g, '') : '';
                      const itemName = (row[0] || '').replace(/\*\*/g, '');
                      const execType = actionText ? detectExecType(actionText) : null;
                      const isAdded = actionMode && actionMode.addedKeys[actionKey];
                      const isAdding = actionMode && actionMode.addingKey === actionKey;

                      // Determine severity from table data
                      let severity = 'medium';
                      if (sevColIdx !== -1) {
                        const sv = (row[sevColIdx] || '').toLowerCase();
                        if (/high|critical|significant/.test(sv)) severity = 'critical';
                        else if (/medium|moderate/.test(sv)) severity = 'high';
                        else if (/low|minimal/.test(sv)) severity = 'medium';
                      }

                      return (
                        <tr key={ri} style={{ borderBottom: '1px solid var(--border)' }}>
                          {row.map((cell, ci) => {
                            let cellStyle = { padding: '12px 16px', fontSize: 13, color: 'var(--text2)', lineHeight: 1.6 };
                            const lower = cell.toLowerCase();
                            const cleanCell = cell.replace(/\*\*/g, '');
                            if (/high|critical|significant/.test(lower) || cell.includes('\u{1F534}')) cellStyle.color = '#ef4444';
                            else if (/medium|moderate/.test(lower) || cell.includes('\u{1F7E0}')) cellStyle.color = '#f59e0b';
                            else if (/\blow\b|minimal/.test(lower) || cell.includes('\u{1F7E1}') || cell.includes('\u{1F7E2}')) cellStyle.color = '#3b82f6';
                            if (cell.includes('\u2705') || /^yes$/i.test(lower) || /\bstrong\b/i.test(lower) || /\bmatch\b/i.test(lower)) cellStyle.color = '#22c55e';
                            if (cell.includes('\u274C') || /^no$/i.test(lower) || /not listed|not found|missing/i.test(lower)) cellStyle.color = '#ef4444';
                            if (cell.includes('\u26A0') || /\bpartial\b/i.test(lower) || /unverif/i.test(lower)) cellStyle.color = '#f59e0b';

                            // Explain "Partial" inline with details from notes column
                            if (/\bpartial\b/i.test(lower)) {
                              const explanation = notesColIdx !== -1 && notesColIdx !== ci && row[notesColIdx]
                                ? row[notesColIdx].replace(/\*\*/g, '') : '';
                              return <td key={ci} style={cellStyle}>
                                <span>{cleanCell}</span>
                                {explanation && <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2, fontStyle: 'italic' }}>{explanation}</div>}
                              </td>;
                            }

                            return <td key={ci} style={cellStyle}>{cleanCell}</td>;
                          })}
                          {hasActions && (
                            <td style={{ padding: '8px 10px', textAlign: 'center', whiteSpace: 'nowrap' }}>
                              {actionText && actionText.length > 3 ? (
                                isAdded ? (
                                  <span style={{ color: '#22c55e', fontSize: 12, fontWeight: 600 }}>
                                    <i className="fas fa-check" style={{ marginRight: 3 }} />Added
                                  </span>
                                ) : (
                                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                                    {execType && (
                                      <span style={{ fontSize: 9, padding: '1px 5px', borderRadius: 3, background: execType.color + '20', color: execType.color, fontWeight: 700 }}>
                                        <i className={execType.icon} style={{ fontSize: 8, marginRight: 2 }} />{execType.label}
                                      </span>
                                    )}
                                    <button
                                      className="btn btn-secondary"
                                      onClick={() => actionMode.onAdd(actionKey, {
                                        title: itemName,
                                        description: actionText,
                                        severity: severity,
                                        execution_type: execType ? execType.type : 'manual'
                                      })}
                                      disabled={isAdding}
                                      style={{ fontSize: 11, padding: '3px 8px' }}
                                    >
                                      {isAdding ? <i className="fas fa-spinner fa-spin" /> : <><i className="fas fa-plus" style={{ marginRight: 3 }} />Add</>}
                                    </button>
                                  </div>
                                )
                              ) : (
                                <span style={{ color: 'var(--text3)', fontSize: 11 }}>—</span>
                              )}
                            </td>
                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            );
          }
          tableRows = [];
        };

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();

          if (/^\|[\s-:|]+\|$/.test(trimmed)) continue;

          if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
            const cells = trimmed.split('|').filter(c => c.trim()).map(c => c.trim());
            if (cells.length >= 2) {
              tableRows.push(cells);
              inTable = true;
              continue;
            }
          }

          if (inTable) { flushTable(); inTable = false; }

          if (trimmed === '---' || trimmed === '***') {
            elements.push(<hr key={`hr${i}`} style={{ border: 'none', borderTop: '1px solid var(--border)', margin: '16px 0' }} />);
            continue;
          }

          if (!trimmed) { elements.push(<div key={`e${i}`} style={{ height: 8 }} />); continue; }

          // Sub-headers (#### lines)
          if (trimmed.startsWith('####')) {
            const subTitle = trimmed.replace(/^#+\s*/, '').replace(/\*\*/g, '');
            elements.push(<div key={`sh${i}`} style={{ fontSize: 15, fontWeight: 700, color: 'var(--text1)', marginTop: 16, marginBottom: 8 }}>{subTitle}</div>);
            continue;
          }

          const clean = trimmed.replace(/\*\*/g, '');
          if (/^(Key Takeaway|Score Rationale|Health Score|Strategic Rationale|Recommended Actions|Assessment)/i.test(clean)) {
            elements.push(<div key={i} style={{ fontSize: 14, fontWeight: 600, color: 'var(--text1)', lineHeight: 1.7, marginBottom: 8, padding: '10px 14px', background: 'rgba(99,102,241,0.06)', borderLeft: '3px solid #818cf8', borderRadius: '0 6px 6px 0' }}>{clean}</div>);
            continue;
          }

          elements.push(<div key={i} style={{ fontSize: 14, color: 'var(--text2)', lineHeight: 1.7, marginBottom: 2 }}>{clean}</div>);
        }
        if (inTable) flushTable();
        return elements;
      };

      if (loading) {
        return (
          <div className="audit-loading-overlay">
            <span className="spinner-large"></span>
            <div className="audit-loading-text">External GBP Audit</div>
            <div className="audit-loading-sub">Managed agent is researching your business across the web. This takes 2-5 minutes.</div>
          </div>
        );
      }

      if (error) {
        return (
          <div>
            <div style={{ padding: 14, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 15, marginBottom: 16 }}>
              <i className="fas fa-exclamation-circle" style={{ marginRight: 8 }} />{error}
            </div>
            <button className="btn btn-primary" onClick={runAudit} style={{ fontSize: 15, padding: '10px 20px' }}>
              <i className="fas fa-robot" style={{ marginRight: 8 }} />Re-run External Audit
            </button>
          </div>
        );
      }

      if (!report) {
        return (
          <div style={{ textAlign: 'center', color: 'var(--text3)', padding: 60, fontSize: 16, background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)' }}>
            <i className="fas fa-robot" style={{ fontSize: 40, marginBottom: 16, display: 'block', opacity: 0.3 }} />
            No external audit yet.
            <div style={{ marginTop: 16 }}>
              <button className="btn btn-primary" onClick={runAudit} style={{ fontSize: 15, padding: '10px 20px' }}>
                <i className="fas fa-robot" style={{ marginRight: 8 }} />Run External Audit
              </button>
            </div>
          </div>
        );
      }

      // If section is specified, show just that section with inline actions
      if (section && section !== 'full') {
        const sections = parseReportSections(report);
        const sec = sections.find(s => s.title.toLowerCase().replace(/[^a-z0-9]/g, '') === section.toLowerCase().replace(/[^a-z0-9]/g, ''));
        if (sec) {
          const handleAddAction = async (key, action) => {
            setAddingAction(key);
            try {
              await api('/projects/' + project.id + '/action-items', {
                method: 'POST',
                body: JSON.stringify({
                  pillar: 'gbp_external',
                  type: action.execution_type || 'manual',
                  title: action.title,
                  description: action.description,
                  severity: action.severity || 'medium',
                  current_value: action.current_value || null,
                  new_value: action.new_value || null
                })
              });
              setAddedActions(prev => ({ ...prev, [key]: true }));
            } catch (e) {
              console.error('Failed to add action:', e);
            }
            setAddingAction(null);
          };

          const actionMode = {
            onAdd: handleAddAction,
            addedKeys: addedActions,
            addingKey: addingAction
          };

          return (
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 20, color: 'var(--text1)' }}>
                <i className="fas fa-globe" style={{ marginRight: 10, color: '#818cf8' }} />{sec.title}
              </h2>
              <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '20px 24px' }}>
                {renderSectionContent(sec.content, actionMode)}
              </div>
            </div>
          );
        }
      }

      // Full report view — raw agent output rendered with table support
      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>
              <i className="fas fa-globe" style={{ marginRight: 10, color: '#818cf8' }} />External GBP Audit — Full Report
            </h2>
            <div style={{ marginLeft: 'auto' }}>
              <button className="btn btn-primary" onClick={runAudit} style={{ fontSize: 14, padding: '8px 16px' }}>
                <i className="fas fa-robot" style={{ marginRight: 8 }} />Re-run Audit
              </button>
            </div>
          </div>
          <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '24px 28px' }}>
            {renderSectionContent(report.split('\n'))}
          </div>
        </div>
      );
    }

    // Helper: get external audit section names for sidebar
    function getExternalAuditSections(report) {
      if (!report) return [];
      const raw = [];
      for (const line of report.split('\n')) {
        const trimmed = line.trim();
        const match = trimmed.match(/^#{2,3}\s+(?:\d+\.\s+)?(.+)/);
        if (match) {
          const title = match[1].replace(/\*\*/g, '').trim();
          if (title.length > 3) raw.push(title);
        }
      }
      // Filter out unwanted sections
      const skipPatterns = [/houseworks/i, /plumbing.*gas/i, /^summary$/i, /^audit conclusion$/i];
      const filtered = raw.filter(s => !skipPatterns.some(p => p.test(s)));
      // Combine directory sections
      const hasPresence = filtered.some(s => /directory presence/i.test(s));
      const hasRegistration = filtered.some(s => /directory registration/i.test(s));
      const combined = [];
      for (const s of filtered) {
        if (/directory presence/i.test(s) && hasRegistration) {
          combined.push('DIRECTORY AUDIT & ACTIONS');
        } else if (/directory registration/i.test(s) && hasPresence) {
          continue; // skip — merged into DIRECTORY AUDIT
        } else {
          combined.push(s);
        }
      }
      return combined;
    }

    // ============ GBP AUDIT PAGE (with Internal/External tabs) ============
    function InternalGBPAuditPage({ project }) {
      const [findings, setFindings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [selected, setSelected] = useState(new Set());
      const [reviewFinding, setReviewFinding] = useState(null);
      const [searchQ, setSearchQ] = useState('');
      const [filterSev, setFilterSev] = useState('all');
      const [filterStatus, setFilterStatus] = useState('active');
      const [filterPillar, setFilterPillar] = useState('all');
      const [sortCol, setSortCol] = useState('severity');
      const [sortDir, setSortDir] = useState('asc');
      const [profileSummary, setProfileSummary] = useState(null);

      useEffect(() => { if (project) checkStatus(); }, [project?.id]);

      const checkStatus = async () => {
        try {
          const data = await api(`/projects/${project.id}/audits/gbp-external/status`);
          if (data.status === 'running') {
            setLoading(true);
            startPolling();
          } else if (data.status === 'completed' && data.report) {
            setReport(data.report);
          } else if (data.status === 'failed' && data.error) {
            setError(data.error);
          }
        } catch (e) {}
      };

      const startPolling = () => {
        const pollInterval = setInterval(async () => {
          try {
            const data = await api(`/projects/${project.id}/audits/gbp-external/status`);
            if (data.status === 'completed') {
              clearInterval(pollInterval);
              if (data.report) setReport(data.report);
              setLoading(false);
            } else if (data.status === 'failed') {
              clearInterval(pollInterval);
              setError(data.error || 'Audit failed');
              setLoading(false);
            }
          } catch (e) { clearInterval(pollInterval); setLoading(false); }
        }, 5000);
      };

      const runAudit = async () => {
        setLoading(true); setError(''); setReport('');
        try {
          await api(`/projects/${project.id}/audits/gbp-external/run`, { method: 'POST' });
          startPolling();
        } catch (err) { setError(err.message); setLoading(false); }
      };

      const updateStatus = async (id, status) => {
        try {
          await api(`/audit-findings/${id}`, { method: 'PUT', body: { status } });
          setFindings(prev => prev.map(f => f.id === id ? { ...f, status } : f));
        } catch (err) { setError(err.message); }
      };

      const bulkAction = async (status) => {
        for (const id of selected) { await updateStatus(id, status); }
        setSelected(new Set());
      };

      const selectBySeverity = (sev) => {
        const ids = sorted.filter(f => f.status !== 'fixed' && (sev === 'all' || (f.severity || '').toLowerCase() === sev)).map(f => f.id);
        setSelected(new Set(ids));
      };

      const toggleSelect = (id) => { const s = new Set(selected); s.has(id) ? s.delete(id) : s.add(id); setSelected(s); };
      const toggleSort = (col) => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir('asc'); } };

      const sevOrder = { Critical: 0, critical: 0, High: 1, high: 1, Medium: 2, medium: 2, Low: 3, low: 3 };

      // Extract gbp_pillar from category field ("Proximity > Service Areas" → "Proximity")
      const getPillar = (f) => {
        if (f.gbp_pillar) return f.gbp_pillar;
        if (f.category && f.category.includes(' > ')) return f.category.split(' > ')[0];
        return 'Relevance';
      };
      const getSubcat = (f) => {
        if (f.category && f.category.includes(' > ')) return f.category.split(' > ')[1];
        return f.category || 'General';
      };

      const sorted = useMemo(() => {
        let list = [...findings];
        if (filterSev !== 'all') list = list.filter(f => (f.severity || '').toLowerCase() === filterSev);
        if (filterPillar !== 'all') list = list.filter(f => getPillar(f) === filterPillar);
        if (filterStatus === 'active') list = list.filter(f => f.status !== 'rejected' && f.status !== 'fixed');
        else if (filterStatus !== 'all') list = list.filter(f => f.status === filterStatus);
        if (searchQ.trim()) { const q = searchQ.toLowerCase(); list = list.filter(f => (f.title || '').toLowerCase().includes(q) || (f.description || '').toLowerCase().includes(q)); }
        // Group by pillar, then sort within each group
        const pillarOrder = { Proximity: 0, Relevance: 1, Prominence: 2 };
        list.sort((a, b) => {
          const pa = pillarOrder[getPillar(a)] ?? 1;
          const pb = pillarOrder[getPillar(b)] ?? 1;
          if (pa !== pb) return pa - pb;
          let av, bv;
          if (sortCol === 'severity') { av = sevOrder[a.severity] ?? 5; bv = sevOrder[b.severity] ?? 5; }
          else if (sortCol === 'title') { av = (a.title || '').toLowerCase(); bv = (b.title || '').toLowerCase(); return av.localeCompare(bv); }
          else { av = sevOrder[a.severity] ?? 5; bv = sevOrder[b.severity] ?? 5; }
          return sortDir === 'asc' ? av - bv : bv - av;
        });
        return list;
      }, [findings, filterSev, filterPillar, filterStatus, searchQ, sortCol, sortDir]);

      const SortIcon = ({ col }) => sortCol === col ? <i className={`fas fa-sort-${sortDir === 'asc' ? 'up' : 'down'}`} style={{ marginLeft: 4, fontSize: 10 }} /> : null;

      const sevBadge = (sev) => {
        const colors = { Critical: '#ef4444', critical: '#ef4444', High: '#f97316', high: '#f97316', Medium: '#f59e0b', medium: '#f59e0b', Low: '#3b82f6', low: '#3b82f6' };
        const c = colors[sev] || '#64748b';
        return <span style={{ padding: '4px 14px', borderRadius: 4, fontSize: 14, fontWeight: 700, background: c + '20', color: c }}>{sev}</span>;
      };

      const statusBadge = (status) => {
        const cfg = { new: { bg: 'rgba(99,102,241,0.15)', color: '#818cf8', label: 'new' }, approved: { bg: 'rgba(34,197,94,0.15)', color: '#22c55e', label: 'approved' }, rejected: { bg: 'rgba(100,116,139,0.15)', color: '#94a3b8', label: 'ignored' }, fixed: { bg: 'rgba(34,197,94,0.25)', color: '#22c55e', label: 'Fixed' } };
        const c = cfg[status] || cfg.new;
        return <span style={{ padding: '4px 12px', borderRadius: 4, fontSize: 13, fontWeight: 600, background: c.bg, color: c.color }}>{c.label}</span>;
      };

      // Review panel
      if (reviewFinding) {
        const f = reviewFinding;
        return (
          <div>
            <button className="btn btn-secondary" onClick={() => setReviewFinding(null)} style={{ marginBottom: 16, fontSize: 15, padding: '8px 16px' }}>
              <i className="fas fa-arrow-left" style={{ marginRight: 8 }} /> Back to Issues
            </button>
            <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: 28 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
                <div>
                  <div style={{ fontSize: 13, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 6 }}>Issue Brief</div>
                  <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>{f.title}</h2>
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  {sevBadge(f.severity)}
                  {(() => { const pc = { Proximity: '#f59e0b', Relevance: '#6366f1', Prominence: '#22c55e' }; const p = getPillar(f); const c = pc[p] || '#818cf8';
                    return <span style={{ padding: '4px 12px', borderRadius: 4, fontSize: 13, fontWeight: 600, background: c + '15', color: c }}>{p}</span>;
                  })()}
                  <span style={{ padding: '4px 12px', borderRadius: 4, fontSize: 13, fontWeight: 600, background: 'var(--bg)', color: 'var(--text3)' }}>{getSubcat(f)}</span>
                </div>
              </div>
              {f.description && (
                <div style={{ marginBottom: 20, padding: 20, background: 'var(--bg)', borderRadius: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', marginBottom: 10 }}>What's the issue</div>
                  <div style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--text1)' }}>{f.description}</div>
                </div>
              )}
              {f.recommendation && (
                <div style={{ marginBottom: 20, padding: 20, background: 'rgba(34,197,94,0.06)', borderRadius: 10, border: '1px solid rgba(34,197,94,0.15)' }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: '#22c55e', textTransform: 'uppercase', marginBottom: 10 }}><i className="fas fa-lightbulb" style={{ marginRight: 6 }} />Suggested Fix</div>
                  <div style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--text1)' }}>{f.recommendation}</div>
                </div>
              )}
              {(f.current_value || f.recommended_value) && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>
                  <div style={{ padding: '16px 20px', background: 'rgba(239,68,68,0.06)', borderRadius: 10 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', marginBottom: 8 }}>Current State</div>
                    <div style={{ fontSize: 17, fontWeight: 600, color: '#ef4444' }}>{f.current_value || '—'}</div>
                  </div>
                  <div style={{ padding: '16px 20px', background: 'rgba(34,197,94,0.06)', borderRadius: 10 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', marginBottom: 8 }}>Target</div>
                    <div style={{ fontSize: 17, fontWeight: 600, color: '#22c55e' }}>{f.recommended_value || '—'}</div>
                  </div>
                </div>
              )}
              <div style={{ display: 'flex', gap: 14, marginTop: 24 }}>
                <button className="btn btn-success" onClick={() => { updateStatus(f.id, 'approved'); setReviewFinding({ ...f, status: 'approved' }); }} style={{ fontSize: 16, padding: '12px 28px' }}>
                  <i className="fas fa-check" style={{ marginRight: 8 }} /> Move to Action Plan
                </button>
                <button className="btn btn-secondary" onClick={() => { updateStatus(f.id, 'rejected'); setReviewFinding(null); }} style={{ fontSize: 16, padding: '12px 28px' }}>
                  <i className="fas fa-eye-slash" style={{ marginRight: 8 }} /> Ignore
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>
              <i className="fas fa-map-marker-alt" style={{ marginRight: 10, color: 'var(--accent)' }} />GBP Issues
              <span style={{ color: 'var(--text3)', fontWeight: 400, fontSize: 16, marginLeft: 10 }}>{findings.length} items</span>
            </h2>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
              <button className="btn btn-secondary" onClick={async () => {
                try {
                  // Tell the extension to collect GBP data via dashboard bridge
                  const token = localStorage.getItem('token');
                  window.postMessage({ source: 'seo-room-dashboard', type: 'GBP_COLLECT', projectId: project.id, authToken: token }, '*');
                  // Also try direct extension message
                  if (chrome?.runtime?.sendMessage) {
                    chrome.runtime.sendMessage({ type: 'DASHBOARD_GBP_COLLECT', projectId: project.id, authToken: token });
                  }
                } catch (e) { console.error('Extension sync:', e); }
              }} style={{ fontSize: 14, padding: '10px 16px' }}>
                <i className="fas fa-sync" style={{ marginRight: 6 }} /> Sync GBP
              </button>
              <button className="btn btn-primary" onClick={runAudit} disabled={loading} style={{ fontSize: 15, padding: '10px 20px' }}>
                <i className="fas fa-play" style={{ marginRight: 8 }} /> {loading ? 'Running...' : 'Re-run'}
              </button>
            </div>
          </div>

          {loading && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Running GBP Audit</div>
              <div className="audit-loading-sub">Analyzing profile, reviews, competitors, and maps rankings...</div>
            </div>
          )}

          {error && <div style={{ padding: 14, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 15, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 8 }} />{error}</div>}

          {profileSummary && !loading && (
            <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '16px 20px', marginBottom: 16 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap' }}>
                <span style={{ fontSize: 18, fontWeight: 700 }}><i className="fas fa-store" style={{ marginRight: 8, color: 'var(--accent)' }} />{profileSummary.name || project.business_name}</span>
                {profileSummary.rating && <span style={{ fontSize: 17, fontWeight: 700, color: '#f59e0b' }}>{profileSummary.rating} ★</span>}
                {profileSummary.review_count != null && <span style={{ fontSize: 15, color: 'var(--text2)' }}><i className="fas fa-comments" style={{ marginRight: 4, fontSize: 13 }} />{profileSummary.review_count} reviews</span>}
                {profileSummary.address && <span style={{ fontSize: 14, color: 'var(--text3)' }}><i className="fas fa-map-marker-alt" style={{ marginRight: 4, fontSize: 12 }} />{profileSummary.address}</span>}
                {profileSummary.has_description && <span style={{ fontSize: 13, color: '#22c55e' }}><i className="fas fa-check" style={{ marginRight: 4 }} />Description</span>}
                {profileSummary.has_hours && <span style={{ fontSize: 13, color: '#22c55e' }}><i className="fas fa-check" style={{ marginRight: 4 }} />Hours</span>}
                {profileSummary.photo_count > 0 && <span style={{ fontSize: 13, color: 'var(--text2)' }}><i className="fas fa-camera" style={{ marginRight: 4 }} />{profileSummary.photo_count} photos</span>}
              </div>
              {profileSummary.categories && profileSummary.categories.length > 0 && (
                <div style={{ display: 'flex', gap: 6, marginTop: 10, flexWrap: 'wrap' }}>
                  {profileSummary.categories.map((cat, i) => (
                    <span key={i} style={{ fontSize: 13, padding: '3px 12px', borderRadius: 6, background: i === 0 ? 'rgba(99,102,241,0.15)' : 'var(--bg)', color: i === 0 ? 'var(--accent)' : 'var(--text3)', fontWeight: i === 0 ? 600 : 400 }}>
                      {i === 0 && <i className="fas fa-star" style={{ marginRight: 4, fontSize: 10 }} />}{cat}
                    </span>
                  ))}
                </div>
              )}
            </div>
          )}

          {selected.size > 0 && (
            <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 8, padding: 14, marginBottom: 16, display: 'flex', gap: 10, alignItems: 'center' }}>
              <span style={{ fontSize: 15, color: 'var(--text2)' }}>{selected.size} selected:</span>
              <button className="btn btn-small" onClick={() => bulkAction('approved')} style={{ fontSize: 14 }}>Move to Action Plan</button>
              <button className="btn btn-small" onClick={() => bulkAction('rejected')} style={{ fontSize: 14 }}>Ignore</button>
              <button className="btn btn-small" onClick={() => setSelected(new Set())} style={{ fontSize: 14, color: 'var(--text3)' }}>Clear</button>
            </div>
          )}

          {findings.length > 0 && (
            <div style={{ marginBottom: 16 }}>
              {/* Pillar tabs */}
              <div style={{ display: 'flex', gap: 0, marginBottom: 12 }}>
                {[
                  { key: 'all', label: 'All Pillars', icon: 'fas fa-layer-group', color: 'var(--accent)' },
                  { key: 'Proximity', label: 'Proximity', icon: 'fas fa-map-marker-alt', color: '#f59e0b', desc: 'Service areas & geo-targeting' },
                  { key: 'Relevance', label: 'Relevance', icon: 'fas fa-bullseye', color: '#6366f1', desc: 'Categories, content & business info' },
                  { key: 'Prominence', label: 'Prominence', icon: 'fas fa-star', color: '#22c55e', desc: 'Reviews, photos & brand signals' },
                ].map(tab => {
                  const count = tab.key === 'all' ? findings.length : findings.filter(f => getPillar(f) === tab.key).length;
                  const active = filterPillar === tab.key;
                  return (
                    <button key={tab.key} onClick={() => setFilterPillar(tab.key)}
                      style={{ flex: 1, padding: '14px 10px', border: '1px solid var(--border)', background: active ? tab.color + '15' : 'var(--card)',
                        borderBottom: active ? `3px solid ${tab.color}` : '1px solid var(--border)', cursor: 'pointer', color: active ? tab.color : 'var(--text2)',
                        fontWeight: active ? 700 : 500, fontSize: 15, transition: 'all 0.15s',
                        borderRadius: tab.key === 'all' ? '8px 0 0 0' : tab.key === 'Prominence' ? '0 8px 0 0' : 0 }}>
                      <i className={tab.icon} style={{ marginRight: 8 }} />{tab.label}
                      <span style={{ marginLeft: 8, fontSize: 13, opacity: 0.7 }}>({count})</span>
                    </button>
                  );
                })}
              </div>
              {/* Severity quick-select */}
              <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 8, padding: 14, display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                <span style={{ fontSize: 14, color: 'var(--text2)' }}>Select:</span>
                <button className="btn btn-small" style={{ background: 'rgba(239,68,68,0.15)', borderColor: 'rgba(239,68,68,0.3)', color: '#ef4444', fontSize: 14 }} onClick={() => selectBySeverity('critical')}>Critical ({sorted.filter(f => (f.severity||'').toLowerCase() === 'critical').length})</button>
                <button className="btn btn-small" style={{ background: 'rgba(249,115,22,0.15)', borderColor: 'rgba(249,115,22,0.3)', color: '#f97316', fontSize: 14 }} onClick={() => selectBySeverity('high')}>High ({sorted.filter(f => (f.severity||'').toLowerCase() === 'high').length})</button>
                <button className="btn btn-small" style={{ background: 'rgba(245,158,11,0.15)', borderColor: 'rgba(245,158,11,0.3)', color: '#f59e0b', fontSize: 14 }} onClick={() => selectBySeverity('medium')}>Medium ({sorted.filter(f => (f.severity||'').toLowerCase() === 'medium').length})</button>
                <button className="btn btn-small" style={{ background: 'rgba(59,130,246,0.15)', borderColor: 'rgba(59,130,246,0.3)', color: '#3b82f6', fontSize: 14 }} onClick={() => selectBySeverity('low')}>Low ({sorted.filter(f => (f.severity||'').toLowerCase() === 'low').length})</button>
                <button className="btn btn-small" onClick={() => selectBySeverity('all')} style={{ fontSize: 14 }}>All ({sorted.length})</button>
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
            <input type="text" placeholder="Search findings..." value={searchQ} onChange={e => setSearchQ(e.target.value)}
              style={{ flex: 1, minWidth: 200, background: 'var(--card)', color: 'var(--text1)', border: '1px solid var(--border)', borderRadius: 6, padding: '10px 14px', fontSize: 15 }} />
            <select value={filterSev} onChange={e => setFilterSev(e.target.value)} style={{ background: 'var(--card)', color: 'var(--text1)', border: '1px solid var(--border)', borderRadius: 6, padding: '10px 14px', fontSize: 15 }}>

              <option value="critical">Critical</option>

              <option value="rejected">Ignored</option>

          </div>

          <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)' }}>
                  <th style={{ width: 36, padding: '14px 10px' }}><input type="checkbox" onChange={e => setSelected(e.target.checked ? new Set(sorted.map(f => f.id)) : new Set())} checked={selected.size === sorted.length && sorted.length > 0} /></th>

                </tr>
              </thead>

                {sorted.length === 0 ? (
                  <tr><td colSpan={8} style={{ textAlign: 'center', color: 'var(--text3)', padding: 50, fontSize: 16 }}>
