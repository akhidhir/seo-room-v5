<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Room v5</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text2: #a1a1aa;
      --text3: #52525b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    html, body, #root {
      height: 100%;
      width: 100%;
    }

    .app-wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .sidebar-header i {
      font-size: 24px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .sidebar-section {
      padding: 0;
    }

    .sidebar-section-title {
      padding: 16px 20px 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text3);
      letter-spacing: 0.5px;
    }

    .sidebar-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text2);
      font-size: 13px;
    }

    .sidebar-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
    }

    .sidebar-item.active {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 17px;
      font-weight: 600;
    }

    .sidebar-item i {
      width: 16px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-selector {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .project-selector:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .topbar-domain {
      color: var(--text2);
      font-size: 13px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-subtitle {
      color: var(--text2);
      font-size: 14px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-success {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    .btn-success:hover:not(:disabled) {
      background: #16a34a;
    }

    .btn-danger {
      background: transparent;
      color: var(--error);
      border-color: var(--error);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text2);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-critical {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .badge-medium {
      background: rgba(245, 158, 11, 0.2);
      color: #fed7aa;
    }

    .badge-low {
      background: rgba(59, 130, 246, 0.2);
      color: #bfdbfe;
    }

    .badge-pending {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
    }

    .badge-approved {
      background: rgba(59, 130, 246, 0.2);
      color: #bfdbfe;
    }

    .badge-in-progress {
      background: rgba(245, 158, 11, 0.2);
      color: #fed7aa;
    }

    .badge-done {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table th {
      background: var(--bg);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }

    .table th:hover {
      color: var(--text);
    }

    .table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      width: 90%;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 20px;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #bfdbfe;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(99, 102, 241, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .gap-8 {
      gap: 8px;
    }

    .gap-16 {
      gap: 16px;
    }

    .flex {
      display: flex;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .mt-24 {
      margin-top: 24px;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    .mb-24 {
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        position: absolute;
        height: 100%;
        transition: width 0.3s;
      }

      .sidebar.mobile-open {
        width: 280px;
      }

      .main-content {
        width: 100%;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        max-width: 95%;
      }
    }

    .login-page {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text2);
      font-size: 14px;
    }

    .toggle-auth {
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      margin-top: 16px;
    }

    .toggle-auth button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-auth button:hover {
      text-decoration: underline;
    }

    .finding-card {
      background: var(--bg);
      border-left: 4px solid;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .finding-card.critical {
      border-left-color: var(--error);
    }

    .finding-card.medium {
      border-left-color: var(--warning);
    }

    .finding-card.low {
      border-left-color: var(--info);
    }

    .finding-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .finding-card-title {
      font-weight: 600;
      color: var(--text);
    }

    .finding-card-description {
      color: var(--text2);
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .finding-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
      padding: 8px;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 4px;
      font-size: 12px;
    }

    .finding-value {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .finding-value-label {
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 11px;
    }

    .finding-value-content {
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
    }

    .finding-actions {
      display: flex;
      gap: 8px;
    }

    .kanban-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .kanban-column {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
      overflow-y: auto;
    }

    .kanban-column-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(99, 102, 241, 0.05);
    }

    .kanban-column-count {
      background: var(--card);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text2);
    }

    .kanban-items {
      padding: 12px;
      flex: 1;
    }

    .kanban-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: move;
    }

    .kanban-card-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .kanban-card-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .kanban-card-actions {
      display: flex;
      gap: 6px;
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox input {
      cursor: pointer;
    }

    .integration-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .integration-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .integration-title {
      font-size: 15px;
      font-weight: 600;
    }

    .integration-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: var(--success);
    }

    .status-dot.disconnected {
      background: var(--text3);
    }

    .integration-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-info {
      flex: 1;
    }

    .project-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .project-domain {
      color: var(--text2);
      font-size: 13px;
    }

    .maps-table-wrapper {
      overflow-x: auto;
    }

    .maps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .maps-table th {
      background: var(--bg);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .maps-table th:hover {
      color: var(--text);
    }

    .maps-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .maps-table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .visibility-bar {
      width: 100%;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .visibility-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--warning), var(--error));
      transition: width 0.3s;
    }

    .expand-icon {
      cursor: pointer;
      color: var(--text2);
    }

    .expand-icon:hover {
      color: var(--text);
    }

    .action-panel {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }

    .action-panel-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .action-panel-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-footer {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .metric-footer-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .metric-footer dl {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric-footer dt {
      font-weight: 600;
      color: var(--text);
    }

    .metric-footer dd {
      color: var(--text2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    const API_BASE = window.location.origin + '/api';

    const api = async (path, opts = {}) => {
      const token = localStorage.getItem('token');
      const res = await fetch(`${API_BASE}${path}`, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          ...(token && { Authorization: `Bearer ${token}` }),
          ...opts.headers,
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });

      if (res.status === 401) {
        console.warn('[api] 401 on', path);
        return { error: 'Not authenticated' };
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    };

    // ============ LOGIN PAGE ============
    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isRegister, setIsRegister] = useState(false);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          const endpoint = isRegister ? '/auth/register' : '/auth/login';
          const data = await api(endpoint, {
            method: 'POST',
            body: { email, password },
          });

          localStorage.setItem('token', data.token);
          setEmail('');
          setPassword('');
          onLogin(data.user);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="login-page">
          <div className="login-form">

                <i className="fas fa-search"></i>

      const [optimizingPages, setOptimizingPages] = useState(new Set());
      const [expandedSpeedPage, setExpandedSpeedPage] = useState(null);
      const [pageSpeedData, setPageSpeedData] = useState({});

      const categories = [
        { key: 'speed', label: 'Page Speed & Core Web Vitals', icon: 'fas fa-tachometer-alt', color: '#ef4444' },

        { key: 'sitemap', label: 'Sitemap & Robots.txt', icon: 'fas fa-sitemap', color: '#6366f1' },

        { id: 1, category: 'speed', severity: 'Critical', title: 'LCP exceeds 4.0s on mobile', description: 'Largest Contentful Paint is 4.2s on /plumber-perth. Google threshold is 2.5s.', current: '4.2s', recommended: '< 2.5s' },

        { id: 3, category: 'links', severity: 'Critical', title: '12 broken internal links found', description: 'Links pointing to pages that return 404 errors.', current: '12 broken links', recommended: 'Fix or redirect all' },
        { id: 4, category: 'crawl', severity: 'Medium', title: '3 pages blocked by robots.txt', description: 'Service pages accidentally blocked from crawling.', current: '3 pages blocked', recommended: 'Remove from robots.txt' },
        { id: 5, category: 'schema', severity: 'Low', title: 'Missing LocalBusiness schema on suburb pages', description: 'Suburb landing pages lack structured data for local SEO.', current: 'No schema', recommended: 'Add LocalBusiness + Service schema' },
        { id: 6, category: 'mobile', severity: 'Medium', title: 'Tap targets too close on /contact', description: 'Buttons and links are less than 48px apart on mobile.', current: '32px spacing', recommended: '48px minimum' },

        { id: 9, category: 'sitemap', severity: 'Low', title: 'Sitemap contains 404 URLs', description: '3 URLs in sitemap return 404.', current: '3 dead URLs', recommended: 'Remove from sitemap' },
      ];

      const runAudit = async () => {
        setLoading(true); setError('');
        try {
          await new Promise(r => setTimeout(r, 1500));
          setFindings(sampleFindings);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const runSpeedAudit = async () => {
        setSpeedLoading(true); setSpeedError('');
        try {
          const data = await api('/speed-audit/${project?.id || 1}/run', { method: 'POST' });
          setSpeedResults(data.results || []);
        } catch (err) { setSpeedError(err.message); }
        finally { setSpeedLoading(false); }

        setOptimizingPages(prev => new Set([...prev, pageId]));

          await api(`/speed-audit/${project?.id || 1}/optimize/${pageId}`, { method: 'POST', body: { max_width: 1200, quality: 82, webp: true } });

          const updated = await api(`/speed-audit/${project?.id || 1}/page/${pageId}`);
          setSpeedResults(prev => prev.map(r => r.page_id === pageId ? { ...r, ...updated } : r));

            {!speedLoading && speedResults.length === 0 && (

    // ============ ACTION PLAN PAGES ============
    function ActionPlanPage({ type, title, icon }) {
      const [actions, setActions] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [statusFilter, setStatusFilter] = useState('all');
      const [severityFilter, setSeverityFilter] = useState('all');

      useEffect(() => {
        loadActions();
      }, [type]);

      const loadActions = async () => {
        setLoading(true);
        setError('');
        try {
          const data = await api(`/actions/${type}`);
          setActions(data.actions || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleApproveExecute = async (actionId) => {
        try {
          await api(`/actions/${actionId}/approve-execute`, { method: 'POST' });
          setActions((prev) =>
            prev.map((a) => (a.id === actionId ? { ...a, status: 'in-progress' } : a))
          );
        } catch (err) {
          setError(err.message);
        }
      };

      const handleMarkManual = async (actionId) => {
        try {
          await api(`/actions/${actionId}/mark-manual`, { method: 'POST' });
          setActions((prev) =>
            prev.map((a) => (a.id === actionId ? { ...a, status: 'pending' } : a))
          );
        } catch (err) {
          setError(err.message);
        }
      };

      const handleStatusChange = async (actionId, newStatus) => {
        try {
          await api(`/actions/${actionId}`, {
            method: 'PATCH',
            body: { status: newStatus },
          });
          setActions((prev) =>
            prev.map((a) => (a.id === actionId ? { ...a, status: newStatus } : a))
          );
        } catch (err) {
          setError(err.message);
        }
      };

      const statuses = ['pending', 'approved', 'in-progress', 'done'];

      const filteredActions = useMemo(() => {
        return actions.filter(
          (a) =>
            (statusFilter === 'all' || a.status === statusFilter) &&
            (severityFilter === 'all' || a.severity === severityFilter)
        );
      }, [actions, statusFilter, severityFilter]);

      const statusColumns = useMemo(() => {
        return statuses.map((status) => ({
          status,
          actions: filteredActions.filter((a) => a.status === status),
        }));
      }, [filteredActions]);

      return (
        <>

                  onChange={(e) => setStatusFilter(e.target.value)}
                >
                  <option value="all">All Status</option>
                  <option value="pending">Pending</option>
                  <option value="approved">Approved</option>
                  <option value="in-progress">In Progress</option>
                  <option value="done">Done</option>
                </select>
              </label>

              <label className="flex gap-8">
                <span style={{ color: 'var(--text2)' }}>Severity:</span>
                <select

                >
                  <option value="all">All Severity</option>
                  <option value="Critical">Critical</option>
                  <option value="Medium">Medium</option>
                  <option value="Low">Low</option>
                </select>
              </label>
            </div>
          </div>

          <div className="kanban-board">
            {statusColumns.map(({ status, actions: statusActions }) => (
              <div key={status} className="kanban-column">
                <div className="kanban-column-header">
                  <div style={{ textTransform: 'capitalize' }}>
                    {status === 'in-progress' ? 'In Progress' : status.charAt(0).toUpperCase() + status.slice(1)}

                  <div className="kanban-column-count">{statusActions.length}</div>
                </div>
                <div className="kanban-items">
                  {statusActions.map((action) => (
                    <div key={action.id} className="kanban-card">
