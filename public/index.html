                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>
                            <i className="fa-solid fa-briefcase" style={{ marginRight: 6, color: 'var(--accent)' }} />Services
                          </span>
                          <span style={{ fontSize: 11, color: 'var(--text3)' }}>{genServicesText.split('\n').filter(s => s.trim()).length} added</span>
                        </div>
                        <textarea className="form-input" value={genServicesText} onChange={(e) => setGenServicesText(e.target.value)}
                          placeholder={'One per line, e.g.:\nauto locksmith\ncar key replacement\nemergency lockout\ntransponder key programming'}
                          rows={8} style={{ fontSize: 12, resize: 'vertical', minHeight: 160, fontFamily: 'inherit' }} />
                        <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                          <button onClick={suggestServices} disabled={suggestingServices} className="btn btn-primary" style={{ fontSize: 11, padding: '6px 12px', flex: 1 }}>
                            {suggestingServices ? <><i className="fa-solid fa-spinner fa-spin" style={{ marginRight: 4 }} />Generating...</> : <><i className="fa-solid fa-robot" style={{ marginRight: 4 }} />AI Suggest</>}
                          </button>
                          <button onClick={() => {
                            const input = document.createElement('input');
                            input.type = 'file'; input.accept = '.csv,.txt';
                            input.onchange = async (e) => {
                              const file = e.target.files[0]; if (!file) return;
                              const text = await file.text();
                              const lines = text.split(/\r?\n/).map(l => l.split(',')[0].replace(/^["']|["']$/g, '').trim()).filter(s => s && !['service','keyword','services'].includes(s.toLowerCase()));
                              setGenServicesText(prev => {
                                const existing = prev.split('\n').filter(s => s.trim());
                                return [...new Set([...existing, ...lines])].join('\n');
                              });
                            };
                            input.click();
                          }} className="btn" style={{ fontSize: 11, padding: '6px 12px' }}>
                            <i className="fa-solid fa-file-csv" style={{ marginRight: 4 }} />CSV
                          </button>
                        </div>
                      </div>
                      {/* Suburbs */}
                      <div>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>
                            <i className="fa-solid fa-map-marker-alt" style={{ marginRight: 6, color: '#22c55e' }} />Suburbs
                          </span>
                          <span style={{ fontSize: 11, color: 'var(--text3)' }}>{genSuburbsText.split('\n').filter(s => s.trim()).length} added</span>
                        </div>
                        <textarea className="form-input" value={genSuburbsText} onChange={(e) => setGenSuburbsText(e.target.value)}
                          placeholder={'One per line, e.g.:\nVincent\nSubiaco\nVictoria Park\nNedlands\nBayswater'}
                          rows={8} style={{ fontSize: 12, resize: 'vertical', minHeight: 160, fontFamily: 'inherit' }} />
                        {/* Quick-fill from service areas */}
                        <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
                          <button onClick={async () => {
                            const resp = await api(`/projects/${project.id}/service-areas`);
                            const areas = (resp.service_areas || resp || []).filter(a => !cityNames.has((a.name || '').toLowerCase()));
                            const sorted = areas.sort((a, b) => (a.distance || 99) - (b.distance || 99));
                            setGenSuburbsText(prev => {
                              const existing = prev.split('\n').filter(s => s.trim());
                              return [...new Set([...existing, ...sorted.map(a => a.name)])].join('\n');
                            });
                          }} className="btn" style={{ fontSize: 11, padding: '6px 12px', flex: 1 }}>
                            <i className="fa-solid fa-location-dot" style={{ marginRight: 4 }} />Load from Settings
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Config row */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, padding: '12px 16px', background: 'var(--bg)', borderRadius: 8, border: '1px solid var(--border)' }}>
                      <div style={{ display: 'flex', borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border)' }}>
                        {[['1:1', '1 : 1'], ['many', 'Many : Many']].map(([val, label]) => (
                          <button key={val} onClick={() => setComboMode(val)}
                            style={{ padding: '5px 14px', fontSize: 11, fontWeight: 600, cursor: 'pointer', border: 'none',
                              background: comboMode === val ? 'var(--accent)' : 'var(--bg3)', color: comboMode === val ? '#fff' : 'var(--text2)' }}>{label}</button>
                        ))}
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text2)' }}>Keywords:</span>
                      {[10, 20, 30, 40, 50].map(n => (
                        <button key={n} onClick={() => setMapsLimit(n)}
                          style={{ padding: '5px 14px', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                            background: mapsLimit === n ? 'var(--accent)' : 'var(--bg3)', color: mapsLimit === n ? '#fff' : 'var(--text2)',
                            border: mapsLimit === n ? 'none' : '1px solid var(--border)' }}>{n}</button>
                      ))}
                    </div>
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                    {/* Step 2: Results */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                      <button className="btn" onClick={() => setGenStep('input')} style={{ fontSize: 11, padding: '4px 12px' }}>
                        <i className="fa-solid fa-arrow-left" style={{ marginRight: 4 }} />Back to inputs
                      </button>
                      <button className="btn" onClick={generateCombos} disabled={generating} style={{ fontSize: 11, padding: '4px 12px' }}>
                        <i className="fa-solid fa-sync" style={{ marginRight: 4 }} />{generating ? 'Regenerating...' : 'Regenerate'}
                      </button>
                    </div>

                    {/* Manual add row */}
                    <div style={{ display: 'flex', gap: 6, marginBottom: 10, alignItems: 'center' }}>
                      <input className="form-input" value={manualService} onChange={(e) => setManualService(e.target.value)} placeholder="Service..." style={{ fontSize: 11, padding: '4px 8px', flex: 1 }} />
                      <input className="form-input" value={manualSuburb} onChange={(e) => setManualSuburb(e.target.value)} placeholder="Suburb..." style={{ fontSize: 11, padding: '4px 8px', flex: 1 }}
                        onKeyDown={(e) => { if (e.key === 'Enter') addManualCombo(); }} />
                      <button onClick={addManualCombo} className="btn" style={{ fontSize: 10, padding: '4px 10px' }}>
                        <i className="fa-solid fa-plus" style={{ marginRight: 3 }} />Add
                      </button>
                    </div>

                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                      <thead>
                        <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)' }}>
                          <th style={{ padding: '6px 10px', width: 24 }}></th>
                          <th style={{ padding: '6px 10px', textAlign: 'left' }}>Service</th>
                          <th style={{ padding: '6px 10px', textAlign: 'left' }}>Suburb</th>
                          <th style={{ padding: '6px 10px', textAlign: 'center', width: 70 }}>Vol.</th>
                          <th style={{ padding: '6px 10px', width: 30 }}></th>
                        </tr>
                      </thead>
                      <tbody>
                        {genCombos.map((c, i) => (
                          <tr key={i} style={{ borderBottom: '1px solid var(--border)', cursor: 'pointer' }} onClick={() => toggleGenItem(i)}>
                            <td style={{ padding: '6px 10px', textAlign: 'center' }}>
                              <input type="checkbox" checked={!!genChecked[i]} onChange={(e) => { e.stopPropagation(); toggleGenItem(i); }} />
                            </td>
                            <td style={{ padding: '6px 10px', fontWeight: 500 }}>{c.service}</td>
                            <td style={{ padding: '6px 10px' }}>{c.location}</td>
                            <td style={{ padding: '6px 10px', textAlign: 'center', color: c.volume != null ? (c.volume >= 100 ? '#22c55e' : c.volume >= 10 ? '#f59e0b' : 'var(--text3)') : 'var(--text3)', fontSize: 11 }}>
                              {c.volume != null ? c.volume.toLocaleString() : '—'}
                            </td>
                            <td style={{ padding: '6px 10px', textAlign: 'center' }}>
                              <button onClick={(e) => { e.stopPropagation(); removeCombo(i); }} style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 11 }}>×</button>

                <div style={{ padding: '12px 20px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8, alignItems: 'center' }}>

                    <button className="btn btn-primary" onClick={generateCombos} disabled={generating} style={{ flex: 1, fontSize: 13, padding: '10px 16px' }}>

                    </button>
                  ) : (
                    <React.Fragment>
                      <button className="btn" onClick={() => {
                        if (checkedCount === genCombos.length) setGenChecked({});
                        else { const c = {}; genCombos.forEach((_, i) => c[i] = true); setGenChecked(c); }
                      }} style={{ flex: 1, fontSize: 12 }}>
                        {checkedCount === genCombos.length ? 'Deselect All' : 'Select All'}
                      </button>
                      <button className="btn btn-primary" onClick={addGeneratedKeywords} disabled={checkedCount === 0} style={{ flex: 1, fontSize: 12 }}>
                        <i className="fa-solid fa-plus" style={{ marginRight: 4 }} />Add {checkedCount} Keywords
                      </button>
                    </React.Fragment>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============ MONTHLY REPORTS PAGE ============
    function MonthlyReportsPage({ project }) {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [generating, setGenerating] = useState(false);
      const [expandedId, setExpandedId] = useState(null);

      useEffect(() => {
        if (project) loadReports();
      }, [project?.id]);

      const loadReports = async () => {
        setLoading(true);
        setError('');
        try {
          const data = await api(`/projects/${project.id}/reports`);
          setReports(data.reports || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleGenerateReport = async () => {
        setGenerating(true);
        setError('');
        try {
          const data = await api(`/projects/${project.id}/reports/generate`, { method: 'POST' });
          if (data.report) {
            setReports(prev => {
              const filtered = prev.filter(r => r.month !== data.report.month);
              return [data.report, ...filtered];
            });
            setExpandedId(data.report.id);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setGenerating(false);
        }
      };

      const StatBox = ({ label, value, sub, color }) => (
        <div style={{ padding: '14px 16px', background: 'var(--bg)', borderRadius: 8, border: '1px solid var(--border)' }}>
          <div style={{ color: 'var(--text3)', fontSize: 11, marginBottom: 4 }}>{label}</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: color || 'var(--text)' }}>{value}</div>
          {sub && <div style={{ color: 'var(--text3)', fontSize: 11, marginTop: 2 }}>{sub}</div>}
        </div>
      );

      return (
        <>
          <div className="page-header">
            <div className="page-title">
              <i className="fas fa-chart-bar"></i> Monthly Reports
            </div>
            <div className="page-subtitle">Auto-generated performance reports from your SEO data</div>
          </div>

          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

          <button className="btn btn-primary" style={{ marginBottom: 20 }} onClick={handleGenerateReport} disabled={generating}>
            {generating ? <span className="spinner"></span> : <i className="fas fa-sync-alt"></i>}
            {generating ? ' Generating...' : ' Generate This Month\'s Report'}
          </button>

          {reports.length > 0 ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {reports.map((report) => {
                const isExpanded = expandedId === report.id;
                const rs = report.rankingsSummary || {};
                const gsc = report.gscTrends || {};
                return (
                  <div key={report.id} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
                    <div
                      style={{ padding: '16px 20px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}
                      onClick={() => setExpandedId(isExpanded ? null : report.id)}
                    >
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 700 }}>{report.monthLabel || report.month}</div>
                        <div style={{ color: 'var(--text3)', fontSize: 12, marginTop: 2 }}>
                          Generated {new Date(report.createdAt || report.generatedAt).toLocaleDateString('en-AU')}
                        </div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                        {rs.avgPosition && <span style={{ fontSize: 12, color: 'var(--text2)' }}>Avg #{rs.avgPosition.toFixed(1)}</span>}
                        {gsc.clicks > 0 && <span style={{ fontSize: 12, color: 'var(--text2)' }}>{gsc.clicks} clicks</span>}
                        <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`} style={{ color: 'var(--text3)' }} />
                      </div>
                    </div>

                    {isExpanded && (
                      <div style={{ padding: '0 20px 20px', borderTop: '1px solid var(--border)' }}>
                        {/* SERP Rankings */}
                        <div style={{ fontSize: 13, fontWeight: 600, margin: '16px 0 10px', color: 'var(--text2)' }}>
                          <i className="fas fa-search" style={{ marginRight: 6 }} />SERP Rankings
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10 }}>
                          <StatBox label="Avg Position" value={rs.avgPosition ? `#${rs.avgPosition.toFixed(1)}` : '—'} color={rs.avgPosition && rs.avgPosition <= 10 ? '#22c55e' : '#f59e0b'} />
                          <StatBox label="Top 3" value={rs.serpTop3 || 0} sub={`of ${rs.serpPositions || 0} tracked`} color="#22c55e" />
                          <StatBox label="Top 10" value={rs.serpTop10 || 0} color="#3b82f6" />
                          <StatBox label="Keywords" value={rs.keywordsTracked || 0} />
                        </div>

                        {/* Maps Rankings */}
                        {(rs.mapsPositions > 0) && (
                          <>
                            <div style={{ fontSize: 13, fontWeight: 600, margin: '16px 0 10px', color: 'var(--text2)' }}>
                              <i className="fas fa-map-marker-alt" style={{ marginRight: 6 }} />Maps Rankings
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10 }}>
                              <StatBox label="Avg Maps Position" value={rs.avgMapsPosition ? `#${rs.avgMapsPosition.toFixed(1)}` : '—'} color={rs.avgMapsPosition && rs.avgMapsPosition <= 3 ? '#22c55e' : '#f59e0b'} />
                              <StatBox label="Maps Top 3" value={rs.mapsTop3 || 0} sub={`of ${rs.mapsPositions} tracked`} color="#22c55e" />
                            </div>
                          </>
                        )}

                        {/* GSC */}
                        <div style={{ fontSize: 13, fontWeight: 600, margin: '16px 0 10px', color: 'var(--text2)' }}>
                          <i className="fas fa-chart-line" style={{ marginRight: 6 }} />Google Search Console
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10 }}>
                          <StatBox label="Total Clicks" value={gsc.clicks?.toLocaleString() || 0} color="#3b82f6" />
                          <StatBox label="Impressions" value={gsc.impressions?.toLocaleString() || 0} />
                          <StatBox label="Avg CTR" value={gsc.ctr ? `${gsc.ctr.toFixed(1)}%` : '—'} color={gsc.ctr >= 3 ? '#22c55e' : '#f59e0b'} />
                          <StatBox label="Keywords w/ Clicks" value={gsc.keywordsWithClicks || 0} sub={`of ${gsc.totalKeywords || 0}`} />
                        </div>

                        {/* Action Items */}
                        <div style={{ fontSize: 13, fontWeight: 600, margin: '16px 0 10px', color: 'var(--text2)' }}>
                          <i className="fas fa-tasks" style={{ marginRight: 6 }} />Action Items
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 10 }}>
                          <StatBox label="Completed" value={report.actionsCompleted || 0} color="#22c55e" />
                          <StatBox label="In Progress" value={report.actionsInProgress || 0} color="#3b82f6" />
                          <StatBox label="Pending" value={report.actionsPending || 0} color="#f59e0b" />
                        </div>

                        {/* Audit Findings */}
                        {report.findingsByPillar && Object.keys(report.findingsByPillar).length > 0 && (
                          <>
                            <div style={{ fontSize: 13, fontWeight: 600, margin: '16px 0 10px', color: 'var(--text2)' }}>
                              <i className="fas fa-clipboard-check" style={{ marginRight: 6 }} />Audit Findings
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 10 }}>
                              {Object.entries(report.findingsByPillar).map(([pillar, data]) => (
                                <div key={pillar} style={{ padding: '12px 16px', background: 'var(--bg)', borderRadius: 8, border: '1px solid var(--border)' }}>
                                  <div style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', color: 'var(--accent)', marginBottom: 6 }}>{pillar}</div>
                                  <div style={{ fontSize: 13 }}>
                                    <span style={{ color: '#ef4444' }}>{data.critical} critical</span> ·
                                    <span> {data.total} total</span> ·
                                    <span style={{ color: '#22c55e' }}> {data.approved} approved</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </>
                        )}

                        {/* Recommendations */}
                        {report.recommendations && report.recommendations.length > 0 && (
                          <div style={{ marginTop: 16, padding: '14px 18px', background: 'rgba(138,180,248,0.08)', border: '1px solid rgba(138,180,248,0.2)', borderRadius: 8 }}>
                            <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: '#8ab4f8' }}>
                              <i className="fas fa-lightbulb" style={{ marginRight: 6 }} />Recommendations
                            </div>
                            {report.recommendations.map((rec, i) => (
                              <div key={i} style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 6, paddingLeft: 12, borderLeft: '2px solid rgba(138,180,248,0.3)' }}>
                                {rec}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ) : !loading && (
            <div className="empty-state">
              <div className="empty-state-icon">
                <i className="fas fa-chart-bar"></i>
              </div>
              <div className="empty-state-title">No reports yet</div>
              <div>Click "Generate This Month's Report" to create your first performance report</div>
            </div>
          )}
        </>
      );
    }

    // ============ PROJECT SETTINGS PAGE ============
    function ProjectSettingsPage({ project: currentProject }) {
      const [project, setProject] = useState(null);
      const [loading, setLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [error, setError] = useState('');
      const [formData, setFormData] = useState({
        name: '',
        domain: '',
        businessName: '',
        industry: '',
        location: '',
        serviceAreas: [],
        competitors: [],
        isLocalBusiness: true,
        isElementorSite: true,
        wordpressUrl: '',
        wpUsername: '',
        wpAppPassword: '',
        gscProperty: '',
        gbpLocationId: '',
        gbpLocationName: '',
        toneOfVoice: '',
        customerPersona: '',
      });
      const [newSuburb, setNewSuburb] = useState('');
      const [newDistance, setNewDistance] = useState(20);
      const [gscSites, setGscSites] = useState([]);
      const [gbpLocations, setGbpLocations] = useState([]);
      const [loadingGsc, setLoadingGsc] = useState(false);
      const [loadingGbp, setLoadingGbp] = useState(false);
      const [newCompetitor, setNewCompetitor] = useState('');

      useEffect(() => {
        if (currentProject) loadProject();
      }, [currentProject?.id]);

      const loadProject = async () => {
        setLoading(true);
        setError('');
        try {
          const data = await api(`/projects/${currentProject.id}`);
          if (data?.project) {
            setProject(data.project);
            setFormData({
              name: data.project.name || '',
              domain: data.project.domain || '',
              businessName: data.project.business_name || data.project.businessName || '',
              industry: data.project.industry || '',
              location: data.project.location || '',
              serviceAreas: data.project.service_areas || data.project.serviceAreas || [],
              competitors: data.project.competitors || [],
              isLocalBusiness: data.project.is_local_business !== false,
              isElementorSite: data.project.is_elementor_site !== false,
              wordpressUrl: data.project.wordpress_url || '',
              wpUsername: data.project.wp_username || '',
              wpAppPassword: data.project.wp_app_password || '',
              gscProperty: data.project.gsc_property || '',
              gbpLocationId: data.project.gbp_location_id || '',
              gbpLocationName: data.project.gbp_location_name || '',
              toneOfVoice: data.project.tone_of_voice || '',
              customerPersona: data.project.customer_persona || '',
            });
          }
          // Load available GSC sites and GBP locations
          loadGscSites();
          loadGbpLocations();
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleSave = async () => {
        setSaving(true);
        setError('');
        try {
          const pid = project?.id || currentProject?.id;
          if (!pid) { setError('No project selected'); setSaving(false); return; }
          await api(`/projects/${pid}`, {
            method: 'PUT',
            body: {
              ...formData,
              tone_of_voice: formData.toneOfVoice,
              customer_persona: formData.customerPersona,
            },
          });
          setError('');
          setSaved(true);
          setTimeout(() => setSaved(false), 3000);
        } catch (err) {
          setError(err.message);
        } finally {
          setSaving(false);
        }
      };

      const [bulkMode, setBulkMode] = useState(false);
      const [bulkText, setBulkText] = useState('');

      const handleAddSuburb = () => {
        if (!newSuburb.trim()) return;
        setFormData((prev) => ({
          ...prev,
          serviceAreas: [...prev.serviceAreas, { name: newSuburb, distance: newDistance }],
        }));
        setNewSuburb('');
        setNewDistance(20);
      };

      const handleBulkAdd = () => {
        if (!bulkText.trim()) return;
        const names = bulkText.split(/[,\n]/).map(s => s.trim()).filter(Boolean);
        const existing = new Set(formData.serviceAreas.map(a => a.name.toLowerCase()));
        const newAreas = names.filter(n => !existing.has(n.toLowerCase())).map(name => ({ name, distance: newDistance }));
        if (newAreas.length === 0) return;
        setFormData(prev => ({ ...prev, serviceAreas: [...prev.serviceAreas, ...newAreas] }));
        setBulkText('');
        setBulkMode(false);
      };

      const importSuburbsCSV = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv,.txt';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const text = await file.text();
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          const existing = new Set(formData.serviceAreas.map(a => a.name.toLowerCase()));
          const newAreas = [];
          for (const line of lines) {
            const parts = line.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
            const name = parts[0];
            if (!name || name.toLowerCase() === 'suburb' || name.toLowerCase() === 'name' || name.toLowerCase() === 'location') continue;
            if (existing.has(name.toLowerCase())) continue;
            existing.add(name.toLowerCase());
            const dist = parts[1] ? parseInt(parts[1]) || 20 : newDistance;
            newAreas.push({ name, distance: dist });
          }
          if (newAreas.length > 0) {
            setFormData(prev => ({ ...prev, serviceAreas: [...prev.serviceAreas, ...newAreas] }));
            alert(`Imported ${newAreas.length} suburbs`);
          } else {
            alert('No new suburbs found. CSV format: suburb name, distance (one per line)');
          }
        };
        input.click();
      };

      const handleRemoveSuburb = (index) => {
        setFormData((prev) => ({
          ...prev,
          serviceAreas: prev.serviceAreas.filter((_, i) => i !== index),
        }));
      };

      const handleAddCompetitor = () => {
        if (!newCompetitor.trim()) return;
        const updated = [...formData.competitors, newCompetitor.trim()];
        setFormData((prev) => ({ ...prev, competitors: updated }));
        setNewCompetitor('');
        // Auto-save competitors
        const pid = project?.id || currentProject?.id;
        if (pid) api(`/projects/${pid}`, { method: 'PUT', body: { competitors: updated } }).catch(e => console.error('Save competitors:', e));
      };

      const handleRemoveCompetitor = (index) => {
        const updated = formData.competitors.filter((_, i) => i !== index);
        setFormData((prev) => ({ ...prev, competitors: updated }));
        // Auto-save competitors
        const pid = project?.id || currentProject?.id;
        if (pid) api(`/projects/${pid}`, { method: 'PUT', body: { competitors: updated } }).catch(e => console.error('Save competitors:', e));
      };

      const loadGscSites = async () => {
        setLoadingGsc(true);
        try {
          const data = await api('/user/gsc/sites');
          setGscSites(data.sites || []);
        } catch (e) { /* GSC not connected */ }
        finally { setLoadingGsc(false); }
      };

      const loadGbpLocations = async () => {
        setLoadingGbp(true);
        try {
          const data = await api('/user/gbp/locations');
          setGbpLocations(data.locations || []);
        } catch (e) { /* GBP not connected */ }
        finally { setLoadingGbp(false); }
      };

      if (loading) {
        return <div className="empty-state"><span className="spinner"></span> Loading...</div>;
      }

      return (
        <>
          <div className="page-header">
            <div className="page-title">
              <i className="fas fa-cog"></i> Project Settings
            </div>
            <div className="page-subtitle">Configure your current project</div>
          </div>

          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

          <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>Basic Information</div>

            <div className="form-group">
              <label className="form-label">Project Name</label>
              <input
                type="text"
                className="form-input"
                value={formData.name}
                onChange={(e) => setFormData((prev) => ({ ...prev, name: e.target.value }))}
                placeholder="My Client Project"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Domain</label>
              <input
                type="text"
                className="form-input"
                value={formData.domain}
                onChange={(e) => setFormData((prev) => ({ ...prev, domain: e.target.value }))}
                placeholder="example.com"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Business Name</label>
              <input
                type="text"
                className="form-input"
                value={formData.businessName}
                onChange={(e) => setFormData((prev) => ({ ...prev, businessName: e.target.value }))}
                placeholder="My Business Inc."
              />
            </div>

            <div className="form-group">
              <label className="form-label">Industry</label>
              <input
                type="text"
                className="form-input"
                value={formData.industry}
                onChange={(e) => setFormData((prev) => ({ ...prev, industry: e.target.value }))}
                placeholder="e.g., Plumbing"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Location</label>
              <input
                type="text"
                className="form-input"
                value={formData.location}
                onChange={(e) => setFormData((prev) => ({ ...prev, location: e.target.value }))}
                placeholder="e.g., Perth, Australia"
              />
            </div>
          </div>

          <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>Project Type</div>

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
              <div>
                <strong>Local Business</strong>
                <div style={{ color: 'var(--text2)', fontSize: '13px' }}>Enable GBP Audit, GBP Actions, Maps Rankings, and service area targeting</div>
              </div>
              <label style={{ position: 'relative', display: 'inline-block', width: '48px', height: '26px', cursor: 'pointer' }}>
                <input
                  type="checkbox"
                  checked={formData.isLocalBusiness}
                  onChange={(e) => setFormData(prev => ({ ...prev, isLocalBusiness: e.target.checked }))}
                  style={{ opacity: 0, width: 0, height: 0 }}
                />
                <span style={{
                  position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                  background: formData.isLocalBusiness ? 'var(--primary)' : 'var(--bg)',
                  borderRadius: '13px', transition: 'background 0.2s',
                  border: '1px solid var(--border)'
                }}>
                  <span style={{
                    position: 'absolute', top: '3px', left: formData.isLocalBusiness ? '24px' : '3px',
                    width: '18px', height: '18px', borderRadius: '50%',
                    background: '#fff', transition: 'left 0.2s'
                  }}></span>
                </span>
              </label>
            </div>

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
              <div>
                <strong>Elementor Site</strong>
                <div style={{ color: 'var(--text2)', fontSize: '13px' }}>Use SEO Room Helper plugin for design-safe Elementor content updates</div>
              </div>
              <label style={{ position: 'relative', display: 'inline-block', width: '48px', height: '26px', cursor: 'pointer' }}>
                <input
                  type="checkbox"
                  checked={formData.isElementorSite}
                  onChange={(e) => setFormData(prev => ({ ...prev, isElementorSite: e.target.checked }))}
                  style={{ opacity: 0, width: 0, height: 0 }}
                />
                <span style={{
                  position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                  background: formData.isElementorSite ? 'var(--primary)' : 'var(--bg)',
                  borderRadius: '13px', transition: 'background 0.2s',
                  border: '1px solid var(--border)'
                }}>
                  <span style={{
                    position: 'absolute', top: '3px', left: formData.isElementorSite ? '24px' : '3px',
                    width: '18px', height: '18px', borderRadius: '50%',
                    background: '#fff', transition: 'left 0.2s'
                  }}></span>
                </span>
              </label>
            </div>

            <div className="form-group" style={{ marginTop: '12px' }}>
              <label className="form-label">WordPress URL</label>
              <input
                type="text"
                className="form-input"
                value={formData.wordpressUrl}
                onChange={(e) => setFormData(prev => ({ ...prev, wordpressUrl: e.target.value }))}
                placeholder="https://yoursite.com"
              />
              <div style={{ color: 'var(--text2)', fontSize: '12px', marginTop: '4px' }}>
                {formData.isElementorSite ? 'Requires seoroom-helper.php installed as mu-plugin' : 'Uses standard WP REST API for content updates'}
              </div>
            </div>

            <div style={{ marginTop: 16, padding: 14, background: 'rgba(59,130,246,0.05)', borderRadius: 8, border: '1px solid rgba(59,130,246,0.15)' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text1)', marginBottom: 10 }}>
                <i className="fas fa-key" style={{ marginRight: 6, color: '#3b82f6' }} />WordPress Auth (for On-Page Fix)
              </div>
              <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 10 }}>
                Required to push meta fixes to WordPress. Create an Application Password in WordPress: Users → Your Profile → Application Passwords.
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <label className="form-label" style={{ fontSize: 11 }}>WP Username</label>
                  <input type="text" className="form-input" value={formData.wpUsername}
                    onChange={(e) => setFormData(prev => ({ ...prev, wpUsername: e.target.value }))}
                    placeholder="admin" style={{ fontSize: 12 }} />
                </div>
                <div>
                  <label className="form-label" style={{ fontSize: 11 }}>Application Password</label>
                  <input type="password" className="form-input" value={formData.wpAppPassword}
                    onChange={(e) => setFormData(prev => ({ ...prev, wpAppPassword: e.target.value }))}
                    placeholder="xxxx xxxx xxxx xxxx" style={{ fontSize: 12 }} />
                </div>
              </div>
            </div>
          </div>

          {/* Google Connections — per-project property/location selection */}
          <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>
              <i className="fab fa-google" style={{ marginRight: 8, color: '#4285F4' }} />Google Connections
            </div>
            <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 16 }}>
              Connect your Google accounts in <strong>Agency Integrations</strong>, then select which property/location belongs to this project.
            </div>

            <div className="form-group">
              <label className="form-label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span><i className="fas fa-chart-line" style={{ marginRight: 6, color: '#4285F4' }} />Google Search Console Property</span>
                {gscSites.length > 0 && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: 'rgba(34,197,94,0.15)', color: '#22c55e', fontWeight: 600 }}>Connected</span>}
              </label>
              {gscSites.length > 0 ? (
                <select className="form-input" value={formData.gscProperty} onChange={(e) => setFormData(prev => ({ ...prev, gscProperty: e.target.value }))}>
                  <option value="">— Select GSC Property —</option>
                  {gscSites.map(s => <option key={s.url} value={s.url}>{s.url} ({s.permission})</option>)}
                </select>
              ) : (
                <div style={{ padding: '10px 14px', background: 'var(--bg)', borderRadius: 8, fontSize: 13, color: 'var(--text3)' }}>
                  {loadingGsc ? <><span className="spinner" style={{ width: 14, height: 14, marginRight: 6 }} />Loading sites...</> :
                    formData.gscProperty ? <span style={{ color: 'var(--text)' }}>{formData.gscProperty}</span> :
                    'GSC not connected — connect in Agency Integrations'}
                </div>
              )}
            </div>

            <div className="form-group" style={{ marginTop: 12 }}>
              <label className="form-label" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span><i className="fas fa-map-marker-alt" style={{ marginRight: 6, color: '#EA4335' }} />Google Business Profile</span>
                {formData.gbpLocationId && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 6, background: 'rgba(34,197,94,0.15)', color: '#22c55e', fontWeight: 600 }}>Linked</span>}
              </label>
              <input
                type="text"
                className="form-input"
                value={formData.gbpLocationId}
                onChange={(e) => setFormData(prev => ({ ...prev, gbpLocationId: e.target.value }))}
                placeholder="Paste Google Maps URL or Place ID (e.g. ChIJ...)"

    // ============ INTEGRATIONS PAGE ============
    function IntegrationsPage({ project }) {
      const [integrations, setIntegrations] = useState({
        gbp: { connected: false },
        gsc: { connected: false },
        serpapi: { connected: false },
        localfalcon: { connected: false },
        wordpress: { connected: false },
        ahrefs: { active: false },
      });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [testLoading, setTestLoading] = useState({});
      const [serpApiCredentials, setSerpApiCredentials] = useState({ apiKey: '' });
      const [lfCredentials, setLfCredentials] = useState({ apiKey: '' });
      const [wpCredentials, setWpCredentials] = useState({ url: '', username: '', appPassword: '' });

      useEffect(() => {
        loadIntegrations();
      }, [project?.id]);

      const loadIntegrations = async () => {
        setLoading(true);
        setError('');
        try {
          // Load user-level integrations (GSC, GBP)
          const userData = await api('/user/integrations');
          if (userData && !userData.error) {
            const raw = userData.integrations || {};
            setIntegrations(prev => ({
              ...prev,
              gsc: raw.gsc || { connected: false },
              gbp: raw.gbp || { connected: false },
            }));
          }
          // Load project-level integrations (SerpAPI, LocalFalcon, WordPress, Ahrefs)
          if (project?.id) {
            const projData = await api(`/projects/${project.id}/integrations`);
            if (projData && !projData.error) {
              const raw = projData.integrations || projData || {};
              const normalized = {};
              for (const [key, val] of Object.entries(raw)) {
                if (key === 'gsc' || key === 'gbp') continue; // skip — these are user-level now
                normalized[key] = { ...val, connected: val.status === 'connected' };
              }
              setIntegrations(prev => ({ ...prev, ...normalized }));
              // Populate credential inputs from saved config
              if (normalized.serpapi?.config) {
                const c = normalized.serpapi.config;
                setSerpApiCredentials({ apiKey: c.apiKey || '' });
              }
              if (normalized.localfalcon?.config) {
                const c = normalized.localfalcon.config;
                setLfCredentials({ apiKey: c.apiKey || '' });
              }
              if (normalized.wordpress?.config) {
                const c = normalized.wordpress.config;
                setWpCredentials({ url: c.url || '', username: c.username || '', appPassword: c.appPassword || '' });
              }
            }
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleConnectOAuth = async (type) => {
        try {
          const token = localStorage.getItem('token');
          // User-level OAuth — no projectId
          const data = await fetch(`/api/user/${type}/connect`, {
            headers: { 'Authorization': `Bearer ${token}` }
          }).then(r => r.json());
          if (data.url) {
            window.open(data.url, 'oauth', 'width=600,height=700');
          } else {
            setError(data.error || `${type.toUpperCase()} OAuth not configured`);
          }
        } catch (err) {
          setError(err.message);
        }
      };

      const handleDisconnectOAuth = async (type) => {
        try {
          await api(`/user/${type}/disconnect`, { method: 'POST' });
          await loadIntegrations();
        } catch (err) {
          setError(err.message);
        }
      };

      const [testResult, setTestResult] = useState({});

      const handleTestConnection = async (type) => {
        setTestLoading((prev) => ({ ...prev, [type]: true }));
        setTestResult((prev) => ({ ...prev, [type]: null }));
        try {
          if (type === 'gsc' || type === 'gbp') {
            const data = await api(`/user/${type}/status`);
            setTestResult((prev) => ({ ...prev, [type]: data.connected ? 'Connected' : 'Not connected' }));
          } else {
            const data = await api(`/projects/${project.id}/integrations/${type}/test`, { method: 'POST' });
            setTestResult((prev) => ({ ...prev, [type]: data.message || 'Connected' }));
          }
        } catch (err) {
          setTestResult((prev) => ({ ...prev, [type]: '✗ ' + err.message }));
        } finally {
          setTestLoading((prev) => ({ ...prev, [type]: false }));
          setTimeout(() => setTestResult((prev) => ({ ...prev, [type]: null })), 4000);
        }
      };

      const [savedType, setSavedType] = useState(null);

      const handleSaveCredentials = async (type, credentials) => {
        if (!project?.id) { setError('No project selected'); return; }
        try {
          const data = await api(`/projects/${project.id}/integrations/${type}`, {
            method: 'PUT',
            body: { status: 'connected', config: credentials },
          });
          if (data.error) { setError(data.error); return; }
          await loadIntegrations();
          setSavedType(type);
          setTimeout(() => setSavedType(null), 2000);
        } catch (err) {
          setError(err.message);
        }
      };

      return (
        <>
          <div className="page-header">
            <div className="page-title">
              <i className="fas fa-plug"></i> Agency Integrations
            </div>
            <div className="page-subtitle">Account-level connections shared across all projects</div>
          </div>

          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

          <div style={{ fontSize: '13px', color: 'var(--text2)', marginBottom: '16px', padding: '10px 14px', background: 'var(--bg2)', borderRadius: '8px' }}>
            <i className="fas fa-info-circle" style={{ marginRight: '6px' }}></i>
            Google connections are <strong>account-level</strong> — connect once and they work across all your projects.
          </div>

          {/* Google Business Profile */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-map-marker-alt" style={{ marginRight: '8px', color: '#EA4335' }}></i>
                Google Business Profile
                <span style={{ fontSize: '11px', color: 'var(--text2)', marginLeft: '8px', fontWeight: 400 }}>Account-level</span>
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.gbp?.connected ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.gbp?.connected ? 'Connected' : 'Not Connected'}</span>
              </div>
            </div>
            <div className="btn-group" style={{ gap: '8px' }}>
              <button className="btn btn-primary" onClick={() => handleConnectOAuth('gbp')}>
                <i className="fas fa-link"></i> {integrations.gbp?.connected ? 'Reconnect' : 'Connect'}
              </button>
              {integrations.gbp?.connected && (
                <button className="btn btn-secondary" onClick={() => handleDisconnectOAuth('gbp')}>
                  <i className="fas fa-unlink"></i> Disconnect
                </button>
              )}
            </div>
          </div>

          {/* Google Search Console */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-chart-line" style={{ marginRight: '8px', color: '#4285F4' }}></i>
                Google Search Console
                <span style={{ fontSize: '11px', color: 'var(--text2)', marginLeft: '8px', fontWeight: 400 }}>Account-level</span>
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.gsc?.connected ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.gsc?.connected ? 'Connected' : 'Not Connected'}</span>
              </div>
            </div>
            <div className="btn-group" style={{ gap: '8px' }}>
              <button className="btn btn-primary" onClick={() => handleConnectOAuth('gsc')}>
                <i className="fas fa-link"></i> {integrations.gsc?.connected ? 'Reconnect' : 'Connect'}
              </button>
              {integrations.gsc?.connected && (
                <button className="btn btn-secondary" onClick={() => handleDisconnectOAuth('gsc')}>
                  <i className="fas fa-unlink"></i> Disconnect
                </button>
              )}
            </div>
          </div>

          {/* SerpAPI */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-search" style={{ marginRight: '8px', color: '#FF6B35' }}></i>
                SerpAPI
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.serpapi?.connected ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.serpapi?.connected ? 'Connected' : 'Not Connected'}</span>
              </div>
            </div>
            <div className="integration-fields">
              <input
                type="password"
                className="form-input"
                placeholder="API Key"
                value={serpApiCredentials.apiKey}
                onChange={(e) => setSerpApiCredentials((prev) => ({ ...prev, apiKey: e.target.value }))}
              />
              <div className="btn-group">
                <button
                  className={`btn ${savedType === 'serpapi' ? 'btn-success' : 'btn-primary'}`}
                  onClick={() => handleSaveCredentials('serpapi', serpApiCredentials)}
                >
                  <i className={`fas ${savedType === 'serpapi' ? 'fa-check' : 'fa-save'}`}></i> {savedType === 'serpapi' ? 'Saved' : 'Save'}
                </button>
                <button
                  className="btn btn-secondary"
                  onClick={() => handleTestConnection('serpapi')}
                  disabled={testLoading.serpapi}
                >
                  {testLoading.serpapi ? <span className="spinner"></span> : <i className="fas fa-check"></i>}
                  {testResult.serpapi || 'Test'}
                </button>
              </div>
            </div>
          </div>

          {/* Local Falcon */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-map" style={{ marginRight: '8px', color: '#7C3AED' }}></i>
                Local Falcon
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.localfalcon?.connected ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.localfalcon?.connected ? 'Connected' : 'Not Connected'}</span>
              </div>
            </div>
            <div className="integration-fields">
              <input
                type="password"
                className="form-input"
                placeholder="API Key"
                value={lfCredentials.apiKey}
                onChange={(e) => setLfCredentials((prev) => ({ ...prev, apiKey: e.target.value }))}
              />
              <div className="btn-group">
                <button
                  className={`btn ${savedType === 'localfalcon' ? 'btn-success' : 'btn-primary'}`}
                  onClick={() => handleSaveCredentials('localfalcon', lfCredentials)}
                >
                  <i className={`fas ${savedType === 'localfalcon' ? 'fa-check' : 'fa-save'}`}></i> {savedType === 'localfalcon' ? 'Saved' : 'Save'}
                </button>
                <button
                  className="btn btn-secondary"
                  onClick={() => handleTestConnection('localfalcon')}
                  disabled={testLoading.localfalcon}
                >
                  {testLoading.localfalcon ? <span className="spinner"></span> : <i className="fas fa-check"></i>}
                  {testResult.localfalcon || 'Test'}
                </button>
              </div>
            </div>
          </div>

          {/* WordPress */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-wordpress" style={{ marginRight: '8px', color: '#0073AA' }}></i>
                WordPress
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.wordpress?.connected ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.wordpress?.connected ? 'Connected' : 'Not Connected'}</span>
              </div>
            </div>
            <div className="integration-fields">
              <input
                type="url"
                className="form-input"
                placeholder="WordPress URL (e.g., https://example.com)"
                value={wpCredentials.url}
                onChange={(e) => setWpCredentials((prev) => ({ ...prev, url: e.target.value }))}
              />
              <input
                type="text"
                className="form-input"
                placeholder="Username"
                value={wpCredentials.username}
                onChange={(e) => setWpCredentials((prev) => ({ ...prev, username: e.target.value }))}
              />
              <input
                type="password"
                className="form-input"
                placeholder="App Password"
                value={wpCredentials.appPassword}
                onChange={(e) => setWpCredentials((prev) => ({ ...prev, appPassword: e.target.value }))}
              />
              <div className="btn-group">
                <button
                  className={`btn ${savedType === 'wordpress' ? 'btn-success' : 'btn-primary'}`}
                  onClick={() => handleSaveCredentials('wordpress', wpCredentials)}
                >
                  <i className={`fas ${savedType === 'wordpress' ? 'fa-check' : 'fa-save'}`}></i> {savedType === 'wordpress' ? 'Saved' : 'Save'}
                </button>
                <button
                  className="btn btn-secondary"
                  onClick={() => handleTestConnection('wordpress')}
                  disabled={testLoading.wordpress}
                >
                  {testLoading.wordpress ? <span className="spinner"></span> : <i className="fas fa-check"></i>}
                  {testResult.wordpress || 'Test'}
                </button>
              </div>
            </div>
          </div>

          {/* Ahrefs Extension */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-rocket" style={{ marginRight: '8px', color: '#FF4655' }}></i>
                Ahrefs (Chrome Extension)
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.ahrefs?.active ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.ahrefs?.active ? 'Active' : 'Not Detected'}</span>
