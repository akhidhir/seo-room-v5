                      </div>
                    </div>
                  );
                })}

                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 16 }}>
                  <button className="btn" onClick={function() { setLinkPreview(null); setSelectedPreviewLinks([]); }} disabled={linkPreview.applying} style={{ fontSize: 13, padding: '8px 16px' }}>Cancel</button>
                  <button className="btn btn-primary" onClick={handleApplyLinks} disabled={linkPreview.applying || selectedPreviewLinks.length === 0} style={{ fontSize: 13, padding: '8px 20px' }}>
                    {linkPreview.applying
                      ? React.createElement('span', null, React.createElement('span', { className: 'spinner', style: { marginRight: 6 } }), 'Applying...')
                      : React.createElement('span', null, React.createElement('i', { className: 'fas fa-check', style: { marginRight: 6 } }), 'Apply ' + selectedPreviewLinks.length + ' of ' + linkPreview.links.length + ' Link' + (linkPreview.links.length !== 1 ? 's' : ''))}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============ ACTION PLAN PAGES ============
    function ActionPlanPage({ pillar, agentPillar, title, icon, color, project }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        if (project?.id) loadData();
      }, [project?.id, pillar]);

      const loadData = async () => {
        setLoading(true); setError('');
        try {
          const d = await api(`/projects/${project.id}/orchestrator`);
          const pillarItems = Object.entries(d.grouped?.[pillar] || {}).flatMap(([cat, tasks]) => tasks.map(t => ({ ...t, _category: cat })));
          setItems(pillarItems);
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      const syncFindings = async () => {
        setSyncing(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/orchestrator/run`, { method: 'POST' });
          if (data?.status === 'running') {
            // Orchestrator runs async — poll for results
            setTimeout(() => loadData(), 8000);
            setTimeout(() => loadData(), 15000);
            setTimeout(() => { loadData(); setSyncing(false); }, 25000);
            return;
          }
          loadData();
        } catch (e) { setError('Sync failed: ' + e.message); }
        setSyncing(false);
      };

      const handleStatusChange = async (actionId, newStatus) => {
        try {
          await api(`/action-items/${actionId}`, { method: 'PUT', body: { status: newStatus } });
          setItems(prev => prev.map(i => i.id === actionId ? { ...i, status: newStatus } : i));
        } catch (e) { setError(e.message); }
      };

      const stats = useMemo(() => {
        const total = items.length;
        const critical = items.filter(i => (i.severity || '').toLowerCase() === 'critical').length;
        const pending = items.filter(i => i.status === 'pending').length;
        const done = items.filter(i => i.status === 'done' || i.status === 'completed').length;
        return { total, critical, pending, done };
      }, [items]);

      const sevColors = { critical: '#ef4444', high: '#ef4444', medium: '#f59e0b', low: '#22c55e' };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className={icon} style={{ marginRight: 10, color }} />{title}
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>
                {stats.total} items — {stats.critical} critical, {stats.pending} pending, {stats.done} done
              </p>
            </div>
            <button className="btn btn-primary" onClick={syncFindings} disabled={syncing} style={{ fontSize: 13 }}>
              {syncing ? <><span className="spinner"></span> Running Orchestrator...</> : <><i className="fas fa-robot" style={{ marginRight: 6 }} />Run Orchestrator</>}
            </button>
          </div>

          {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

          {loading && (
            <div style={{ textAlign: 'center', padding: 40 }}>
              <span className="spinner-large"></span>
              <div style={{ marginTop: 12, color: 'var(--text3)' }}>Loading...</div>
            </div>
          )}

          {items.length > 0 && (
            <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 12, color: 'var(--text3)' }}>
                  {stats.critical > 0 && <span style={{ color: '#ef4444', fontWeight: 700, marginRight: 12 }}>CRITICAL — {stats.critical} items</span>}
                  {stats.total} items
                </span>
              </div>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ borderBottom: '2px solid var(--border)' }}>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 80 }}>PRIORITY</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)' }}>ACTION</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 140 }}>CATEGORY</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 140 }}>ASSIGNEE</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 90 }}>STATUS</th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((item) => {
                    const sev = (item.severity || 'medium').toLowerCase();
                    const sevColor = sevColors[sev] || '#f59e0b';
                    // Use AI-assigned label from DB if available, fall back to detectExecType
                    const aiLabel = item.assignee_label;
                    const execInfo = aiLabel ? null : detectExecType(item.description || item.title, item.pillar || pillar);
                    const assigneeLabel = aiLabel || (execInfo && execInfo.label) || 'SEO Specialist';
                    const assigneeColorMap = { 'WP Plugin': '#f59e0b', 'SEO Specialist': '#10b981', 'Manual': '#6b7280', 'Automated': '#3b82f6' };
                    const assigneeIconMap = { 'WP Plugin': 'fas fa-wrench', 'SEO Specialist': 'fas fa-user-tie', 'Manual': 'fas fa-user', 'Automated': 'fas fa-robot' };
                    const aColor = assigneeColorMap[assigneeLabel] || (execInfo && execInfo.color) || '#6b7280';
                    const aIcon = assigneeIconMap[assigneeLabel] || (execInfo && execInfo.icon) || 'fas fa-user';
                    return (
                      <tr key={item.id} style={{ borderBottom: '1px solid var(--border)' }}>
                        <td style={{ padding: '14px', verticalAlign: 'top' }}>
                          <span style={{ color: sevColor, fontWeight: 700, fontSize: 13 }}>{item.severity || 'Medium'}</span>
                        </td>
                        <td style={{ padding: '14px', verticalAlign: 'top' }}>
                          <div style={{ fontWeight: 600, fontSize: 13, lineHeight: 1.5, color: 'var(--text1)' }}>{item.title}</div>
                          <div style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.5, marginTop: 2 }}>{item.description}</div>
                          {(item.current_value || item.new_value) && (
                            <div style={{ fontSize: 12, marginTop: 6 }}>
                              {item.current_value && <span style={{ color: '#ef4444' }}>{item.current_value}</span>}
                              {item.current_value && item.new_value && <span style={{ color: 'var(--text3)', margin: '0 6px' }}>→</span>}
                              {item.new_value && <span style={{ color: '#22c55e' }}>{item.new_value}</span>}
                            </div>
                          )}
                        </td>
                        <td style={{ padding: '14px', verticalAlign: 'top', fontSize: 12, color: 'var(--text2)' }}>
                          {item._category}
                        </td>

    // ============ UNIFIED ACTION PLAN ============
    function UnifiedActionPlanPage({ project }) {
      const [activePillar, setActivePillar] = useState('all');
      const [filterSeverity, setFilterSeverity] = useState('all');
      const [filterCategory, setFilterCategory] = useState('all');
      const [filterAssignee, setFilterAssignee] = useState('all');
      const [filterStatus, setFilterStatus] = useState('all');
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => { if (project?.id) loadData(); }, [project?.id]);

      const loadData = async () => {
        setLoading(true); setError('');
        try {
          const d = await api(`/projects/${project.id}/orchestrator`);
          const grouped = d.grouped || {};
          const all = [];
          for (const [pillar, cats] of Object.entries(grouped)) {
            for (const [cat, tasks] of Object.entries(cats)) {
              tasks.forEach(t => all.push({ ...t, _category: cat, _pillar: pillar }));
            }
          }
          setItems(all);
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      const runOrchestrator = async () => {
        setSyncing(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/orchestrator/run`, { method: 'POST' });
          if (data?.status === 'running') {
            setTimeout(() => loadData(), 8000);
            setTimeout(() => loadData(), 15000);
            setTimeout(() => { loadData(); setSyncing(false); }, 25000);
            return;
          }
          loadData();
        } catch (e) { setError('Orchestrator failed: ' + e.message); }
        setSyncing(false);
      };

      const handleStatusChange = async (actionId, newStatus) => {
        try {
          await api(`/action-items/${actionId}`, { method: 'PUT', body: { status: newStatus } });
          setItems(prev => prev.map(i => i.id === actionId ? { ...i, status: newStatus } : i));
        } catch (e) { setError(e.message); }
      };

      const pillars = [
        { id: 'all', label: 'All', icon: 'fas fa-layer-group', color: 'var(--accent)' },
        { id: 'GBP', label: 'GBP', icon: 'fas fa-store', color: '#ef4444' },
        { id: 'GSC', label: 'GSC', icon: 'fas fa-chart-line', color: '#3b82f6' },
        { id: 'Website', label: 'Website', icon: 'fas fa-globe', color: '#8b5cf6' },
      ];

      // Compute assignee label for each item (memoized)
      const itemsWithAssignee = useMemo(() => items.map(item => {
        const aiLabel = item.assignee_label;
        const execInfo = aiLabel ? null : detectExecType(item.description || item.title, item._pillar || item.pillar);
        const assigneeLabel = aiLabel || (execInfo && execInfo.label) || 'SEO Specialist';
        return { ...item, _assigneeLabel: assigneeLabel };
      }), [items]);

      // Derive unique filter options from data
      const filterOptions = useMemo(() => {
        const categories = [...new Set(itemsWithAssignee.map(i => i._category || i.category).filter(Boolean))].sort();
        const severities = [...new Set(itemsWithAssignee.map(i => (i.severity || 'medium').toLowerCase()).filter(Boolean))].sort((a, b) => {
          const order = { critical: 0, high: 1, medium: 2, low: 3 };
          return (order[a] ?? 9) - (order[b] ?? 9);
        });
        const assignees = [...new Set(itemsWithAssignee.map(i => i._assigneeLabel).filter(Boolean))].sort();
        return { categories, severities, assignees };
      }, [itemsWithAssignee]);

      const filtered = useMemo(() => {
        return itemsWithAssignee.filter(i => {
          if (activePillar !== 'all' && (i._pillar || i.pillar) !== activePillar) return false;
          if (filterSeverity !== 'all' && (i.severity || 'medium').toLowerCase() !== filterSeverity) return false;
          if (filterCategory !== 'all' && (i._category || i.category) !== filterCategory) return false;
          if (filterAssignee !== 'all' && i._assigneeLabel !== filterAssignee) return false;
          if (filterStatus !== 'all' && (i.status || 'pending') !== filterStatus) return false;
          return true;
        });
      }, [itemsWithAssignee, activePillar, filterSeverity, filterCategory, filterAssignee, filterStatus]);

      const activeFilterCount = [filterSeverity, filterCategory, filterAssignee, filterStatus].filter(f => f !== 'all').length;

      const clearFilters = () => { setFilterSeverity('all'); setFilterCategory('all'); setFilterAssignee('all'); setFilterStatus('all'); };

      const stats = useMemo(() => {
        const base = activePillar === 'all' ? itemsWithAssignee : itemsWithAssignee.filter(i => (i._pillar || i.pillar) === activePillar);
        const total = base.length;
        const critical = base.filter(i => (i.severity || '').toLowerCase() === 'critical').length;
        const high = base.filter(i => (i.severity || '').toLowerCase() === 'high').length;
        const pending = base.filter(i => i.status === 'pending').length;
        const done = base.filter(i => i.status === 'done' || i.status === 'completed').length;
        const inProgress = base.filter(i => i.status === 'in-progress').length;
        return { total, critical, high, pending, done, inProgress };
      }, [itemsWithAssignee, activePillar]);

      const sevColors = { critical: '#ef4444', high: '#ef4444', medium: '#f59e0b', low: '#22c55e' };
      const pillarLabels = { GBP: 'GBP', GSC: 'GSC', Website: 'Website', gbp_external: 'GBP', gsc_agent: 'GSC', website: 'Website', gbp: 'GBP', gsc: 'GSC', technical: 'Website' };
      const pillarColors = { GBP: '#ef4444', GSC: '#3b82f6', Website: '#8b5cf6', gbp_external: '#ef4444', gsc_agent: '#3b82f6', website: '#8b5cf6', gbp: '#ef4444', gsc: '#3b82f6', technical: '#8b5cf6' };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-tasks" style={{ marginRight: 10, color: 'var(--accent)' }} />Action Plan
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>
                AI-orchestrated tasks from all audits — deduplicated and prioritized
              </p>
            </div>
            <button className="btn btn-primary" onClick={runOrchestrator} disabled={syncing} style={{ fontSize: 13 }}>
              {syncing ? <><span className="spinner"></span> Running Orchestrator...</> : <><i className="fas fa-robot" style={{ marginRight: 6 }} />Run Orchestrator</>}
            </button>
          </div>

          {/* Stats cards */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 20 }}>
            {[
              { label: 'TOTAL', value: stats.total, color: 'var(--text1)' },
              { label: 'CRITICAL', value: stats.critical + stats.high, color: '#ef4444' },
              { label: 'PENDING', value: stats.pending, color: '#f59e0b' },
              { label: 'DONE', value: stats.done, color: '#22c55e' },
            ].map(s => (
              <div key={s.label} style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', padding: '16px 20px', textAlign: 'center' }}>
                <div style={{ fontSize: 28, fontWeight: 800, color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--text3)', letterSpacing: 1, marginTop: 4 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Pillar tabs */}
          <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
            {pillars.map(p => (
              <button key={p.id} onClick={() => setActivePillar(p.id)}
                style={{ padding: '8px 16px', borderRadius: 8, border: activePillar === p.id ? `2px solid ${p.color}` : '1px solid var(--border)',
                  background: activePillar === p.id ? `${p.color}15` : 'var(--card)', cursor: 'pointer', fontSize: 13, fontWeight: 600,
                  color: activePillar === p.id ? p.color : 'var(--text2)', display: 'flex', alignItems: 'center', gap: 6 }}>
                <i className={p.icon} style={{ fontSize: 12 }} />{p.label}
                <span style={{ fontSize: 11, opacity: 0.7 }}>
                  ({p.id === 'all' ? items.length : items.filter(i => (i._pillar || i.pillar) === p.id).length})
                </span>
              </button>
            ))}
          </div>

          {/* Filter bar */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 16, alignItems: 'center', flexWrap: 'wrap' }}>
            <span style={{ fontSize: 12, color: 'var(--text3)', fontWeight: 600, marginRight: 4 }}><i className="fas fa-filter" style={{ marginRight: 4 }} />Filters:</span>
            {[
              { value: filterSeverity, set: setFilterSeverity, label: 'Priority', options: filterOptions.severities },
              { value: filterCategory, set: setFilterCategory, label: 'Category', options: filterOptions.categories },
              { value: filterAssignee, set: setFilterAssignee, label: 'Assignee', options: filterOptions.assignees },
              { value: filterStatus, set: setFilterStatus, label: 'Status', options: ['pending', 'in-progress', 'done'] },
            ].map(f => (
              <select key={f.label} value={f.value} onChange={e => f.set(e.target.value)}
                style={{ fontSize: 12, padding: '5px 8px', background: f.value !== 'all' ? 'var(--accent)' : 'var(--card)', border: '1px solid var(--border)', borderRadius: 6,
                  color: f.value !== 'all' ? '#fff' : 'var(--text2)', cursor: 'pointer', fontWeight: f.value !== 'all' ? 600 : 400 }}>
                <option value="all">{f.label}</option>
                {f.options.map(o => <option key={o} value={o} style={{ background: 'var(--card)', color: 'var(--text1)' }}>{o.charAt(0).toUpperCase() + o.slice(1)}</option>)}
              </select>
            ))}
            {activeFilterCount > 0 && (
              <button onClick={clearFilters} style={{ fontSize: 11, padding: '5px 10px', background: 'transparent', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text3)', cursor: 'pointer' }}>
                <i className="fas fa-times" style={{ marginRight: 4 }} />Clear ({activeFilterCount})
              </button>
            )}
            <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text3)' }}>
              {filtered.length}{filtered.length !== stats.total ? ` of ${stats.total}` : ''} items
            </span>
          </div>

          {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

          {loading && (
            <div style={{ textAlign: 'center', padding: 40 }}>
              <span className="spinner-large"></span>
              <div style={{ marginTop: 12, color: 'var(--text3)' }}>Loading action items...</div>
            </div>
          )}

          {!loading && filtered.length > 0 && (
            <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ borderBottom: '2px solid var(--border)' }}>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 80 }}>PRIORITY</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)' }}>ACTION</th>
                    {activePillar === 'all' && <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 80 }}>PILLAR</th>}
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 140 }}>CATEGORY</th>
                    <th style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 140 }}>ASSIGNEE</th>
                    <th style={{ padding: '10px 14px', textAlign: 'center', fontSize: 11, fontWeight: 700, color: 'var(--text3)', width: 90 }}>STATUS</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((item) => {
                    const sev = (item.severity || 'medium').toLowerCase();
                    const sevColor = sevColors[sev] || '#f59e0b';
                    const assigneeLabel = item._assigneeLabel;
                    const assigneeColorMap = { 'WP Plugin': '#f59e0b', 'SEO Specialist': '#10b981', 'Manual': '#6b7280', 'Automated': '#3b82f6' };
                    const assigneeIconMap = { 'WP Plugin': 'fas fa-wrench', 'SEO Specialist': 'fas fa-user-tie', 'Manual': 'fas fa-user', 'Automated': 'fas fa-robot' };
                    const aColor = assigneeColorMap[assigneeLabel] || '#6b7280';

                    const itemPillar = item._pillar || item.pillar;
                    return (
                      <tr key={item.id} style={{ borderBottom: '1px solid var(--border)' }}>
                        <td style={{ padding: '14px', verticalAlign: 'top' }}>
                          <span style={{ color: sevColor, fontWeight: 700, fontSize: 12, textTransform: 'capitalize' }}>{item.severity || 'Medium'}</span>

                        <td style={{ padding: '14px', verticalAlign: 'top' }}>

                          <div style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.5, marginTop: 2 }}>{item.description}</div>
                        </td>
                        {activePillar === 'all' && (
                          <td style={{ padding: '14px', verticalAlign: 'top' }}>
                            <span style={{ fontSize: 11, fontWeight: 700, color: pillarColors[itemPillar] || 'var(--text3)', background: `${pillarColors[itemPillar] || 'var(--text3)'}15`, padding: '3px 8px', borderRadius: 4 }}>
                              {pillarLabels[itemPillar] || itemPillar}
                            </span>
                          </td>
                        )}
                        <td style={{ padding: '14px', verticalAlign: 'top', fontSize: 12, color: 'var(--text2)' }}>{item._category || item.category}</td>
                        <td style={{ padding: '14px', verticalAlign: 'top', fontSize: 12, whiteSpace: 'nowrap' }}>

                        <td style={{ padding: '14px', textAlign: 'center', verticalAlign: 'top' }}>
                          <select value={item.status || 'pending'} onChange={e => handleStatusChange(item.id, e.target.value)}
                            style={{ fontSize: 11, padding: '4px 6px', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text1)' }}>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="done">Done</option>
                          </select>
                        </td>
                      </tr>

            </div>

              <i className="fas fa-tasks" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
              <div style={{ fontSize: 16, marginBottom: 8 }}>No action items yet</div>
              <div style={{ fontSize: 13 }}>Run your audits first, then click "Run Orchestrator" to generate a unified action plan.</div>
            </div>
          )}
        </div>
      );
    }

    function OptimiseWebsitePage({ project, view, setPage }) {
      const [graphData, setGraphData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [scannedAt, setScannedAt] = useState(null);

      const zoomRef = React.useRef(null);
      const svgSelRef = React.useRef(null);

      // Load cached data on mount
      const loadCached = async () => {
        try {
          const data = await api(`/projects/${project.id}/site-graph`);
          if (data && data.nodes) {
            setGraphData(data);
            setScannedAt(data.scanned_at);
          }
        } catch(e) { console.error('Site graph load error:', e); }
      };

      // Fresh scan
      const rescan = async () => {
        setLoading(true);
        try {
          const data = await api(`/projects/${project.id}/site-graph`, { method: 'POST' });
          if (data && data.nodes) {
            setGraphData(data);
            setScannedAt(data.scanned_at);
          }
        } catch(e) { console.error('Site graph scan error:', e); }
        setLoading(false);
      };

      useEffect(() => { loadCached(); }, [project.id]);

      // Escape key exits fullscreen
      useEffect(() => {
        const handleKey = (e) => { if (e.key === 'Escape' && isFullscreen) setIsFullscreen(false); };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [isFullscreen]);

      // D3 graph rendering
      useEffect(() => {
        if (!graphData || viewMode !== 'graph' || !graphRef.current) return;
        const container = graphRef.current;
        container.innerHTML = '';
        const width = container.clientWidth || 900;
        const height = isFullscreen ? window.innerHeight - 60 : 500;

        const svg = d3.select(container).append('svg')
          .attr('width', width).attr('height', height)
          .style('background', 'rgba(0,0,0,0.1)').style('border-radius', '8px');

        const g = svg.append('g');
        const zoom = d3.zoom().scaleExtent([0.1, 3]).on('zoom', (e) => g.attr('transform', e.transform));
        svg.call(zoom);
        zoomRef.current = zoom;
        svgSelRef.current = svg;

        const nodes = graphData.nodes.map(n => ({ ...n }));
        const edges = graphData.edges.map(e => ({ source: e.source, target: e.target }));

        const nodeCount = nodes.length;
        const R = nodeCount > 30 ? 6 : 10; // node radius scales with count
        const RHome = nodeCount > 30 ? 10 : 14;

        const sim = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(edges).id(d => d.id).distance(Math.max(60, Math.sqrt(width * height / nodeCount) * 0.7)))
          .force('charge', d3.forceManyBody().strength(-Math.max(200, 30000 / nodeCount)))
          .force('x', d3.forceX(width / 2).strength(0.05))
          .force('y', d3.forceY(height / 2).strength(0.05))
          .force('collision', d3.forceCollide().radius(R + 4))
          .alpha(1).alphaDecay(0.03);

        const link = g.append('g').selectAll('line').data(edges).join('line')
          .attr('stroke', 'rgba(99,102,241,0.25)').attr('stroke-width', 0.5);

        const node = g.append('g').selectAll('g').data(nodes).join('g')
          .call(d3.drag().on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

        const getColor = (n) => {
          if (n.issues.length > 0 && n.inbound_count === 0) return '#ef4444';
          if (n.inbound_count === 0 && n.slug !== 'home' && n.slug !== '') return '#f59e0b';
          if (n.issues.length > 0) return '#3b82f6';
          return '#22c55e';
        };

        node.append('circle')
          .attr('r', d => d.slug === 'home' || d.slug === '' ? RHome : R)
          .attr('fill', d => getColor(d))
          .attr('stroke', d => d.issues.length > 0 ? '#ef4444' : 'transparent')
          .attr('stroke-width', d => d.issues.length > 0 ? 1.5 : 0)
          .attr('opacity', 0.85)
          .style('cursor', 'pointer')
          .on('click', (e, d) => { e.stopPropagation(); setSelectedNode(d); });

        // Labels — only show on hover (tooltip style)
        const labelG = g.append('g').attr('class', 'labels');
        const labels = labelG.selectAll('g').data(nodes).join('g').attr('opacity', 0).attr('pointer-events', 'none');
        labels.append('rect').attr('rx', 3).attr('fill', 'rgba(0,0,0,0.8)').attr('x', -40).attr('y', -(R + 18)).attr('width', 80).attr('height', 16);
        labels.append('text').text(d => d.title.length > 16 ? d.title.substring(0, 14) + '..' : d.title)
          .attr('text-anchor', 'middle').attr('dy', -(R + 6)).attr('font-size', 8).attr('fill', '#fff');

        // Show label on hover
        node.on('mouseenter', (e, d) => { labels.filter(l => l.id === d.id).attr('opacity', 1); })
            .on('mouseleave', (e, d) => { labels.filter(l => l.id === d.id).attr('opacity', 0); });

        // Issue count badge (smaller)
        node.filter(d => d.issues.length > 0).append('circle')
          .attr('r', 5).attr('cx', R - 1).attr('cy', -(R - 1))
          .attr('fill', '#ef4444');
        node.filter(d => d.issues.length > 0).append('text')
          .text(d => d.issues.length).attr('x', R - 1).attr('y', -(R - 4))
          .attr('text-anchor', 'middle').attr('font-size', 7).attr('fill', '#fff').attr('font-weight', 700);

        const zoomToFit = (animate) => {
          const pad = 60;
          let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
          nodes.forEach(n => { if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x; if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y; });
          const bw = maxX - minX + pad * 2;
          const bh = maxY - minY + pad * 2;
          const scale = Math.min(width / bw, height / bh, 1.5);
          const tx = width / 2 - (minX + maxX) / 2 * scale;
          const ty = height / 2 - (minY + maxY) / 2 * scale;
          if (animate) svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
          else svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        };

        let tickCount = 0;
        sim.on('tick', () => {
          link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
          node.attr('transform', d => `translate(${d.x},${d.y})`);
          labels.attr('transform', d => `translate(${d.x},${d.y})`);
          tickCount++;
          if (tickCount === 100) zoomToFit(false);
        });
        sim.on('end', () => { zoomToFit(true); });

        svg.on('click', () => setSelectedNode(null));
        return () => sim.stop();
      }, [graphData, viewMode, isFullscreen]);

      const filtered = graphData ? (filter === 'orphans' ? graphData.nodes.filter(n => n.inbound_count === 0 && n.slug !== 'home' && n.slug !== '') : filter === 'issues' ? graphData.nodes.filter(n => n.issues.length > 0) : graphData.nodes) : [];

          try {
            const data = await api(`/projects/${project.id}/site-graph`);
            if (data && data.nodes) setGraphData(data);
          } catch(e) { console.error(e); }
          setLoading(false);
        })();
      }, [project.id]);

      if (loading) return <div style={{ padding: 40, textAlign: 'center' }}><div className="spinner-large" /></div>;
      if (!graphData || !graphData.nodes) return (
        <div style={{ padding: '24px 32px', textAlign: 'center', marginTop: 60 }}>
          <i className="fas fa-exclamation-triangle" style={{ fontSize: 48, color: 'var(--text3)', marginBottom: 16 }} />
          <h3 style={{ fontSize: 18, fontWeight: 700 }}>No scan data</h3>
          <p style={{ color: 'var(--text3)', marginBottom: 20 }}>Run a site scan from the Site Map page first.</p>
          <button onClick={() => setPage('ow-sitemap')} style={{ padding: '10px 24px', fontSize: 14, fontWeight: 600, borderRadius: 8, border: 'none', cursor: 'pointer', background: '#6366f1', color: '#fff' }}>
            <i className="fas fa-project-diagram" style={{ marginRight: 6 }} />Go to Site Map
          </button>
        </div>
      );

      // Group issues by type
      const issueGroups = {};
      graphData.nodes.forEach(n => {
        n.issues.forEach(issue => {
          const key = issue.replace(/\(\d+.*?\)/, '').replace(/—.*$/, '').trim();
          if (!issueGroups[key]) issueGroups[key] = [];
          issueGroups[key].push(n);
        });
      });

      const ISSUE_META = {
        'Missing or short meta title': { icon: 'fa-heading', color: '#ef4444', fix: 'onpage', label: 'Fix in On-Page Audit' },
        'Missing or short meta description': { icon: 'fa-align-left', color: '#ef4444', fix: 'onpage', label: 'Fix in On-Page Audit' },
        'Meta title too long': { icon: 'fa-text-width', color: '#f59e0b', fix: 'onpage', label: 'Fix in On-Page Audit' },
        'Meta description too long': { icon: 'fa-text-width', color: '#f59e0b', fix: 'onpage', label: 'Fix in On-Page Audit' },
        'Missing H1 tag': { icon: 'fa-h', color: '#ef4444', fix: 'onpage', label: 'Fix in On-Page Audit' },
        'Thin content': { icon: 'fa-file-lines', color: '#f59e0b', fix: 'copywriter', label: 'Send to Copywriter' },
        'No outbound internal links': { icon: 'fa-arrow-up-right-from-square', color: '#3b82f6', fix: 'links', label: 'Add Internal Links' },
        'Orphan page': { icon: 'fa-unlink', color: '#ef4444', fix: 'links', label: 'Add Inbound Links' },
      };

      const getIssueMeta = (key) => {
        for (const [pattern, meta] of Object.entries(ISSUE_META)) {
          if (key.startsWith(pattern)) return meta;
        }
        return { icon: 'fa-circle-exclamation', color: '#ef4444', fix: 'onpage', label: 'Fix in On-Page Audit' };
      };

      const toggleSelect = (groupKey, nodeId) => {
        setSelected(prev => {
          const group = prev[groupKey] || {};
          return { ...prev, [groupKey]: { ...group, [nodeId]: !group[nodeId] } };
        });
      };

      const selectAll = (groupKey, nodes) => {
        const allSelected = nodes.every(n => (selected[groupKey] || {})[n.id]);
        setSelected(prev => {
          const group = {};
          if (!allSelected) nodes.forEach(n => { group[n.id] = true; });
          return { ...prev, [groupKey]: group };
        });
      };

      const getSelected = (groupKey, nodes) => nodes.filter(n => (selected[groupKey] || {})[n.id]);

      // Add internal links action
      const handleAddLinks = async (pageNode) => {
        setLinkingPage(pageNode.id);
        try {
          await api(`/projects/${project.id}/onpage-audit/add-links`, {
            method: 'POST',
            body: { page_id: pageNode.id }
          });
          setFixing(prev => ({ ...prev, [pageNode.id]: 'linked' }));
        } catch(e) {
          console.error('Link error:', e);
          setFixing(prev => ({ ...prev, [pageNode.id]: 'error' }));
        }
        setLinkingPage(null);
      };

      // Send to copywriter
      const handleSendCopywriter = async (pageNode) => {
        setSending(prev => ({ ...prev, [pageNode.id]: true }));
        try {
          await api(`/projects/${project.id}/content-queue`, {
            method: 'POST',
            body: {
              page_id: pageNode.id,
              page_url: pageNode.url,
              page_title: pageNode.title,
              content_type: 'optimise',
              source: 'site-issues',
              priority: 'high',
              brief: `Thin content (${pageNode.word_count} words). Expand to 800+ words with relevant, keyword-rich content.`
            }
          });
          setFixing(prev => ({ ...prev, ['cw-' + pageNode.id]: 'sent' }));
        } catch(e) {
          if (e.message && e.message.includes('409')) {
            setFixing(prev => ({ ...prev, ['cw-' + pageNode.id]: 'exists' }));
          } else {
            console.error(e);
          }
        }
        setSending(prev => ({ ...prev, [pageNode.id]: false }));
      };

      // AI suggest meta fix for a page
      const handleAiSuggest = async (pageNode) => {
        setAiLoading(prev => ({ ...prev, [pageNode.id]: true }));
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/suggest`, {
            method: 'POST',
            body: { pages: [{
              id: pageNode.id,
              title: pageNode.title,
              url: pageNode.url,
              metaTitle: pageNode.meta_title,
              metaDesc: pageNode.meta_description,
              focusKeyword: '',
              h1: pageNode.h1,
              wordCount: pageNode.word_count,
              issues: pageNode.issues.map(i => ({ type: 'problem', text: i }))
            }]}
          });
          if (data.suggestions && data.suggestions.length > 0) {
            const s = data.suggestions[0];
            setAiSuggestions(prev => ({ ...prev, [pageNode.id]: s }));
            setPreviewPage(pageNode);
          }
        } catch(e) { console.error('AI suggest error:', e); }
        setAiLoading(prev => ({ ...prev, [pageNode.id]: false }));
      };

      // Apply AI fix to WordPress
      const handleApplyFix = async (pageNode) => {
        const s = aiSuggestions[pageNode.id];
        if (!s) return;
        setApplying(prev => ({ ...prev, [pageNode.id]: true }));
        setApplyResult(null);
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/fix`, {
            method: 'POST',
            body: { fixes: [{
              id: pageNode.id,
              url: pageNode.url,
              title: pageNode.title,
              new_meta_title: s.suggested_title,
              new_meta_desc: s.suggested_desc,
              new_focus_keyword: s.suggested_keyword
            }]}
          });
          const r = data.results && data.results[0];
          if (r?.success) {
            setFixing(prev => ({ ...prev, ['meta-' + pageNode.id]: 'fixed' }));
            setApplyResult({ success: true, message: 'Updated successfully! ' + (r.changes || 0) + ' field(s) changed.' });
            setTimeout(() => { setPreviewPage(null); setApplyResult(null); }, 2000);
          } else {
            const errMsg = r?.error || 'Unknown error';
            // Parse WP-specific errors for user-friendly messages
            let friendly = errMsg;
            if (errMsg.includes('already match')) friendly = 'No changes needed — the current values already match the suggestions.';
            else if (errMsg.includes('401') || errMsg.includes('not allowed')) friendly = 'WordPress rejected the edit — check that the WP user has Administrator/Editor role and the Application Password is correct.';
            else if (errMsg.includes('not found')) friendly = 'Page not found in WordPress — try rescanning the site.';
            else if (errMsg.includes('seoroom-helper')) friendly = 'WordPress accepted the request but the meta fields were not actually updated. You may need to install the seoroom-helper plugin to enable Yoast meta writes via REST API.';
            else if (errMsg.includes('not configured')) friendly = errMsg;
            setApplyResult({ success: false, message: friendly });
          }
        } catch(e) {
          setApplyResult({ success: false, message: e.message || 'Network error — check your connection.' });
        }
        setApplying(prev => ({ ...prev, [pageNode.id]: false }));
      };

      // Bulk AI fix for selected onpage pages
      const handleBulkAiFix = async (nodes) => {
        const toFix = nodes.filter(n => !fixing['meta-' + n.id]);
        if (!toFix.length) return;
        setAiLoading(prev => { const n = {...prev}; toFix.forEach(p => n[p.id] = true); return n; });
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/suggest`, {
            method: 'POST',
            body: { pages: toFix.map(n => ({
              id: n.id, title: n.title, url: n.url,
              metaTitle: n.meta_title, metaDesc: n.meta_description, focusKeyword: '',
              h1: n.h1, wordCount: n.word_count,
              issues: n.issues.map(i => ({ type: 'problem', text: i }))
            }))}
          });
          if (data.suggestions) {
            const newSugg = {};
            data.suggestions.forEach(s => { newSugg[s.id] = s; });
            setAiSuggestions(prev => ({ ...prev, ...newSugg }));
            // Auto-apply all
            for (const s of data.suggestions) {
              const node = toFix.find(n => n.id === s.id);
              if (!node) continue;
              try {
                const fixData = await api(`/projects/${project.id}/onpage-audit/fix`, {
                  method: 'POST',
                  body: { fixes: [{
                    id: node.id, url: node.url, title: node.title,
                    new_meta_title: s.suggested_title,
                    new_meta_desc: s.suggested_desc,
                    new_focus_keyword: s.suggested_keyword
                  }]}
                });
                const r = fixData.results && fixData.results[0];
                if (r?.success) {
                  setFixing(prev => ({ ...prev, ['meta-' + node.id]: 'fixed' }));
                } else {
                  setFixing(prev => ({ ...prev, ['meta-' + node.id]: 'error' }));
                  console.error(`[bulk-fix] Failed for ${node.id}: ${r?.error}`);
                }
              } catch(e) {
                setFixing(prev => ({ ...prev, ['meta-' + node.id]: 'error' }));
                console.error(e);
              }
            }
          }
        } catch(e) { console.error(e); }
        setAiLoading(prev => { const n = {...prev}; toFix.forEach(p => n[p.id] = false); return n; });
      };

      const totalIssues = Object.values(issueGroups).reduce((sum, arr) => sum + arr.length, 0);
      const groupEntries = Object.entries(issueGroups).sort((a, b) => b[1].length - a[1].length);

      return (
        <div style={{ padding: '24px 32px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 10 }}>
                <i className="fas fa-exclamation-triangle" style={{ color: '#ef4444' }} />
                Site Issues
              </h2>
              <div style={{ fontSize: 13, color: 'var(--text3)', marginTop: 4 }}>
                {totalIssues} issues across {graphData.nodes.filter(n => n.issues.length > 0).length} pages · {groupEntries.length} issue types
              </div>
            </div>
          </div>

          {/* Summary cards — clickable filter */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 10, marginBottom: 24 }}>
            {groupEntries.map(([key, nodes]) => {
              const meta = getIssueMeta(key);
              const isActive = activeFilter === key;
              return (
                <div key={key} onClick={() => setActiveFilter(isActive ? null : key)}
                  style={{ background: isActive ? `${meta.color}20` : 'var(--card)', borderRadius: 8, padding: '12px 14px', border: isActive ? `2px solid ${meta.color}` : '1px solid var(--border)', borderLeft: `3px solid ${meta.color}`, cursor: 'pointer', transition: 'all 0.15s', transform: isActive ? 'scale(1.02)' : 'none' }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: meta.color }}>
                    <i className={`fas ${meta.icon}`} style={{ fontSize: 14, marginRight: 6, opacity: 0.6 }} />{nodes.length}
                  </div>
                  <div style={{ fontSize: 10, fontWeight: 600, color: isActive ? 'var(--text)' : 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, marginTop: 2 }}>{key}</div>
                </div>
              );
            })}
          </div>

          {activeFilter && (
            <div style={{ marginBottom: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 12, color: 'var(--text3)' }}>Showing: <strong style={{ color: 'var(--text)' }}>{activeFilter}</strong></span>
              <button onClick={() => setActiveFilter(null)} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 11, textDecoration: 'underline' }}>Show All</button>
            </div>
          )}

          {/* Issue groups */}
          {groupEntries.filter(([key]) => !activeFilter || activeFilter === key).map(([key, nodes]) => {
            const meta = getIssueMeta(key);
            const sel = getSelected(key, nodes);
            return (
              <div key={key} style={{ background: 'var(--card)', borderRadius: 8, border: '1px solid var(--border)', marginBottom: 16, overflow: 'hidden' }}>
                {/* Group header */}
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', background: `${meta.color}15`, borderBottom: '1px solid var(--border)' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <i className={`fas ${meta.icon}`} style={{ color: meta.color, fontSize: 14 }} />
                    <span style={{ fontWeight: 700, fontSize: 14 }}>{key}</span>
                    <span style={{ fontSize: 11, color: 'var(--text3)', background: 'var(--bg)', padding: '2px 8px', borderRadius: 10, fontWeight: 600 }}>{nodes.length} page{nodes.length !== 1 ? 's' : ''}</span>
                  </div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    {meta.fix === 'onpage' && (
                      <button onClick={() => handleBulkAiFix(nodes)} style={{ padding: '5px 12px', fontSize: 11, fontWeight: 600, borderRadius: 6, border: 'none', cursor: 'pointer', background: '#6366f1', color: '#fff' }}>
                        <i className="fas fa-wand-magic-sparkles" style={{ marginRight: 4 }} />AI Fix All ({nodes.length})
                      </button>
                    )}
                  </div>
                </div>
                {/* Pages table */}
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
                  <thead>
                    <tr style={{ background: 'var(--bg)' }}>
                      <th style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', color: 'var(--text3)', width: 30 }}>
                        <input type="checkbox" checked={nodes.length > 0 && nodes.every(n => (selected[key] || {})[n.id])} onChange={() => selectAll(key, nodes)} style={{ cursor: 'pointer' }} />
                      </th>
                      <th style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', color: 'var(--text3)' }}>Page</th>
                      <th style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', color: 'var(--text3)', width: 80 }}>Words</th>
                      <th style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', color: 'var(--text3)', width: 80 }}>Inbound</th>
                      <th style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', color: 'var(--text3)', width: 80 }}>Outbound</th>
                      <th style={{ padding: '8px 12px', textAlign: 'right', fontWeight: 600, fontSize: 10, textTransform: 'uppercase', color: 'var(--text3)', width: 160 }}>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    {nodes.map(n => {
                      const isLinked = fixing[n.id] === 'linked';
                      const isLinking = linkingPage === n.id;
                      const cwSent = fixing['cw-' + n.id] === 'sent' || fixing['cw-' + n.id] === 'exists';
                      const isSending = sending[n.id];
                      return (
                        <tr key={n.id} style={{ borderBottom: '1px solid var(--border)' }}>
                          <td style={{ padding: '8px 12px' }}>
                            <input type="checkbox" checked={!!(selected[key] || {})[n.id]} onChange={() => toggleSelect(key, n.id)} style={{ cursor: 'pointer' }} />
                          </td>
                          <td style={{ padding: '8px 12px' }}>
                            <div style={{ fontWeight: 600, fontSize: 13 }}>{n.title}</div>
                            <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 2 }}>{n.slug || '/'}</div>
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, color: n.word_count < 300 ? '#ef4444' : 'var(--text2)' }}>{n.word_count}</td>
                          <td style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, color: n.inbound_count === 0 ? '#ef4444' : 'var(--text2)' }}>{n.inbound_count}</td>
                          <td style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, color: n.internal_links.length === 0 ? '#ef4444' : 'var(--text2)' }}>{n.internal_links.length}</td>
                          <td style={{ padding: '8px 12px', textAlign: 'right' }}>
                            {meta.fix === 'links' && !isLinked && (
                              <button onClick={() => handleAddLinks(n)} disabled={isLinking}
                                style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, borderRadius: 5, border: 'none', cursor: isLinking ? 'default' : 'pointer', background: isLinking ? 'var(--border)' : '#3b82f6', color: '#fff', opacity: isLinking ? 0.7 : 1 }}>
                                {isLinking ? <><i className="fas fa-spinner fa-spin" style={{ marginRight: 4 }} />Linking...</> : <><i className="fas fa-link" style={{ marginRight: 4 }} />Add Links</>}
                              </button>
                            )}
                            {meta.fix === 'links' && isLinked && (
                              <span style={{ fontSize: 11, color: '#22c55e', fontWeight: 600 }}><i className="fas fa-circle-check" style={{ marginRight: 4 }} />Links Added</span>
                            )}
                            {meta.fix === 'copywriter' && !cwSent && (
                              <button onClick={() => handleSendCopywriter(n)} disabled={isSending}
                                style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, borderRadius: 5, border: 'none', cursor: isSending ? 'default' : 'pointer', background: isSending ? 'var(--border)' : '#8b5cf6', color: '#fff', opacity: isSending ? 0.7 : 1 }}>
                                {isSending ? <><i className="fas fa-spinner fa-spin" style={{ marginRight: 4 }} />Sending...</> : <><i className="fas fa-pen" style={{ marginRight: 4 }} />Send to Copywriter</>}
                              </button>
                            )}
                            {meta.fix === 'copywriter' && cwSent && (
                              <span style={{ fontSize: 11, color: '#22c55e', fontWeight: 600 }}><i className="fas fa-circle-check" style={{ marginRight: 4 }} />{fixing['cw-' + n.id] === 'exists' ? 'Already in Queue' : 'Sent'}</span>
                            )}
                            {meta.fix === 'onpage' && (!fixing['meta-' + n.id] || fixing['meta-' + n.id] === 'error') && (
                              <button onClick={() => { setFixing(prev => { const c = {...prev}; delete c['meta-' + n.id]; return c; }); handleAiSuggest(n); }} disabled={aiLoading[n.id]}
                                style={{ padding: '4px 10px', fontSize: 11, fontWeight: 600, borderRadius: 5, border: 'none', cursor: aiLoading[n.id] ? 'default' : 'pointer', background: aiLoading[n.id] ? 'var(--border)' : '#6366f1', color: '#fff', opacity: aiLoading[n.id] ? 0.7 : 1 }}>
                                {aiLoading[n.id] ? <><i className="fas fa-spinner fa-spin" style={{ marginRight: 4 }} />Generating...</> : <><i className="fas fa-wand-magic-sparkles" style={{ marginRight: 4 }} />{fixing['meta-' + n.id] === 'error' ? 'Retry' : 'AI Fix'}</>}
                              </button>
                            )}
                            {meta.fix === 'onpage' && fixing['meta-' + n.id] === 'fixed' && (
                              <span style={{ fontSize: 11, color: '#22c55e', fontWeight: 600 }}><i className="fas fa-circle-check" style={{ marginRight: 4 }} />Fixed</span>
                            )}
                            {meta.fix === 'onpage' && fixing['meta-' + n.id] === 'error' && (
                              <span style={{ fontSize: 11, color: '#ef4444', fontWeight: 600 }}><i className="fas fa-circle-xmark" style={{ marginRight: 4 }} />Failed</span>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {/* Bulk actions for selected */}
                {sel.length > 0 && (
                  <div style={{ padding: '10px 16px', background: 'var(--bg)', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text2)' }}>{sel.length} selected</span>
                    {meta.fix === 'links' && (
                      <button onClick={async () => { for (const n of sel) { await handleAddLinks(n); } }}
                        style={{ padding: '5px 14px', fontSize: 11, fontWeight: 600, borderRadius: 6, border: 'none', cursor: 'pointer', background: '#3b82f6', color: '#fff' }}>
                        <i className="fas fa-link" style={{ marginRight: 4 }} />Add Links to All
                      </button>
                    )}
                    {meta.fix === 'copywriter' && (
                      <button onClick={async () => { for (const n of sel) { await handleSendCopywriter(n); } }}
                        style={{ padding: '5px 14px', fontSize: 11, fontWeight: 600, borderRadius: 6, border: 'none', cursor: 'pointer', background: '#8b5cf6', color: '#fff' }}>
                        <i className="fas fa-pen" style={{ marginRight: 4 }} />Send All to Copywriter
                      </button>
                    )}
                    {meta.fix === 'onpage' && (
                      <button onClick={() => handleBulkAiFix(sel)}
                        style={{ padding: '5px 14px', fontSize: 11, fontWeight: 600, borderRadius: 6, border: 'none', cursor: 'pointer', background: '#6366f1', color: '#fff' }}>
                        <i className="fas fa-wand-magic-sparkles" style={{ marginRight: 4 }} />AI Fix Selected ({sel.length})
                      </button>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {groupEntries.length === 0 && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fas fa-circle-check" style={{ fontSize: 48, color: '#22c55e', marginBottom: 16 }} />
              <h3 style={{ fontSize: 18, fontWeight: 700, color: '#22c55e' }}>All Clear</h3>
              <p>No issues detected across {graphData.stats.total} pages.</p>
            </div>
          )}

          {/* AI Fix Preview Modal */}
          {previewPage && aiSuggestions[previewPage.id] && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              onClick={() => setPreviewPage(null)}>
              <div style={{ background: 'var(--card)', borderRadius: 12, width: 600, maxHeight: '80vh', overflow: 'auto', padding: 24, border: '1px solid var(--border)' }}
                onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                  <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>
                    <i className="fas fa-wand-magic-sparkles" style={{ color: '#6366f1', marginRight: 8 }} />AI Fix Preview
                  </h3>
                  <button onClick={() => setPreviewPage(null)} style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 16 }}><i className="fas fa-times" /></button>
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>{previewPage.title}</div>
                <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 16 }}>{previewPage.url}</div>

                {[
                  { label: 'Meta Title', current: previewPage.meta_title, suggested: aiSuggestions[previewPage.id].suggested_title },
                  { label: 'Meta Description', current: previewPage.meta_description, suggested: aiSuggestions[previewPage.id].suggested_desc },
                  { label: 'Focus Keyword', current: '(not set)', suggested: aiSuggestions[previewPage.id].suggested_keyword },
                ].map((field, i) => (
                  <div key={i} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', color: 'var(--text3)', marginBottom: 6 }}>{field.label}</div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <div style={{ flex: 1, padding: '8px 10px', borderRadius: 6, background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.2)', fontSize: 12 }}>

    function cleanWpHtml(html) {
      if (!html) return '';
      return html
        .replace(/<p>\s*<a[^>]*>[A-Z\s&;]{2,50}<\/a>\s*<\/p>/gi, '')
        .replace(/<h[2-4]>\s*<a[^>]*>[A-Z\s&;]{2,50}<\/a>\s*<\/h[2-4]>/gi, '')
        .replace(/<p>(\s|&nbsp;|<br\s*\/?>)*<\/p>/gi, '')
        .replace(/<h[2-4]>(\s|&nbsp;|<br\s*\/?>)*<\/h[2-4]>/gi, '')
        .replace(/(<br\s*\/?>[\s\n]*){2,}/gi, '<br>')
        .replace(/(<[ph][^>]*>)\s*<br\s*\/?>/gi, '$1')
        .replace(/<br\s*\/?>\s*(<\/[ph])/gi, '$1')
        .replace(/<li>\s*<\/li>/gi, '')
        .replace(/<[uo]l>\s*<\/[uo]l>/gi, '')
        .replace(/<p>\s*<\/p>/gi, '')
        .trim();

    function ContentScorePanel({ content, focusKeyword, keywords, targetKeywords, onAddKeyword, onRemoveKeyword, onScoreChange }) {
      const text = useMemo(() => {
        if (!content) return '';
        const div = document.createElement('div');
        div.innerHTML = content;
        return div.textContent || '';
      }, [content]);

      const stats = useMemo(() => {
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        const div = document.createElement('div');
        div.innerHTML = content || '';
        const h2s = div.querySelectorAll('h2').length;
        const h3s = div.querySelectorAll('h3').length;
        const links = div.querySelectorAll('a').length;
        const imgs = div.querySelectorAll('img').length;
        const paragraphs = div.querySelectorAll('p').length;
        return { words, h2s, h3s, links, imgs, paragraphs };
      }, [content]);

      const allKeywords = useMemo(() => {
        const tgt = (targetKeywords || []).map(k => typeof k === 'string' ? { keyword: k, volume: null, isTarget: true } : { ...k, isTarget: true });
        const proj = (keywords || []).slice(0, 30).map(k => ({ ...k, isTarget: false }));
        const seen = new Set(tgt.map(k => k.keyword.toLowerCase()));
        return [...tgt, ...proj.filter(k => !seen.has(k.keyword.toLowerCase()))];
      }, [keywords, targetKeywords]);

      const keywordAnalysis = useMemo(() => {
        if (!allKeywords.length) return [];
        const lower = text.toLowerCase();
        return allKeywords.map(kw => {
          const kwLower = kw.keyword.toLowerCase();
          let count = 0;
          let pos = 0;
          while ((pos = lower.indexOf(kwLower, pos)) !== -1) { count++; pos += kwLower.length; }
          return { ...kw, count };
        });
      }, [text, allKeywords]);

      const focusCount = useMemo(() => {
        if (!focusKeyword || !text) return 0;
        const lower = text.toLowerCase();
        const fk = focusKeyword.toLowerCase();
        let count = 0, pos = 0;
        while ((pos = lower.indexOf(fk, pos)) !== -1) { count++; pos += fk.length; }
        return count;
      }, [text, focusKeyword]);

      const { score, tips } = useMemo(() => {
        let s = 0;
        const t = [];
        if (stats.words >= 1500) { s += 25; t.push({ type: 'success', msg: 'Great content length!' }); }
        else if (stats.words >= 800) { s += 15; t.push({ type: 'warn', msg: 'Add ' + (1500 - stats.words) + ' more words (target: 1,500+)' }); }
        else if (stats.words >= 400) { s += 8; t.push({ type: 'error', msg: 'Content too short (' + stats.words + ' words). Aim for 1,500+' }); }
        else { t.push({ type: 'error', msg: stats.words === 0 ? 'No content yet' : 'Very short (' + stats.words + ' words). Need 1,500+' }); }
        if (stats.h2s >= 3) { s += 15; t.push({ type: 'success', msg: stats.h2s + ' H2 headings (target: 3+)' }); }
        else if (stats.h2s >= 1) { s += 8; t.push({ type: 'warn', msg: 'Add ' + (3 - stats.h2s) + ' more H2 headings (target: 3+)' }); }
        else { t.push({ type: 'error', msg: 'No H2 headings. Add at least 3' }); }
        if (stats.h3s >= 2) { s += 5; t.push({ type: 'success', msg: stats.h3s + ' H3 subheadings' }); }
        else { t.push({ type: 'warn', msg: 'Add H3 subheadings for better structure' }); }
        if (stats.links >= 3) { s += 10; t.push({ type: 'success', msg: stats.links + ' internal links' }); }
        else if (stats.links >= 1) { s += 5; t.push({ type: 'warn', msg: 'Add ' + (3 - stats.links) + ' more internal links' }); }
        else { t.push({ type: 'error', msg: 'No links found. Add internal links' }); }
        if (stats.imgs >= 1) { s += 5; t.push({ type: 'success', msg: stats.imgs + ' image' + (stats.imgs > 1 ? 's' : '') }); }
        else { t.push({ type: 'warn', msg: 'Add at least 1 image' }); }
        if (focusCount >= 3 && focusCount <= 8) { s += 20; t.push({ type: 'success', msg: 'Focus keyword used ' + focusCount + 'x (ideal: 3-8)' }); }
        else if (focusCount > 8) { s += 12; t.push({ type: 'warn', msg: 'Focus keyword overused (' + focusCount + 'x). Reduce to 3-8 for best results' }); }
        else if (focusCount >= 1) { s += 10; t.push({ type: 'warn', msg: 'Use focus keyword ' + (3 - focusCount) + ' more times (have ' + focusCount + ', need 3-8)' }); }
        else if (focusKeyword) { t.push({ type: 'error', msg: 'Focus keyword "' + focusKeyword + '" not found in content' }); }
        const hasKws = keywordAnalysis.length > 0;
        const used = keywordAnalysis.filter(k => k.count > 0).length;
        const total = keywordAnalysis.length || 1;
        if (hasKws) {
          s += Math.min(20, Math.round((used / total) * 20));
          if (used < total * 0.5) t.push({ type: 'warn', msg: 'Using ' + used + '/' + keywordAnalysis.length + ' target keywords. Add more.' });
        }
        if (stats.words >= 1500 && stats.h2s >= 3 && focusCount >= 3) {
          t.unshift({ type: 'success', msg: 'Great content structure!' });
        }
        return { score: Math.min(100, s), tips: t };
      }, [stats, focusCount, keywordAnalysis, focusKeyword]);

      useEffect(() => {
        if (onScoreChange) onScoreChange({ score, tips, stats, focusCount, keywordAnalysis });
      }, [score, tips, stats, focusCount, keywordAnalysis]);

      const [keywords, setKeywords] = useState([]);
      const [rankings, setRankings] = useState([]);
      const [syncing, setSyncing] = useState(false);
      const [importing, setImporting] = useState(false);

      const loadData = async () => {
        const [kwRes, rankRes] = await Promise.all([
          api(`/projects/${project.id}/rank-tracking/keywords`),
          api(`/projects/${project.id}/rank-tracking/latest`)
        ]);
        if (Array.isArray(kwRes)) setKeywords(kwRes);
        if (Array.isArray(rankRes)) setRankings(rankRes);
      };

      useEffect(() => { if (project) loadData(); }, [project?.id]);

      const addKeyword = async (kw, location) => {
        await api(`/projects/${project.id}/rank-tracking/keywords`, { method: 'POST', body: { keywords: [kw.trim()], location: location || null } });
        loadData();
      };
      const removeKeyword = async (id) => {
        await api(`/projects/${project.id}/rank-tracking/keywords/${id}`, { method: 'DELETE' });
        loadData();
      };
      const deleteAllKeywords = async () => {
        if (!confirm('Delete ALL tracked keywords and ranking data? This cannot be undone.')) return;
        await api(`/projects/${project.id}/rank-tracking/keywords`, { method: 'DELETE' });
        loadData();
      };
      const importKeywords = async () => {
        setImporting(true);
        const r = await api(`/projects/${project.id}/rank-tracking/import`, { method: 'POST', body: { limit: 50 } });
        if (r.ok) loadData(); else if (r.error) alert(r.error);
        setImporting(false);
      };
      const importCSV = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv,.txt';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const text = await file.text();
          const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
          const firstLine = lines[0].toLowerCase();

          // Detect GSC export format: "Top queries,Clicks,Impressions,CTR,Position"
          const isGsc = firstLine.includes('top queries') || (firstLine.includes('queries') && firstLine.includes('clicks') && firstLine.includes('impressions'));

          setImporting(true);
          if (isGsc) {
            // Parse GSC CSV — upload to gsc_keywords AND rank_keywords
            const gscRows = [];
            const kws = [];
            for (let i = 1; i < lines.length; i++) {
              const cols = lines[i].split(',').map(c => c.replace(/^["']|["']$/g, '').trim());
              if (!cols[0]) continue;
              kws.push(cols[0]);
              gscRows.push({ keyword: cols[0], clicks: cols[1] || '0', impressions: cols[2] || '0', ctr: cols[3] || '0', position: cols[4] || '0' });
            }
            if (gscRows.length === 0) { alert('No keywords found in CSV'); setImporting(false); return; }
            // Upload GSC data (positions, clicks, impressions)
            const gscR = await api(`/projects/${project.id}/gsc/upload-csv`, { method: 'POST', body: { rows: gscRows } });
            // Also add to rank tracking keywords
            const kwR = await api(`/projects/${project.id}/rank-tracking/keywords`, { method: 'POST', body: { keywords: kws } });
            alert(`Uploaded ${gscR.synced || gscRows.length} GSC keywords with positions + added ${kwR.added || kws.length} to rank tracking`);
            loadData();
          } else {
            // Plain keyword list — first column only
            const startIdx = (firstLine === 'keyword' || firstLine === 'keywords' || firstLine.includes('keyword')) ? 1 : 0;
            const kws = [];
            for (let i = startIdx; i < lines.length; i++) {
              const kw = lines[i].split(',')[0].replace(/^["']|["']$/g, '').trim();
              if (kw && kw.length > 0) kws.push(kw);
            }
            if (kws.length === 0) { alert('No keywords found in file'); setImporting(false); return; }
            const r = await api(`/projects/${project.id}/rank-tracking/keywords`, { method: 'POST', body: { keywords: kws } });
            if (r.ok) alert(`Imported ${r.added} keywords (${r.total} total)`);
            else if (r.error) alert(r.error);
            loadData();
          }
          setImporting(false);
        };
        input.click();
      };
      const syncRanks = async () => {
        setSyncing(true);
        const r = await api(`/projects/${project.id}/rank-tracking/sync`, { method: 'POST' });
        if (r.ok) loadData(); else if (r.error) alert(r.error);
        setSyncing(false);
      };

      const merged = keywords.map(kw => {
        const rank = rankings.find(r => r.keyword.toLowerCase() === kw.keyword.toLowerCase() && (r.location || '') === (kw.location || ''));
        return { ...kw, ...rank };
      });

      return { keywords, rankings, merged, syncing, importing, addKeyword, removeKeyword, deleteAllKeywords, importKeywords, importCSV, syncRanks, loadData };
    }

    // ============ SERP RANKINGS PAGE ============
    function SERPRankingsPage({ project }) {
      const { keywords, rankings, merged, syncing, importing, addKeyword, removeKeyword, deleteAllKeywords, importKeywords, importCSV, syncRanks, loadData } = useRankData(project);
      const [newKw, setNewKw] = useState('');
      const [history, setHistory] = useState([]);
      const [selectedKw, setSelectedKw] = useState(null);
      const [expandedKw, setExpandedKw] = useState(null);
      const [sortCol, setSortCol] = useState(null);
      const [sortDir, setSortDir] = useState('asc');
      const [discovering, setDiscovering] = useState(false);
      const [discovered, setDiscovered] = useState(null);
      const [discoverLimit, setDiscoverLimit] = useState(20);
      const [selectedDiscovered, setSelectedDiscovered] = useState(new Set());

      const toggleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir('asc'); }
      };
      const sortIcon = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

      const sorted = useMemo(() => {
        if (!sortCol) return merged;
        return [...merged].sort((a, b) => {
          let va, vb;
          if (sortCol === 'keyword') { va = (a.keyword || '').toLowerCase(); vb = (b.keyword || '').toLowerCase(); }
          else if (sortCol === 'volume') { va = a.search_volume ?? -1; vb = b.search_volume ?? -1; }
          else if (sortCol === 'position') { va = a.serp_position ?? 999; vb = b.serp_position ?? 999; }
          else if (sortCol === 'gsc') { va = a.gsc_position ?? 999; vb = b.gsc_position ?? 999; }
          else if (sortCol === 'competitors') { va = (a.competitors || []).filter(c => c.source === 'serp').length; vb = (b.competitors || []).filter(c => c.source === 'serp').length; }
          else if (sortCol === 'checked') { va = a.checked_at || ''; vb = b.checked_at || ''; }
          else return 0;
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
      }, [merged, sortCol, sortDir]);

      const discoverKeywords = async () => {
        setDiscovering(true);
        const r = await api(`/projects/${project.id}/rank-tracking/discover`, { method: 'POST', body: { limit: discoverLimit } });
        if (r.ok && r.keywords) {
          // Filter out keywords already tracked
          const tracked = new Set(keywords.map(k => k.keyword.toLowerCase()));
          const fresh = r.keywords.filter(k => !tracked.has(k.keyword.toLowerCase()));
          setDiscovered(fresh);
          setSelectedDiscovered(new Set(fresh.map(k => k.keyword)));
        } else {
          alert(r.error || 'Failed to discover keywords');
        }
        setDiscovering(false);
      };
      const addDiscoveredKeywords = async () => {
        if (selectedDiscovered.size === 0) return;
        // Send full data (volume, position, url, competition)
        const kws = discovered.filter(k => selectedDiscovered.has(k.keyword));
        const r = await api(`/projects/${project.id}/rank-tracking/import-discovered`, { method: 'POST', body: { keywords: kws } });
        if (r.ok) alert(`Added ${r.added} keywords with positions & volume`);
        else if (r.error) alert(r.error);
        setDiscovered(null);
        setSelectedDiscovered(new Set());
        loadData();
      };
      const toggleDiscovered = (kw) => {
        setSelectedDiscovered(prev => {
          const next = new Set(prev);
          if (next.has(kw)) next.delete(kw); else next.add(kw);
          return next;
        });
      };

      const downloadSampleCSV = () => {
        const csv = `Keyword\nplumber perth\nblocked drain repair\nemergency plumber near me\nhot water system installation`;
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'sample-keywords.csv';
        a.click();
      };

      async function loadHistory(kw) {
        setSelectedKw(kw);
        const r = await api(`/projects/${project.id}/rank-tracking/history?keyword=${encodeURIComponent(kw)}&days=90`);
        if (Array.isArray(r)) setHistory(r);
      }

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h2 style={{ margin: 0 }}><i className="fa-solid fa-chart-line" style={{ marginRight: 8, color: 'var(--accent)' }} />SERP Rankings</h2>
            <div style={{ display: 'flex', gap: 8 }}>
              {keywords.length > 0 && <button className="btn" onClick={deleteAllKeywords} style={{ fontSize: 13, color: '#ef4444', borderColor: '#ef4444' }}>
                <i className="fa-solid fa-trash" style={{ marginRight: 4 }} />Delete All
              </button>}
              <div style={{ display: 'flex', alignItems: 'center', gap: 0 }}>
                <select value={discoverLimit} onChange={e => setDiscoverLimit(Number(e.target.value))} disabled={discovering}
                  style={{ fontSize: 13, padding: '6px 8px', borderRadius: '6px 0 0 6px', border: '1px solid var(--border)', borderRight: 'none', background: 'var(--card)', color: 'var(--text)', cursor: 'pointer' }}>
                  {[10, 20, 30, 40, 50].map(n => <option key={n} value={n}>{n}</option>)}
                </select>
                <button className="btn" onClick={discoverKeywords} disabled={discovering} style={{ fontSize: 13, borderRadius: '0 6px 6px 0' }}>
                  {discovering ? <><i className="fa-solid fa-spinner fa-spin" style={{ marginRight: 4 }} />Discovering...</> : <><i className="fa-solid fa-magnifying-glass" style={{ marginRight: 4 }} />Discover Keywords</>}
                </button>
              </div>
              <button className="btn" onClick={importCSV} disabled={importing} style={{ fontSize: 13 }}>
                <i className="fa-solid fa-file-csv" style={{ marginRight: 4 }} />Import CSV
              </button>
              <button onClick={downloadSampleCSV} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 11, padding: '0 4px', textDecoration: 'underline', alignSelf: 'center' }}>
                Sample CSV
              </button>
              <button className="btn" onClick={() => importKeywords()} disabled={importing} style={{ fontSize: 13 }}>
                {importing ? <><i className="fa-solid fa-spinner fa-spin" style={{ marginRight: 4 }} />Importing...</> : <><i className="fa-solid fa-download" style={{ marginRight: 4 }} />Import from GSC</>}
              </button>
              <button className="btn btn-primary" onClick={syncRanks} disabled={syncing || keywords.length === 0} style={{ fontSize: 13 }}>
                {syncing ? <><i className="fa-solid fa-spinner fa-spin" style={{ marginRight: 4 }} />Checking...</> : <><i className="fa-solid fa-sync" style={{ marginRight: 4 }} />Check Rankings</>}
              </button>
            </div>
          </div>

          {/* Summary cards */}
          {rankings.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12, marginBottom: 20 }}>
              {[
                { label: 'Tracked', value: keywords.length, color: 'var(--text)' },
                { label: 'Top 3', value: rankings.filter(r => r.serp_position && r.serp_position <= 3).length, color: '#22c55e' },
                { label: 'Top 10', value: rankings.filter(r => r.serp_position && r.serp_position <= 10).length, color: '#3b82f6' },
                { label: 'Top 20', value: rankings.filter(r => r.serp_position && r.serp_position <= 20).length, color: '#f59e0b' },
                { label: 'Not Ranking', value: rankings.filter(r => !r.serp_position).length, color: '#ef4444' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--card)', borderRadius: 10, padding: 14, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 26, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* Add keyword */}
          <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
            <input value={newKw} onChange={e => setNewKw(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && newKw.trim()) { addKeyword(newKw); setNewKw(''); } }}
              placeholder="Add keyword to track..." style={{ flex: 1, padding: '10px 14px', background: 'var(--card)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 14 }} />
            <button className="btn btn-primary" onClick={() => { if (newKw.trim()) { addKeyword(newKw); setNewKw(''); } }} disabled={!newKw.trim()} style={{ fontSize: 14, padding: '10px 20px' }}>
              <i className="fa-solid fa-plus" style={{ marginRight: 4 }} />Add
            </button>
          </div>

          {keywords.length === 0 ? (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fa-solid fa-chart-line" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
              <div style={{ fontSize: 16, marginBottom: 8 }}>No keywords tracked yet</div>
              <div style={{ fontSize: 13, marginBottom: 16 }}>Add keywords manually, import from CSV, or import from GSC.</div>
