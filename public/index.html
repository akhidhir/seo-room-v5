                  </td></tr>
                ) : (() => {
                  const pillarColors = { Proximity: '#f59e0b', Relevance: '#6366f1', Prominence: '#22c55e' };
                  const pillarIcons = { Proximity: 'fas fa-map-marker-alt', Relevance: 'fas fa-bullseye', Prominence: 'fas fa-star' };
                  let lastPillar = null;
                  let num = 0;
                  return sorted.map((f) => {
                    const pillar = getPillar(f);
                    const subcat = getSubcat(f);
                    const showHeader = pillar !== lastPillar && filterPillar === 'all';
                    lastPillar = pillar;
                    num++;
                    const pColor = pillarColors[pillar] || '#6366f1';
                    return React.createElement(React.Fragment, { key: f.id },
                      showHeader && (
                        <tr style={{ background: pColor + '10' }}>
                          <td colSpan={8} style={{ padding: '12px 14px', fontWeight: 700, fontSize: 16, color: pColor, borderBottom: `2px solid ${pColor}30` }}>
                            <i className={pillarIcons[pillar] || 'fas fa-circle'} style={{ marginRight: 10 }} />{pillar}
                            <span style={{ fontWeight: 400, fontSize: 13, color: 'var(--text3)', marginLeft: 10 }}>
                              ({sorted.filter(s => getPillar(s) === pillar).length} issues)
                            </span>
                          </td>
                        </tr>
                      ),
                      <tr style={{ borderBottom: '1px solid var(--border)', background: selected.has(f.id) ? 'rgba(99,102,241,0.08)' : 'transparent', cursor: 'pointer' }}
                        onClick={(e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') setReviewFinding(f); }}>
                        <td style={{ padding: '14px 10px' }}><input type="checkbox" checked={selected.has(f.id)} onChange={() => toggleSelect(f.id)} /></td>
                        <td style={{ padding: '14px 6px', color: 'var(--text3)', fontSize: 14 }}>{num}</td>
                        <td style={{ padding: '14px', fontWeight: 600, fontSize: 16 }}>
                          <span style={{ display: 'inline-block', width: 4, height: 20, borderRadius: 2, background: pColor, marginRight: 10, verticalAlign: 'middle' }} />
                          {f.title}
                        </td>
                        <td style={{ padding: '14px 10px' }}>{sevBadge(f.severity)}</td>
                        <td style={{ padding: '14px', fontSize: 14, color: 'var(--text2)', maxWidth: 400, lineHeight: 1.5 }}>{(f.description || '').substring(0, 150)}{(f.description || '').length > 150 ? '...' : ''}</td>
                        <td style={{ padding: '14px 10px', textAlign: 'center' }}><span style={{ fontSize: 12, padding: '3px 8px', borderRadius: 4, background: pColor + '15', color: pColor }}>{subcat}</span></td>
                        <td style={{ padding: '14px 10px', textAlign: 'center' }}>{statusBadge(f.status || 'new')}</td>
                        <td style={{ padding: '14px 10px', textAlign: 'center' }}>
                          <button className="btn btn-small" onClick={(e) => { e.stopPropagation(); setReviewFinding(f); }} style={{ fontSize: 14 }}>
                            <i className="fas fa-search" style={{ marginRight: 4 }} /> Review
                          </button>
                        </td>
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============ GSC AUDIT PAGE ============
    function GSCAuditPage({ project }) {
      const [findings, setFindings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [approvedIds, setApprovedIds] = useState(new Set());
      const [expandedId, setExpandedId] = useState(null);
      const [expandedCats, setExpandedCats] = useState(new Set());
      const [summary, setSummary] = useState(null);

      // Load previous findings on mount
      useEffect(() => {
        if (project) loadExisting();
      }, [project?.id]);

      const loadExisting = async () => {
        const data = await api(`/projects/${project.id}/audit-findings`);
        if (data.findings) setFindings(data.findings.filter(f => f.pillar === 'gsc'));
      };

      const runAudit = async () => {
        setLoading(true);
        setError('');
        try {
          const data = await api(`/projects/${project.id}/audits/gsc/run`, { method: 'POST' });
          setFindings(data.findings || []);
          if (data.summary) setSummary(data.summary);
          if (data.message && (!data.findings || data.findings.length === 0)) setError(data.message);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleApprove = async (finding) => {
        try {
          await api(`/audit-findings/${finding.id}`, { method: 'PUT', body: { status: 'approved' } });
          setApprovedIds((prev) => new Set([...prev, finding.id]));
        } catch (err) {
          setError(err.message);
        }
      };

      const handleReject = async (finding) => {
        try {
          await api(`/audit-findings/${finding.id}`, { method: 'PUT', body: { status: 'rejected' } });
          setFindings((prev) => prev.filter((f) => f.id !== finding.id));
        } catch (err) {
          setError(err.message);
        }
      };

      const stats = useMemo(() => {
        const critical = findings.filter((f) => f.severity === 'Critical').length;
        const medium = findings.filter((f) => f.severity === 'Medium').length;
        const low = findings.filter((f) => f.severity === 'Low').length;
        return { critical, medium, low };
      }, [findings]);

      return (
        <>
          <div className="page-header">
            <div className="page-title">
              <i className="fas fa-chart-line"></i> GSC Audit
            </div>
            <div className="page-subtitle">Google Search Console optimization — find quick wins, low CTR pages, and keyword cannibalization</div>
          </div>

          {loading && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Running GSC Audit</div>
              <div className="audit-loading-sub">Fetching keywords, pages, and search performance data...</div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 12, marginBottom: 20 }}>
            <button className="btn btn-primary" onClick={runAudit} disabled={loading}>
              {loading ? <><span className="spinner"></span>Analyzing...</> : <><i className="fas fa-play" style={{ marginRight: 6 }}></i>Run GSC Audit</>}
            </button>
            {summary && (
              <div style={{ fontSize: 12, color: 'var(--text3)', display: 'flex', alignItems: 'center', gap: 12 }}>
                <span><i className="fas fa-key" style={{ marginRight: 4 }} />{summary.keywords} keywords</span>
                <span><i className="fas fa-file" style={{ marginRight: 4 }} />{summary.pages} pages</span>
                <span><i className="fas fa-flag" style={{ marginRight: 4 }} />{summary.findings} findings</span>
              </div>
            )}
          </div>

          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

          {!loading && findings.length > 0 && (() => {
            const gscCategoryConfig = {
              'Quick Win': { icon: 'fas fa-bolt', color: '#f59e0b' },
              'Low CTR': { icon: 'fas fa-mouse-pointer', color: '#ef4444' },
              'Zero Clicks': { icon: 'fas fa-ban', color: '#dc2626' },
              'Cannibalization': { icon: 'fas fa-clone', color: '#8b5cf6' },
              'Underperforming Page': { icon: 'fas fa-chart-line', color: '#6366f1' },
              'Brand Dependency': { icon: 'fas fa-tag', color: '#ec4899' },
              'Indexing Issues': { icon: 'fas fa-exclamation-triangle', color: '#f97316' },
              'Mobile Usability': { icon: 'fas fa-mobile-alt', color: '#3b82f6' },
            };
            const categories = [...new Set(findings.map(f => f.category))];
            return (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12, marginBottom: 24 }}>
                <div style={{ background: 'var(--card)', borderRadius: 12, padding: 20, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 36, fontWeight: 800, color: '#ef4444' }}>{stats.critical}</div>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4, textTransform: 'uppercase', letterSpacing: 1 }}>Critical</div>
                </div>
                <div style={{ background: 'var(--card)', borderRadius: 12, padding: 20, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 36, fontWeight: 800, color: '#f59e0b' }}>{stats.medium}</div>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4, textTransform: 'uppercase', letterSpacing: 1 }}>Medium</div>
                </div>
                <div style={{ background: 'var(--card)', borderRadius: 12, padding: 20, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 36, fontWeight: 800, color: '#3b82f6' }}>{stats.low}</div>
                  <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4, textTransform: 'uppercase', letterSpacing: 1 }}>Low</div>
                </div>
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16, alignItems: 'start' }}>
              {categories.map(cat => {
                const cfg = gscCategoryConfig[cat] || { icon: 'fas fa-circle', color: '#64748b' };
                const catFindings = findings.filter(f => f.category === cat);
                const isOpen = expandedCats.has(cat);
                const hasCritical = catFindings.some(f => f.severity === 'Critical');
                return (
                  <div key={cat} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
                    <div onClick={() => setExpandedCats(prev => { const s = new Set(prev); s.has(cat) ? s.delete(cat) : s.add(cat); return s; })}
                      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', background: `${cfg.color}12`, borderBottom: isOpen ? `2px solid ${cfg.color}` : 'none', cursor: 'pointer' }}>
                      <i className={cfg.icon} style={{ color: cfg.color, fontSize: 18 }} />
                      <span style={{ fontSize: 15, fontWeight: 700, color: cfg.color }}>{cat}</span>
                      {hasCritical && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(239,68,68,0.15)', color: '#ef4444', fontWeight: 700 }}>CRITICAL</span>}
                      <span style={{ fontSize: 11, color: 'var(--text3)', marginLeft: 'auto', background: 'var(--bg)', padding: '2px 8px', borderRadius: 10, fontWeight: 600 }}>
                        {catFindings.length}
                      </span>
                      <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 12 }} />
                    </div>
                    {isOpen && <div style={{ padding: 8 }}>
                    {catFindings.map(finding => (
                      <FindingCard
                        key={finding.id}
                        finding={finding}
                        onApprove={handleApprove}
                        onReject={handleReject}
                        isApproved={approvedIds.has(finding.id)}
                        expanded={expandedId === finding.id}
                        onToggle={() => setExpandedId(expandedId === finding.id ? null : finding.id)}
                      />
                    ))}
                    </div>}
                  </div>
                );
              })}
              </div>
            </>
            );
          })()}

          {!loading && findings.length === 0 && (
            <div className="empty-state">
              <div className="empty-state-icon">
                <i className="fas fa-chart-line"></i>
              </div>
              <div className="empty-state-title">No GSC audit data</div>
              <div>Connect Google Search Console and click "Run GSC Audit" to find optimization opportunities</div>
            </div>
          )}
        </>
      );
    }

    // ============ WEBSITE AUDIT PAGE ============
    // ============ TECHNICAL AUDIT PAGE ============
    function TechnicalAuditPage({ project }) {
      const [tab, setTab] = useState('general');
      const [findings, setFindings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [approvedIds, setApprovedIds] = useState(new Set());
      const [expandedId, setExpandedId] = useState(null);
      const [expandedCats, setExpandedCats] = useState(new Set());

      const handleApprove = async (finding) => {
        try {
          await api(`/audit-findings/${finding.id}`, { method: 'PUT', body: { status: 'approved' } });
          setApprovedIds(prev => new Set([...prev, finding.id]));
        } catch (err) { setError(err.message); }
      };
      const handleReject = async (finding) => {
        try {
          await api(`/audit-findings/${finding.id}`, { method: 'PUT', body: { status: 'rejected' } });
          setFindings(prev => prev.filter(f => f.id !== finding.id));
        } catch (err) { setError(err.message); }
      };

      // Speed audit state
      const [speedResults, setSpeedResults] = useState([]);
      const [speedLoading, setSpeedLoading] = useState(false);
      const [speedError, setSpeedError] = useState('');
      const [optimizingPages, setOptimizingPages] = useState(new Set());
      const [expandedSpeedPage, setExpandedSpeedPage] = useState(null);
      const [pageSpeedData, setPageSpeedData] = useState({});
      const [psLoading, setPsLoading] = useState(null);

      const categories = [
        { key: 'speed', label: 'Page Speed & Core Web Vitals', icon: 'fas fa-tachometer-alt', color: '#ef4444' },
        { key: 'crawl', label: 'Crawlability & Indexing', icon: 'fas fa-spider', color: '#f59e0b' },
        { key: 'links', label: 'Broken Links & Redirects', icon: 'fas fa-unlink', color: '#ef4444' },
        { key: 'security', label: 'HTTPS & Security', icon: 'fas fa-lock', color: '#22c55e' },
        { key: 'mobile', label: 'Mobile Usability', icon: 'fas fa-mobile-alt', color: '#3b82f6' },
        { key: 'schema', label: 'Schema Markup', icon: 'fas fa-code', color: '#8b5cf6' },
        { key: 'sitemap', label: 'Sitemap & Robots.txt', icon: 'fas fa-sitemap', color: '#6366f1' },
        { key: 'structure', label: 'Internal Link Structure', icon: 'fas fa-project-diagram', color: '#14b8a6' },
      ];

      // Load previous findings on mount
      useEffect(() => {
        if (project) loadExisting();
      }, [project?.id]);

      const loadExisting = async () => {
        const data = await api(`/projects/${project.id}/audit-findings`);
        if (data.findings) setFindings(data.findings.filter(f => f.pillar === 'technical'));
        // Load previous speed audit results
        try {
          const speedData = await api(`/projects/${project.id}/audits/speed/latest`);
          if (speedData.results) {
            setSpeedResults(speedData.results);
            const cwvMap = {};
            speedData.results.forEach(r => { if (r.cwv) cwvMap[r.page_id] = r.cwv; });
            setPageSpeedData(prev => ({ ...prev, ...cwvMap }));
          }
        } catch (e) { /* no previous speed audit */ }
      };

      const runAudit = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/audits/technical/run`, { method: 'POST' });
          if (data.findings) setFindings(data.findings);
          else if (data.error) setError(data.error);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const runSpeedAudit = async () => {
        setSpeedLoading(true); setSpeedError('');
        try {
          const data = await api(`/speed-audit/${project?.id || 1}/run`, { method: 'POST' });
          setSpeedResults(data.results || []);
          // Auto-populate CWV data from batch results
          const cwvMap = {};
          (data.results || []).forEach(r => { if (r.cwv) cwvMap[r.page_id] = r.cwv; });
          setPageSpeedData(prev => ({ ...prev, ...cwvMap }));
        } catch (err) { setSpeedError(err.message); }
        finally { setSpeedLoading(false); }
      };

      const optimizePage = async (pageId) => {
        setOptimizingPages(prev => new Set([...prev, pageId]));
        try {
          await api(`/speed-audit/${project?.id || 1}/optimize/${pageId}`, { method: 'POST', body: { max_width: 1200, quality: 82, webp: true } });
          // Re-run audit for this page to show updated data
          const updated = await api(`/speed-audit/${project?.id || 1}/page/${pageId}`);
          setSpeedResults(prev => prev.map(r => r.page_id === pageId ? { ...r, ...updated } : r));
        } catch (err) { setSpeedError(err.message); }
        finally { setOptimizingPages(prev => { const s = new Set(prev); s.delete(pageId); return s; }); }
      };

      const runPageSpeed = async (url, pageId) => {
        setPsLoading(pageId);
        try {
          const data = await api(`/speed-audit/${project?.id || 1}/pagespeed?url=${encodeURIComponent(url)}&strategy=mobile`);
          setPageSpeedData(prev => ({ ...prev, [pageId]: data.cwv }));
        } catch (err) { setSpeedError(err.message); }
        finally { setPsLoading(null); }
      };

      // handleApprove and handleReject defined above

      const stats = useMemo(() => ({
        critical: findings.filter(f => f.severity === 'Critical').length,
        medium: findings.filter(f => f.severity === 'Medium').length,
        low: findings.filter(f => f.severity === 'Low').length,
      }), [findings]);

      const speedStats = useMemo(() => {
        if (!speedResults.length) return null;
        const totalImages = speedResults.reduce((s, r) => s + (r.image_count || 0), 0);
        const totalIssues = speedResults.reduce((s, r) => s + (r.total_issues || 0), 0);
        const pagesWithIssues = speedResults.filter(r => (r.total_issues || 0) > 0).length;
        return { totalImages, totalIssues, pagesWithIssues, totalPages: speedResults.length };
      }, [speedResults]);

      const issueLabel = (issue) => ({
        missing_width: 'Missing width attribute',
        missing_height: 'Missing height attribute',
        no_lazy_load: 'No lazy loading',
        missing_alt: 'Missing alt text',
        too_large: 'File too large (>200KB)',
        oversized: 'Image oversized (>1920px)',
        no_webp: 'No WebP version',
      }[issue] || issue);

      const issueSeverity = (issue) => {
        if (['too_large', 'oversized', 'missing_alt'].includes(issue)) return 'critical';
        if (['no_webp', 'missing_width', 'missing_height'].includes(issue)) return 'medium';
        return 'low';
      };

      const tabs = [
        { id: 'general', label: 'General', icon: 'fas fa-cogs' },
        { id: 'speed', label: 'Speed & Images', icon: 'fas fa-tachometer-alt' },
      ];

      // Health score: 100 minus weighted penalties
      const healthScore = useMemo(() => {
        if (!findings.length) return null;
        const penalty = stats.critical * 12 + stats.medium * 5 + stats.low * 2;
        return Math.max(0, Math.min(100, 100 - penalty));
      }, [findings, stats]);

      const healthColor = (score) => score >= 80 ? '#22c55e' : score >= 50 ? '#f59e0b' : '#ef4444';
      const healthLabel = (score) => score >= 80 ? 'Good' : score >= 50 ? 'Needs Work' : 'Poor';

      const [severityFilter, setSeverityFilter] = useState('all');

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-cogs" style={{ marginRight: 10, color: 'var(--accent)' }} />Technical Audit
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Site speed, crawlability, broken links, schema, security, mobile usability</p>
            </div>
            <button className="btn btn-primary" onClick={tab === 'general' ? runAudit : runSpeedAudit} disabled={loading || speedLoading} style={{ fontSize: 13 }}>
              {(loading || speedLoading) ? <><span className="spinner"></span>Scanning...</> : <><i className="fas fa-play" style={{ marginRight: 6 }} />{tab === 'general' ? 'Run Technical Audit' : 'Run Speed Audit'}</>}
            </button>
          </div>

          {/* Tab switcher */}
          <div style={{ display: 'flex', gap: 4, marginBottom: 20, background: 'var(--bg)', borderRadius: 10, padding: 4 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex: 1, padding: '10px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 600,
                background: tab === t.id ? 'var(--primary)' : 'transparent',
                color: tab === t.id ? '#fff' : 'var(--text2)',
                transition: 'all 0.2s',
              }}>
                <i className={t.icon} style={{ marginRight: 6 }} />{t.label}
              </button>
            ))}
          </div>

          {/* ====== GENERAL TAB ====== */}
          {tab === 'general' && <>

            {loading && (
              <div className="audit-loading-overlay">
                <span className="spinner-large"></span>
                <div className="audit-loading-text">Running Technical Audit</div>
                <div className="audit-loading-sub">Crawling pages, checking HTTPS, robots, sitemap, schema, links...</div>
              </div>
            )}

            {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

            {findings.length > 0 && <>
              {/* Health score + stats row */}
              <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: 16, marginBottom: 24 }}>
                {/* Health score circle */}
                <div style={{ background: 'var(--card)', borderRadius: 12, padding: 20, border: '1px solid var(--border)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ position: 'relative', width: 80, height: 80 }}>
                    <svg viewBox="0 0 80 80" style={{ transform: 'rotate(-90deg)' }}>
                      <circle cx="40" cy="40" r="34" fill="none" stroke="var(--border)" strokeWidth="6" />
                      <circle cx="40" cy="40" r="34" fill="none" stroke={healthColor(healthScore)} strokeWidth="6"
                        strokeDasharray={`${(healthScore / 100) * 213.6} 213.6`}
                        strokeLinecap="round" style={{ transition: 'stroke-dasharray 0.5s' }} />
                    </svg>
                    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                      <span style={{ fontSize: 22, fontWeight: 800, color: healthColor(healthScore) }}>{healthScore}</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: healthColor(healthScore), marginTop: 8, textTransform: 'uppercase' }}>{healthLabel(healthScore)}</div>
                </div>

                {/* Severity stats */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                  {[
                    { id: 'Critical', label: 'Critical', value: stats.critical, color: '#ef4444', icon: 'fas fa-exclamation-circle' },
                    { id: 'Medium', label: 'Medium', value: stats.medium, color: '#f59e0b', icon: 'fas fa-exclamation-triangle' },
                    { id: 'Low', label: 'Low', value: stats.low, color: '#3b82f6', icon: 'fas fa-info-circle' },
                  ].map(s => (
                    <div key={s.id} onClick={() => setSeverityFilter(severityFilter === s.id ? 'all' : s.id)}
                      style={{ background: 'var(--card)', borderRadius: 12, padding: 20, textAlign: 'center', border: severityFilter === s.id ? `2px solid ${s.color}` : '1px solid var(--border)', cursor: 'pointer', transition: 'all 0.2s' }}>
                      <i className={s.icon} style={{ fontSize: 18, color: s.color, display: 'block', marginBottom: 8 }} />
                      <div style={{ fontSize: 32, fontWeight: 800, color: s.color }}>{s.value}</div>
                      <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4, textTransform: 'uppercase', letterSpacing: 1 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Active filter indicator */}
              {severityFilter !== 'all' && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, fontSize: 13, color: 'var(--text3)' }}>
                  <span>Showing: <strong style={{ color: severityFilter === 'Critical' ? '#ef4444' : severityFilter === 'Medium' ? '#f59e0b' : '#3b82f6' }}>{severityFilter}</strong> findings only</span>
                  <button onClick={() => setSeverityFilter('all')} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 12 }}>Clear filter</button>
                </div>
              )}
            </>}

            {!loading && findings.length > 0 && <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16, alignItems: 'start' }}>
            {categories.map(cat => {
              const allCatFindings = findings.filter(f => f.category === cat.key);
              const catFindings = severityFilter === 'all' ? allCatFindings : allCatFindings.filter(f => f.severity === severityFilter);
              if (allCatFindings.length === 0) return null;
              if (catFindings.length === 0 && severityFilter !== 'all') return null;
              const isOpen = expandedCats.has(cat.key);
              const critCount = allCatFindings.filter(f => f.severity === 'Critical').length;
              const medCount = allCatFindings.filter(f => f.severity === 'Medium').length;
              const lowCount = allCatFindings.filter(f => f.severity === 'Low').length;
              return (
                <div key={cat.key} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
                  <div onClick={() => setExpandedCats(prev => { const s = new Set(prev); s.has(cat.key) ? s.delete(cat.key) : s.add(cat.key); return s; })}
                    style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '16px 18px', background: `${cat.color}12`, borderBottom: isOpen ? `2px solid ${cat.color}` : 'none', cursor: 'pointer' }}>
                    <i className={cat.icon} style={{ color: cat.color, fontSize: 20 }} />
                    <span style={{ fontSize: 16, fontWeight: 700, color: 'var(--text1)' }}>{cat.label}</span>
                    <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
                      {critCount > 0 && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(239,68,68,0.15)', color: '#ef4444', fontWeight: 700 }}>{critCount}</span>}
                      {medCount > 0 && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(245,158,11,0.15)', color: '#f59e0b', fontWeight: 700 }}>{medCount}</span>}
                      {lowCount > 0 && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(59,130,246,0.15)', color: '#3b82f6', fontWeight: 700 }}>{lowCount}</span>}
                      <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 12, marginLeft: 4 }} />
                    </div>
                  </div>
                  {isOpen && <div style={{ padding: 8 }}>
                  {catFindings.map(f => (
                    <FindingCard
                      key={f.id}
                      finding={f}
                      onApprove={handleApprove}
                      onReject={handleReject}
                      isApproved={approvedIds.has(f.id)}
                      expanded={expandedId === f.id}
                      onToggle={() => setExpandedId(expandedId === f.id ? null : f.id)}
                    />
                  ))}
                  </div>}
                </div>
              );
            })}
            </div>}

            {!loading && findings.length === 0 && (
              <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
                <i className="fas fa-cogs" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
                <div style={{ fontSize: 16, marginBottom: 8 }}>No technical audit run yet</div>
                <div style={{ fontSize: 13 }}>Click "Run Technical Audit" to scan for speed, crawl, link, and security issues.</div>
              </div>
            )}
          </>}

          {/* ====== SPEED & IMAGES TAB ====== */}
          {tab === 'speed' && <>
            {speedLoading && (
              <div className="audit-loading-overlay">
                <span className="spinner-large"></span>
                <div className="audit-loading-text">Running Speed Audit</div>
                <div className="audit-loading-sub">Scanning pages for image issues, WebP, lazy loading, Core Web Vitals...</div>
              </div>
            )}

            {speedError && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{speedError}</div>}

            {speedStats && (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
                {[
                  { label: 'Pages Scanned', value: speedStats.totalPages, color: 'var(--primary)' },
                  { label: 'Total Images', value: speedStats.totalImages, color: '#3b82f6' },
                  { label: 'Issues Found', value: speedStats.totalIssues, color: speedStats.totalIssues > 0 ? '#ef4444' : '#22c55e' },
                  { label: 'Pages With Issues', value: speedStats.pagesWithIssues, color: speedStats.pagesWithIssues > 0 ? '#f59e0b' : '#22c55e' },
                ].map(s => (
                  <div key={s.label} style={{ background: 'var(--card)', borderRadius: 10, padding: 14, textAlign: 'center', border: '1px solid var(--border)' }}>
                    <div style={{ fontSize: 26, fontWeight: 800, color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{s.label}</div>
                  </div>
                ))}
              </div>
            )}

            {speedResults.length > 0 && speedResults.map(page => {
              const isExpanded = expandedSpeedPage === page.page_id;
              const hasIssues = (page.total_issues || 0) > 0;
              const cwv = pageSpeedData[page.page_id];
              return (
                <div key={page.page_id} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, marginBottom: 8, overflow: 'hidden' }}>
                  <div onClick={() => setExpandedSpeedPage(isExpanded ? null : page.page_id)}
                    style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', cursor: 'pointer' }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{page.title || page.slug}</div>
                      <div style={{ fontSize: 12, color: 'var(--text3)' }}>/{page.slug}</div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <span style={{ fontSize: 12, color: 'var(--text3)' }}>{page.image_count || 0} images</span>
                      {hasIssues ? (
                        <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, fontWeight: 600, background: 'rgba(239,68,68,0.15)', color: '#ef4444' }}>
                          {page.total_issues} issues
                        </span>
                      ) : (
                        <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, fontWeight: 600, background: 'rgba(34,197,94,0.15)', color: '#22c55e' }}>
                          All good
                        </span>
                      )}
                      <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 12 }} />
                    </div>
                  </div>

                  {isExpanded && (
                    <div style={{ borderTop: '1px solid var(--border)', padding: 16 }}>
                      {/* PageSpeed Insights */}
                      <div style={{ marginBottom: 16, padding: 12, background: 'var(--bg)', borderRadius: 8 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: cwv ? 10 : 0 }}>
                          <strong style={{ fontSize: 13 }}><i className="fas fa-tachometer-alt" style={{ marginRight: 6, color: 'var(--primary)' }} />Core Web Vitals (Google PageSpeed)</strong>
                          <button className="btn btn-secondary" onClick={() => runPageSpeed(page.url, page.page_id)} disabled={psLoading === page.page_id} style={{ fontSize: 11, padding: '4px 10px' }}>
                            {psLoading === page.page_id ? <><span className="spinner" style={{ width: 12, height: 12, marginRight: 4 }}></span>Testing...</> : <><i className="fas fa-bolt" style={{ marginRight: 4 }} />Run PageSpeed</>}
                          </button>
                        </div>
                        {cwv && (
                          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
                            {[
                              { label: 'Performance', value: Math.round(cwv.score), unit: '', color: cwv.score >= 90 ? '#22c55e' : cwv.score >= 50 ? '#f59e0b' : '#ef4444' },
                              { label: 'LCP', value: cwv.lcp, unit: '', color: parseFloat(cwv.lcp) <= 2.5 ? '#22c55e' : parseFloat(cwv.lcp) <= 4 ? '#f59e0b' : '#ef4444' },
                              { label: 'CLS', value: cwv.cls, unit: '', color: parseFloat(cwv.cls) <= 0.1 ? '#22c55e' : parseFloat(cwv.cls) <= 0.25 ? '#f59e0b' : '#ef4444' },
                              { label: 'TBT', value: cwv.tbt, unit: '', color: '#3b82f6' },
                            ].map(m => (
                              <div key={m.label} style={{ textAlign: 'center', padding: 8, background: 'var(--card)', borderRadius: 6, border: '1px solid var(--border)' }}>
                                <div style={{ fontSize: 18, fontWeight: 800, color: m.color }}>{m.value}</div>
                                <div style={{ fontSize: 10, color: 'var(--text3)' }}>{m.label}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>

                      {/* Image issues */}
                      {page.images && page.images.length > 0 ? (
                        <>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                            <strong style={{ fontSize: 13 }}><i className="fas fa-images" style={{ marginRight: 6, color: '#3b82f6' }} />Images ({page.images.length})</strong>
                            {hasIssues && (
                              <button className="btn btn-primary" onClick={() => optimizePage(page.page_id)} disabled={optimizingPages.has(page.page_id)} style={{ fontSize: 11, padding: '4px 12px' }}>
                                {optimizingPages.has(page.page_id) ? <><span className="spinner" style={{ width: 12, height: 12, marginRight: 4 }}></span>Optimizing...</> : <><i className="fas fa-magic" style={{ marginRight: 4 }} />Optimize All</>}
                              </button>
                            )}
                          </div>
                          {page.images.map((img, idx) => (
                            <div key={idx} style={{ padding: '10px 12px', background: 'var(--bg)', borderRadius: 8, marginBottom: 6, fontSize: 12 }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ fontWeight: 600, marginBottom: 4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{img.src.split('/').pop()}</div>
                                  <div style={{ display: 'flex', gap: 12, color: 'var(--text3)', fontSize: 11 }}>
                                    {img.file_size_kb && <span>{img.file_size_kb}KB</span>}
                                    {img.width && <span>{img.width}x{img.height}px</span>}
                                    {img.has_webp !== undefined && <span style={{ color: img.has_webp ? '#22c55e' : '#f59e0b' }}>{img.has_webp ? 'WebP exists' : 'No WebP'}</span>}
                                  </div>
                                </div>
                                <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'flex-end', marginLeft: 12 }}>
                                  {img.issues && img.issues.map((issue, i) => (
                                    <span key={i} style={{
                                      fontSize: 10, padding: '2px 6px', borderRadius: 4, fontWeight: 600,
                                      background: issueSeverity(issue) === 'critical' ? 'rgba(239,68,68,0.15)' : 'rgba(245,158,11,0.15)',
                                      color: issueSeverity(issue) === 'critical' ? '#ef4444' : '#f59e0b',
                                    }}>{issueLabel(issue)}</span>
                                  ))}
                                  {(!img.issues || img.issues.length === 0) && (
                                    <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, fontWeight: 600, background: 'rgba(34,197,94,0.15)', color: '#22c55e' }}>OK</span>
                                  )}
                                </div>
                              </div>
                            </div>
                          ))}
                        </>
                      ) : (
                        <div style={{ fontSize: 12, color: 'var(--text3)', textAlign: 'center', padding: 20 }}>No images on this page</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            {!speedLoading && speedResults.length === 0 && (
              <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
                <i className="fas fa-tachometer-alt" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
                <div style={{ fontSize: 16, marginBottom: 8 }}>No speed audit run yet</div>
                <div style={{ fontSize: 13 }}>Click "Run Speed Audit" to scan all pages for image issues, missing WebP, lazy loading, and Core Web Vitals.</div>
                <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 8 }}>Uses Google PageSpeed Insights API. Discovers pages via sitemap.xml or WordPress REST API.</div>
              </div>
            )}
          </>}
        </div>
      );
    }

    // ============ ON-PAGE AUDIT PAGE (with Yoast) ============
    // ============ INDEXING PAGE ============
    function IndexingPage({ project }) {
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [initialLoading, setInitialLoading] = useState(true);
      const [error, setError] = useState('');
      const [stats, setStats] = useState({ total: 0, indexed: 0, notIndexed: 0, errors: 0 });
      const [filter, setFilter] = useState('all');
      const [lastChecked, setLastChecked] = useState(null);

      // Load previous results on mount
      useEffect(() => {
        if (!project?.id) { setInitialLoading(false); return; }
        (async () => {
          try {
            console.log('[indexing] Loading previous results for project', project.id);
            const data = await api(`/projects/${project.id}/audits/indexing/latest`);
            console.log('[indexing] Got data:', data?.total, 'pages,', data?.results?.length, 'results');
            if (data.results && data.results.length > 0) {
              setResults(data.results);
              setStats({ total: data.total || data.results.length, indexed: data.indexed || 0, notIndexed: data.notIndexed || 0, errors: data.errors || 0 });
              if (data.completed_at) setLastChecked(new Date(data.completed_at));
              else if (data.ran_at) setLastChecked(new Date(data.ran_at));
            }
          } catch (err) { console.error('[indexing] Failed to load previous results:', err.message); }
          finally { setInitialLoading(false); }
        })();
      }, [project?.id]);

      const runCheck = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/indexing/check`, { method: 'POST' });
          setResults(data.results || []);
          setStats({ total: data.total, indexed: data.indexed, notIndexed: data.notIndexed, errors: data.errors });
          setLastChecked(new Date());
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const [expandedRow, setExpandedRow] = useState(null);
      const [fixingPages, setFixingPages] = useState(new Set());

      const createFixAction = async (page) => {
        setFixingPages(prev => new Set([...prev, page.path]));
        try {
          const isCrawled = page.coverageState?.includes('Crawled');
          const isDiscovered = page.coverageState?.includes('Discovered');
          await api(`/projects/${project.id}/action-items`, {
            method: 'POST',
            body: {
              pillar: 'technical',
              category: 'indexing',
              title: `Fix indexing: ${page.path}`,
              description: `Page "${page.path}" is ${page.coverageState}. ${isCrawled ? 'Google crawled it but found the content insufficient.' : 'Google discovered it but hasn\'t fully crawled it yet.'}`,
              recommendation: isCrawled
                ? `1) Improve content quality — add 500+ unique words\n2) Add 3-5 internal links from indexed pages\n3) Add FAQ or LocalBusiness schema\n4) Request indexing in GSC\n5) Re-check in 2 weeks`
                : `1) Add internal links from homepage and service pages\n2) Ensure page is in sitemap.xml\n3) Check robots.txt isn't blocking\n4) Request indexing in GSC\n5) Re-check in 1 week`,
              severity: isCrawled ? 'Medium' : 'Critical',
              status: 'pending',
            }
          });
        } catch (err) { setError(err.message); }
        finally { setFixingPages(prev => { const s = new Set(prev); s.delete(page.path); return s; }); }
      };

      const filtered = filter === 'all' ? results
        : filter === 'indexed' ? results.filter(r => r.verdict === 'PASS')
        : filter === 'not-indexed' ? results.filter(r => r.verdict === 'FAIL' || r.verdict === 'NEUTRAL')
        : results.filter(r => r.verdict === 'ERROR');

      const verdictColor = (v) => v === 'PASS' ? '#22c55e' : v === 'FAIL' ? '#ef4444' : v === 'NEUTRAL' ? '#f59e0b' : '#64748b';
      const verdictLabel = (r) => {
        if (r.verdict === 'PASS') return 'Indexed';
        if (r.verdict === 'FAIL') return r.coverageState || 'Not Indexed';
        if (r.verdict === 'NEUTRAL') return r.coverageState || 'Excluded';
        return r.coverageState || 'Error';
      };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-file-import" style={{ marginRight: 10, color: 'var(--accent)' }} />Indexing Status
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Check which pages are indexed by Google — home, services, and suburb pages</p>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              {lastChecked && <span style={{ fontSize: 12, color: 'var(--text3)' }}>Last checked: {lastChecked.toLocaleDateString()} {lastChecked.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>}
              <button className="btn btn-primary" onClick={runCheck} disabled={loading} style={{ fontSize: 13 }}>
                {loading ? <><span className="spinner"></span>Checking...</> : <><i className="fas fa-sync" style={{ marginRight: 6 }} />{results.length > 0 ? 'Re-check' : 'Check Indexing'}</>}
              </button>
            </div>
          </div>

          {loading && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Checking Indexing Status</div>
              <div className="audit-loading-sub">Inspecting each page via Google Search Console API... this may take a minute</div>
            </div>
          )}

          {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

          {!loading && results.length > 0 && <>
            {/* Stats */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
              {[
                { label: 'Total Pages', value: stats.total, color: 'var(--primary)', icon: 'fas fa-globe' },
                { label: 'Indexed', value: stats.indexed, color: '#22c55e', icon: 'fas fa-check-circle' },
                { label: 'Not Indexed', value: stats.notIndexed, color: '#ef4444', icon: 'fas fa-times-circle' },
                { label: 'Errors', value: stats.errors, color: '#64748b', icon: 'fas fa-exclamation-triangle' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--card)', borderRadius: 12, padding: 16, textAlign: 'center', border: '1px solid var(--border)', cursor: 'pointer' }}
                  onClick={() => setFilter(s.label === 'Total Pages' ? 'all' : s.label === 'Indexed' ? 'indexed' : s.label === 'Not Indexed' ? 'not-indexed' : 'errors')}>
                  <i className={s.icon} style={{ fontSize: 20, color: s.color, marginBottom: 8, display: 'block' }} />
                  <div style={{ fontSize: 32, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2, textTransform: 'uppercase', letterSpacing: 1 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Filter tabs */}
            <div style={{ display: 'flex', gap: 4, marginBottom: 16, background: 'var(--bg)', borderRadius: 8, padding: 3 }}>
              {[
                { id: 'all', label: `All (${stats.total})` },
                { id: 'indexed', label: `Indexed (${stats.indexed})` },
                { id: 'not-indexed', label: `Not Indexed (${stats.notIndexed})` },
                { id: 'errors', label: `Errors (${stats.errors})` },
              ].map(t => (
                <button key={t.id} onClick={() => setFilter(t.id)} style={{
                  flex: 1, padding: '8px 12px', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600,
                  background: filter === t.id ? 'var(--primary)' : 'transparent',
                  color: filter === t.id ? '#fff' : 'var(--text3)',
                }}>{t.label}</button>
              ))}
            </div>

            {/* Results table */}
            <div style={{ background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '2fr 1.5fr 1fr 1fr 0.8fr 0.3fr', padding: '12px 16px', background: 'var(--bg)', fontSize: 11, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '1px solid var(--border)' }}>
                <span>Page URL</span>
                <span>Status</span>
                <span>Last Crawl</span>
                <span>Mobile</span>
                <span>Robots</span>
                <span></span>
              </div>
              {filtered.map((r, idx) => {
                const isExpanded = expandedRow === idx;
                const isNotIndexed = r.verdict === 'FAIL' || r.verdict === 'NEUTRAL';
                const isCrawled = r.coverageState?.includes('Crawled');
                const isDiscovered = r.coverageState?.includes('Discovered');
                return (
                <div key={idx}>
                  <div onClick={() => isNotIndexed && setExpandedRow(isExpanded ? null : idx)}
                    style={{ display: 'grid', gridTemplateColumns: '2fr 1.5fr 1fr 1fr 0.8fr 0.3fr', padding: '10px 16px', borderBottom: isExpanded ? 'none' : '1px solid var(--border)', fontSize: 13, alignItems: 'center', cursor: isNotIndexed ? 'pointer' : 'default',
                    background: r.verdict === 'FAIL' ? 'rgba(239,68,68,0.05)' : r.verdict === 'NEUTRAL' ? 'rgba(245,158,11,0.05)' : 'transparent' }}>
                    <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      <span style={{ fontWeight: 600 }}>{r.path}</span>
                      {r.googleCanonical && r.googleCanonical !== r.url && (
                        <div style={{ fontSize: 10, color: '#f59e0b', marginTop: 2 }}>Canonical: {r.googleCanonical}</div>
                      )}
                    </div>
                    <div>
                      <span style={{ display: 'inline-block', padding: '3px 10px', borderRadius: 6, fontSize: 11, fontWeight: 700,
                        background: `${verdictColor(r.verdict)}20`, color: verdictColor(r.verdict) }}>
                        {verdictLabel(r)}
                      </span>
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--text3)' }}>
                      {r.lastCrawlTime ? new Date(r.lastCrawlTime).toLocaleDateString() : '—'}
                    </div>
                    <div>
                      {r.mobileVerdict === 'PASS' ? <span style={{ color: '#22c55e', fontSize: 12 }}><i className="fas fa-check" /> OK</span>
                        : r.mobileVerdict === 'FAIL' ? <span style={{ color: '#ef4444', fontSize: 12 }}><i className="fas fa-times" /> Fail</span>
                        : <span style={{ color: 'var(--text3)', fontSize: 12 }}>—</span>}
                    </div>
                    <div style={{ fontSize: 12, color: r.robotsTxtState === 'ALLOWED' ? '#22c55e' : r.robotsTxtState === 'DISALLOWED' ? '#ef4444' : 'var(--text3)' }}>
                      {r.robotsTxtState === 'ALLOWED' ? 'Allowed' : r.robotsTxtState === 'DISALLOWED' ? 'Blocked' : '—'}
                    </div>
                    <div>{isNotIndexed && <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 11 }} />}</div>
                  </div>
                  {isExpanded && (
                    <div style={{ padding: '12px 16px 16px', background: 'rgba(239,68,68,0.03)', borderBottom: '1px solid var(--border)' }}>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4, textTransform: 'uppercase', fontWeight: 700 }}>Why not indexed</div>
                          <div style={{ fontSize: 13 }}>
                            {isCrawled ? 'Google crawled this page but decided the content is not valuable enough to index. Common causes: thin content (<300 words), duplicate content, low internal links, or poor content quality.'
                              : isDiscovered ? 'Google knows this page exists but hasn\'t fully crawled it yet. This means the page has low priority — not enough internal links or authority signals.'
                              : r.coverageState || 'Unknown reason.'}
                          </div>
                        </div>
                        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4, textTransform: 'uppercase', fontWeight: 700 }}>Details</div>
                          <div style={{ fontSize: 12, display: 'flex', flexDirection: 'column', gap: 4 }}>
                            <span><strong>Status:</strong> {r.coverageState}</span>
                            <span><strong>Last Crawl:</strong> {r.lastCrawlTime ? new Date(r.lastCrawlTime).toLocaleDateString() : 'Never'}</span>
                            <span><strong>Crawled As:</strong> {r.crawledAs || '—'}</span>
                            <span><strong>Robots:</strong> {r.robotsTxtState || '—'}</span>
                            <span><strong>Indexing:</strong> {r.indexingState || '—'}</span>
                          </div>
                        </div>
                      </div>
                      <div style={{ background: 'rgba(34,197,94,0.08)', borderRadius: 8, padding: 12, marginBottom: 12, border: '1px solid rgba(34,197,94,0.2)' }}>
                        <div style={{ fontSize: 11, color: '#22c55e', marginBottom: 6, textTransform: 'uppercase', fontWeight: 700 }}><i className="fas fa-lightbulb" style={{ marginRight: 4 }} />How to fix</div>
                        {isCrawled ? (
                          <ol style={{ fontSize: 13, margin: 0, paddingLeft: 20, display: 'flex', flexDirection: 'column', gap: 4 }}>
                            <li>Improve content quality — add at least 500+ unique, valuable words</li>
                            <li>Add 3-5 internal links from your highest-traffic indexed pages</li>
                            <li>Add structured data (FAQ schema, LocalBusiness schema)</li>
                            <li>Ensure meta title and description are unique and keyword-optimized</li>
                            <li>Request indexing in Google Search Console after changes</li>
                          </ol>
                        ) : (
                          <ol style={{ fontSize: 13, margin: 0, paddingLeft: 20, display: 'flex', flexDirection: 'column', gap: 4 }}>
                            <li>Add internal links from homepage and main service pages to this URL</li>
                            <li>Verify the page is included in sitemap.xml</li>
                            <li>Check robots.txt isn't blocking crawling</li>
                            <li>Add unique, valuable content (500+ words minimum)</li>
                            <li>Submit URL for indexing in Google Search Console</li>
                          </ol>
                        )}
                      </div>
                      <button className="btn btn-primary" onClick={() => createFixAction(r)} disabled={fixingPages.has(r.path)} style={{ fontSize: 12 }}>
                        {fixingPages.has(r.path) ? <><span className="spinner" style={{ width: 14, height: 14, marginRight: 6 }}></span>Creating...</> : <><i className="fas fa-wrench" style={{ marginRight: 6 }} />Create Fix Action Item</>}
                      </button>
                    </div>
                  )}
                </div>
                );
              })}
            </div>
          </>}

          {!loading && !initialLoading && results.length === 0 && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fas fa-file-import" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
              <div style={{ fontSize: 16, marginBottom: 8 }}>No indexing check run yet</div>
              <div style={{ fontSize: 13 }}>Click "Check Indexing" to inspect all pages via Google Search Console API.</div>
              <div style={{ fontSize: 12, marginTop: 8, color: 'var(--text3)' }}>Requires GSC connected in Agency Integrations.</div>
            </div>
          )}
          {initialLoading && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <span className="spinner" style={{ marginBottom: 12, display: 'inline-block' }}></span>
              <div style={{ fontSize: 13 }}>Loading previous results...</div>
            </div>
          )}
        </div>
      );
    }

    // ============ CITATIONS & DIRECTORIES PAGE ============
    function CitationsPage({ project }) {
      const [directories, setDirectories] = useState([]);
      const [stats, setStats] = useState({ total: 0, listed: 0, pending: 0, not_listed: 0 });
      const [loading, setLoading] = useState(true);
      const [editingDir, setEditingDir] = useState(null);
      const [editUrl, setEditUrl] = useState('');
      const [editNotes, setEditNotes] = useState('');
      const [saving, setSaving] = useState(null);
      const [scanning, setScanning] = useState(false);
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        if (project?.id) loadCitations();
      }, [project?.id]);

      const loadCitations = async () => {
        setLoading(true);
        try {
          const data = await api(`/projects/${project.id}/citations`);
          setDirectories(data.directories || []);
          setStats(data.stats || { total: 0, listed: 0, pending: 0, not_listed: 0 });
        } catch (e) { console.error('Load citations:', e); }
        finally { setLoading(false); }
      };

      const scanCitations = async () => {
        setScanning(true);
        try {
          const data = await api(`/projects/${project.id}/citations/scan`, { method: 'POST' });
          // Reload to get fresh data
          await loadCitations();
        } catch (e) { console.error('Scan citations:', e); }
        finally { setScanning(false); }
      };

      const recalcStats = (dirs) => ({
        total: dirs.length,
        listed: dirs.filter(d => d.status === 'listed').length,
        pending: dirs.filter(d => d.status === 'pending').length,
        not_listed: dirs.filter(d => d.status === 'not_listed').length,
      });

      const updateStatus = async (dir, newStatus) => {
        setSaving(dir.name);
        try {
          await api(`/projects/${project.id}/citations/${encodeURIComponent(dir.name)}`, {
            method: 'PUT',
            body: { status: newStatus, listing_url: dir.listing_url, notes: dir.notes },
          });
          const updated = directories.map(d => d.name === dir.name ? { ...d, status: newStatus, updated_at: new Date().toISOString() } : d);
          setDirectories(updated);
          setStats(recalcStats(updated));
        } catch (e) { console.error('Update citation:', e); }
        finally { setSaving(null); }
      };

      const saveDetails = async (dir) => {
        setSaving(dir.name);
        try {
          await api(`/projects/${project.id}/citations/${encodeURIComponent(dir.name)}`, {
            method: 'PUT',
            body: { status: dir.status, listing_url: editUrl, notes: editNotes },
          });
          setDirectories(prev => prev.map(d => d.name === dir.name ? { ...d, listing_url: editUrl, notes: editNotes } : d));
          setEditingDir(null);
        } catch (e) { console.error('Save citation details:', e); }
        finally { setSaving(null); }
      };

      const typeColor = { Essential: '#22c55e', Major: '#3b82f6', Industry: '#f59e0b', Standard: '#64748b' };
      const statusColor = { listed: '#22c55e', pending: '#f59e0b', not_listed: '#64748b' };

      const tiers = [
        { key: 'Essential', label: 'Essential Platforms', desc: 'Must-have listings — direct ranking impact', icon: 'fas fa-star' },
        { key: 'Major', label: 'Major Directories', desc: 'High authority Australian directories', icon: 'fas fa-building' },
        { key: 'Industry', label: 'Industry-Specific', desc: 'Trade & service platforms — leads + citations', icon: 'fas fa-hard-hat' },
        { key: 'Standard', label: 'Standard Directories', desc: 'Additional citation sources for NAP consistency', icon: 'fas fa-list' },
      ];

      if (loading) return (
        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
          <span className="spinner" style={{ marginBottom: 12, display: 'inline-block' }}></span>
          <div style={{ fontSize: 13 }}>Loading citations...</div>
        </div>
      );

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-building" style={{ marginRight: 10, color: 'var(--accent)' }} />Citations & Directories
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Track your business listings across Australian directories — NAP consistency is a key local ranking factor</p>
            </div>
            <button className="btn btn-primary" onClick={scanCitations} disabled={scanning} style={{ fontSize: 13 }}>
              {scanning ? <><span className="spinner"></span>Scanning...</> : <><i className="fas fa-search" style={{ marginRight: 6 }} />Scan All Directories</>}
            </button>
          </div>

          {scanning && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Scanning Citations</div>
              <div className="audit-loading-sub">Checking each directory for your business listing via Google... this takes 1-2 minutes</div>
            </div>
          )}

          {/* Stats */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
            {[
              { id: 'all', label: 'Total Directories', value: stats.total, color: 'var(--primary)', icon: 'fas fa-globe' },
              { id: 'listed', label: 'Listed', value: stats.listed, color: '#22c55e', icon: 'fas fa-check-circle' },
              { id: 'pending', label: 'Pending', value: stats.pending, color: '#f59e0b', icon: 'fas fa-clock' },
              { id: 'not_listed', label: 'Not Listed', value: stats.not_listed, color: '#ef4444', icon: 'fas fa-times-circle' },
            ].map(s => (
              <div key={s.id} onClick={() => setFilter(s.id)} style={{ background: 'var(--card)', borderRadius: 12, padding: 16, textAlign: 'center', border: filter === s.id ? `2px solid ${s.color}` : '1px solid var(--border)', cursor: 'pointer', opacity: filter === 'all' || filter === s.id ? 1 : 0.5, transition: 'all 0.2s' }}>
                <i className={s.icon} style={{ fontSize: 20, color: s.color, marginBottom: 8, display: 'block' }} />
                <div style={{ fontSize: 32, fontWeight: 800, color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2, textTransform: 'uppercase', letterSpacing: 1 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text3)', marginBottom: 6 }}>
              <span>Citation Coverage</span>
              <span>{stats.total > 0 ? Math.round((stats.listed / stats.total) * 100) : 0}%</span>
            </div>
            <div style={{ height: 8, background: 'var(--bg)', borderRadius: 4, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${stats.total > 0 ? (stats.listed / stats.total) * 100 : 0}%`, background: 'linear-gradient(90deg, #22c55e, #16a34a)', borderRadius: 4, transition: 'width 0.3s' }} />
            </div>
          </div>

          {/* Directory tiers */}
          {filter !== 'all' && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, fontSize: 13, color: 'var(--text3)' }}>
              <span>Showing: <strong style={{ color: 'var(--text1)' }}>{filter === 'listed' ? 'Listed' : filter === 'pending' ? 'Pending' : 'Not Listed'}</strong></span>
              <button onClick={() => setFilter('all')} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 12 }}>Clear filter</button>
            </div>
          )}

          {tiers.map(tier => {
            const allTierDirs = directories.filter(d => d.type === tier.key).length;
            const tierDirs = directories.filter(d => d.type === tier.key && (filter === 'all' || d.status === filter));
            if (tierDirs.length === 0) return null;
            const tierListed = directories.filter(d => d.type === tier.key && d.status === 'listed').length;
            return (
              <div key={tier.key} style={{ marginBottom: 20 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                  <i className={tier.icon} style={{ color: typeColor[tier.key], fontSize: 16 }} />
                  <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--text1)' }}>{tier.label}</span>
                  <span style={{ fontSize: 12, color: 'var(--text3)' }}>— {tier.desc}</span>
                  <span style={{ marginLeft: 'auto', fontSize: 12, fontWeight: 600, color: tierListed === allTierDirs ? '#22c55e' : 'var(--text3)' }}>
                    {filter === 'all' ? `${tierListed}/${allTierDirs}` : `${tierDirs.length} shown`}
                  </span>
                </div>
                <div style={{ background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden' }}>
                  {tierDirs.map((dir, idx) => {
                    const isEditing = editingDir === dir.name;
                    return (
                      <div key={dir.name} style={{ borderBottom: idx < tierDirs.length - 1 ? '1px solid var(--border)' : 'none' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 0.8fr', padding: '12px 16px', alignItems: 'center', gap: 12 }}>
                          {/* Directory info */}
                          <div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <span style={{ fontWeight: 600, fontSize: 13 }}>{dir.name}</span>
                              {dir.free ? (
                                <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(34,197,94,0.15)', color: '#22c55e', fontWeight: 600 }}>FREE</span>
                              ) : (
                                <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(245,158,11,0.15)', color: '#f59e0b', fontWeight: 600 }}>PAID</span>
                              )}
                              {dir.paid_option && <span style={{ fontSize: 10, color: 'var(--text3)' }}>{dir.paid_option}</span>}
                            </div>
                            <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{dir.description}</div>
                            {dir.listing_url && <a href={dir.listing_url} target="_blank" rel="noopener" style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none' }}><i className="fas fa-link" style={{ marginRight: 4, fontSize: 9 }} />{dir.listing_url}</a>}
                          </div>

                          {/* URL */}
                          <div>
                            <a href={`https://${dir.url}`} target="_blank" rel="noopener" style={{ fontSize: 12, color: 'var(--accent)', textDecoration: 'none' }}>

                                border: `1px solid ${statusColor[dir.status]}40`,

                              <i className={`fas fa-${isEditing ? 'times' : 'edit'}`} />

                          </div>

                        {/* Expanded edit row */}
                        {isEditing && (
                          <div style={{ padding: '8px 16px 14px', background: 'rgba(99,102,241,0.03)', borderTop: '1px dashed var(--border)', display: 'flex', gap: 12, alignItems: 'flex-end' }}>

                            <button className="btn btn-primary btn-small" onClick={() => saveDetails(dir)} disabled={saving === dir.name} style={{ fontSize: 11, whiteSpace: 'nowrap' }}>
                              {saving === dir.name ? <span className="spinner" style={{ width: 12, height: 12 }}></span> : <><i className="fas fa-save" style={{ marginRight: 4 }} />Save</>}

                    );
                  })}

              </div>
            );
          })}
        </div>
      );

    // ============ ON-PAGE AUDIT PAGE (with Yoast) ============
    function OnPageAuditPage({ project }) {
      const [pages, setPages] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [expandedPage, setExpandedPage] = useState(null);
      const [sortBy, setSortBy] = useState(null);
      const [sortDir, setSortDir] = useState('asc');

      const toggleSort = (col) => {
        if (sortBy === col) { setSortDir(d => d === 'asc' ? 'desc' : 'asc'); }
        else { setSortBy(col); setSortDir('asc'); }
      };

      // Load previous results on mount
      useEffect(() => {
        if (project) loadExisting();
      }, [project?.id]);

      const loadExisting = async () => {
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/results`);
          if (data?.pages) setPages(data.pages);
        } catch (e) { /* no previous results */ }
      };

      const runAudit = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/run`, { method: 'POST' });
          if (data?.pages) {
            setPages(data.pages);
          } else if (data?.error) {
            setError(data.error);
          }
        } catch (err) {
          setError(err.message);
        }
        finally { setLoading(false); }
      };

      const yoastDot = (score) => ({
        green: { color: '#22c55e', icon: 'fas fa-circle' },
        orange: { color: '#f59e0b', icon: 'fas fa-circle' },
        red: { color: '#ef4444', icon: 'fas fa-circle' },
      }[score] || { color: '#6b7280', icon: 'fas fa-circle' });

      const issueIcon = (type) => ({
        problem: { color: '#ef4444', icon: 'fas fa-times-circle' },
        warning: { color: '#f59e0b', icon: 'fas fa-exclamation-circle' },
        good: { color: '#22c55e', icon: 'fas fa-check-circle' },
      }[type] || { color: '#6b7280', icon: 'fas fa-circle' });

      const overallStats = useMemo(() => {
        if (!pages.length) return null;
        return {
          green: pages.filter(p => p.yoastScore === 'green').length,
          orange: pages.filter(p => p.yoastScore === 'orange').length,
          red: pages.filter(p => p.yoastScore === 'red').length,
          avgWords: Math.round(pages.reduce((s, p) => s + p.wordCount, 0) / pages.length),
          missingMeta: pages.filter(p => !p.metaDesc || p.metaDescLen < 50).length,
          noFocus: pages.filter(p => !p.focusKeyword).length,
        };
      }, [pages]);

      const sortedPages = useMemo(() => {
        if (!sortBy) return pages;
        const scoreVal = { green: 3, orange: 2, red: 1 };
        return [...pages].sort((a, b) => {
          let av, bv;
          switch (sortBy) {
            case 'seo': av = scoreVal[a.yoastScore] || 0; bv = scoreVal[b.yoastScore] || 0; break;
            case 'read': av = scoreVal[a.yoastReadability] || 0; bv = scoreVal[b.yoastReadability] || 0; break;
            case 'words': av = a.wordCount || 0; bv = b.wordCount || 0; break;
            case 'links': av = a.internalLinks || 0; bv = b.internalLinks || 0; break;
            case 'issues': av = (a.issues || []).filter(i => i.type === 'problem').length; bv = (b.issues || []).filter(i => i.type === 'problem').length; break;
            case 'page': av = (a.title || '').toLowerCase(); bv = (b.title || '').toLowerCase(); return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            case 'keyword': av = (a.focusKeyword || '').toLowerCase(); bv = (b.focusKeyword || '').toLowerCase(); return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            default: return 0;
          }
          return sortDir === 'asc' ? av - bv : bv - av;
        });
      }, [pages, sortBy, sortDir]);

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-file-alt" style={{ marginRight: 10, color: 'var(--accent)' }} />On-Page Audit
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Yoast SEO scores, meta tags, content quality, keyword optimization per page</p>
            </div>
            <button className="btn btn-primary" onClick={runAudit} disabled={loading} style={{ fontSize: 13 }}>
              {loading ? <><span className="spinner"></span>Scanning...</> : <><i className="fas fa-play" style={{ marginRight: 6 }} />Run On-Page Audit</>}
            </button>
          </div>

          {loading && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Running On-Page Audit</div>
              <div className="audit-loading-sub">Fetching pages, checking Yoast scores, meta tags, and content quality...</div>
            </div>
          )}

          {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

          {overallStats && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 12, marginBottom: 24 }}>
              {[
                { label: 'Yoast Green', value: overallStats.green, color: '#22c55e' },
                { label: 'Yoast Orange', value: overallStats.orange, color: '#f59e0b' },
                { label: 'Yoast Red', value: overallStats.red, color: '#ef4444' },
                { label: 'Avg Words', value: overallStats.avgWords, color: 'var(--accent)' },
                { label: 'Missing Meta', value: overallStats.missingMeta, color: overallStats.missingMeta > 0 ? '#ef4444' : '#22c55e' },
                { label: 'No Focus KW', value: overallStats.noFocus, color: overallStats.noFocus > 0 ? '#ef4444' : '#22c55e' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--card)', borderRadius: 10, padding: 14, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 10, color: 'var(--text3)', marginTop: 2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {pages.length > 0 && (
            <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>

                            {warnings > 0 && <span style={{ color: '#f59e0b', fontWeight: 600 }}>{warnings}<i className="fas fa-exclamation-circle" style={{ marginLeft: 2, fontSize: 10 }} /></span>}

                                  <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 12, border: '1px solid var(--border)' }}>
                                    <div style={{ fontSize: 10, color: 'var(--text3)', textTransform: 'uppercase', fontWeight: 600, marginBottom: 6 }}>Meta Description ({page.metaDescLen} chars)</div>

                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 16 }}>
                                  <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 10, border: '1px solid var(--border)', textAlign: 'center' }}>

                                    <div style={{ fontSize: 12, fontWeight: 600 }}>{page.h1}</div>
                                  </div>
                                  <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 10, border: '1px solid var(--border)', textAlign: 'center' }}>
                                    <div style={{ fontSize: 10, color: 'var(--text3)', marginBottom: 4 }}>Internal Links</div>
                                    <div style={{ fontSize: 16, fontWeight: 700, color: page.internalLinks < 3 ? '#ef4444' : '#22c55e' }}>{page.internalLinks}</div>

                                <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text2)', marginBottom: 8 }}>

                                  <button className="btn btn-primary" style={{ fontSize: 11, padding: '6px 12px' }}>

          {!loading && pages.length === 0 && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fas fa-file-alt" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
