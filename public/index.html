              <button className="btn btn-primary" onClick={() => importKeywords()} disabled={importing}>
                <i className="fa-solid fa-download" style={{ marginRight: 6 }} />Import from GSC
              </button>
            </div>
          ) : (
            <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)' }}>
                    {[
                      { key: 'keyword', label: 'Keyword', align: 'left', w: null },
                      { key: 'volume', label: 'Volume', align: 'center', w: 90 },
                      { key: 'gsc', label: 'GSC Pos', align: 'center', w: 80 },
                      { key: 'position', label: 'SERP Pos', align: 'center', w: 80 },
                      { key: null, label: 'Ranking URL', align: 'left', w: 200 },
                      { key: 'competitors', label: 'Competitors', align: 'center', w: 100 },
                      { key: 'checked', label: 'Checked', align: 'center', w: 90 },
                    ].map(h => (
                      <th key={h.label} onClick={h.key ? () => toggleSort(h.key) : undefined} style={{ padding: '10px 14px', textAlign: h.align, fontWeight: 600, color: sortCol === h.key ? 'var(--accent)' : 'var(--text2)', width: h.w || undefined, cursor: h.key ? 'pointer' : 'default', userSelect: 'none' }}>
                        {h.label}{h.key && sortIcon(h.key)}
                      </th>
                    ))}
                    <th style={{ width: 40 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.map(kw => (
                    <React.Fragment key={kw.id}>
                      <tr style={{ borderBottom: '1px solid var(--border)', cursor: 'pointer' }} onClick={() => loadHistory(kw.keyword)}>
                        <td style={{ padding: '10px 14px', fontWeight: 500 }}>{kw.keyword}{kw.location && <span style={{ fontSize: 11, color: 'var(--text3)', marginLeft: 6 }}><i className="fa-solid fa-location-dot" style={{ fontSize: 9, marginRight: 2 }} />{kw.location}</span>}</td>
                        <td style={{ padding: '10px 14px', textAlign: 'center', fontWeight: 600, color: 'var(--text2)' }}>
                          {kw.search_volume != null ? kw.search_volume.toLocaleString() : '—'}
                        </td>
                        <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                          {kw.gsc_position != null ? <span style={{ color: posColor(Math.round(kw.gsc_position)), fontWeight: 700, fontSize: 15 }}>{Math.round(kw.gsc_position * 10) / 10}</span> : <span style={{ color: 'var(--text3)' }}>—</span>}
                        </td>
                        <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                          <span style={{ color: posColor(kw.serp_position, kw.checked_at), fontWeight: 700, fontSize: kw.serp_position ? 16 : 13 }}>{posLabel(kw.serp_position, kw.checked_at)}</span>
                        </td>
                        <td style={{ padding: '10px 14px', fontSize: 12, color: 'var(--text2)', maxWidth: 350, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                          {kw.serp_url ? <a href={kw.serp_url} target="_blank" rel="noopener" style={{ color: 'var(--accent)', textDecoration: 'none' }} onClick={e => e.stopPropagation()} title={kw.serp_url}>{kw.serp_url.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '')}</a> : '—'}
                        </td>
                        <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                          {(kw.competitors || []).filter(c => c.source === 'serp').length > 0 ? (
                            <button className="btn" onClick={e => { e.stopPropagation(); setExpandedKw(expandedKw === kw.keyword ? null : kw.keyword); }} style={{ fontSize: 12, padding: '3px 10px' }}>
                              {(kw.competitors || []).filter(c => c.source === 'serp').length} <i className="fa-solid fa-chevron-down" style={{ fontSize: 9, marginLeft: 4 }} />
                            </button>
                          ) : <span style={{ color: 'var(--text3)' }}>—</span>}
                        </td>
                        <td style={{ padding: '10px 14px', textAlign: 'center', fontSize: 12, color: 'var(--text3)' }}>
                          {kw.checked_at ? new Date(kw.checked_at).toLocaleDateString() : '—'}
                        </td>
                        <td style={{ padding: '6px' }}>
                          <button onClick={e => { e.stopPropagation(); removeKeyword(kw.id); }} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 12, padding: 4 }}>
                            <i className="fa-solid fa-trash" />
                          </button>
                        </td>
                      </tr>
                      {expandedKw === kw.keyword && (kw.competitors || []).filter(c => c.source === 'serp').length > 0 && (
                        <tr><td colSpan={8} style={{ padding: '0 14px 10px 30px', background: 'var(--bg)' }}>
                          {(kw.competitors || []).filter(c => c.source === 'serp').map((c, j) => (
                            <div key={j} style={{ display: 'flex', gap: 12, padding: '4px 0', fontSize: 12, color: 'var(--text2)' }}>
                              <span style={{ fontWeight: 600, color: posColor(c.position) }}>#{c.position}</span>
                              <span>{c.domain}</span>
                              <span style={{ color: 'var(--text3)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.title}</span>
                            </div>
                          ))}
                        </td></tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* History panel */}
          {selectedKw && (
            <div style={{ marginTop: 20, background: 'var(--card)', borderRadius: 10, padding: 20, border: '1px solid var(--border)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <h3 style={{ margin: 0, fontSize: 16 }}><i className="fa-solid fa-history" style={{ marginRight: 8, color: 'var(--accent)' }} />SERP History: "{selectedKw}"</h3>
                <button className="btn" onClick={() => setSelectedKw(null)} style={{ fontSize: 12 }}>Close</button>
              </div>
              {history.length === 0 ? (
                <div style={{ color: 'var(--text3)', textAlign: 'center', padding: 20 }}>No history yet. Click "Check Rankings" to start.</div>
              ) : (
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                  <thead>
                    <tr style={{ borderBottom: '1px solid var(--border)' }}>
                      <th style={{ padding: '8px 12px', textAlign: 'left', color: 'var(--text3)' }}>Date</th>
                      <th style={{ padding: '8px 12px', textAlign: 'center', color: 'var(--text3)' }}>Position</th>
                      <th style={{ padding: '8px 12px', textAlign: 'center', color: 'var(--text3)' }}>Change</th>
                      <th style={{ padding: '8px 12px', textAlign: 'left', color: 'var(--text3)' }}>Top Competitors</th>
                    </tr>
                  </thead>
                  <tbody>
                    {history.map((h, i) => {
                      const prev = i > 0 ? history[i-1].serp_position : null;
                      const change = prev && h.serp_position ? prev - h.serp_position : null;
                      return (
                        <tr key={i} style={{ borderBottom: '1px solid var(--border)' }}>
                          <td style={{ padding: '8px 12px' }}>{new Date(h.checked_at).toLocaleDateString()}</td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            <span style={{ color: posColor(h.serp_position, true), fontWeight: 700, fontSize: h.serp_position ? 15 : 12 }}>{posLabel(h.serp_position, true)}</span>
                          </td>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            {change != null && change !== 0 ? (
                              <span style={{ color: change > 0 ? '#22c55e' : '#ef4444', fontWeight: 600 }}>{change > 0 ? '↑' : '↓'}{Math.abs(change)}</span>
                            ) : <span style={{ color: 'var(--text3)' }}>—</span>}
                          </td>
                          <td style={{ padding: '8px 12px', fontSize: 12 }}>
                            {(h.competitors || []).filter(c => c.source === 'serp').slice(0, 3).map((c, j) => (
                              <span key={j} style={{ marginRight: 10, color: 'var(--text2)' }}><span style={{ color: posColor(c.position) }}>#{c.position}</span> {c.domain}</span>
                            ))}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          )}
          {/* Discover Keywords Modal */}
          {discovered && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              onClick={() => setDiscovered(null)}>
              <div style={{ background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', width: 700, maxHeight: '80vh', display: 'flex', flexDirection: 'column' }}
                onClick={e => e.stopPropagation()}>
                <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16 }}><i className="fa-solid fa-magnifying-glass" style={{ marginRight: 8, color: 'var(--accent)' }} />Discovered Keywords</div>
                    <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 2 }}>{discovered.length} new keywords found (already tracked excluded)</div>
                  </div>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button className="btn" onClick={() => {
                      if (selectedDiscovered.size === discovered.length) setSelectedDiscovered(new Set());
                      else setSelectedDiscovered(new Set(discovered.map(k => k.keyword)));
                    }} style={{ fontSize: 12 }}>
                      {selectedDiscovered.size === discovered.length ? 'Deselect All' : 'Select All'}
                    </button>
                    <button className="btn btn-primary" onClick={addDiscoveredKeywords} disabled={selectedDiscovered.size === 0} style={{ fontSize: 12 }}>
                      <i className="fa-solid fa-plus" style={{ marginRight: 4 }} />Add {selectedDiscovered.size} Keywords
                    </button>
                    <button onClick={() => setDiscovered(null)} style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 18, padding: '0 4px' }}>×</button>
                  </div>
                </div>
                <div style={{ overflow: 'auto', flex: 1 }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)', position: 'sticky', top: 0 }}>
                        <th style={{ padding: '8px 12px', width: 30 }}></th>
                        <th style={{ padding: '8px 12px', textAlign: 'left', fontWeight: 600, color: 'var(--text2)' }}>Keyword</th>
                        <th style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600, color: 'var(--text2)', width: 100 }}>Volume</th>
                      </tr>
                    </thead>
                    <tbody>
                      {discovered.map(k => (
                        <tr key={k.keyword} style={{ borderBottom: '1px solid var(--border)', cursor: 'pointer' }} onClick={(e) => { if (e.target.type !== 'checkbox') toggleDiscovered(k.keyword); }}>
                          <td style={{ padding: '8px 12px', textAlign: 'center' }}>
                            <input type="checkbox" checked={selectedDiscovered.has(k.keyword)} onChange={() => toggleDiscovered(k.keyword)} />
                          </td>
                          <td style={{ padding: '8px 12px', fontWeight: 500 }}>{k.keyword}</td>
                          <td style={{ padding: '8px 12px', textAlign: 'center', fontWeight: 600 }}>{k.volume?.toLocaleString() || '—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============ GRID HEATMAP COMPONENT ============
    function GridHeatmap({ gridPoints, gridSize, keyword, location }) {
      if (!gridPoints || gridPoints.length === 0) return null;
      const cellSize = gridSize <= 3 ? 56 : gridSize <= 5 ? 44 : 36;
      const getColor = (p) => {
        if (!p || p.error) return '#374151';
        if (!p.found) return '#ef4444';
        if (p.position <= 3) return '#22c55e';
        if (p.position <= 5) return '#84cc16';
        if (p.position <= 10) return '#f59e0b';
        if (p.position <= 15) return '#f97316';
        return '#ef4444';
      };
      const getBg = (p) => {
        if (!p || p.error) return 'rgba(55,65,81,0.3)';
        if (!p.found) return 'rgba(239,68,68,0.15)';
        if (p.position <= 3) return 'rgba(34,197,94,0.15)';
        if (p.position <= 5) return 'rgba(132,204,22,0.12)';
        if (p.position <= 10) return 'rgba(245,158,11,0.12)';
        if (p.position <= 15) return 'rgba(249,115,22,0.12)';
        return 'rgba(239,68,68,0.12)';
      };
      const center = Math.floor(gridSize / 2);
      return (
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${gridSize}, ${cellSize}px)`, gap: 3, justifyContent: 'center' }}>
            {gridPoints.map((p, i) => (
              <div key={i} title={`(${p.lat.toFixed(3)}, ${p.lng.toFixed(3)})${p.found ? ` — Rank #${p.position}` : ' — Not found'}`}
                style={{
                  width: cellSize, height: cellSize, borderRadius: 6,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: getBg(p), border: (p.row === center && p.col === center) ? '2px solid var(--accent)' : '1px solid var(--border)',
                  fontSize: p.found ? 16 : 11, fontWeight: p.found ? 800 : 600,
                  color: getColor(p), cursor: 'default', position: 'relative',
                }}>
                {p.error ? '?' : p.found ? `#${p.position}` : '—'}
                {p.row === center && p.col === center && (
                  <div style={{ position: 'absolute', bottom: 2, right: 3, fontSize: 8, color: 'var(--accent)' }}>
                    <i className="fa-solid fa-location-dot" />
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginTop: 10, fontSize: 10, color: 'var(--text3)' }}>
            {[
              { color: '#22c55e', label: 'Top 3' },
              { color: '#84cc16', label: '4-5' },
              { color: '#f59e0b', label: '6-10' },
              { color: '#f97316', label: '11-15' },
              { color: '#ef4444', label: '16+ / Not found' },
            ].map(l => (
              <div key={l.label} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: l.color, opacity: 0.7 }} />
                {l.label}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============ MAPS RANKINGS PAGE ============
    const TOP_DIRECTORIES = [
      { name: 'Google Business Profile', url: 'business.google.com', free: true, type: 'Essential' },
      { name: 'Apple Maps (Apple Business Connect)', url: 'businessconnect.apple.com', free: true, type: 'Essential' },
      { name: 'Bing Places', url: 'bingplaces.com', free: true, type: 'Essential' },
      { name: 'Facebook Business', url: 'facebook.com', free: true, type: 'Essential' },
      { name: 'Yellow Pages Australia', url: 'yellowpages.com.au', free: true, type: 'Major' },
      { name: 'True Local', url: 'truelocal.com.au', free: true, type: 'Major' },
      { name: 'Hotfrog', url: 'hotfrog.com.au', free: true, type: 'Major' },
      { name: 'Local Business Guide', url: 'localbusinessguide.com.au', free: true, type: 'Major' },
      { name: 'Start Local', url: 'startlocal.com.au', free: true, type: 'Major' },
      { name: 'Yelp Australia', url: 'yelp.com.au', free: true, type: 'Major' },
      { name: 'Localsearch', url: 'localsearch.com.au', free: true, type: 'Major' },
      { name: 'Word of Mouth', url: 'wordofmouth.com.au', free: true, type: 'Major' },
      { name: 'LinkedIn Company', url: 'linkedin.com', free: true, type: 'Standard' },
      { name: 'dLook', url: 'dlook.com.au', free: true, type: 'Standard' },
      { name: 'Superpages', url: 'superpages.com.au', free: true, type: 'Standard' },
    ];

    function MapsRankingsPage({ project, setPage }) {
      const { keywords, rankings, merged, addKeyword, removeKeyword, loadData } = useRankData(project);
      const [syncing, setSyncing] = useState(false);
      const [mapsChecked, setMapsChecked] = useState(false);
      const [expandedMapRow, setExpandedMapRow] = useState(null);
      const [gridScans, setGridScans] = useState({});
      const [gridSize, setGridSize] = useState(5);
      const [gridRadius, setGridRadius] = useState(10);
      const [scanProgress, setScanProgress] = useState('');

      const [auditInsights, setAuditInsights] = useState({ serviceAreas: [], sitePages: [], gbpFindings: [], citations: [] });

      // Load grid scans + audit data on mount
      useEffect(() => {
        (async () => {
          const data = await api(`/projects/${project.id}/maps/grid-scans`);
          if (Array.isArray(data)) {
            const scanMap = {};
            data.forEach(s => { scanMap[`${s.keyword}|||${s.location}`] = s; });
            setGridScans(scanMap);
            if (data.length > 0) setMapsChecked(true);
          }
          // Load audit data for cross-referencing
          const serviceAreas = project.service_areas || project.serviceAreas || [];
          let sitePages = [];
          try { sitePages = await api(`/projects/${project.id}/site-pages`); if (!Array.isArray(sitePages)) sitePages = []; } catch(e) {}
          let gbpFindings = [];
          try {
            const resp = await api(`/projects/${project.id}/audit-findings`);
            if (resp && resp.findings) gbpFindings = resp.findings.filter(f => f.pillar === 'gbp_external' || f.pillar === 'gbp');
          } catch(e) {}
          let citations = [];
          try {
            const citResp = await api(`/projects/${project.id}/citations`);
            if (citResp && Array.isArray(citResp.directories)) citations = citResp.directories;
          } catch(e) {}
          setAuditInsights({ serviceAreas: Array.isArray(serviceAreas) ? serviceAreas : [], sitePages, gbpFindings, citations });
        })();
      }, [project.id]);

      const handleCheckRankings = async () => {
        const mapKws = keywords.filter(k => k.location);
        if (mapKws.length === 0) return alert('No maps keywords. Add service + location keywords first.');
        const totalCalls = mapKws.length * gridSize * gridSize;
        if (!confirm(`Grid scan ${mapKws.length} keywords × ${gridSize}×${gridSize} grid = ${totalCalls} SerpAPI calls.\n\nEstimated cost: ~$${(totalCalls * 0.005).toFixed(2)}\nEstimated time: ~${Math.ceil(totalCalls / 5 * 2)}s\n\nProceed?`)) return;
        setSyncing(true);
        setScanProgress(`Scanning 0/${mapKws.length} keywords...`);
        try {
          const r = await api(`/projects/${project.id}/maps/grid-scan`, {
            method: 'POST',
            body: { grid_size: gridSize, radius_km: gridRadius }
          });
          if (r.ok && r.results) {
            const scanMap = { ...gridScans };
            r.results.forEach(s => { scanMap[`${s.keyword}|||${s.location}`] = s; });
            setGridScans(scanMap);
            await loadData();
          } else if (r.error) alert(r.error);
        } catch (e) { alert(e.message); }
        setSyncing(false);
        setScanProgress('');
        setMapsChecked(true);
      };

      const cleanMapsData = async () => {
        if (!confirm('Clean all Maps data? This removes rankings and grid scans so you start fresh.')) return;
        await api(`/projects/${project.id}/maps/clean`, { method: 'DELETE' });
        setGridScans({});
        setMapsChecked(false);
        loadData();
      };

      const deleteAllMapKeywords = async () => {
        const mapKws = keywords.filter(k => k.location);
        if (mapKws.length === 0) return;
        if (!confirm(`Delete all ${mapKws.length} Maps keywords? This cannot be undone.`)) return;
        for (const kw of mapKws) {
          await api(`/projects/${project.id}/rank-tracking/keywords/${kw.id}`, { method: 'DELETE' });
        }
        setGridScans({});
        setMapsChecked(false);
        loadData();
      };
      const [service, setService] = useState('');
      const [location, setLocation] = useState('');
      const [expandedKw, setExpandedKw] = useState(null);
      const [mSortCol, setMSortCol] = useState(null);
      const [mSortDir, setMSortDir] = useState('asc');
      const [mapsSelected, setMapsSelected] = useState({});
      const mapsSelCount = Object.values(mapsSelected).filter(Boolean).length;

      const bulkDeleteMaps = async () => {
        const ids = Object.entries(mapsSelected).filter(([k, v]) => v).map(([k]) => parseInt(k));
        if (ids.length === 0) return;
        if (!confirm(`Delete ${ids.length} keywords?`)) return;
        await api(`/projects/${project.id}/rank-tracking/keywords/bulk-delete`, { method: 'POST', body: { ids } });
        setMapsSelected({});
        loadData();
      };
      const [showGenerator, setShowGenerator] = useState(false);
      const [genAreas, setGenAreas] = useState([]);
      // genChecked declared above with genCombos
      const [genCombos, setGenCombos] = useState([]);
      const [genChecked, setGenChecked] = useState({});
      const [maxDistance, setMaxDistance] = useState(20);

      const cityNames = new Set(['perth', 'melbourne', 'sydney', 'brisbane', 'adelaide', 'hobart', 'darwin', 'canberra', 'gold coast', 'newcastle', 'wollongong', 'geelong', 'townsville', 'cairns', 'toowoomba', 'ballarat', 'bendigo', 'launceston', 'mackay', 'rockhampton', 'bunbury', 'mandurah', 'dubai', 'abu dhabi', 'sharjah', 'london', 'new york']);

      // --- Generator state ---
      const [genStep, setGenStep] = useState('input'); // 'input' or 'results'
      const [genServicesText, setGenServicesText] = useState('');
      const [genSuburbsText, setGenSuburbsText] = useState('');
      const [mapsLimit, setMapsLimit] = useState(20);
      const [comboMode, setComboMode] = useState('1:1');
      const [generating, setGenerating] = useState(false);
      const [suggestingServices, setSuggestingServices] = useState(false);
      const [manualService, setManualService] = useState('');
      const [manualSuburb, setManualSuburb] = useState('');

      const cleanServiceName = (s) => {
        let cleaned = s.trim();
        for (const city of cityNames) {
          const re = new RegExp('\\s+' + city.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '$', 'i');
          cleaned = cleaned.replace(re, '');
        }
        return cleaned.trim();
      };

      const openGenerator = async () => {
        setGenStep('input');
        setGenCombos([]);
        setGenChecked({});
        // Pre-fill suburbs from service areas
        const resp = await api(`/projects/${project.id}/service-areas`);
        const areas = resp.service_areas || resp;
        const areasArr = Array.isArray(areas) ? areas : [];
        setGenAreas(areasArr);
        const filtered = areasArr.filter(a => (a.distance || 0) <= maxDistance && !cityNames.has(a.name.toLowerCase()));
        if (filtered.length > 0 && !genSuburbsText.trim()) {
          setGenSuburbsText(filtered.sort((a, b) => (a.distance || 99) - (b.distance || 99)).map(a => a.name).join('\n'));
        }
        setShowGenerator(true);
      };

      const suggestServices = async () => {
        setSuggestingServices(true);
        try {
          const existing = genServicesText.split('\n').map(s => s.trim()).filter(Boolean);
          const resp = await api(`/projects/${project.id}/rank-tracking/suggest-services`, {
            method: 'POST',
            body: { existing }
          });
          const suggested = (resp.services || []).map(s => cleanServiceName(s)).filter(s => s && !existing.map(x => x.toLowerCase()).includes(s.toLowerCase()));
          if (suggested.length === 0) { alert('No new suggestions'); return; }
          setGenServicesText(prev => {
            const lines = prev.split('\n').map(s => s.trim()).filter(Boolean);
            return [...new Set([...lines, ...suggested])].join('\n');
          });
        } catch (e) { alert('Error: ' + e.message); }
        finally { setSuggestingServices(false); }
      };

      const generateCombos = async () => {
        const services = genServicesText.split('\n').map(s => s.trim()).filter(Boolean);
        const suburbs = genSuburbsText.split('\n').map(s => s.trim()).filter(Boolean);
        if (services.length === 0 || suburbs.length === 0) { alert('Add at least one service and one suburb'); return; }
        setGenerating(true);
        try {
          const resp = await api(`/projects/${project.id}/rank-tracking/generate-combos`, {
            method: 'POST',
            body: { services, suburbs, count: mapsLimit, mode: comboMode }
          });
          const combos = (resp.combos || []).map(c => ({ service: c.service, location: c.suburb, volume: c.volume ?? null }));
          // Filter out already tracked
          const tracked = new Set(merged.filter(k => k.location).map(k => `${k.keyword.toLowerCase()}|${k.location.toLowerCase()}`));
          const fresh = combos.filter(c => !tracked.has(`${c.service.toLowerCase()}|${c.location.toLowerCase()}`));
          setGenCombos(fresh);
          const checked = {};
          fresh.forEach((_, i) => checked[i] = true);
          setGenChecked(checked);
          setGenStep('results');
        } catch (e) { alert('Error generating: ' + e.message); }
        finally { setGenerating(false); }
      };

      const addManualCombo = () => {
        if (!manualService.trim() || !manualSuburb.trim()) return;
        const newCombo = { service: manualService.trim(), location: manualSuburb.trim(), volume: null };
        const newCombos = [...genCombos, newCombo];
        setGenCombos(newCombos);
        setGenChecked(prev => ({ ...prev, [newCombos.length - 1]: true }));
        setManualService('');
        setManualSuburb('');
      };

      const removeCombo = (idx) => {
        const newCombos = genCombos.filter((_, i) => i !== idx);
        setGenCombos(newCombos);
        const newChecked = {};
        newCombos.forEach((_, i) => newChecked[i] = true);
        setGenChecked(newChecked);
      };

      const addGeneratedKeywords = async () => {
        const toAdd = genCombos.filter((_, i) => genChecked[i]);
        if (toAdd.length === 0) return;
        for (const c of toAdd) {
          await api(`/projects/${project.id}/rank-tracking/keywords`, {
            method: 'POST',
            body: { keywords: [c.service], location: c.location }
          });
        }
        // Persist inputs
        api(`/projects/${project.id}`, {
          method: 'PUT',
          body: { map_services: genServicesText, map_custom_suburbs: genSuburbsText }
        }).catch(() => {});
        alert(`Added ${toAdd.length} Maps keywords`);
        setShowGenerator(false);
        loadData();
      };

      const toggleGenItem = (idx) => {
        setGenChecked(prev => ({ ...prev, [idx]: !prev[idx] }));
      };
      const checkedCount = Object.values(genChecked).filter(Boolean).length;

      const mToggleSort = (col) => {
        if (mSortCol === col) setMSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setMSortCol(col); setMSortDir('asc'); }
      };
      const mSortIcon = (col) => mSortCol === col ? (mSortDir === 'asc' ? ' ▲' : ' ▼') : '';

      // Helper to get grid scan data for a keyword
      const getGridData = (kw) => {
        const scanKey = `${kw.keyword}|||${kw.location}`;
        const scan = gridScans[scanKey];
        if (scan) return scan;
        // Fallback: check competitors array for serpapi_grid or local_falcon source
        const comps = kw.competitors || [];
        const gridMeta = comps.find(c => c.source === 'serpapi_grid') || comps.find(c => c.source === 'local_falcon');
        return gridMeta || {};
      };

      // Only show keywords that have a location (service + location combos)
      const mapsKeywordsRaw = merged.filter(kw => kw.location);
      const mapsKeywords = useMemo(() => {
        if (!mSortCol) return mapsKeywordsRaw;
        return [...mapsKeywordsRaw].sort((a, b) => {
          let va, vb;
          const gA = getGridData(a), gB = getGridData(b);
          if (mSortCol === 'service') { va = (a.keyword || '').toLowerCase(); vb = (b.keyword || '').toLowerCase(); }
          else if (mSortCol === 'location') { va = (a.location || '').toLowerCase(); vb = (b.location || '').toLowerCase(); }
          else if (mSortCol === 'volume') { va = a.search_volume ?? -1; vb = b.search_volume ?? -1; }
          else if (mSortCol === 'maps') { va = gA.arp ?? 999; vb = gB.arp ?? 999; }
          else if (mSortCol === 'atrp') { va = gA.atrp ?? 999; vb = gB.atrp ?? 999; }
          else if (mSortCol === 'solv') { va = gA.solv ?? -1; vb = gB.solv ?? -1; }
          else if (mSortCol === 'coverage') { va = (gA.found_in ?? 0) / (gA.data_points || 1); vb = (gB.found_in ?? 0) / (gB.data_points || 1); }
          else if (mSortCol === 'status') { va = gA.solv ?? -1; vb = gB.solv ?? -1; }
          else return 0;
          if (va < vb) return mSortDir === 'asc' ? -1 : 1;
          if (va > vb) return mSortDir === 'asc' ? 1 : -1;
          return 0;
        });
      }, [mapsKeywordsRaw, mSortCol, mSortDir, gridScans]);

      const handleAdd = () => {
        if (!service.trim() || !location.trim()) return;
        addKeyword(service.trim(), location.trim());
        setService('');
        setLocation('');
      };

      const importMapsCSV = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.csv,.txt';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const text = await file.text();
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          let added = 0;
          for (const line of lines) {
            const parts = line.split(',').map(s => s.trim().replace(/^["']|["']$/g, ''));
            if (parts.length < 2) continue;
            const [svc, loc] = parts;
            if (!svc || !loc || svc.toLowerCase() === 'service' || svc.toLowerCase() === 'keyword') continue;
            await api(`/projects/${project.id}/rank-tracking/keywords`, {
              method: 'POST',
              body: { keywords: [svc], location: loc }
            });
            added++;
          }
          if (added > 0) {
            alert(`Imported ${added} maps keywords`);
            window.location.reload();
          } else {
            alert('No valid rows found. CSV format: service,location (one per line)');
          }
        };
        input.click();
      };

      const downloadMapsSampleCSV = () => {
        const csv = 'service,location\nlocksmith,Perth CBD\nlocksmith,Fremantle\ncar key replacement,Joondalup';
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'maps-keywords-sample.csv'; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h2 style={{ margin: 0 }}><i className="fa-solid fa-map-location-dot" style={{ marginRight: 8, color: '#22c55e' }} />Google Maps Rankings</h2>
            <div style={{ display: 'flex', gap: 8 }}>
              {mapsSelCount > 0 && <button className="btn" onClick={bulkDeleteMaps} style={{ fontSize: 13, color: '#ef4444', borderColor: '#ef4444' }}>
                <i className="fa-solid fa-trash" style={{ marginRight: 4 }} />Delete {mapsSelCount} Selected
              </button>}
              {mapsKeywordsRaw.length > 0 && <button className="btn" onClick={cleanMapsData} style={{ fontSize: 13, color: '#f59e0b', borderColor: '#f59e0b' }}>
                <i className="fa-solid fa-broom" style={{ marginRight: 4 }} />Clean Old Data
              </button>}
              {mapsKeywordsRaw.length > 0 && <button className="btn" onClick={deleteAllMapKeywords} style={{ fontSize: 13, color: '#ef4444', borderColor: '#ef4444' }}>
                <i className="fa-solid fa-trash" style={{ marginRight: 4 }} />Delete All
              </button>}
              <button className="btn" onClick={openGenerator} style={{ fontSize: 13 }}>
                <i className="fa-solid fa-wand-magic-sparkles" style={{ marginRight: 4 }} />Generate Keywords
              </button>
              <button className="btn" onClick={importMapsCSV} style={{ fontSize: 13 }}>
                <i className="fa-solid fa-file-csv" style={{ marginRight: 4 }} />Import CSV
              </button>
              <button onClick={downloadMapsSampleCSV} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 11, padding: '0 4px', textDecoration: 'underline', alignSelf: 'center' }}>
                Sample
              </button>
              <button className="btn btn-primary" onClick={handleCheckRankings} disabled={syncing || mapsKeywordsRaw.length === 0} style={{ fontSize: 13 }}>
                {syncing ? <><i className="fa-solid fa-spinner fa-spin" style={{ marginRight: 4 }} />{scanProgress || 'Scanning...'}</> : <><i className="fa-solid fa-th" style={{ marginRight: 4 }} />Grid Scan</>}
              </button>
            </div>
          </div>

          {/* Grid scan settings */}
          {mapsKeywordsRaw.length > 0 && (
            <div style={{ display: 'flex', gap: 16, marginBottom: 16, alignItems: 'center', fontSize: 12, color: 'var(--text2)' }}>
              <span style={{ fontWeight: 600 }}>Grid Settings:</span>
              <label style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                Size:
                <select value={gridSize} onChange={e => setGridSize(parseInt(e.target.value))} style={{ background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 8px', fontSize: 12 }}>
                  <option value={3}>3×3 (9 pts)</option>
                  <option value={5}>5×5 (25 pts)</option>
                  <option value={7}>7×7 (49 pts)</option>
                </select>
              </label>
              <label style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                Radius:
                <select value={gridRadius} onChange={e => setGridRadius(parseInt(e.target.value))} style={{ background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 8px', fontSize: 12 }}>
                  <option value={5}>5 km</option>
                  <option value={10}>10 km</option>
                  <option value={15}>15 km</option>
                  <option value={20}>20 km</option>
                  <option value={30}>30 km</option>
                </select>
              </label>
              <span style={{ color: 'var(--text3)', fontSize: 11 }}>
                {mapsKeywordsRaw.length} keywords × {gridSize*gridSize} pts = {mapsKeywordsRaw.length * gridSize * gridSize} API calls (~${(mapsKeywordsRaw.length * gridSize * gridSize * 0.005).toFixed(2)})
              </span>
            </div>
          )}

          {/* Maps summary */}
          {(mapsKeywords.some(k => k.checked_at) || Object.keys(gridScans).length > 0) && (() => {
            const withData = mapsKeywords.filter(r => { const g = getGridData(r); return g.solv !== undefined || g.arp !== undefined || r.checked_at; });
            const withSolv = withData.filter(r => getGridData(r).solv !== undefined);
            const avgSolv = withSolv.length ? (withSolv.reduce((s,r) => s + (getGridData(r).solv || 0), 0) / withSolv.length).toFixed(1) : '—';
            const dominant = withSolv.filter(r => (getGridData(r).solv || 0) >= 50).length;
            const visible = withSolv.filter(r => (getGridData(r).solv || 0) > 0 && (getGridData(r).solv || 0) < 50).length;
            const invisible = withData.filter(r => !getGridData(r).solv && !r.maps_position).length;
            const ranked = mapsKeywords.filter(r => r.maps_position);
            const avgPos = ranked.length ? (ranked.reduce((s,r) => s + r.maps_position, 0) / ranked.length).toFixed(1) : '—';
            return (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 20 }}>
              {[
                { label: 'Dominant (50%+ visibility)', value: dominant, color: '#22c55e' },
                { label: 'Partially Visible', value: visible, color: '#3b82f6' },
                { label: 'Not Visible', value: invisible, color: '#ef4444' },
                { label: 'Avg Visibility %', value: avgSolv !== '—' ? `${avgSolv}%` : '—', color: '#f59e0b' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--card)', borderRadius: 10, padding: 14, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 26, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{s.label}</div>
                </div>
              ))}
            </div>
            );
          })()}


          {/* Add service + location */}
          <div style={{ background: 'var(--card)', borderRadius: 10, padding: 16, border: '1px solid var(--border)', marginBottom: 20 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', marginBottom: 10 }}>
              <i className="fa-solid fa-plus-circle" style={{ marginRight: 6, color: 'var(--accent)' }} />Add Service + Location
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <input value={service} onChange={e => setService(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()}
                placeholder="Service (e.g. plumber, dentist, SEO agency)" style={{ flex: 1, padding: '10px 14px', background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 14 }} />
              <input value={location} onChange={e => setLocation(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()}
                placeholder="Location (e.g. Melbourne, Sydney CBD)" style={{ flex: 1, padding: '10px 14px', background: 'var(--bg)', color: 'var(--text)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 14 }} />
              <button className="btn btn-primary" onClick={handleAdd} disabled={!service.trim() || !location.trim()} style={{ fontSize: 14, padding: '10px 20px', whiteSpace: 'nowrap' }}>
                <i className="fa-solid fa-plus" style={{ marginRight: 4 }} />Add
              </button>
            </div>
          </div>

          {/* Maps rankings table */}
          {mapsKeywords.length === 0 ? (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fa-solid fa-map-location-dot" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
              <div style={{ fontSize: 16, marginBottom: 8 }}>No maps keywords yet</div>
              <div style={{ fontSize: 13 }}>Add a service + location above to track your Google Maps positions.</div>
            </div>
          ) : (
            <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)' }}>
                    <th style={{ padding: '10px 8px', width: 30, textAlign: 'center' }}>
                      <input type="checkbox" checked={mapsKeywords.length > 0 && mapsKeywords.every(k => mapsSelected[k.id])} onChange={(e) => {
                        const sel = {};
                        if (e.target.checked) mapsKeywords.forEach(k => sel[k.id] = true);
                        setMapsSelected(sel);
                      }} />
                    </th>
                    {[
                      { key: 'service', label: 'Service', align: 'left', w: null },
                      { key: 'location', label: 'Location', align: 'left', w: 140 },
                      { key: 'maps', label: 'Avg Rank', align: 'center', w: 90 },
                      { key: 'atrp', label: 'True Avg', align: 'center', w: 90 },
                      { key: 'solv', label: 'Visibility %', align: 'center', w: 100 },
                      { key: 'coverage', label: 'Coverage', align: 'center', w: 90 },
                      { key: 'status', label: 'Status', align: 'center', w: 130 },
                    ].map(h => (
                      <th key={h.label} onClick={h.key ? () => mToggleSort(h.key) : undefined} style={{ padding: '10px 14px', textAlign: h.align, fontWeight: 600, color: mSortCol === h.key ? 'var(--accent)' : 'var(--text2)', width: h.w || undefined, cursor: h.key ? 'pointer' : 'default', userSelect: 'none' }}>
                        {h.label}{h.key && mSortIcon(h.key)}
                      </th>
                    ))}
                    <th style={{ width: 40 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {mapsKeywords.map(kw => {
                    const g = getGridData(kw);
                    const hasData = g.solv !== undefined || g.arp !== undefined;
                    const arp = g.arp;
                    const atrp = g.atrp;
                    const solv = g.solv;
                    const foundIn = g.found_in;
                    const dataPoints = g.data_points;
                    const statusLabel = !hasData ? (kw.checked_at ? 'No Scan' : null) : solv >= 80 ? 'Dominant' : solv >= 50 ? 'Strong' : solv >= 20 ? 'Competitive' : solv > 0 ? 'Needs Work' : foundIn > 0 ? 'Weak' : 'Not Visible';
                    const statusColor = !hasData ? '#6b7280' : solv >= 80 ? '#22c55e' : solv >= 50 ? '#22c55e' : solv >= 20 ? '#3b82f6' : solv > 0 ? '#f59e0b' : foundIn > 0 ? '#f59e0b' : '#ef4444';
                    const statusIcon = !hasData ? 'fa-circle-question' : solv >= 50 ? 'fa-circle-check' : solv >= 20 ? 'fa-circle-minus' : solv > 0 ? 'fa-triangle-exclamation' : 'fa-circle-xmark';
                    const isExpanded = expandedMapRow === kw.id;
                    const scanKey = `${kw.keyword}|||${kw.location}`;
                    const gridScanData = gridScans[scanKey];
                    const gridPointsData = gridScanData?.grid_points || [];
                    // Dynamic advice from audit insights — actions are { text, color } objects
                    const buildAdvice = (status, kwObj) => {
                      if (!status) return null;
                      const loc = (kwObj.location || '').toLowerCase().trim();
                      const svcAreas = (auditInsights.serviceAreas || []).map(a => (typeof a === 'string' ? a : a.name || '').toLowerCase().trim());
                      const inServiceArea = svcAreas.some(a => a && loc && (a.includes(loc) || loc.includes(a)));
                      const matchingPage = (auditInsights.sitePages || []).find(p => {
                        const pn = (p.page_name || '').toLowerCase();
                        const sl = (p.slug || '').toLowerCase();
                        return loc && (pn.includes(loc) || sl.includes(loc));
                      });
                      const gbpFindings = auditInsights.gbpFindings || [];
                      const citationFindings = gbpFindings.filter(f => (f.category || '').toLowerCase().includes('citation') || (f.category || '').toLowerCase().includes('directory'));
                      const reviewFindings = gbpFindings.filter(f => (f.category || '').toLowerCase().includes('review'));
                      const napFindings = gbpFindings.filter(f => (f.category || '').toLowerCase().includes('nap') || (f.title || '').toLowerCase().includes('nap'));
                      const profileFindings = gbpFindings.filter(f => (f.category || '').toLowerCase().includes('profile') || (f.category || '').toLowerCase().includes('completeness'));
                      const criticalFindings = gbpFindings.filter(f => f.severity === 'critical');
                      // Citation/directory data — array of { name, url, status, listing_url, ... }
                      const citDirs = Array.isArray(auditInsights.citations) ? auditInsights.citations : [];
                      const listedDirs = citDirs.filter(d => d.status === 'listed');
                      const unlistedDirs = citDirs.filter(d => d.status === 'not_listed');
                      const hasCitationData = citDirs.length > 0;

                      const ok = (text, link) => ({ text, color: '#22c55e', link });
                      const bad = (text, link) => ({ text, color: '#ef4444', link });
                      const warn = (text, link) => ({ text, color: '#f59e0b', link });
                      const info = (text, link) => ({ text, color: 'var(--text2)', link });

                      const base = {
                        'Dominant': { color: '#22c55e', icon: 'fa-trophy', title: 'You dominate this area' },
                        'Strong': { color: '#22c55e', icon: 'fa-thumbs-up', title: 'Strong presence — keep it up' },
                        'Competitive': { color: '#3b82f6', icon: 'fa-chart-line', title: 'Good visibility — room to grow' },
                        'Needs Work': { color: '#f59e0b', icon: 'fa-wrench', title: 'Showing up in a few spots — needs improvement' },
                        'Weak': { color: '#f59e0b', icon: 'fa-exclamation-circle', title: 'Found but never in top 3' },
                        'Not Visible': { color: '#ef4444', icon: 'fa-eye-slash', title: 'Not found in this area' },
                        'No Scan': { color: '#6b7280', icon: 'fa-circle-question', title: 'Not scanned yet' },
                      }[status];
                      if (!base) return null;

                      const actions = [];
                      if (status === 'No Scan') {
                        actions.push(info('Click "Grid Scan" to run a SerpAPI Maps grid scan for all keywords'));
                        return { ...base, actions };
                      }
                      if (status === 'Dominant' || status === 'Strong') {
                        actions.push(info('Maintain review velocity — keep asking for reviews'));
                        if (reviewFindings.length > 0) actions.push(warn('GBP Audit: ' + reviewFindings[0].title));
                        actions.push(info('Monitor competitors entering this area'));
                        if (status === 'Dominant') actions.push(info('Focus efforts on weaker suburbs instead'));
                        if (inServiceArea) actions.push(ok(kwObj.location + ' is in your GBP service areas'));
                        if (matchingPage) actions.push(ok('Suburb page exists: ' + matchingPage.page_name + (matchingPage.stage === 'published' ? ' (published)' : ' (' + (matchingPage.stage || 'draft') + ')')));
                        if (hasCitationData) {
                          actions.push({ text: '__directories__', color: 'none', directories: citDirs });
                        }
                        return { ...base, actions };
                      }

                      // Competitive, Needs Work, Weak, Not Visible — actionable advice
                      // 1. Service area check
                      if (inServiceArea) {
                        actions.push(ok(kwObj.location + ' is in your GBP service areas'));
                      } else {
                        actions.push(bad(kwObj.location + ' is NOT in your GBP service areas — add it in Settings →', 'settings'));
                      }
                      // 2. Suburb page check
                      if (matchingPage) {
                        actions.push(ok('Suburb page exists: ' + matchingPage.page_name + (matchingPage.stage === 'published' ? ' (published)' : ' (' + (matchingPage.stage || 'draft') + ')'), 'nw-staging'));
                      } else {
                        actions.push({ text: 'No suburb page for ' + kwObj.location + ' — click to create →', color: '#ef4444', createPage: { name: kwObj.location, keyword: kwObj.keyword, location: kwObj.location } });
                      }
                      // 3. Directories — show checklist with real data
                      if (hasCitationData) {
                        actions.push({ text: '__directories__', color: 'none', directories: citDirs });
                      } else {
                        actions.push({ text: '__directories__', color: 'none', directories: TOP_DIRECTORIES.map(d => ({ ...d, status: 'unknown' })) });
                      }
                      // 4. GBP audit findings
                      if (criticalFindings.length > 0) {
                        actions.push(bad(criticalFindings.length + ' critical GBP issue' + (criticalFindings.length > 1 ? 's' : '') + ': ' + criticalFindings.slice(0, 2).map(f => f.title).join(', ')));
                      }
                      if (napFindings.length > 0) {
                        actions.push(warn('NAP: ' + napFindings[0].title));
                      }
                      if (reviewFindings.length > 0) {
                        actions.push(warn('Reviews: ' + reviewFindings[0].title));
                      } else {
                        actions.push(info('Ask customers in ' + (kwObj.location || 'this area') + ' to leave reviews mentioning the suburb'));
                      }
                      if (profileFindings.length > 0) {
                        actions.push(warn('Profile: ' + profileFindings[0].title));
                      }
                      // 5. Status-specific extras
                      if (status === 'Not Visible') {
                        if (!inServiceArea) actions.push(warn('This area may be outside your GBP service radius'));
                        actions.push(info('Post GBP updates targeting ' + (kwObj.location || 'this area')));
                      }
                      if (status === 'Weak') {
                        actions.push(warn('Your GBP is detected but ranks too low for the local pack'));
                      }
                      if (status === 'Needs Work' || status === 'Competitive') {
                        actions.push(info('Post GBP updates about jobs completed in ' + (kwObj.location || 'this area')));
                      }
                      // No-audit fallback
                      if (gbpFindings.length === 0 && actions.length < 3) {
                        actions.push(info('Run a GBP Audit for detailed recommendations'));
                      }
                      return { ...base, actions };
                    };
                    const advice = buildAdvice(statusLabel, kw);
                    return (
                    <React.Fragment key={kw.id}>
                    <tr onClick={() => setExpandedMapRow(isExpanded ? null : kw.id)} style={{ borderBottom: isExpanded ? 'none' : '1px solid var(--border)', cursor: 'pointer', background: isExpanded ? 'rgba(99,102,241,0.05)' : mapsSelected[kw.id] ? 'rgba(239,68,68,0.05)' : 'transparent' }}>
                      <td style={{ padding: '10px 8px', textAlign: 'center' }} onClick={(e) => e.stopPropagation()}>
                        <input type="checkbox" checked={!!mapsSelected[kw.id]} onChange={() => setMapsSelected(prev => ({ ...prev, [kw.id]: !prev[kw.id] }))} />
                      </td>
                      <td style={{ padding: '10px 14px', fontWeight: 500 }}>{kw.keyword}</td>
                      <td style={{ padding: '10px 14px', color: 'var(--text2)' }}>
                        <i className="fa-solid fa-location-dot" style={{ marginRight: 4, fontSize: 10, color: '#22c55e' }} />{kw.location}
                      </td>
                      <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                        {hasData && arp ? (
                          <span style={{ color: arp <= 3 ? '#22c55e' : arp <= 10 ? '#3b82f6' : arp <= 20 ? '#f59e0b' : '#ef4444', fontWeight: 700, fontSize: 15 }}>
                            {arp.toFixed(1)}
                          </span>
                        ) : hasData ? <span style={{ color: '#ef4444', fontWeight: 700 }}>20+</span> : <span style={{ color: 'var(--text3)' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                        {hasData && atrp ? (
                          <span style={{ color: atrp <= 3 ? '#22c55e' : atrp <= 10 ? '#3b82f6' : atrp <= 20 ? '#f59e0b' : '#ef4444', fontWeight: 600, fontSize: 14 }}>
                            {atrp.toFixed(1)}
                          </span>
                        ) : hasData ? <span style={{ color: '#ef4444' }}>20+</span> : <span style={{ color: 'var(--text3)' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                        {hasData && solv !== undefined ? (
                          <span style={{ color: solv >= 50 ? '#22c55e' : solv >= 20 ? '#3b82f6' : solv > 0 ? '#f59e0b' : '#ef4444', fontWeight: 700, fontSize: 15 }}>
                            {solv.toFixed(0)}%
                          </span>
                        ) : <span style={{ color: 'var(--text3)' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                        {hasData && foundIn !== undefined ? (
                          <span style={{ color: 'var(--text2)', fontSize: 13 }}>
                            {foundIn}/{dataPoints || '?'}
                          </span>
                        ) : <span style={{ color: 'var(--text3)' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 14px', textAlign: 'center' }}>
                        {statusLabel ? (
                          <span style={{ color: statusColor, fontWeight: 600, fontSize: 12 }}>
                            <i className={`fa-solid ${statusIcon}`} style={{ marginRight: 4 }} />{statusLabel}
                            <i className="fa-solid fa-chevron-down" style={{ marginLeft: 6, fontSize: 9, transform: isExpanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }} />
                          </span>
                        ) : <span style={{ color: 'var(--text3)' }}>—</span>}
                      </td>
                      <td style={{ padding: '6px' }}>
                        <button onClick={(e) => { e.stopPropagation(); removeKeyword(kw.id); }} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 12, padding: 4 }}>
                          <i className="fa-solid fa-trash" />
                        </button>
                      </td>
                    </tr>
                    {isExpanded && (
                      <tr style={{ borderBottom: '1px solid var(--border)' }}>
                        <td colSpan={9} style={{ padding: 0 }}>
                          <div style={{ padding: '16px 20px 20px 20px', background: 'rgba(99,102,241,0.03)', borderTop: '1px dashed var(--border)' }}>
                            {/* Row 1: Grid heatmap + Action advice */}
                            <div style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
                              {gridPointsData.length > 0 && (
                                <div style={{ flexShrink: 0 }}>
                                  <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text2)', marginBottom: 8, textAlign: 'center' }}>
                                    <i className="fa-solid fa-th" style={{ marginRight: 4 }} />Grid Scan — {gridScanData.grid_size}×{gridScanData.grid_size}, {gridScanData.radius_km}km radius
                                  </div>
                                  <GridHeatmap gridPoints={gridPointsData} gridSize={gridScanData.grid_size || 5} keyword={kw.keyword} location={kw.location} />
                                  {gridScanData.scanned_at && (
                                    <div style={{ fontSize: 10, color: 'var(--text3)', textAlign: 'center', marginTop: 6 }}>
                                      Scanned: {new Date(gridScanData.scanned_at).toLocaleDateString()} {new Date(gridScanData.scanned_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
                                    </div>
                                  )}
                                </div>
                              )}
                              {advice && (
                                <div style={{ flex: 1 }}>
                                  <div style={{ fontWeight: 700, fontSize: 13, color: advice.color, marginBottom: 10 }}>
                                    <i className={`fa-solid ${advice.icon}`} style={{ marginRight: 6 }} />{advice.title}
                                  </div>
                                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                                    {advice.actions.map((action, i) => {
                                      const act = typeof action === 'string' ? { text: action, color: 'var(--text2)' } : action;
                                      // Directory checklist widget
                                      if (act.text === '__directories__' && act.directories) {
                                        const listed = act.directories.filter(d => d.status === 'listed');
                                        const notListed = act.directories.filter(d => d.status === 'not_listed');
                                        const unknown = act.directories.filter(d => d.status === 'unknown');
                                        return (
                                        <div key={i} style={{ marginTop: 4, marginBottom: 2 }}>
                                          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text2)', marginBottom: 6 }}>
                                            <i className="fa-solid fa-list-check" style={{ marginRight: 5 }} />
                                            Directories ({listed.length} listed{notListed.length > 0 ? ', ' + notListed.length + ' missing' : ''}{unknown.length > 0 ? ', ' + unknown.length + ' not checked' : ''})
                                          </div>
                                          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '3px 16px' }}>
                                            {act.directories.map((d, j) => (
                                              <div key={j} style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 5, padding: '2px 0' }}>
                                                <i className={`fa-solid ${d.status === 'listed' ? 'fa-circle-check' : d.status === 'not_listed' ? 'fa-circle-xmark' : 'fa-circle-question'}`}
                                                   style={{ fontSize: 10, color: d.status === 'listed' ? '#22c55e' : d.status === 'not_listed' ? '#ef4444' : '#6b7280', flexShrink: 0 }} />
                                                <a href={'https://' + d.url} target="_blank" rel="noopener noreferrer"
                                                   style={{ color: d.status === 'listed' ? '#22c55e' : d.status === 'not_listed' ? '#ef4444' : 'var(--text3)', textDecoration: 'none', fontSize: 11 }}
                                                   onMouseEnter={(e) => { e.target.style.textDecoration = 'underline'; }} onMouseLeave={(e) => { e.target.style.textDecoration = 'none'; }}>
                                                  {d.name}
                                                </a>
                                                {d.free && d.status !== 'listed' && <span style={{ fontSize: 9, color: '#22c55e', opacity: 0.7 }}>FREE</span>}
                                              </div>
                                            ))}
                                          </div>
                                        </div>
                                        );
                                      }
                                      const isGreen = act.color === '#22c55e';
                                      const isRed = act.color === '#ef4444';
                                      const icon = isGreen ? 'fa-circle-check' : isRed ? 'fa-circle-xmark' : 'fa-arrow-right';
                                      const isClickable = act.link || act.createPage;
                                      const handleClick = isClickable ? async (e) => {
                                        e.stopPropagation();
                                        if (act.createPage) {
                                          const cp = act.createPage;
                                          const resp = await api(`/projects/${project.id}/site-pages/quick-create`, {
                                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ page_name: cp.name, page_type: 'suburb', keyword: cp.keyword, location: cp.location })
                                          });
                                          if (resp && resp.id) {
                                            // Refresh audit insights to reflect new page
                                            const sp = await api(`/projects/${project.id}/site-pages`);
                                            setAuditInsights(prev => ({ ...prev, sitePages: Array.isArray(sp) ? sp : [] }));
                                          }
                                        } else if (act.link && setPage) {
                                          setPage(act.link);
                                        }
                                      } : undefined;
                                      return (
                                      <div key={i} style={{ fontSize: 12, color: act.color, display: 'flex', alignItems: 'flex-start', gap: 8, cursor: isClickable ? 'pointer' : 'default' }}
                                           onClick={handleClick}>
                                        <i className={`fa-solid ${icon}`} style={{ fontSize: isGreen || isRed ? 11 : 9, marginTop: isGreen || isRed ? 2 : 4, color: act.color, flexShrink: 0 }} />
                                        <span style={isClickable ? { textDecoration: 'underline', textDecorationStyle: 'dotted' } : undefined}>{act.text}</span>
                                      </div>
                                      );
                                    })}
                                  </div>
                                  {hasData && (
                                    <div style={{ marginTop: 14, display: 'flex', gap: 16, fontSize: 11, color: 'var(--text3)' }}>
                                      {arp && <span>ARP: <strong style={{ color: 'var(--text2)' }}>{arp.toFixed(1)}</strong></span>}
                                      {atrp && <span>ATRP: <strong style={{ color: 'var(--text2)' }}>{atrp.toFixed(1)}</strong></span>}
                                      {solv !== undefined && <span>SOLV: <strong style={{ color: 'var(--text2)' }}>{solv.toFixed(1)}%</strong></span>}
                                      {foundIn !== undefined && <span>Found: <strong style={{ color: 'var(--text2)' }}>{foundIn}/{dataPoints}</strong></span>}
                                    </div>
                                  )}
                                </div>
                              )}
                              {!advice && !gridPointsData.length && (
                                <div style={{ flex: 1, color: 'var(--text3)', fontSize: 13, padding: 20, textAlign: 'center' }}>
                                  No scan data yet. Click "Grid Scan" to scan this keyword.
                                </div>
                              )}
                            </div>
                            {/* Row 2: Gap Analysis — Top 3 Competitors */}
                            {(() => {
                              const compData = gridScanData?.competitors || {};
                              const comps = Array.isArray(compData) ? compData.slice(0, 3) : (compData.top || []).slice(0, 3);
                              const our = compData.our_business || {};
                              if (comps.length === 0) return null;
                              const ourReviews = our.reviews || 0;
                              const ourRating = our.rating || 0;
                              const maxReviews = Math.max(...comps.map(c => c.reviews || 0), ourReviews);

                              if (solv < 50) actions.push({ icon: 'fa-map-pin', color: '#8b5cf6', text: `Add "${kw.location}" to GBP service areas and create a dedicated landing page for "${kw.keyword} ${kw.location}".`, priority: 'high' });

                                        </div>
                                        <div>
                                          <div style={{ fontSize: 10, color: 'var(--text3)' }}>Reviews</div>
                                          <div style={{ fontSize: 18, fontWeight: 800, color: ourReviews >= avgCompReviews ? '#22c55e' : '#ef4444' }}>{ourReviews || '—'}</div>
                                        </div>
                                      </div>
                                      <div style={{ fontSize: 10, color: 'var(--text3)' }}>Visibility</div>
                                      <div style={{ fontSize: 16, fontWeight: 800, color: solv >= 50 ? '#22c55e' : solv >= 20 ? '#3b82f6' : '#ef4444' }}>{solv?.toFixed(0) || 0}%</div>
                                    </div>
                                    {/* Competitor cards */}

                                      <div key={ci} style={{ background: 'rgba(239,68,68,0.04)', borderRadius: 10, padding: 14, border: '1px solid var(--border)', position: 'relative' }}>
                                        <div style={{ position: 'absolute', top: -8, left: 12, background: ci === 0 ? '#ef4444' : '#6b7280', color: '#fff', fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 4 }}>

                                        <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)', marginBottom: 8, marginTop: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }} title={c.name}>{c.name}</div>
                                        <div style={{ display: 'flex', gap: 12, marginBottom: 6 }}>
                                          <div>
                                            <div style={{ fontSize: 10, color: 'var(--text3)' }}>Rating</div>
                                            <div style={{ fontSize: 18, fontWeight: 800, color: c.rating >= 4.5 ? '#22c55e' : '#3b82f6' }}>
                                              {c.rating ? <><i className="fa-solid fa-star" style={{ fontSize: 12 }} /> {c.rating}</> : '—'}

                                          </div>
                                          <div>
                                            <div style={{ fontSize: 10, color: 'var(--text3)' }}>Reviews</div>
                                            <div style={{ fontSize: 18, fontWeight: 800, color: (c.reviews || 0) > ourReviews ? '#ef4444' : '#22c55e' }}>

                                          <i className={`fa-solid ${a.icon}`} style={{ fontSize: 9, color: a.color }} />
                                        </div>
                                        <div style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.4 }}>
                                          {a.priority === 'high' && <span style={{ color: '#ef4444', fontWeight: 700, fontSize: 10, marginRight: 4 }}>HIGH</span>}
                                          {a.text}
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              );
                            })()}
                          </div>
                        </td>
                      </tr>
                    )}
                    </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
              {/* Metric explanations */}
              <div style={{ padding: '14px 20px', borderTop: '1px solid var(--border)', fontSize: 11, color: 'var(--text3)', lineHeight: 1.8 }}>
                <strong style={{ color: 'var(--text2)' }}>Avg Rank</strong> — Average position where your business was found (lower is better).{' '}
                <strong style={{ color: 'var(--text2)' }}>True Avg</strong> — Same but counts unfound spots as #21, giving the full picture.{' '}
                <strong style={{ color: 'var(--text2)' }}>Visibility %</strong> — Percentage of scan points where you appear in the top 3. This is the most important metric.{' '}
                <strong style={{ color: 'var(--text2)' }}>Coverage</strong> — How many scan points found your business out of total scanned.
              </div>
            </div>
          )}
          {/* Generate Maps Keywords Modal */}
          {showGenerator && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center' }}
              onClick={() => setShowGenerator(false)}>
              <div style={{ background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', width: 800, maxHeight: '85vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}

                {/* Header */}
                <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>

                    <i className="fa-solid fa-wand-magic-sparkles" style={{ marginRight: 8, color: 'var(--accent)' }} />

                  <button onClick={() => setShowGenerator(false)} style={{ background: 'none', border: 'none', color: 'var(--text3)', cursor: 'pointer', fontSize: 18 }}>×</button>

                <div style={{ overflow: 'auto', flex: 1, padding: '20px' }}>
                  {genStep === 'input' ? (
                    <React.Fragment>

                      {/* Services */}
