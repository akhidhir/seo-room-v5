<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Room v5</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text2: #a1a1aa;
      --text3: #52525b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    html, body, #root {
      height: 100%;
      width: 100%;
    }

    .app-wrapper {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 100;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .sidebar-header i {
      font-size: 24px;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .sidebar-section {
      padding: 0;
    }

    .sidebar-section-title {
      padding: 16px 20px 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text3);
      letter-spacing: 0.5px;
    }

    .sidebar-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text2);
      font-size: 13px;
    }

    .sidebar-item:hover {
      background: rgba(99, 102, 241, 0.1);
      color: var(--accent);
    }

    .sidebar-item.active {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 17px;
      font-weight: 600;
    }

    .sidebar-item i {
      width: 16px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-selector {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .project-selector:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .topbar-domain {
      color: var(--text2);
      font-size: 13px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-subtitle {
      color: var(--text2);
      font-size: 14px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-success {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }

    .btn-success:hover:not(:disabled) {
      background: #16a34a;
    }

    .btn-danger {
      background: transparent;
      color: var(--error);
      border-color: var(--error);
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text2);
      border-color: var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-critical {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .badge-medium {
      background: rgba(245, 158, 11, 0.2);
      color: #fed7aa;
    }

    .badge-low {
      background: rgba(59, 130, 246, 0.2);
      color: #bfdbfe;
    }

    .badge-pending {
      background: rgba(107, 114, 128, 0.2);
      color: #d1d5db;
    }

    .badge-approved {
      background: rgba(59, 130, 246, 0.2);
      color: #bfdbfe;
    }

    .badge-in-progress {
      background: rgba(245, 158, 11, 0.2);
      color: #fed7aa;
    }

    .badge-done {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table th {
      background: var(--bg);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
    }

    .table th:hover {
      color: var(--text);
    }

    .table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-label {
      color: var(--text2);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      width: 90%;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 20px;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #bfdbfe;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .spinner-large {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .audit-loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }

    .audit-loading-overlay .spinner-large {
      width: 48px;
      height: 48px;
      border-width: 4px;
    }

    .audit-loading-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .audit-loading-sub {
      font-size: 13px;
      color: var(--text3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .gap-8 {
      gap: 8px;
    }

    .gap-16 {
      gap: 16px;
    }

    .flex {
      display: flex;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
    }

    .mt-16 {
      margin-top: 16px;
    }

    .mt-24 {
      margin-top: 24px;
    }

    .mb-16 {
      margin-bottom: 16px;
    }

    .mb-24 {
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        position: absolute;
        height: 100%;
        transition: width 0.3s;
      }

      .sidebar.mobile-open {
        width: 280px;
      }

      .main-content {
        width: 100%;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        max-width: 95%;
      }
    }

    .login-page {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .login-form {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text2);
      font-size: 14px;
    }

    .toggle-auth {
      text-align: center;
      color: var(--text2);
      font-size: 13px;
      margin-top: 16px;
    }

    .toggle-auth button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
    }

    .toggle-auth button:hover {
      text-decoration: underline;
    }

    .finding-card {
      background: var(--bg);
      border-left: 4px solid;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 4px;
    }

    .finding-card.critical {
      border-left-color: var(--error);
    }

    .finding-card.medium {
      border-left-color: var(--warning);
    }

    .finding-card.low {
      border-left-color: var(--info);
    }

    .finding-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .finding-card-title {
      font-weight: 600;
      color: var(--text);
    }

    .finding-card-description {
      color: var(--text2);
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .finding-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
      padding: 8px;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 4px;
      font-size: 12px;
    }

    .finding-value {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .finding-value-label {
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 11px;
    }

    .finding-value-content {
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
    }

    .finding-actions {
      display: flex;
      gap: 8px;
    }

    .kanban-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .kanban-column {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
      overflow-y: auto;
    }

    .kanban-column-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(99, 102, 241, 0.05);
    }

    .kanban-column-count {
      background: var(--card);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: var(--text2);
    }

    .kanban-items {
      padding: 12px;
      flex: 1;
    }

    .kanban-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: move;
    }

    .kanban-card-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .kanban-card-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .kanban-card-actions {
      display: flex;
      gap: 6px;
    }

    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox input {
      cursor: pointer;
    }

    .integration-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .integration-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .integration-title {
      font-size: 15px;
      font-weight: 600;
    }

    .integration-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.connected {
      background: var(--success);
    }

    .status-dot.disconnected {
      background: var(--text3);
    }

    .integration-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 480px;
    }

    .integration-fields .btn-group {
      display: flex;
      gap: 8px;
    }

    .integration-fields .btn-group .btn {
      flex: none;
      min-width: 100px;
    }

    .project-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .project-info {
      flex: 1;
    }

    .project-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .project-domain {
      color: var(--text2);
      font-size: 13px;
    }

    .maps-table-wrapper {
      overflow-x: auto;
    }

    .maps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .maps-table th {
      background: var(--bg);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .maps-table th:hover {
      color: var(--text);
    }

    .maps-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .maps-table tr:hover {
      background: rgba(99, 102, 241, 0.05);
    }

    .visibility-bar {
      width: 100%;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .visibility-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--warning), var(--error));
      transition: width 0.3s;
    }

    .expand-icon {
      cursor: pointer;
      color: var(--text2);
    }

    .expand-icon:hover {
      color: var(--text);
    }

    .action-panel {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }

    .action-panel-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .action-panel-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .metric-footer {
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text2);
      line-height: 1.6;
    }

    .metric-footer-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .metric-footer dl {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric-footer dt {
      font-weight: 600;
      color: var(--text);
    }

    .metric-footer dd {
      color: var(--text2);
    }

    /* Wireframe skeleton layout classes — render in editor + preview */
    .wf-columns { display: flex; gap: 20px; align-items: flex-start; margin: 16px 0; flex-wrap: wrap; }
    .wf-col { flex: 1; min-width: 200px; }
    .wf-col img { width: 100%; border-radius: 8px; }
    .wf-hero { text-align: center; padding: 24px 16px; margin-bottom: 16px; background: rgba(99,102,241,0.05); border-radius: 8px; border: 1px dashed rgba(99,102,241,0.2); }
    .wf-hero h1 { font-size: 28px; margin-bottom: 8px; }
    .wf-cta { text-align: center; padding: 20px; margin: 16px 0; background: rgba(34,197,94,0.05); border-radius: 8px; border: 1px dashed rgba(34,197,94,0.2); }
    .wf-btn { display: inline-block; padding: 10px 24px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 8px; }
    .wf-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 16px 0; }
    .wf-feature-item { padding: 16px; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border); }
    .wf-faq { margin: 16px 0; }
    .wf-testimonial { padding: 16px; margin: 12px 0; border-left: 3px solid var(--accent); background: rgba(99,102,241,0.03); border-radius: 0 8px 8px 0; font-style: italic; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const API_BASE = window.location.origin + '/api';

    const api = async (path, opts = {}) => {
      const token = localStorage.getItem('token');
      const res = await fetch(`${API_BASE}${path}`, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          ...(token && { Authorization: `Bearer ${token}` }),
          ...opts.headers,
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });

      if (res.status === 401) {
        console.warn('[api] 401 on', path);
        return { error: 'Not authenticated' };
      }

      const contentType = res.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) {
        console.warn('[api] Non-JSON response on', path, contentType);
        throw new Error('Server returned non-JSON response — deploy may be pending');
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    };

    // ============ LOGIN PAGE ============
    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isRegister, setIsRegister] = useState(false);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          const endpoint = isRegister ? '/auth/register' : '/auth/login';
          const data = await api(endpoint, {
            method: 'POST',
            body: { email, password },
          });

          localStorage.setItem('token', data.token);
          setEmail('');
          setPassword('');
          onLogin(data.user);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="login-page">
          <div className="login-form">
            <div className="login-header">
              <div className="login-title">
                <i className="fas fa-rocket"></i> SEO Room
              </div>
              <div className="login-subtitle">SEO Automation for Agencies</div>
            </div>

            {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label className="form-label">Email</label>
                <input
                  type="email"
                  className="form-input"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  placeholder="you@example.com"
                  required
                  disabled={loading}
                />
              </div>

              <div className="form-group">
                <label className="form-label">Password</label>
                <input
                  type="password"
                  className="form-input"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="••••••••"
                  required
                  disabled={loading}
                />
              </div>

              <button type="submit" className="btn btn-primary" style={{ width: '100%' }} disabled={loading}>
                {loading ? <span className="spinner"></span> : null}
                {isRegister ? 'Create Account' : 'Sign In'}
              </button>
            </form>

            <div className="toggle-auth">
              {isRegister ? 'Already have an account? ' : "Don't have an account? "}
              <button onClick={() => setIsRegister(!isRegister)} disabled={loading}>
                {isRegister ? 'Sign In' : 'Sign Up'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============ FINDINGS CARD COMPONENT ============
    function FindingCard({ finding, onApprove, onReject, isApproved, expanded, onToggle }) {
      const severityClass = finding.severity ? finding.severity.toLowerCase() : 'medium';
      const currentVal = finding.current_value || finding.current;
      const recommendedVal = finding.recommended_value || finding.recommended;
      const isExpanded = expanded;
      const sevColor = { critical: '#ef4444', medium: '#f59e0b', low: '#3b82f6' }[severityClass] || '#64748b';
      const sevIcon = { critical: 'fas fa-exclamation-circle', medium: 'fas fa-exclamation-triangle', low: 'fas fa-info-circle' }[severityClass] || 'fas fa-circle';

      // Parse recommendation into steps if it contains numbered items
      const recSteps = finding.recommendation ? finding.recommendation.split(/(?:\d+\)\s*|\d+\.\s+)/).filter(Boolean) : [];

      return (
        <div style={{ marginBottom: 10, background: 'var(--bg)', borderRadius: 10, border: `1px solid var(--border)`, borderLeft: `4px solid ${sevColor}`, overflow: 'hidden' }}>
          <div style={{ cursor: 'pointer', padding: '14px 16px' }} onClick={onToggle}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1, minWidth: 0 }}>
                <i className={sevIcon} style={{ color: sevColor, fontSize: 18, flexShrink: 0 }} />
                <span style={{ fontSize: 16, fontWeight: 700, color: 'var(--text1)' }}>{finding.title}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0, marginLeft: 12 }}>
                <span style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, fontWeight: 700, background: `${sevColor}20`, color: sevColor, textTransform: 'uppercase' }}>{finding.severity}</span>
                <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 12 }} />
              </div>
            </div>
            {/* Always show a one-line summary */}
            {!isExpanded && finding.description && (
              <div style={{ fontSize: 14, color: 'var(--text3)', marginTop: 6, marginLeft: 28, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{finding.description.substring(0, 150)}</div>
            )}
          </div>
          {isExpanded && (
            <div style={{ padding: '0 16px 16px' }}>
              {/* What's wrong */}
              <div style={{ fontSize: 15, color: 'var(--text2)', lineHeight: 1.7, marginBottom: 16, marginLeft: 28 }}>{finding.description}</div>

              {/* What to do - recommendation */}
              {finding.recommendation && (
                <div style={{ margin: '0 0 16px', padding: '16px 18px', background: 'rgba(34,197,94,0.06)', borderRadius: 10, border: '1px solid rgba(34,197,94,0.15)', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                  <i className="fas fa-arrow-right" style={{ color: '#22c55e', fontSize: 16, marginTop: 2, flexShrink: 0 }} />
                  <div style={{ fontSize: 15, color: 'var(--text1)', lineHeight: 1.6, fontWeight: 500 }}>{finding.recommendation}</div>
                </div>
              )}

              {/* Current vs Target */}
              {currentVal && recommendedVal && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
                  <div style={{ padding: '14px 16px', background: 'rgba(239,68,68,0.06)', borderRadius: 10, border: '1px solid rgba(239,68,68,0.12)' }}>
                    <div style={{ color: 'var(--text3)', fontSize: 12, fontWeight: 600, textTransform: 'uppercase', marginBottom: 6 }}>Now</div>
                    <div style={{ color: '#ef4444', fontSize: 15, fontWeight: 600 }}>{currentVal}</div>
                  </div>
                  <div style={{ padding: '14px 16px', background: 'rgba(34,197,94,0.06)', borderRadius: 10, border: '1px solid rgba(34,197,94,0.12)' }}>
                    <div style={{ color: 'var(--text3)', fontSize: 12, fontWeight: 600, textTransform: 'uppercase', marginBottom: 6 }}>Goal</div>
                    <div style={{ color: '#22c55e', fontSize: 15, fontWeight: 600 }}>{recommendedVal}</div>
                  </div>
                </div>
              )}

              {/* Action buttons */}
              <div style={{ display: 'flex', gap: 12, marginTop: 4 }}>
                {!isApproved && finding.status !== 'approved' ? (
                  <>
                    <button className="btn btn-success" onClick={(e) => { e.stopPropagation(); onApprove(finding); }} style={{ fontSize: 14, padding: '10px 20px', fontWeight: 600 }}>
                      <i className="fas fa-check" style={{ marginRight: 8 }}></i> Approve
                    </button>
                    <button className="btn btn-danger" onClick={(e) => { e.stopPropagation(); onReject(finding); }} style={{ fontSize: 14, padding: '10px 20px', fontWeight: 600 }}>
                      <i className="fas fa-times" style={{ marginRight: 8 }}></i> Dismiss
                    </button>
                  </>
                ) : (
                  <span style={{ padding: '10px 20px', borderRadius: 8, background: 'rgba(34,197,94,0.1)', color: '#22c55e', fontWeight: 600, fontSize: 14 }}>
                    <i className="fas fa-check-circle" style={{ marginRight: 8 }} /> Added to Action Plan
                  </span>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============ SHARED AGENT AUDIT HELPERS ============
    // Shared skip patterns for agent audit pages — filters junk sections from agent output
    const AGENT_SKIP_PATTERNS = [/^summary$/i, /^audit conclusion$/i, /^overview$/i, /^deliverables$/i, /^next steps$/i, /^files included$/i, /^Q:/i, /^today/i, /^this week/i, /^next \d/i, /GSC_Audit/i, /EXECUTIVE_SUMMARY/i, /TACTICAL_PLAYBOOK/i, /Quick_Reference/i, /\.md$/i, /report package/i, /^assumptions/i, /^data quality/i, /^methodology/i, /^appendix/i, /^notes$/i, /^conclusion$/i, /^introduction$/i, /^executive/i, /^recommendations$/i];

    // Allowed sections per audit type (whitelist)
    const GSC_ALLOWED_SECTIONS = ['Quick Wins', 'Low CTR Pages', 'Cannibalization', 'Zero-Click Pages', 'Underperforming Pages', 'Summary'];
    const WEBSITE_ALLOWED_SECTIONS = ['Site Health', 'Crawlability', 'On-Page Issues', 'Content Quality', 'Core Web Vitals', 'Schema & Data', 'Summary'];
    const GBP_ALLOWED_SECTIONS = ['Profile Completeness', 'NAP Consistency', 'Reviews & Reputation', 'Competitor Analysis', 'Directory & Citations', 'Photos & Media', 'Suburb Coverage', 'Summary'];

    // Detect execution type / assignee from action text + pillar context
    const detectExecType = (text, pillar) => {
      const t = (text || '').toLowerCase();
      const MANUAL = { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280' };
      const SEO_SPECIALIST = { type: 'manual', label: 'SEO Specialist', icon: 'fas fa-user-tie', color: '#10b981' };
      const AUTOMATED = { type: 'api', label: 'Automated', icon: 'fas fa-robot', color: '#3b82f6' };
      const WP_PLUGIN = { type: 'plugin', label: 'WP Plugin', icon: 'fas fa-wrench', color: '#f59e0b' };

      if (pillar === 'gbp_external' || pillar === 'gbp') {
        // 1. WP Plugin — check first so "create landing page" wins over incidental "review" mentions
        if (/\b(landing.?page|suburb.?page|service.?page|create.*page|develop.*page|build.*page|wordpress|wp|meta.?title|meta.?desc|schema|web.?page|website.?content|blog.?post|web.?content|about.?us.?page)\b/.test(t)) return WP_PLUGIN;
        // 2. Photos — physical action
        if (/\b(photo|picture|image|shoot|camera)\b/.test(t)) return MANUAL;
        // 3. Social media — SEO Specialist manages
        if (/\b(facebook|instagram|social.?media|linkedin|tiktok|youtube|twitter|x\.com)\b/.test(t)) return SEO_SPECIALIST;
        // 4. Directories — business owner registers/claims
        if (/\b(directory|directories|listing|yelp|yellow.?pages|true.?local|hotfrog|word.?of.?mouth|register|sign.?up|claim)\b/.test(t)) return MANUAL;
        // 5. Review responses — SEO Specialist
        if (/\b(respond.*review|reply.*review|review.*response)\b/.test(t)) return SEO_SPECIALIST;
        // 6. Getting reviews — business owner action (only action-oriented phrases)
        if (/\b(ask.*review|collect.*review|request.*review|share.*review|get.*review|more.*review|review.*campaign|review.*request|ask.*customer|ask.*client)\b/.test(t)) return MANUAL;
        // 7. Everything else in GBP — SEO Specialist
        return SEO_SPECIALIST;
      }
      if (pillar === 'gsc_agent' || pillar === 'gsc') {
        if (/\b(submit.*url|request.*index|fetch.*render|sitemap)\b/.test(t)) return AUTOMATED;
        if (/\b(cannibal|consolidat|merge.*page|redirect.*competing|duplicate.*target)\b/.test(t)) return SEO_SPECIALIST;
        if (/\b(backlink|link.?build|off.?page|directory.?link|guest.?post|outreach)\b/.test(t) && !/\b(title|meta|h1|heading|rewrite|content)\b/.test(t)) return SEO_SPECIALIST;
        if (/\b(page.?speed|speed|server|hosting|cache|minif|render.?block)\b/.test(t) && !/\b(title|meta|h1|heading|rewrite|content)\b/.test(t)) return SEO_SPECIALIST;
        if (/\b(title|meta|rewrite|heading|h1|h2|schema|content|landing.?page|web.?page|wordpress|yoast|quick.?win|ctr|click.?through|underperform|zero.?click|internal.?link|add.*link|intro|snippet|description|keyword|cta|call.?to.?action|above.?fold)\b/.test(t)) return WP_PLUGIN;
        return SEO_SPECIALIST;
      }
      if (pillar === 'website' || pillar === 'technical') {
        if (/\b(photo|picture|image|shoot|camera)\b/.test(t)) return MANUAL;
        if (/\b(core.?web.?vitals|cwv|lcp|cls|tbt|fid|inp|page.?speed|minif|cache|lazy.?load|render.?block|server|hosting|cdn|gzip|compress(?!.*image)|brotli)\b/.test(t)) return SEO_SPECIALIST;
        if (/\b(crawl.?error|crawl.?budget|robots\.txt|ssl.?cert|ssl.?issue|mixed.?content|security.?header|certificate|redirect.?chain|mobile.?usab|responsive|viewport)\b/.test(t)) return SEO_SPECIALIST;
        if (/\b(canonical|meta.?title|meta.?desc|title.?tag|title|meta|description.?tag|heading|h1|h2|schema|structured.?data|alt.?text|image.?alt|broken.?link|internal.?link|link|href|anchor|content|thin.?content|word.?count|duplicate|redirect|301|302|rewrite|cta|intro|snippet)\b/.test(t)) return WP_PLUGIN;
        return WP_PLUGIN;
      }

      // No pillar context — fall back to text-based detection
      if (/\b(photo|picture|image|shoot|camera|testimonial|in.?person|physically|visit|call |phone call|handshake|print|brochure|flyer|sign\.?up|create.*account|register on|claim.*listing)\b/.test(t)) return MANUAL;
      if (/\b(gbp|google business|business description|business name|categor|service area|hours|opening|google posts?|review.*respon|respond.*review|nap|name.?address|consistency|maintain)\b/.test(t)) return SEO_SPECIALIST;
      if (/\b(search console|gsc|indexing|submit.*url|pagespeed|sitemap|robots\.txt|crawl|api|fetch.*render)\b/.test(t)) return AUTOMATED;
      if (/\b(schema|structured data|website|landing page|web.?page|code|html|css|wordpress|elementor|yoast|meta.?title|meta.?desc|heading|h1|alt.?text|content|faq.*section|internal.?link|page.*speed|lazy.?load|minif|compress|mobile.?responsive)\b/.test(t)) return WP_PLUGIN;
      if (/\b(directory|directories|listing|yelp|yellow.?pages|true.?local|hotfrog|word.?of.?mouth)\b/.test(t)) return MANUAL;
      return SEO_SPECIALIST;
    };

    // Normalize messy agent section names into clean sidebar labels
    // Uses exact map first, then fuzzy keyword matching as fallback
    function normalizeAgentSection(name) {
      const n = name.replace(/\s*\(.*?\)\s*/g, '').trim();
      const lower = n.toLowerCase();
      // Exact matches first
      const exactMap = {
        'quick wins': 'Quick Wins',
        'quick win': 'Quick Wins',
        'quick-win opportunities': 'Quick Wins',
        'low ctr pages': 'Low CTR Pages',
        'low ctr': 'Low CTR Pages',
        'cannibalization': 'Cannibalization',
        'keyword cannibalization': 'Cannibalization',
        'zero-click pages': 'Zero-Click Pages',
        'zero click pages': 'Zero-Click Pages',
        'zero clicks': 'Zero-Click Pages',
        'underperforming pages': 'Underperforming Pages',
        'underperforming': 'Underperforming Pages',
        'action plan': 'Summary',
        'priority action plan': 'Summary',
        'summary': 'Summary',
        'site health': 'Site Health',
        'site health overview': 'Site Health',
        'crawlability': 'Crawlability',
        'crawlability & indexing': 'Crawlability',
        'crawlability and indexing': 'Crawlability',
        'on-page issues': 'On-Page Issues',
        'on-page seo issues': 'On-Page Issues',
        'on page issues': 'On-Page Issues',
        'content quality': 'Content Quality',
        'core web vitals': 'Core Web Vitals',
        'cwv': 'Core Web Vitals',
        'schema & structured data': 'Schema & Data',
        'schema and structured data': 'Schema & Data',
        'structured data': 'Schema & Data',
        'schema': 'Schema & Data',
        // GBP sections
        'profile completeness': 'Profile Completeness',
        'gbp profile completeness': 'Profile Completeness',
        'profile optimization': 'Profile Completeness',
        'nap consistency': 'NAP Consistency',
        'nap': 'NAP Consistency',
        'name address phone': 'NAP Consistency',
        'reviews & reputation': 'Reviews & Reputation',
        'reviews and reputation': 'Reviews & Reputation',
        'reviews': 'Reviews & Reputation',
        'review analysis': 'Reviews & Reputation',
        'competitor analysis': 'Competitor Analysis',
        'competitors': 'Competitor Analysis',
        'competitive analysis': 'Competitor Analysis',
        'directory & citations': 'Directory & Citations',
        'directory and citations': 'Directory & Citations',
        'directories & citations': 'Directory & Citations',
        'citations': 'Directory & Citations',
        'directories': 'Directory & Citations',
        'photos & media': 'Photos & Media',
        'photos and media': 'Photos & Media',
        'photos': 'Photos & Media',
        'photo analysis': 'Photos & Media',
        'suburb coverage': 'Suburb Coverage',
        'service area coverage': 'Suburb Coverage',
        'suburb targeting': 'Suburb Coverage',
      };
      if (exactMap[lower]) return exactMap[lower];
      // Fuzzy keyword matching for creative renames
      if (/quick.?win|striking.?distance|page.?2|position.?[4-9]|position.?1[0-9]|position.?20|keyword.?opportunit/i.test(n)) return 'Quick Wins';
      if (/low.?ctr|poor.?ctr|ctr.?below|click.?through.?rate/i.test(n)) return 'Low CTR Pages';
      if (/cannibal|competing.?pages|duplicate.?rank/i.test(n)) return 'Cannibalization';
      if (/zero.?click|no.?click|0.?click/i.test(n)) return 'Zero-Click Pages';
      if (/underperform|stuck|should.?rank|declining/i.test(n)) return 'Underperforming Pages';
      if (/action.?plan|priority.?action|next.?action|implementation|summary/i.test(n)) return 'Summary';
      if (/site.?health|overall.?health|site.?overview/i.test(n)) return 'Site Health';
      if (/crawl|index|robot|sitemap/i.test(n)) return 'Crawlability';
      if (/on.?page|title|meta|h1|heading/i.test(n)) return 'On-Page Issues';
      if (/content.?quality|thin.?content|e-?e-?a-?t|word.?count/i.test(n)) return 'Content Quality';
      if (/core.?web|vital|cwv|speed|lcp|cls|inp|fcp/i.test(n)) return 'Core Web Vitals';
      if (/schema|structured.?data|rich.?result|json.?ld/i.test(n)) return 'Schema & Data';
      // GBP fuzzy
      if (/profile.?complete|gbp.?profile|listing.?complete/i.test(n)) return 'Profile Completeness';
      if (/nap|name.?address.?phone/i.test(n)) return 'NAP Consistency';
      if (/review|reputation|rating/i.test(n)) return 'Reviews & Reputation';
      if (/competitor|competitive|competing/i.test(n)) return 'Competitor Analysis';
      if (/director|citation|local.?listing/i.test(n)) return 'Directory & Citations';
      if (/photo|media|image.?quality/i.test(n)) return 'Photos & Media';
      if (/suburb|service.?area|coverage|geo/i.test(n)) return 'Suburb Coverage';
      return name;
    }

    // ============ SORTABLE TABLE FOR AGENT AUDITS ============
    function AgentSortableTable({ headers, rows, tblIdx, actionColIdx, sevColIdx, notesColIdx, listedColIdx, hasActions, actionMode, getActionBrief, rowNeedsAction }) {
      const [sortCol, setSortCol] = useState(null);
      const [sortDir, setSortDir] = useState('asc');

      const toggleSort = (colIdx) => {
        if (sortCol === colIdx) {
          setSortDir(prev => prev === 'asc' ? 'desc' : 'asc');
        } else {
          setSortCol(colIdx);
          setSortDir('asc');
        }
      };

      const sortedRows = React.useMemo(() => {
        if (sortCol === null) return rows;
        return [...rows].sort((a, b) => {
          const av = (a[sortCol] || '').replace(/\*\*/g, '').trim();
          const bv = (b[sortCol] || '').replace(/\*\*/g, '').trim();
          // Try numeric sort first
          const an = parseFloat(av.replace(/[^0-9.-]/g, ''));
          const bn = parseFloat(bv.replace(/[^0-9.-]/g, ''));
          if (!isNaN(an) && !isNaN(bn)) return sortDir === 'asc' ? an - bn : bn - an;
          // Severity sort
          const sevOrder = { critical: 0, high: 1, significant: 1, medium: 2, moderate: 2, low: 3, minimal: 3 };
          const sa = sevOrder[av.toLowerCase()];
          const sb = sevOrder[bv.toLowerCase()];
          if (sa !== undefined && sb !== undefined) return sortDir === 'asc' ? sa - sb : sb - sa;
          // String sort
          const cmp = av.localeCompare(bv, undefined, { numeric: true, sensitivity: 'base' });
          return sortDir === 'asc' ? cmp : -cmp;
        });
      }, [rows, sortCol, sortDir]);

      const SortIcon = ({ col }) => {
        if (sortCol !== col) return <i className="fas fa-sort" style={{ marginLeft: 5, fontSize: 10, opacity: 0.3 }} />;
        return <i className={`fas fa-sort-${sortDir === 'asc' ? 'up' : 'down'}`} style={{ marginLeft: 5, fontSize: 10, color: 'var(--accent)' }} />;
      };

      const renderCell = (cell, ci, row) => {
        let cellStyle = { padding: '12px 16px', fontSize: 14, color: 'var(--text2)', lineHeight: 1.6 };
        const lower = cell.toLowerCase();
        const cleanCell = cell.replace(/\*\*/g, '');
        if (/high|critical|significant/.test(lower)) cellStyle.color = '#ef4444';
        else if (/medium|moderate/.test(lower)) cellStyle.color = '#f59e0b';
        else if (/\blow\b|minimal/.test(lower)) cellStyle.color = '#3b82f6';
        if (/^yes$/i.test(lower) || /\bstrong\b/i.test(lower) || /\bmatch\b/i.test(lower)) cellStyle.color = '#22c55e';
        if (/^no$/i.test(lower) || /not listed|not found|missing/i.test(lower)) cellStyle.color = '#ef4444';
        if (/\bpartial\b/i.test(lower) || /unverif/i.test(lower)) cellStyle.color = '#f59e0b';
        if (/\bpartial\b/i.test(lower)) {
          const explanation = notesColIdx !== -1 && notesColIdx !== ci && row[notesColIdx]
            ? row[notesColIdx].replace(/\*\*/g, '') : '';
          return <td key={ci} style={cellStyle}>
            <span>{cleanCell}</span>
            {explanation && <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2, fontStyle: 'italic' }}>{explanation}</div>}
          </td>;
        }
        return <td key={ci} style={cellStyle}>{cleanCell}</td>;
      };

      // Assignee auto-mapping from exec type
      const execAssignee = { extension: 'Chrome Extension', api: 'SEO Room (Auto)', plugin: 'WordPress Plugin', manual: 'SEO Specialist' };
      const execAssigneeIcon = { extension: 'fas fa-puzzle-piece', api: 'fas fa-robot', plugin: 'fas fa-wrench', manual: 'fas fa-user' };

      const renderActionCells = (row, ri) => {
        if (!hasActions) return null;
        const actionKey = `t${tblIdx}_r${ri}`;
        const itemName = (row[0] || '').replace(/\*\*/g, '');
        const addedItem = actionMode && actionMode.addedKeys[actionKey];
        const isAdded = addedItem && typeof addedItem === 'object';
        const isAdding = actionMode && actionMode.addingKey === actionKey;
        let severity = 'medium';
        if (sevColIdx !== -1) {
          const sv = (row[sevColIdx] || '').toLowerCase();
          if (/high|critical|significant/.test(sv)) severity = 'critical';
          else if (/medium|moderate/.test(sv)) severity = 'high';
          else if (/low|minimal/.test(sv)) severity = 'medium';
        }
        const brief = getActionBrief(row);
        const needsAction = rowNeedsAction(row);
        const isIgnored = actionMode.ignoredKeys && actionMode.ignoredKeys[actionKey];

        if (!needsAction) return <React.Fragment><td></td><td></td><td style={{ padding: '8px 10px', textAlign: 'center' }}><span style={{ color: '#22c55e', fontSize: 11 }}><i className="fas fa-check" /></span></td><td></td></React.Fragment>;
        if (isIgnored) return <React.Fragment><td></td><td></td><td style={{ padding: '8px 10px', textAlign: 'center' }}><span style={{ color: 'var(--text3)', fontSize: 11, cursor: 'pointer' }} onClick={() => actionMode.onUndo && actionMode.onUndo(actionKey)} title="Click to undo">Ignored</span></td><td><button onClick={() => actionMode.onUndo && actionMode.onUndo(actionKey)} style={{ fontSize: 10, padding: '3px 7px', background: 'transparent', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text3)', cursor: 'pointer' }} title="Reset"><i className="fas fa-undo" /></button></td></React.Fragment>;

        // After adding — show Assignee + Status dropdown + Reset
        if (isAdded) {
          const item = addedItem;
          const st = item.status || 'pending';
          const statusOptions = item.execType === 'manual'
            ? [{ value: 'pending', label: 'Not Started' }, { value: 'in_progress', label: 'In Progress' }, { value: 'done', label: 'Done' }]
            : [{ value: 'pending', label: 'Ready' }, { value: 'in_progress', label: 'Running' }, { value: 'done', label: 'Done' }];
          const statusColors = { pending: '#6b7280', in_progress: '#f59e0b', done: '#22c55e' };

          return (
            <React.Fragment>
              <td style={{ padding: '8px 12px', fontSize: 12, color: item.execColor || '#6b7280', whiteSpace: 'nowrap' }}>
                <i className={item.execIcon || 'fas fa-user'} style={{ marginRight: 5, fontSize: 11 }} />{item.execLabel || 'SEO Specialist'}
              </td>
              <td style={{ padding: '6px 8px', textAlign: 'center' }}>
                <select value={st} onChange={e => actionMode.onStatusChange && actionMode.onStatusChange(actionKey, e.target.value)} style={{
                  fontSize: 11, fontWeight: 600, padding: '4px 8px', borderRadius: 5,
                  border: '1px solid ' + statusColors[st] + '50',
                  background: statusColors[st] + '15', color: statusColors[st],
                  cursor: 'pointer', outline: 'none', appearance: 'auto'
                }}>
                  {statusOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
              </td>
              {(item.execType !== 'manual' && st === 'pending') ? (
                <td style={{ padding: '6px 8px', textAlign: 'center' }}>
                  <button onClick={() => actionMode.onStatusChange && actionMode.onStatusChange(actionKey, 'in_progress')} style={{
                    fontSize: 11, fontWeight: 700, padding: '4px 12px', borderRadius: 5, border: 'none',
                    background: item.execColor || '#8b5cf6', color: '#fff', cursor: 'pointer'
                  }}>
                    <i className="fas fa-play" style={{ marginRight: 4, fontSize: 9 }} />Start
                  </button>
                </td>
              ) : <td></td>}
              <td style={{ padding: '6px 4px', textAlign: 'center' }}>
                <button onClick={() => actionMode.onUndo && actionMode.onUndo(actionKey)} style={{
                  fontSize: 10, padding: '3px 7px', background: 'transparent', border: '1px solid var(--border)',
                  borderRadius: 4, color: 'var(--text3)', cursor: 'pointer', opacity: 0.6
                }} title="Reset">
                  <i className="fas fa-undo" />
                </button>
              </td>
            </React.Fragment>
          );
        }

        const actionBrief = brief || ('Review and fix: ' + itemName);
        return (
          <React.Fragment>
            <td></td>
            <td colSpan="2" style={{ padding: '6px 8px', textAlign: 'center', whiteSpace: 'nowrap' }}>
              <div style={{ display: 'flex', gap: 4, justifyContent: 'center' }}>
                <button className="btn btn-primary" onClick={() => actionMode.onAdd(actionKey, { title: itemName, description: actionBrief, severity })} disabled={isAdding} style={{ fontSize: 10, padding: '3px 7px' }}>
                  {isAdding ? <i className="fas fa-spinner fa-spin" /> : <><i className="fas fa-plus" style={{ marginRight: 2 }} />Add</>}
                </button>
                <button className="btn btn-secondary" onClick={() => actionMode.onIgnore && actionMode.onIgnore(actionKey)} style={{ fontSize: 10, padding: '3px 7px', opacity: 0.7 }}>
                  <i className="fas fa-times" />
                </button>
              </div>
            </td>
            <td></td>
          </React.Fragment>
        );
      };

      return (
        <div style={{ marginBottom: 16, background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
          <div style={{ maxHeight: 600, overflowY: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--bg)', position: 'sticky', top: 0, zIndex: 2 }}>
                  {headers.map((h, i) => (
                    <th key={i} onClick={() => toggleSort(i)} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 13, fontWeight: 700, color: sortCol === i ? 'var(--accent)' : 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '2px solid var(--border)', cursor: 'pointer', userSelect: 'none', background: 'var(--bg)' }}>
                      {h}<SortIcon col={i} />
                    </th>
                  ))}
                  {hasActions && (
                    <React.Fragment>
                      <th style={{ padding: '12px 16px', textAlign: 'left', fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '2px solid var(--border)', width: 140, background: 'var(--bg)', position: 'sticky', top: 0, zIndex: 2 }}>ASSIGNEE</th>
                      <th style={{ padding: '12px 16px', textAlign: 'center', fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', width: 110, background: 'var(--bg)', position: 'sticky', top: 0, zIndex: 2 }}>STATUS</th>
                      <th style={{ padding: '12px 16px', textAlign: 'center', fontSize: 12, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '2px solid var(--border)', whiteSpace: 'nowrap', width: 70, background: 'var(--bg)', position: 'sticky', top: 0, zIndex: 2 }}></th>
                      <th style={{ padding: '12px 8px', textAlign: 'center', borderBottom: '2px solid var(--border)', width: 40, background: 'var(--bg)', position: 'sticky', top: 0, zIndex: 2 }}></th>
                    </React.Fragment>
                  )}
                </tr>
              </thead>
              <tbody>
                {sortedRows.map((row, ri) => (
                  <tr key={ri} style={{ borderBottom: '1px solid var(--border)' }}>
                    {row.slice(0, headers.length).map((cell, ci) => renderCell(cell, ci, row))}
                    {renderActionCells(row, ri)}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============ GENERIC AGENT AUDIT PAGE ============
    function AgentAuditPage({ project, section, setActiveTab, auditKey = 'gbp-external', title = 'External GBP Audit', iconClass = 'fas fa-globe', pillar = 'gbp_external', loadingText = 'Managed agent is researching your business across the web. This takes 2-5 minutes.', skipPatterns = null, mergeDirectories = true, allowedSections = null }) {
      const defaultSkip = [/houseworks/i, /plumbing.*gas/i, /^summary$/i, /^audit conclusion$/i];
      const skip = skipPatterns || defaultSkip;
      const [report, setReport] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [addedActions, setAddedActions] = useState({});
      const [addingAction, setAddingAction] = useState(null);
      const [expandedCats, setExpandedCats] = useState({0: true});
      const [savedActionItems, setSavedActionItems] = useState([]);
      const removedKeysRef = React.useRef(new Set());
      const pollRef = React.useRef(null);

      // Reset addedActions when section changes (different section = different table keys)
      useEffect(() => {
        setAddedActions({});
        removedKeysRef.current.clear();
      }, [section]);

      // Listen for extension task completion messages via dashboard bridge
      useEffect(() => {
        const handler = (event) => {
          if (event.data?.source !== 'seo-room-extension') return;
          // Bridge response format: { source, requestId, response: { success, taskId } }
          const resp = event.data.response || event.data.payload || {};
          const taskId = resp.taskId;
          if (!taskId) return;
          // Find the key for this task ID and update status
          setAddedActions(prev => {
            const next = { ...prev };
            for (const [key, val] of Object.entries(next)) {
              if (val && val.id === taskId) {
                next[key] = { ...val, status: resp.success ? 'done' : 'pending' };
                break;
              }
            }
            return next;
          });
        };
        window.addEventListener('message', handler);
        return () => window.removeEventListener('message', handler);
      }, []);

      // Load existing action items from DB for this pillar
      useEffect(() => {
        if (!project?.id || !pillar) return;
        (async () => {
          try {
            const data = await api(`/projects/${project.id}/action-items?pillar=${encodeURIComponent(pillar)}`);
            setSavedActionItems(data.action_items || []);
          } catch (e) { console.error('Failed to load action items:', e); }
        })();
      }, [project?.id, pillar]);

      // When report + savedActionItems are both ready, map saved items to table row keys
      useEffect(() => {
        if (!report || savedActionItems.length === 0 || !section || section === 'full') return;
        const sections = parseReportSections(report);
        const sec = sections.find(s => s.title.toLowerCase().replace(/[^a-z0-9]/g, '') === section.toLowerCase().replace(/[^a-z0-9]/g, ''));
        if (!sec) return;

        // Build a title→action_item map from saved items
        const titleMap = {};
        savedActionItems.forEach(ai => {
          if (ai.title) titleMap[ai.title.toLowerCase().trim()] = ai;
        });

        // Parse the section's tables to find matching rows
        const restored = {};
        const lines = sec.content;
        let tableRows = [];
        let inTable = false;
        let tableCounter = 0;

        const flushRestore = () => {
          if (tableRows.length >= 2) {
            const rows = tableRows.slice(1); // skip header
            rows.forEach((row, ri) => {
              const itemName = (row[0] || '').replace(/\*\*/g, '').trim();
              const match = titleMap[itemName.toLowerCase()];
              if (match) {
                const execInfo = detectExecType(match.description || match.title, match.pillar || pillar);
                const key = `t${tableCounter}_r${ri}`;
                restored[key] = {
                  id: match.id,
                  execType: execInfo.type,
                  execLabel: execInfo.label,
                  execIcon: execInfo.icon,
                  execColor: execInfo.color,
                  status: match.status || 'pending',
                  actionTitle: match.title,
                  actionDesc: match.description
                };
              }
            });
            tableCounter++;
          }
          tableRows = [];
        };

        for (const line of lines) {
          const trimmed = line.trim();
          if (trimmed.startsWith('|') && !trimmed.startsWith('|--') && !trimmed.startsWith('| --')) {
            const cells = trimmed.split('|').slice(1, -1).map(c => c.trim());
            if (cells.length > 0) {
              if (!inTable) inTable = true;
              // Skip separator rows
              if (!cells.every(c => /^[\s:-]+$/.test(c))) {
                tableRows.push(cells);
              }
            }
          } else {
            if (inTable) { flushRestore(); inTable = false; }
          }
        }
        if (inTable) flushRestore();

        // Filter out keys the user has manually removed this session
        const removedSet = removedKeysRef.current;
        Object.keys(restored).forEach(k => { if (removedSet.has(k)) delete restored[k]; });
        if (Object.keys(restored).length > 0) {
          setAddedActions(prev => ({ ...restored, ...prev }));
        }
      }, [report, savedActionItems, section]);

      useEffect(() => {
        if (project) checkStatus();
        return () => { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } };
      }, [project?.id, auditKey]);

      const startPolling = (pid, ak) => {
        if (pollRef.current) clearInterval(pollRef.current);
        pollRef.current = setInterval(async () => {
          try {
            const data = await api(`/projects/${pid}/audits/${ak}/status`);
            if (data.status === 'completed') {
              clearInterval(pollRef.current); pollRef.current = null;
              if (data.report) setReport(data.report);
              setLoading(false);
            } else if (data.status === 'failed') {
              clearInterval(pollRef.current); pollRef.current = null;
              setError(data.error || 'Audit failed');
              setLoading(false);
            }
          } catch (e) { clearInterval(pollRef.current); pollRef.current = null; setLoading(false); }
        }, 5000);
      };

      const checkStatus = async () => {
        try {
          const data = await api(`/projects/${project.id}/audits/${auditKey}/status`);
          if (data.status === 'running') {
            setLoading(true);
            startPolling(project.id, auditKey);
          } else if (data.status === 'completed' && data.report) {
            setReport(data.report);
          } else if (data.status === 'failed' && data.error) {
            setError(data.error);
          }
        } catch (e) {}
      };

      const runAudit = async () => {
        setLoading(true); setError(''); setReport('');
        try {
          await api(`/projects/${project.id}/audits/${auditKey}/run`, { method: 'POST' });
          startPolling(project.id, auditKey);
        } catch (err) { setError(err.message); setLoading(false); }
      };

      // Parse report into sections — only split on numbered headers
      const parseReportSections = (text) => {
        if (!text) return [];
        const lines = text.split('\n');
        const rawSections = [];
        let current = null;

        // Filter out agent chatter, tracebacks, and processing noise
        const isNoiseLine = (line) => {
          const t = line.trim();
          if (!t) return false;
          if (/^(Traceback|File "|>>>|\.\.\.|\^{5,}|FileNotFoundError|ModuleNotFoundError|ImportError|SyntaxError|NameError|TypeError|ValueError|KeyError|IndexError|AttributeError)/i.test(t)) return true;
          if (/^(I'll |Let me |Now let me |Perfect[\.\!]|Great[\.\!]|OK,|Alright|Here's what|I need to|First,|Next,|I can see|I found|I notice|Looking at|Let's |I've |I will |Now I|File created|Here are|I would|Based on|This (is|was)|For:|Contents:|Length:|# Houseworks|Houseworks Plumbing & Gas|> Assumptions:|> Data quality|> Note:|Assumptions:)/i.test(t)) return true;
          if (/^(data = |import |from |print\(|with open|json\.|os\.|sys\.|result|output|```)/i.test(t)) return true;
          if (/^>\s*(Assumptions|Data quality|Note:|Data cap|CTR benchmark|Local plumbing|Brand|Strong brand)/i.test(t)) return true;
          if (/^\s*(def |class |if |for |while |try:|except|finally)/.test(t)) return true;
          return false;
        };

        for (let i = 0; i < lines.length; i++) {
          const trimmed = lines[i].trim();
          if (isNoiseLine(trimmed)) continue;

          // Match ## or ### headers
          const mdMatch = trimmed.match(/^#{2,3}\s+(?:\d+\.\s+)?(.+)/);
          // Match === TITLE === headers
          const eqMatch = trimmed.match(/^={2,}\s*(.+?)\s*={2,}$/);
          const headerMatch = mdMatch || eqMatch;

          if (headerMatch) {
            const title = headerMatch[1].replace(/\*\*/g, '').trim();
            if (title.length > 3) {
              if (current) rawSections.push(current);
              current = { title, content: [] };
              continue;
            }
          }
          if (current) {
            current.content.push(lines[i]);
          } else {
            current = { title: 'Overview', content: [lines[i]] };
          }
        }
        if (current) rawSections.push(current);

        // Filter out unwanted sections
        const filtered = rawSections.filter(s => !skip.some(p => p.test(s.title)));

        // Normalize section titles for clean display
        filtered.forEach(s => {
          if (typeof normalizeAgentSection === 'function') {
            s.title = normalizeAgentSection(s.title);
          }
        });

        // Deduplicate: if multiple sections normalize to same title, merge their content
        const seenTitles = {};
        const deduped = [];
        for (const s of filtered) {
          if (seenTitles[s.title]) {
            seenTitles[s.title].content.push('', ...s.content);
          } else {
            seenTitles[s.title] = s;
            deduped.push(s);
          }
        }

        // Whitelist filter: only keep allowed sections, in allowed order
        if (allowedSections && allowedSections.length > 0) {
          const allowed = [];
          for (const name of allowedSections) {
            const found = deduped.find(s => s.title === name);
            if (found) allowed.push(found);
          }
          return allowed;
        }

        // Merge directory sections (GBP only)
        if (mergeDirectories) {
          const presenceIdx = filtered.findIndex(s => /directory presence/i.test(s.title));
          const registrationIdx = filtered.findIndex(s => /directory registration/i.test(s.title));
          if (presenceIdx !== -1 && registrationIdx !== -1) {
            filtered[presenceIdx].title = 'DIRECTORY AUDIT & ACTIONS';
            filtered[presenceIdx].content = [
              ...filtered[presenceIdx].content,
              '',
              '---',
              '',
              '#### Registration Recommendations',
              '',
              ...filtered[registrationIdx].content
            ];
            filtered.splice(registrationIdx, 1);
          }
        }

        return filtered;
      };


      // Render a section's content — tables with optional inline action buttons
      // actionMode: { onAdd, addedKeys, addingKey } — adds inline action buttons to table rows
      const renderSectionContent = (lines, actionMode) => {
        const elements = [];
        let tableRows = [];
        let inTable = false;
        let tableCounter = 0;

        const flushTable = () => {
          if (tableRows.length < 2) {
            tableRows.forEach((row, i) => elements.push(
              <div key={`t${elements.length}_${i}`} style={{ fontSize: 14, color: 'var(--text2)', lineHeight: 1.7 }}>{row.join(' | ')}</div>
            ));
          } else {
            const headers = tableRows[0];
            const rows = tableRows.slice(1);
            const tblIdx = tableCounter++;

            // Detect columns
            const actionColIdx = headers.findIndex(h => /fix|action|recommend|resolution|what.?to.?do|implementation/i.test(h));
            const sevColIdx = headers.findIndex(h => /priority|severity|gap|coverage/i.test(h));
            const notesColIdx = headers.findIndex(h => /notes|explanation|details|status/i.test(h));
            const listedColIdx = headers.findIndex(h => /listed|present|status/i.test(h));
            const hasActions = !!actionMode;

            // Auto-generate action brief from row data when no explicit action column
            const getActionBrief = (row) => {
              // If there's an explicit action/fix column, use it
              if (actionColIdx !== -1 && row[actionColIdx] && row[actionColIdx].replace(/\*\*/g, '').length > 3) {
                return row[actionColIdx].replace(/\*\*/g, '');
              }
              const itemName = (row[0] || '').replace(/\*\*/g, '');
              const allText = row.join(' ').toLowerCase();
              const clean = (s) => (s || '').replace(/\*\*/g, '').trim();
              const notes = notesColIdx !== -1 ? clean(row[notesColIdx]) : '';
              // Find your value column (usually col 1) and competitor columns
              const yourCol = headers.findIndex(h => /houseworks|your|business|gbp value/i.test(h));
              const yourVal = yourCol !== -1 ? clean(row[yourCol]) : clean(row[1] || '');

              // NAP/Alignment tables — partial/mismatch: use notes for specifics
              const matchCol = headers.findIndex(h => /match|status|alignment/i.test(h));
              if (matchCol !== -1 && /partial|mismatch/i.test(clean(row[matchCol]))) {
                if (notes) return 'Fix: ' + notes;
                const gbpVal = clean(row[1] || '');
                const webVal = clean(row[2] || '');
                if (gbpVal && webVal) return 'Standardize ' + itemName + ': GBP says "' + gbpVal.substring(0, 40) + '" vs website "' + webVal.substring(0, 40) + '"';
                return 'Fix ' + itemName + ' inconsistency';
              }

              // Directory table — not listed = register with specific context
              if (/not listed|not found/i.test(allText)) {
                return 'Register on ' + itemName + (notes ? ': ' + notes.substring(0, 80) : ' — create business profile with correct NAP');
              }
              if (/no.*profile|no.*listing|missing/i.test(allText)) return 'Create listing on ' + itemName + (notes ? ': ' + notes.substring(0, 80) : '');
              if (/partial/i.test(allText) && /directory|listed/i.test(headers.join(' '))) {
                return 'Update ' + itemName + ' listing — ' + (notes || 'verify NAP accuracy and add missing info');
              }
              if (/unverif/i.test(allText) && /directory|listed|present/i.test(headers.join(' '))) return 'Verify ' + itemName + ' listing — claim and confirm business details';

              // Competitor gap — use YOUR value vs competitors to explain what to do
              if (sevColIdx !== -1) {
                const gap = clean(row[sevColIdx]).toLowerCase();
                if (/minimal/i.test(gap)) return ''; // no action needed
                if (/significant|moderate/i.test(gap)) {
                  if (yourVal) return itemName + ': currently "' + yourVal.substring(0, 50) + '" — match competitors to close ' + gap + ' gap';
                  return 'Close ' + gap + ' gap in ' + itemName;
                }
              }

              // Suburb coverage — explain what "Partial" means using SOURCE column
              const sourceCol = headers.findIndex(h => /source/i.test(h));
              const coverageCol = headers.findIndex(h => /coverage|strength/i.test(h));
              if (coverageCol !== -1 && /partial/i.test(clean(row[coverageCol]))) {
                const source = sourceCol !== -1 ? clean(row[sourceCol]) : '';
                if (/website/i.test(source) && !/review|gbp/i.test(source)) return 'Add ' + itemName + ' to GBP service areas — currently only on website';
                if (/review/i.test(source) && !/website/i.test(source)) return 'Create landing page for ' + itemName + ' — only mentioned in reviews';
                return 'Strengthen ' + itemName + ' coverage — add to both GBP service areas and website';
              }

              // Score table — use actual score vs max
              const scoreCol = headers.findIndex(h => /^score$/i.test(h));
              const maxCol = headers.findIndex(h => /max/i.test(h));
              if (scoreCol !== -1 && maxCol !== -1) {
                const score = parseInt(row[scoreCol]);
                const max = parseInt(row[maxCol]);
                if (!isNaN(score) && !isNaN(max) && score < max * 0.7) {
                  return itemName + ' (' + score + '/' + max + '): ' + (notes || 'needs improvement');
                }
              }

              // Website audit — fail/needs improvement with notes
              if (/fail/i.test(allText)) return 'Fix ' + itemName + (notes ? ': ' + notes.substring(0, 100) : '');
              if (/needs improvement/i.test(allText)) return 'Improve ' + itemName + (notes ? ': ' + notes.substring(0, 100) : '');

              // Services alignment — website only / gbp only
              if (/website only/i.test(allText)) return 'Add "' + itemName + '" to GBP service menu — already on website but missing from GBP';
              if (/gbp only/i.test(allText)) return 'Create ' + itemName + ' page on website — listed on GBP but no dedicated page';
              if (/unclear/i.test(allText)) return 'Clarify ' + itemName + ' — verify service is listed on both GBP and website consistently';

              // Fallback — use notes or row data
              if (notes && notes.length > 10) return notes.substring(0, 120);
              const desc = row.slice(1).map(c => clean(c)).filter(c => c.length > 3).join('; ').substring(0, 120);
              return desc || 'Review: ' + itemName;
            };

            // Check if row needs action (has issues)
            const rowNeedsAction = (row) => {
              const allText = row.join(' ').toLowerCase();
              // If severity/gap column says Minimal — no action needed
              if (sevColIdx !== -1) {
                const sv = (row[sevColIdx] || '').replace(/\*\*/g, '').trim().toLowerCase();
                if (/^.*minimal.*$/.test(sv)) return false;
              }
              // Catch all issue indicators
              if (/not listed|not found|missing|partial|significant|moderate|mismatch|weak|poor|fail|needs improvement|unclear|likely|website only|gbp only|missed|credibility gap|inconsisten|limited|insufficient|outdated|minimal.*post|no evidence|no visible|no clear|not verified|low visibility/i.test(allText)) return true;
              // "unverifiable" only matters in directory tables
              if (/unverif/i.test(allText) && /directory|listed|present/i.test(headers.join(' '))) return true;
              // Explicit "No" as a cell value (but not inside longer text)
              for (const cell of row) {
                const c = cell.replace(/\*\*/g, '').trim().toLowerCase();
                if (c === 'no' || /^❌/.test(cell.trim())) return true;
              }
              // Score below threshold
              const scoreCol = headers.findIndex(h => /score/i.test(h));
              const maxCol = headers.findIndex(h => /max/i.test(h));
              if (scoreCol !== -1 && maxCol !== -1) {
                const score = parseInt(row[scoreCol]);
                const max = parseInt(row[maxCol]);
                if (!isNaN(score) && !isNaN(max) && score < max * 0.7) return true;
              }
              // Has explicit action column with content
              if (actionColIdx !== -1 && row[actionColIdx] && row[actionColIdx].replace(/\*\*/g, '').length > 3) return true;
              return false;
            };

            const tblKey = `tbl${elements.length}`;
            elements.push(
              <AgentSortableTable key={tblKey} headers={headers} rows={rows} tblIdx={tblIdx}
                actionColIdx={actionColIdx} sevColIdx={sevColIdx} notesColIdx={notesColIdx} listedColIdx={listedColIdx}
                hasActions={hasActions} actionMode={actionMode}
                getActionBrief={getActionBrief} rowNeedsAction={rowNeedsAction} />
            );
          }
          tableRows = [];
        };

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          const trimmed = line.trim();

          if (/^\|[\s-:|]+\|$/.test(trimmed)) continue;

          if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
            // Smart split: rejoin cells split by pipes inside backtick-quoted values
            const rawCells = trimmed.split('|').filter(c => c.trim()).map(c => c.trim());
            const cells = [];
            let pending = null;
            for (const c of rawCells) {
              if (pending !== null) {
                pending += ' | ' + c;
                // Count backticks — if even, the quote is closed
                if ((pending.split('`').length - 1) % 2 === 0) {
                  cells.push(pending);
                  pending = null;
                }
              } else if ((c.split('`').length - 1) % 2 === 1) {
                // Odd number of backticks — unclosed quote, start merging
                pending = c;
              } else {
                cells.push(c);
              }
            }
            if (pending !== null) cells.push(pending);
            if (cells.length >= 2) {
              tableRows.push(cells);
              inTable = true;
              continue;
            }
          }

          if (inTable) { flushTable(); inTable = false; }

          if (trimmed === '---' || trimmed === '***') {
            elements.push(<hr key={`hr${i}`} style={{ border: 'none', borderTop: '1px solid var(--border)', margin: '16px 0' }} />);
            continue;
          }

          if (!trimmed) { elements.push(<div key={`e${i}`} style={{ height: 8 }} />); continue; }

          // Sub-headers (#### lines or === TITLE === lines)
          if (trimmed.startsWith('####')) {
            const subTitle = trimmed.replace(/^#+\s*/, '').replace(/\*\*/g, '');
            elements.push(<div key={`sh${i}`} style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)', marginTop: 20, marginBottom: 10 }}>{subTitle}</div>);
            continue;
          }
          const eqHeader = trimmed.match(/^={2,}\s*(.+?)\s*={2,}$/);
          if (eqHeader) {
            elements.push(<div key={`sh${i}`} style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)', marginTop: 20, marginBottom: 10, paddingBottom: 8, borderBottom: '1px solid var(--border)' }}>{eqHeader[1]}</div>);
            continue;
          }

          // Skip agent chatter/tracebacks/processing noise
          if (/^(Traceback|File "|>>>|\.\.\.|\^{5,}|FileNotFoundError|ModuleNotFoundError|I'll |Let me |Now let me |Perfect[\.\!]|Great[\.\!]|OK,|Alright|I need to|First,|data = |import |print\(|```|File created|Here's |I've |I can see|I found|Looking at|I notice|I will|Now I|result|output =)/i.test(trimmed)) continue;
          // Skip file metadata lines
          if (/^(#{1,3}\s*(Files Included|\d+\.\s*\w+_\w+.*\.md|GSC_Audit|EXECUTIVE_SUMMARY|TACTICAL_PLAYBOOK|Houseworks.*Report Package))/i.test(trimmed)) continue;
          if (/^(For:|Contents:|Length:)/i.test(trimmed)) continue;

          const clean = trimmed.replace(/\*\*/g, '');

          // Highlighted callout lines
          if (/^(Key Takeaway|Score Rationale|Health Score|Strategic Rationale|Recommended Actions|Assessment|Impact|Priority|Critical Issue|Warning|Key Finding|Revenue Opportunity|Estimated Revenue)/i.test(clean)) {
            const isRed = /critical|warning/i.test(clean);
            const isGreen = /revenue|opportunity/i.test(clean);
            const borderColor = isRed ? '#ef4444' : isGreen ? '#22c55e' : '#818cf8';
            const bgColor = isRed ? 'rgba(239,68,68,0.06)' : isGreen ? 'rgba(34,197,94,0.06)' : 'rgba(99,102,241,0.06)';
            elements.push(<div key={i} style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)', lineHeight: 1.7, marginBottom: 10, padding: '12px 16px', background: bgColor, borderLeft: '3px solid ' + borderColor, borderRadius: '0 8px 8px 0' }}>{clean}</div>);
            continue;
          }

          // Key: Value metric lines — collect consecutive ones for grid rendering
          const kvMatch = clean.match(/^([A-Z][A-Za-z\s\-\/&()]+?):\s*(.+)$/);
          if (kvMatch && kvMatch[1].length < 45 && kvMatch[1].length > 2 && !/^(For|Contents|Length|File|Note|Warning|http)/i.test(kvMatch[1])) {
            // Look ahead to collect consecutive KV lines
