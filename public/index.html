            const kvGroup = [{ key: kvMatch[1], value: kvMatch[2], idx: i }];
            let j = i + 1;
            while (j < lines.length) {
              const nextTrimmed = lines[j].trim();
              if (!nextTrimmed) { j++; continue; }
              const nextKv = nextTrimmed.replace(/\*\*/g, '').match(/^([A-Z][A-Za-z\s\-\/&()]+?):\s*(.+)$/);
              if (nextKv && nextKv[1].length < 45 && nextKv[1].length > 2 && !/^(For|Contents|Length|File|Note|Warning|http)/i.test(nextKv[1])) {
                kvGroup.push({ key: nextKv[1], value: nextKv[2], idx: j });
                j++;
              } else break;
            }

            if (kvGroup.length >= 3) {
              // Render as grid cards
              const cols = kvGroup.length <= 3 ? kvGroup.length : kvGroup.length <= 6 ? 3 : 4;
              const getColor = (val) => {
                const v = val.toLowerCase();
                if (/0[.\s]|^0$|^no |^none|^0%/.test(v)) return '#ef4444';
                if (/%/.test(v)) {
                  const pct = parseFloat(v);
                  if (!isNaN(pct)) return pct < 1 ? '#ef4444' : pct < 5 ? '#f59e0b' : '#22c55e';
                }
                return '#818cf8';
              };
              elements.push(
                <div key={`kvg${i}`} style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap: 12, marginBottom: 16 }}>
                  {kvGroup.map((kv, ki) => (
                    <div key={ki} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px 14px', textAlign: 'center' }}>
                      <div style={{ fontSize: 28, fontWeight: 800, color: getColor(kv.value), marginBottom: 4 }}>{kv.value}</div>
                      <div style={{ fontSize: 11, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.8, fontWeight: 600 }}>{kv.key}</div>
                    </div>
                  ))}
                </div>
              );
              i = j - 1; // skip processed lines
              continue;
            } else {
              // Single/pair KV — render as styled row
              elements.push(
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 16px', marginBottom: 6, background: 'rgba(255,255,255,0.03)', borderRadius: 8, border: '1px solid var(--border)' }}>
                  <span style={{ fontSize: 15, color: 'var(--text2)', fontWeight: 500 }}>{kvMatch[1]}</span>
                  <span style={{ fontSize: 17, color: 'var(--text)', fontWeight: 700 }}>{kvMatch[2]}</span>
                </div>
              );
              continue;
            }
          }

          // URL lines — render as styled links
          if (/^https?:\/\//.test(clean)) {
            const urlParts = clean.match(/^(https?:\/\/\S+?)(?::?\s*(.+))?$/);
            if (urlParts) {
              const shortUrl = urlParts[1].replace(/^https?:\/\/[^/]+/, '') || '/';
              elements.push(
                <div key={i} style={{ padding: '8px 14px', marginBottom: 4, background: 'rgba(99,102,241,0.04)', borderRadius: 8, border: '1px solid var(--border)', fontSize: 14 }}>
                  <span style={{ color: '#818cf8', fontFamily: 'monospace', fontSize: 13 }}>{shortUrl}</span>
                  {urlParts[2] && <span style={{ color: 'var(--text2)', marginLeft: 10 }}>{urlParts[2]}</span>}
                </div>
              );
              continue;
            }
          }

          // Bullet points
          if (/^[\-\*•]\s/.test(clean)) {
            elements.push(<div key={i} style={{ fontSize: 14, color: 'var(--text2)', lineHeight: 1.8, marginBottom: 4, paddingLeft: 16 }}>{'• ' + clean.replace(/^[\-\*•]\s*/, '')}</div>);
            continue;
          }

          // Numbered items
          if (/^\d+[\.\)]\s/.test(clean)) {
            elements.push(<div key={i} style={{ fontSize: 14, color: 'var(--text2)', lineHeight: 1.8, marginBottom: 6, paddingLeft: 16 }}>{clean}</div>);
            continue;
          }

          elements.push(<div key={i} style={{ fontSize: 15, color: 'var(--text2)', lineHeight: 1.8, marginBottom: 4 }}>{clean}</div>);
        }
        if (inTable) flushTable();
        return elements;
      };

      if (loading) {
        return (
          <div className="audit-loading-overlay">
            <span className="spinner-large"></span>
            <div className="audit-loading-text">{title}</div>
            <div className="audit-loading-sub">{loadingText}</div>
          </div>
        );
      }

      if (error) {
        return (
          <div>
            <div style={{ padding: 14, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 15, marginBottom: 16 }}>
              <i className="fas fa-exclamation-circle" style={{ marginRight: 8 }} />{error}
            </div>
            <button className="btn btn-primary" onClick={runAudit} style={{ fontSize: 15, padding: '10px 20px' }}>
              <i className="fas fa-robot" style={{ marginRight: 8 }} />Re-run {title}
            </button>
          </div>
        );
      }

      if (!report) {
        return (
          <div style={{ textAlign: 'center', color: 'var(--text3)', padding: 60, fontSize: 16, background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)' }}>
            <i className="fas fa-robot" style={{ fontSize: 40, marginBottom: 16, display: 'block', opacity: 0.3 }} />
            No audit yet.
            <div style={{ marginTop: 16 }}>
              <button className="btn btn-primary" onClick={runAudit} style={{ fontSize: 15, padding: '10px 20px' }}>
                <i className="fas fa-robot" style={{ marginRight: 8 }} />Run {title}
              </button>
            </div>
          </div>
        );
      }

      // If section is specified, show just that section with inline actions
      if (section && section !== 'full') {
        const sections = parseReportSections(report);
        const sec = sections.find(s => s.title.toLowerCase().replace(/[^a-z0-9]/g, '') === section.toLowerCase().replace(/[^a-z0-9]/g, ''));
        if (sec) {
          const handleAddAction = async (key, action) => {
            setAddingAction(key);
            try {
              const execInfo = detectExecType(action.description || action.title, pillar);
              const resp = await api('/projects/' + project.id + '/action-items', {
                method: 'POST',
                body: {
                  pillar: pillar,
                  type: action.execution_type || 'manual',
                  title: action.title,
                  description: action.description,
                  severity: action.severity || 'medium',
                  current_value: action.current_value || null,
                  new_value: action.new_value || null,
                  execution_type: execInfo.type
                }
              });
              const item = resp.action_item || {};
              setAddedActions(prev => ({ ...prev, [key]: { id: item.id, execType: execInfo.type, execLabel: execInfo.label, execIcon: execInfo.icon, execColor: execInfo.color, status: 'pending', actionTitle: action.title, actionDesc: action.description } }));
            } catch (e) {
              console.error('Failed to add action:', e);
            }
            setAddingAction(null);
          };

          const handleStatusChange = async (key, newStatus) => {
            const item = addedActions[key];
            if (!item || !item.id) return;
            try {
              await api('/action-items/' + item.id, { method: 'PUT', body: { status: newStatus, execution_type: item.execType } });
              setAddedActions(prev => ({ ...prev, [key]: { ...prev[key], status: newStatus } }));
              // If starting an extension task, trigger Chrome extension via dashboard bridge
              if (newStatus === 'in_progress' && item.execType === 'extension') {
                window.postMessage({
                  source: 'seo-room-dashboard',
                  type: 'EXECUTE_GBP_TASK',
                  payload: {
                    taskId: item.id,
                    projectId: project?.id,
                    taskData: {
                      id: item.id,
                      title: item.actionTitle || '',
                      description: item.actionDesc || '',
                      business_name: project?.business_name || '',
                      domain: project?.domain || '',
                      gbp_location_id: project?.gbp_location_id || '',
                      gbp_location_name: project?.gbp_location_name || ''
                    }
                  }
                }, '*');
              }
            } catch (e) { console.error('Failed to update status:', e); }
          };

          const handleIgnore = (key) => {
            setAddedActions(prev => ({ ...prev, ['ign_' + key]: true }));
          };

          const handleUndo = (key) => {
            removedKeysRef.current.add(key);
            setAddedActions(prev => {
              const next = { ...prev };
              delete next['ign_' + key];
              delete next[key];
              return next;
            });
          };

          const actionMode = {
            onAdd: handleAddAction,
            addedKeys: addedActions,
            addingKey: addingAction,
            onIgnore: handleIgnore,
            onUndo: handleUndo,
            onStatusChange: handleStatusChange,
            ignoredKeys: Object.fromEntries(Object.entries(addedActions).filter(([k]) => k.startsWith('ign_')).map(([k, v]) => [k.replace('ign_', ''), v]))
          };

          const secMeta = {
            'Quick Wins': { icon: 'fas fa-bolt', color: '#22c55e', desc: 'Pages close to page 1 — easiest ranking gains' },
            'Low CTR Pages': { icon: 'fas fa-mouse-pointer', color: '#f59e0b', desc: 'High impressions but low clicks — fix titles & metas' },
            'Cannibalization': { icon: 'fas fa-clone', color: '#ef4444', desc: 'Multiple pages competing for same query' },
            'Zero-Click Pages': { icon: 'fas fa-eye-slash', color: '#8b5cf6', desc: 'Impressions but zero clicks — fix or deindex' },
            'Underperforming Pages': { icon: 'fas fa-chart-line', color: '#3b82f6', desc: 'Should rank higher but stuck' },
            'Summary': { icon: 'fas fa-clipboard-list', color: '#818cf8', desc: 'Agent summary of key findings and priorities' },
            'Site Health': { icon: 'fas fa-heartbeat', color: '#22c55e', desc: 'Overall site health verdict' },
            'Crawlability': { icon: 'fas fa-spider', color: '#3b82f6', desc: 'What Googlebot can and cannot access' },
            'On-Page Issues': { icon: 'fas fa-file-alt', color: '#f59e0b', desc: 'Page-by-page title, meta, and H1 problems' },
            'Content Quality': { icon: 'fas fa-pen-fancy', color: '#8b5cf6', desc: 'Thin content and E-E-A-T signals' },
            'Core Web Vitals': { icon: 'fas fa-tachometer-alt', color: '#ef4444', desc: 'Speed, layout shift, interactivity' },
            'Schema & Data': { icon: 'fas fa-code', color: '#06b6d4', desc: 'Missing structured data for rich results' },
            // GBP sections
            'Profile Completeness': { icon: 'fas fa-id-card', color: '#22c55e', desc: 'How complete and optimized is the GBP listing' },
            'NAP Consistency': { icon: 'fas fa-map-marker-alt', color: '#ef4444', desc: 'Name, Address, Phone consistency across web' },
            'Reviews & Reputation': { icon: 'fas fa-star', color: '#f59e0b', desc: 'Review quantity, quality, and response rate' },
            'Competitor Analysis': { icon: 'fas fa-users', color: '#8b5cf6', desc: 'Top local competitors and what they do better' },
            'Directory & Citations': { icon: 'fas fa-list-alt', color: '#3b82f6', desc: 'Directory presence across key platforms' },
            'Photos & Media': { icon: 'fas fa-camera', color: '#06b6d4', desc: 'Photo quantity and quality vs competitors' },
            'Suburb Coverage': { icon: 'fas fa-map', color: '#10b981', desc: 'Service area suburb targeting' },
            'PageSpeed Scores': { icon: 'fas fa-tachometer-alt', color: '#ef4444', desc: 'Full PageSpeed performance scores per page' },
          };
          const sm = secMeta[sec.title] || { icon: iconClass, color: '#818cf8', desc: '' };
          const secRowCount = sec.content.filter(l => l.trim().startsWith('|') && !l.trim().startsWith('|--') && !l.trim().startsWith('| --')).length - 1;
          const secHasCritical = sec.content.some(l => /critical|high|fail/i.test(l) && l.includes('|'));

          return (
            <div>
              <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
                <div style={{
                  padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14,
                  background: `linear-gradient(135deg, ${sm.color}15, ${sm.color}08)`,
                  borderBottom: '1px solid var(--border)'
                }}>
                  <i className={sm.icon} style={{ fontSize: 22, color: sm.color }} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--text1)' }}>{sec.title}</div>
                    <div style={{ fontSize: 13, color: 'var(--text3)', marginTop: 2 }}>{sm.desc}</div>
                  </div>
                  {secHasCritical && <span style={{ fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 4, background: 'rgba(239,68,68,0.15)', color: '#ef4444', textTransform: 'uppercase' }}>Critical</span>}
                  {secRowCount > 0 && <span style={{ fontSize: 13, color: 'var(--text3)', fontWeight: 600 }}>{secRowCount} items</span>}
                </div>
                <div style={{ padding: '20px 24px' }}>
                  {renderSectionContent(sec.content, actionMode)}
                </div>
              </div>
            </div>
          );
        }
      }

      // Executive summary view — overview cards for each section
      const allSections = parseReportSections(report);
      const sectionMeta = {
        'Quick Wins': { icon: 'fas fa-bolt', color: '#22c55e', desc: 'Pages close to page 1 — easiest ranking gains' },
        'Low CTR Pages': { icon: 'fas fa-mouse-pointer', color: '#f59e0b', desc: 'High impressions but low clicks — fix titles & metas' },
        'Cannibalization': { icon: 'fas fa-clone', color: '#ef4444', desc: 'Multiple pages competing for same query' },
        'Zero-Click Pages': { icon: 'fas fa-eye-slash', color: '#8b5cf6', desc: 'Impressions but zero clicks — fix or deindex' },
        'Underperforming Pages': { icon: 'fas fa-chart-line', color: '#3b82f6', desc: 'Should rank higher but stuck' },
        'Summary': { icon: 'fas fa-clipboard-list', color: '#818cf8', desc: 'Agent summary of key findings and priorities' },
        'Site Health': { icon: 'fas fa-heartbeat', color: '#22c55e', desc: 'Overall site health verdict' },
        'Crawlability': { icon: 'fas fa-spider', color: '#3b82f6', desc: 'What Googlebot can and cannot access' },
        'On-Page Issues': { icon: 'fas fa-file-alt', color: '#f59e0b', desc: 'Page-by-page title, meta, and H1 problems' },
        'Content Quality': { icon: 'fas fa-pen-fancy', color: '#8b5cf6', desc: 'Thin content and E-E-A-T signals' },
        'Core Web Vitals': { icon: 'fas fa-tachometer-alt', color: '#ef4444', desc: 'Speed, layout shift, interactivity' },
        'Schema & Data': { icon: 'fas fa-code', color: '#06b6d4', desc: 'Missing structured data for rich results' },
        // GBP sections
        'Profile Completeness': { icon: 'fas fa-id-card', color: '#22c55e', desc: 'How complete and optimized is the GBP listing' },
        'NAP Consistency': { icon: 'fas fa-map-marker-alt', color: '#ef4444', desc: 'Name, Address, Phone consistency across web' },
        'Reviews & Reputation': { icon: 'fas fa-star', color: '#f59e0b', desc: 'Review quantity, quality, and response rate' },
        'Competitor Analysis': { icon: 'fas fa-users', color: '#8b5cf6', desc: 'Top local competitors and what they do better' },
        'Directory & Citations': { icon: 'fas fa-list-alt', color: '#3b82f6', desc: 'Directory presence across key platforms' },
        'Photos & Media': { icon: 'fas fa-camera', color: '#06b6d4', desc: 'Photo quantity and quality vs competitors' },
        'Suburb Coverage': { icon: 'fas fa-map', color: '#10b981', desc: 'Service area suburb targeting' },
        'PageSpeed Scores': { icon: 'fas fa-tachometer-alt', color: '#ef4444', desc: 'Full PageSpeed performance scores per page' },
      };

      // Count items and severity per section
      const sectionStats = allSections.map(sec => {
        const dataRows = sec.content.filter(l => {
          const t = l.trim();
          return t.startsWith('|') && !t.startsWith('|--') && !t.startsWith('| --');
        });
        const rowCount = Math.max(0, dataRows.length - 1); // minus header
        const criticalCount = sec.content.filter(l => /critical|high/i.test(l) && l.includes('|')).length;
        const mediumCount = sec.content.filter(l => /medium|moderate/i.test(l) && l.includes('|')).length;
        return { ...sec, rowCount, criticalCount, mediumCount };
      });

      const totalIssues = sectionStats.reduce((sum, s) => sum + (s.title !== 'Summary' ? s.rowCount : 0), 0);
      const totalCritical = sectionStats.reduce((sum, s) => sum + s.criticalCount, 0);

      // Navigate to section in sidebar
      const goToSection = (sectionTitle) => {
        const slug = sectionTitle.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        const prefix = auditKey === 'gsc-agent' ? 'gsc-sec-' : auditKey === 'website-agent' ? 'web-sec-' : 'ext-sec-';
        if (typeof setActiveTab === 'function') {
          setActiveTab(prefix + slug);
        }
      };

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
            <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>
              <i className={iconClass} style={{ marginRight: 10, color: '#818cf8' }} />{title}
            </h2>
            <div style={{ marginLeft: 'auto' }}>
              <button className="btn btn-primary" onClick={runAudit} style={{ fontSize: 14, padding: '8px 16px' }}>
                <i className="fas fa-robot" style={{ marginRight: 8 }} />Re-run Audit
              </button>
            </div>
          </div>

          {/* Stats cards */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 24 }}>
            <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '18px 20px', textAlign: 'center' }}>
              <div style={{ fontSize: 36, fontWeight: 800, color: '#818cf8' }}>{allSections.length}</div>
              <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, marginTop: 4 }}>Categories</div>
            </div>

    // Thin wrappers for each audit type
    function ExternalGBPAuditPage({ project, section, setActiveTab }) {
      return React.createElement(AgentAuditPage, { project, section, setActiveTab, allowedSections: GBP_ALLOWED_SECTIONS, skipPatterns: AGENT_SKIP_PATTERNS, mergeDirectories: false });

    }

    function GSCAgentAuditPage({ project, section, setActiveTab }) {
      return React.createElement(AgentAuditPage, { project, section, setActiveTab, auditKey: 'gsc-agent', title: 'GSC Audit', iconClass: 'fas fa-chart-line', pillar: 'gsc', loadingText: 'Managed agent is analyzing your Search Console data. This takes 2-5 minutes.', skipPatterns: AGENT_SKIP_PATTERNS, mergeDirectories: false, allowedSections: GSC_ALLOWED_SECTIONS });
    }

    // Helper: get agent audit section names for sidebar (generic)
    function getAgentAuditSections(report, skipPats, mergeDirs, allowedSections) {
      if (!report) return [];
      const defaultSkip = AGENT_SKIP_PATTERNS || [/^summary$/i, /^audit conclusion$/i];
      const skip = skipPats || defaultSkip;
      const raw = [];
      for (const line of report.split('\n')) {
        const trimmed = line.trim();
        // Match ## or ### markdown headers
        const mdMatch = trimmed.match(/^#{2,3}\s+(?:\d+\.\s+)?(.+)/);
        // Match === TITLE === headers
        const eqMatch = trimmed.match(/^={2,}\s*(.+?)\s*={2,}$/);
        const match = mdMatch || eqMatch;
        if (match) {
          const title = match[1].replace(/\*\*/g, '').trim();
          if (title.length > 3) raw.push(title);
        }
      }
      // Apply skip filters, then normalize names
      const filtered = raw.filter(s => !skip.some(p => p.test(s)));
      const normalized = filtered.map(s => typeof normalizeAgentSection === 'function' ? normalizeAgentSection(s) : s);
      // Deduplicate (normalization may collapse variants)
      const deduped = [...new Set(normalized)];
      // Whitelist filter: if allowedSections provided, only keep those (in allowed order)
      if (allowedSections && allowedSections.length > 0) {
        return allowedSections.filter(s => deduped.includes(s));
      }
      if (mergeDirs) {
        const hasPresence = deduped.some(s => /directory presence/i.test(s));
        const hasRegistration = deduped.some(s => /directory registration/i.test(s));
        const combined = [];
        for (const s of deduped) {
          if (/directory presence/i.test(s) && hasRegistration) {
            combined.push('DIRECTORY AUDIT & ACTIONS');
          } else if (/directory registration/i.test(s) && hasPresence) {
            continue;
          } else {
            combined.push(s);
          }
        }
        return combined;
      }
      return deduped;
    }

    // Return hardcoded sections when report exists — header parsing is fragile
    function getExternalAuditSections(report) {
      if (!report) return [];
      return [...GBP_ALLOWED_SECTIONS];
    }

    // ============ GBP AUDIT PAGE (with Internal/External tabs) ============
    function InternalGBPAuditPage({ project }) {
      const [findings, setFindings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [selected, setSelected] = useState(new Set());
      const [reviewFinding, setReviewFinding] = useState(null);
      const [searchQ, setSearchQ] = useState('');
      const [filterSev, setFilterSev] = useState('all');
      const [filterStatus, setFilterStatus] = useState('active');
      const [filterPillar, setFilterPillar] = useState('all');
      const [sortCol, setSortCol] = useState('severity');
      const [sortDir, setSortDir] = useState('asc');
      const [profileSummary, setProfileSummary] = useState(null);

      const loadFindings = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/audit-findings?pillar=gbp`);
          if (Array.isArray(data)) setFindings(data);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      };

      useEffect(() => {
        if (project) {
          loadFindings();
          api(`/projects/${project.id}/gbp-profile`).then(d => { if (d) setProfileSummary(d); }).catch(() => {});
        }
      }, [project?.id]);

      const runAudit = async () => {
        setLoading(true); setError('');
        try {
          await api(`/projects/${project.id}/audits/gbp/run`, { method: 'POST' });
          // Reload findings after audit completes
          await loadFindings();
        } catch (err) { setError(err.message); setLoading(false); }
      };

      const updateStatus = async (id, status) => {
        try {
          await api(`/audit-findings/${id}`, { method: 'PUT', body: { status } });
          setFindings(prev => prev.map(f => f.id === id ? { ...f, status } : f));
        } catch (err) { setError(err.message); }
      };

      const bulkAction = async (status) => {
        for (const id of selected) { await updateStatus(id, status); }
        setSelected(new Set());
      };

      const selectBySeverity = (sev) => {
        const ids = sorted.filter(f => f.status !== 'fixed' && (sev === 'all' || (f.severity || '').toLowerCase() === sev)).map(f => f.id);
        setSelected(new Set(ids));
      };

      const toggleSelect = (id) => { const s = new Set(selected); s.has(id) ? s.delete(id) : s.add(id); setSelected(s); };
      const toggleSort = (col) => { if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortCol(col); setSortDir('asc'); } };

      const sevOrder = { Critical: 0, critical: 0, High: 1, high: 1, Medium: 2, medium: 2, Low: 3, low: 3 };

      // Extract gbp_pillar from category field ("Proximity > Service Areas" → "Proximity")
      const getPillar = (f) => {
        if (f.gbp_pillar) return f.gbp_pillar;
        if (f.category && f.category.includes(' > ')) return f.category.split(' > ')[0];
        return 'Relevance';
      };
      const getSubcat = (f) => {
        if (f.category && f.category.includes(' > ')) return f.category.split(' > ')[1];
        return f.category || 'General';
      };

      const sorted = useMemo(() => {
        let list = [...findings];
        if (filterSev !== 'all') list = list.filter(f => (f.severity || '').toLowerCase() === filterSev);
        if (filterPillar !== 'all') list = list.filter(f => getPillar(f) === filterPillar);
        if (filterStatus === 'active') list = list.filter(f => f.status !== 'rejected' && f.status !== 'fixed');
        else if (filterStatus !== 'all') list = list.filter(f => f.status === filterStatus);
        if (searchQ.trim()) { const q = searchQ.toLowerCase(); list = list.filter(f => (f.title || '').toLowerCase().includes(q) || (f.description || '').toLowerCase().includes(q)); }
        // Group by pillar, then sort within each group
        const pillarOrder = { Proximity: 0, Relevance: 1, Prominence: 2 };
        list.sort((a, b) => {
          const pa = pillarOrder[getPillar(a)] ?? 1;
          const pb = pillarOrder[getPillar(b)] ?? 1;
          if (pa !== pb) return pa - pb;
          let av, bv;
          if (sortCol === 'severity') { av = sevOrder[a.severity] ?? 5; bv = sevOrder[b.severity] ?? 5; }
          else if (sortCol === 'title') { av = (a.title || '').toLowerCase(); bv = (b.title || '').toLowerCase(); return av.localeCompare(bv); }
          else { av = sevOrder[a.severity] ?? 5; bv = sevOrder[b.severity] ?? 5; }
          return sortDir === 'asc' ? av - bv : bv - av;
        });
        return list;
      }, [findings, filterSev, filterPillar, filterStatus, searchQ, sortCol, sortDir]);

      const SortIcon = ({ col }) => sortCol === col ? <i className={`fas fa-sort-${sortDir === 'asc' ? 'up' : 'down'}`} style={{ marginLeft: 4, fontSize: 10 }} /> : null;

      const sevBadge = (sev) => {

      // Review panel
      if (reviewFinding) {

        return (

            <button className="btn btn-secondary" onClick={() => setReviewFinding(null)} style={{ marginBottom: 16, fontSize: 15, padding: '8px 16px' }}>

                <div style={{ display: 'flex', gap: 8 }}>
                  {sevBadge(f.severity)}
                  {(() => { const pc = { Proximity: '#f59e0b', Relevance: '#6366f1', Prominence: '#22c55e' }; const p = getPillar(f); const c = pc[p] || '#818cf8';
                    return <span style={{ padding: '4px 12px', borderRadius: 4, fontSize: 13, fontWeight: 600, background: c + '15', color: c }}>{p}</span>;
                  })()}
                  <span style={{ padding: '4px 12px', borderRadius: 4, fontSize: 13, fontWeight: 600, background: 'var(--bg)', color: 'var(--text3)' }}>{getSubcat(f)}</span>

                  <div style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--text1)' }}>{f.description}</div>
                </div>

                <div style={{ marginBottom: 20, padding: 20, background: 'rgba(34,197,94,0.06)', borderRadius: 10, border: '1px solid rgba(34,197,94,0.15)' }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: '#22c55e', textTransform: 'uppercase', marginBottom: 10 }}><i className="fas fa-lightbulb" style={{ marginRight: 6 }} />Suggested Fix</div>
                  <div style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--text1)' }}>{f.recommendation}</div>
                </div>
              )}
              {(f.current_value || f.recommended_value) && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 }}>

                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', marginBottom: 8 }}>Current State</div>
                    <div style={{ fontSize: 17, fontWeight: 600, color: '#ef4444' }}>{f.current_value || '—'}</div>
                  </div>
                  <div style={{ padding: '16px 20px', background: 'rgba(34,197,94,0.06)', borderRadius: 10 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', marginBottom: 8 }}>Target</div>
                    <div style={{ fontSize: 17, fontWeight: 600, color: '#22c55e' }}>{f.recommended_value || '—'}</div>
                  </div>

              <div style={{ display: 'flex', gap: 14, marginTop: 24 }}>

                  <i className="fas fa-check" style={{ marginRight: 8 }} /> Move to Action Plan

                <button className="btn btn-secondary" onClick={() => { updateStatus(f.id, 'rejected'); setReviewFinding(null); }} style={{ fontSize: 16, padding: '12px 28px' }}>
                  <i className="fas fa-eye-slash" style={{ marginRight: 8 }} /> Ignore
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
            <h2 style={{ margin: 0, fontSize: 24, fontWeight: 700 }}>
              <i className="fas fa-map-marker-alt" style={{ marginRight: 10, color: 'var(--accent)' }} />GBP Issues
              <span style={{ color: 'var(--text3)', fontWeight: 400, fontSize: 16, marginLeft: 10 }}>{findings.length} items</span>

                <button className="btn btn-small" style={{ background: 'rgba(239,68,68,0.15)', borderColor: 'rgba(239,68,68,0.3)', color: '#ef4444', fontSize: 14 }} onClick={() => selectBySeverity('critical')}>Critical ({sorted.filter(f => (f.severity||'').toLowerCase() === 'critical').length})</button>
                <button className="btn btn-small" style={{ background: 'rgba(249,115,22,0.15)', borderColor: 'rgba(249,115,22,0.3)', color: '#f97316', fontSize: 14 }} onClick={() => selectBySeverity('high')}>High ({sorted.filter(f => (f.severity||'').toLowerCase() === 'high').length})</button>
                <button className="btn btn-small" style={{ background: 'rgba(245,158,11,0.15)', borderColor: 'rgba(245,158,11,0.3)', color: '#f59e0b', fontSize: 14 }} onClick={() => selectBySeverity('medium')}>Medium ({sorted.filter(f => (f.severity||'').toLowerCase() === 'medium').length})</button>
                <button className="btn btn-small" style={{ background: 'rgba(59,130,246,0.15)', borderColor: 'rgba(59,130,246,0.3)', color: '#3b82f6', fontSize: 14 }} onClick={() => selectBySeverity('low')}>Low ({sorted.filter(f => (f.severity||'').toLowerCase() === 'low').length})</button>
                <button className="btn btn-small" onClick={() => selectBySeverity('all')} style={{ fontSize: 14 }}>All ({sorted.length})</button>
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 8, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
            <input type="text" placeholder="Search findings..." value={searchQ} onChange={e => setSearchQ(e.target.value)}
              style={{ flex: 1, minWidth: 200, background: 'var(--card)', color: 'var(--text1)', border: '1px solid var(--border)', borderRadius: 6, padding: '10px 14px', fontSize: 15 }} />
            <select value={filterSev} onChange={e => setFilterSev(e.target.value)} style={{ background: 'var(--card)', color: 'var(--text1)', border: '1px solid var(--border)', borderRadius: 6, padding: '10px 14px', fontSize: 15 }}>
              <option value="all">All Severities</option>
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ background: 'var(--card)', color: 'var(--text1)', border: '1px solid var(--border)', borderRadius: 6, padding: '10px 14px', fontSize: 15 }}>
              <option value="active">Active</option>
              <option value="all">All</option>
              <option value="approved">Approved</option>
              <option value="rejected">Ignored</option>
            </select>
            <span style={{ fontSize: 14, color: 'var(--text3)' }}>{sorted.length} of {findings.length}</span>
          </div>

          <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: 'var(--bg)', borderBottom: '1px solid var(--border)' }}>
                  <th style={{ width: 36, padding: '14px 10px' }}><input type="checkbox" onChange={e => setSelected(e.target.checked ? new Set(sorted.map(f => f.id)) : new Set())} checked={selected.size === sorted.length && sorted.length > 0} /></th>
                  <th style={{ width: 40, padding: '14px 6px', color: 'var(--text3)', fontWeight: 600, fontSize: 14 }}>#</th>
                  <th style={{ padding: '14px', cursor: 'pointer', fontWeight: 600, color: 'var(--text2)', fontSize: 15 }} onClick={() => toggleSort('title')}>Finding<SortIcon col="title" /></th>
                  <th style={{ width: 110, padding: '14px 10px', cursor: 'pointer', fontWeight: 600, color: 'var(--text2)', fontSize: 14 }} onClick={() => toggleSort('severity')}>Severity<SortIcon col="severity" /></th>
                  <th style={{ padding: '14px', fontWeight: 600, color: 'var(--text2)', fontSize: 14, maxWidth: 400 }}>Details</th>
                  <th style={{ width: 120, padding: '14px 10px', cursor: 'pointer', fontWeight: 600, color: 'var(--text2)', fontSize: 14, textAlign: 'center' }} onClick={() => toggleSort('category')}>Category<SortIcon col="category" /></th>
                  <th style={{ width: 100, padding: '14px 10px', fontWeight: 600, color: 'var(--text2)', fontSize: 14, textAlign: 'center' }}>Status</th>
                  <th style={{ width: 90, padding: '14px 10px', textAlign: 'center', fontWeight: 600, color: 'var(--text2)', fontSize: 14 }}>Action</th>
                </tr>
              </thead>
              <tbody>
                {sorted.length === 0 ? (
                  <tr><td colSpan={8} style={{ textAlign: 'center', color: 'var(--text3)', padding: 50, fontSize: 16 }}>
                    {findings.length === 0 ? 'No findings yet. Click Re-run to start.' : 'No results match filters.'}
                  </td></tr>
                ) : (() => {
                  const pillarColors = { Proximity: '#f59e0b', Relevance: '#6366f1', Prominence: '#22c55e' };
                  const pillarIcons = { Proximity: 'fas fa-map-marker-alt', Relevance: 'fas fa-bullseye', Prominence: 'fas fa-star' };
                  let lastPillar = null;
                  let num = 0;
                  return sorted.map((f) => {
                    const pillar = getPillar(f);
                    const subcat = getSubcat(f);
                    const showHeader = pillar !== lastPillar && filterPillar === 'all';
                    lastPillar = pillar;
                    num++;
                    const pColor = pillarColors[pillar] || '#6366f1';
                    return React.createElement(React.Fragment, { key: f.id },
                      showHeader && (
                        <tr style={{ background: pColor + '10' }}>
                          <td colSpan={8} style={{ padding: '12px 14px', fontWeight: 700, fontSize: 16, color: pColor, borderBottom: `2px solid ${pColor}30` }}>
                            <i className={pillarIcons[pillar] || 'fas fa-circle'} style={{ marginRight: 10 }} />{pillar}
                            <span style={{ fontWeight: 400, fontSize: 13, color: 'var(--text3)', marginLeft: 10 }}>
                              ({sorted.filter(s => getPillar(s) === pillar).length} issues)
                            </span>
                          </td>
                        </tr>
                      ),
                      <tr style={{ borderBottom: '1px solid var(--border)', background: selected.has(f.id) ? 'rgba(99,102,241,0.08)' : 'transparent', cursor: 'pointer' }}
                        onClick={(e) => { if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') setReviewFinding(f); }}>
                        <td style={{ padding: '14px 10px' }}><input type="checkbox" checked={selected.has(f.id)} onChange={() => toggleSelect(f.id)} /></td>
                        <td style={{ padding: '14px 6px', color: 'var(--text3)', fontSize: 14 }}>{num}</td>
                        <td style={{ padding: '14px', fontWeight: 600, fontSize: 16 }}>
                          <span style={{ display: 'inline-block', width: 4, height: 20, borderRadius: 2, background: pColor, marginRight: 10, verticalAlign: 'middle' }} />
                          {f.title}
                        </td>
                        <td style={{ padding: '14px 10px' }}>{sevBadge(f.severity)}</td>
                        <td style={{ padding: '14px', fontSize: 14, color: 'var(--text2)', maxWidth: 400, lineHeight: 1.5 }}>{(f.description || '').substring(0, 150)}{(f.description || '').length > 150 ? '...' : ''}</td>
                        <td style={{ padding: '14px 10px', textAlign: 'center' }}><span style={{ fontSize: 12, padding: '3px 8px', borderRadius: 4, background: pColor + '15', color: pColor }}>{subcat}</span></td>
                        <td style={{ padding: '14px 10px', textAlign: 'center' }}>{statusBadge(f.status || 'new')}</td>
                        <td style={{ padding: '14px 10px', textAlign: 'center' }}>
                          <button className="btn btn-small" onClick={(e) => { e.stopPropagation(); setReviewFinding(f); }} style={{ fontSize: 14 }}>
                            <i className="fas fa-search" style={{ marginRight: 4 }} /> Review
                          </button>
                        </td>
                      </tr>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============ GSC AUDIT PAGE (Agent-Powered) ============
    // GSCAuditPage is now a thin wrapper around AgentAuditPage (defined above)

    // ============ WEBSITE AUDIT PAGE (Agent-Powered) ============
    // WebsiteAuditPage is a thin wrapper around AgentAuditPage (defined above)
    // ============ TECHNICAL AUDIT PAGE (Legacy Internal — kept for now) ============
    function TechnicalAuditPage({ project }) {
      const [tab, setTab] = useState('general');
      const [findings, setFindings] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [approvedIds, setApprovedIds] = useState(new Set());
      const [expandedId, setExpandedId] = useState(null);
      const [expandedCats, setExpandedCats] = useState(new Set());

      const handleApprove = async (finding) => {
        try {
          await api(`/audit-findings/${finding.id}`, { method: 'PUT', body: { status: 'approved' } });
          setApprovedIds(prev => new Set([...prev, finding.id]));
        } catch (err) { setError(err.message); }
      };
      const handleReject = async (finding) => {
        try {
          await api(`/audit-findings/${finding.id}`, { method: 'PUT', body: { status: 'rejected' } });
          setFindings(prev => prev.filter(f => f.id !== finding.id));
        } catch (err) { setError(err.message); }
      };

      // Speed audit state
      const [speedResults, setSpeedResults] = useState([]);
      const [speedLoading, setSpeedLoading] = useState(false);
      const [speedError, setSpeedError] = useState('');
      const [optimizingPages, setOptimizingPages] = useState(new Set());
      const [expandedSpeedPage, setExpandedSpeedPage] = useState(null);
      const [pageSpeedData, setPageSpeedData] = useState({});
      const [psLoading, setPsLoading] = useState(null);

      const categories = [
        { key: 'speed', label: 'Page Speed & Core Web Vitals', icon: 'fas fa-tachometer-alt', color: '#ef4444' },
        { key: 'crawl', label: 'Crawlability & Indexing', icon: 'fas fa-spider', color: '#f59e0b' },
        { key: 'links', label: 'Broken Links & Redirects', icon: 'fas fa-unlink', color: '#ef4444' },
        { key: 'security', label: 'HTTPS & Security', icon: 'fas fa-lock', color: '#22c55e' },
        { key: 'mobile', label: 'Mobile Usability', icon: 'fas fa-mobile-alt', color: '#3b82f6' },
        { key: 'schema', label: 'Schema Markup', icon: 'fas fa-code', color: '#8b5cf6' },
        { key: 'sitemap', label: 'Sitemap & Robots.txt', icon: 'fas fa-sitemap', color: '#6366f1' },
        { key: 'structure', label: 'Internal Link Structure', icon: 'fas fa-project-diagram', color: '#14b8a6' },
      ];

      // Load previous findings on mount
      useEffect(() => {
        if (project) loadExisting();
      }, [project?.id]);

      const loadExisting = async () => {
        const data = await api(`/projects/${project.id}/audit-findings`);
        if (data.findings) setFindings(data.findings.filter(f => f.pillar === 'technical'));
        // Load previous speed audit results
        try {
          const speedData = await api(`/projects/${project.id}/audits/speed/latest`);
          if (speedData.results) {
            setSpeedResults(speedData.results);
            const cwvMap = {};
            speedData.results.forEach(r => { if (r.cwv) cwvMap[r.page_id] = r.cwv; });
            setPageSpeedData(prev => ({ ...prev, ...cwvMap }));
          }
        } catch (e) { /* no previous speed audit */ }
      };

      const runAudit = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/audits/technical/run`, { method: 'POST' });
          if (data.findings) setFindings(data.findings);
          else if (data.error) setError(data.error);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const runSpeedAudit = async () => {
        setSpeedLoading(true); setSpeedError('');
        try {
          const data = await api(`/speed-audit/${project.id}/run`, { method: 'POST' });
          setSpeedResults(data.results || []);
          // Auto-populate CWV data from batch results
          const cwvMap = {};
          (data.results || []).forEach(r => { if (r.cwv) cwvMap[r.page_id] = r.cwv; });
          setPageSpeedData(prev => ({ ...prev, ...cwvMap }));
        } catch (err) { setSpeedError(err.message); }
        finally { setSpeedLoading(false); }
      };

      const optimizePage = async (pageId) => {
        setSpeedError('Image optimization is coming soon — this feature is not yet available.');
      };

      const runPageSpeed = async (url, pageId) => {
        setPsLoading(pageId);
        try {
          const data = await api(`/speed-audit/${project.id}/pagespeed?url=${encodeURIComponent(url)}&strategy=mobile`);
          setPageSpeedData(prev => ({ ...prev, [pageId]: data.cwv }));
        } catch (err) { setSpeedError(err.message); }
        finally { setPsLoading(null); }
      };

      // handleApprove and handleReject defined above

      const stats = useMemo(() => ({
        critical: findings.filter(f => f.severity === 'Critical').length,
        medium: findings.filter(f => f.severity === 'Medium').length,
        low: findings.filter(f => f.severity === 'Low').length,
      }), [findings]);

      const speedStats = useMemo(() => {
        if (!speedResults.length) return null;
        const totalImages = speedResults.reduce((s, r) => s + (r.image_count || 0), 0);
        const totalIssues = speedResults.reduce((s, r) => s + (r.total_issues || 0), 0);
        const pagesWithIssues = speedResults.filter(r => (r.total_issues || 0) > 0).length;
        return { totalImages, totalIssues, pagesWithIssues, totalPages: speedResults.length };
      }, [speedResults]);

      const issueLabel = (issue) => ({
        missing_width: 'Missing width attribute',
        missing_height: 'Missing height attribute',
        no_lazy_load: 'No lazy loading',
        missing_alt: 'Missing alt text',
        too_large: 'File too large (>200KB)',
        oversized: 'Image oversized (>1920px)',
        no_webp: 'No WebP version',
      }[issue] || issue);

      const issueSeverity = (issue) => {
        if (['too_large', 'oversized', 'missing_alt'].includes(issue)) return 'critical';
        if (['no_webp', 'missing_width', 'missing_height'].includes(issue)) return 'medium';
        return 'low';
      };

      const tabs = [
        { id: 'general', label: 'General', icon: 'fas fa-cogs' },
        { id: 'speed', label: 'Core Web Vitals', icon: 'fas fa-tachometer-alt' },
      ];

      // Health score: 100 minus weighted penalties
      const healthScore = useMemo(() => {
        if (!findings.length) return null;
        const penalty = stats.critical * 12 + stats.medium * 5 + stats.low * 2;
        return Math.max(0, Math.min(100, 100 - penalty));
      }, [findings, stats]);

      const healthColor = (score) => score >= 80 ? '#22c55e' : score >= 50 ? '#f59e0b' : '#ef4444';
      const healthLabel = (score) => score >= 80 ? 'Good' : score >= 50 ? 'Needs Work' : 'Poor';

      const [severityFilter, setSeverityFilter] = useState('all');

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-cogs" style={{ marginRight: 10, color: 'var(--accent)' }} />Technical Audit
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Site speed, crawlability, broken links, schema, security, mobile usability</p>
            </div>
            <button className="btn btn-primary" onClick={tab === 'general' ? runAudit : runSpeedAudit} disabled={loading || speedLoading} style={{ fontSize: 13 }}>
              {(loading || speedLoading) ? <><span className="spinner"></span>Scanning...</> : <><i className="fas fa-play" style={{ marginRight: 6 }} />{tab === 'general' ? 'Run Technical Audit' : 'Run Speed Audit'}</>}
            </button>
          </div>

          {/* Tab switcher */}
          <div style={{ display: 'flex', gap: 4, marginBottom: 20, background: 'var(--bg)', borderRadius: 10, padding: 4 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex: 1, padding: '10px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 600,
                background: tab === t.id ? 'var(--primary)' : 'transparent',
                color: tab === t.id ? '#fff' : 'var(--text2)',
                transition: 'all 0.2s',
              }}>
                <i className={t.icon} style={{ marginRight: 6 }} />{t.label}
              </button>
            ))}
          </div>

          {/* ====== GENERAL TAB ====== */}
          {tab === 'general' && <>

            {loading && (
              <div className="audit-loading-overlay">
                <span className="spinner-large"></span>
                <div className="audit-loading-text">Running Technical Audit</div>
                <div className="audit-loading-sub">Crawling pages, checking HTTPS, robots, sitemap, schema, links...</div>
              </div>
            )}

            {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

            {findings.length > 0 && <>
              {/* Health score + stats row */}
              <div style={{ display: 'grid', gridTemplateColumns: '160px 1fr', gap: 16, marginBottom: 24 }}>
                {/* Health score circle */}
                <div style={{ background: 'var(--card)', borderRadius: 12, padding: 20, border: '1px solid var(--border)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                  <div style={{ position: 'relative', width: 80, height: 80 }}>
                    <svg viewBox="0 0 80 80" style={{ transform: 'rotate(-90deg)' }}>
                      <circle cx="40" cy="40" r="34" fill="none" stroke="var(--border)" strokeWidth="6" />
                      <circle cx="40" cy="40" r="34" fill="none" stroke={healthColor(healthScore)} strokeWidth="6"
                        strokeDasharray={`${(healthScore / 100) * 213.6} 213.6`}
                        strokeLinecap="round" style={{ transition: 'stroke-dasharray 0.5s' }} />
                    </svg>
                    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                      <span style={{ fontSize: 22, fontWeight: 800, color: healthColor(healthScore) }}>{healthScore}</span>
                    </div>
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: healthColor(healthScore), marginTop: 8, textTransform: 'uppercase' }}>{healthLabel(healthScore)}</div>
                </div>

                {/* Severity stats */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
                  {[
                    { id: 'Critical', label: 'Critical', value: stats.critical, color: '#ef4444', icon: 'fas fa-exclamation-circle' },
                    { id: 'Medium', label: 'Medium', value: stats.medium, color: '#f59e0b', icon: 'fas fa-exclamation-triangle' },
                    { id: 'Low', label: 'Low', value: stats.low, color: '#3b82f6', icon: 'fas fa-info-circle' },
                  ].map(s => (
                    <div key={s.id} onClick={() => setSeverityFilter(severityFilter === s.id ? 'all' : s.id)}
                      style={{ background: 'var(--card)', borderRadius: 12, padding: 20, textAlign: 'center', border: severityFilter === s.id ? `2px solid ${s.color}` : '1px solid var(--border)', cursor: 'pointer', transition: 'all 0.2s' }}>
                      <i className={s.icon} style={{ fontSize: 18, color: s.color, display: 'block', marginBottom: 8 }} />
                      <div style={{ fontSize: 32, fontWeight: 800, color: s.color }}>{s.value}</div>
                      <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 4, textTransform: 'uppercase', letterSpacing: 1 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Active filter indicator */}
              {severityFilter !== 'all' && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, fontSize: 13, color: 'var(--text3)' }}>
                  <span>Showing: <strong style={{ color: severityFilter === 'Critical' ? '#ef4444' : severityFilter === 'Medium' ? '#f59e0b' : '#3b82f6' }}>{severityFilter}</strong> findings only</span>
                  <button onClick={() => setSeverityFilter('all')} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 12 }}>Clear filter</button>
                </div>
              )}
            </>}

            {!loading && findings.length > 0 && <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 16, alignItems: 'start' }}>
            {categories.map(cat => {
              const allCatFindings = findings.filter(f => f.category === cat.key);
              const catFindings = severityFilter === 'all' ? allCatFindings : allCatFindings.filter(f => f.severity === severityFilter);
              if (allCatFindings.length === 0) return null;
              if (catFindings.length === 0 && severityFilter !== 'all') return null;
              const isOpen = expandedCats.has(cat.key);
              const critCount = allCatFindings.filter(f => f.severity === 'Critical').length;
              const medCount = allCatFindings.filter(f => f.severity === 'Medium').length;
              const lowCount = allCatFindings.filter(f => f.severity === 'Low').length;
              return (
                <div key={cat.key} style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
                  <div onClick={() => setExpandedCats(prev => { const s = new Set(prev); s.has(cat.key) ? s.delete(cat.key) : s.add(cat.key); return s; })}
                    style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '16px 18px', background: `${cat.color}12`, borderBottom: isOpen ? `2px solid ${cat.color}` : 'none', cursor: 'pointer' }}>
                    <i className={cat.icon} style={{ color: cat.color, fontSize: 20 }} />
                    <span style={{ fontSize: 16, fontWeight: 700, color: 'var(--text1)' }}>{cat.label}</span>
                    <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 6 }}>
                      {critCount > 0 && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(239,68,68,0.15)', color: '#ef4444', fontWeight: 700 }}>{critCount}</span>}
                      {medCount > 0 && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(245,158,11,0.15)', color: '#f59e0b', fontWeight: 700 }}>{medCount}</span>}
                      {lowCount > 0 && <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(59,130,246,0.15)', color: '#3b82f6', fontWeight: 700 }}>{lowCount}</span>}
                      <i className={`fas fa-chevron-${isOpen ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 12, marginLeft: 4 }} />
                    </div>
                  </div>
                  {isOpen && <div style={{ padding: 8 }}>
                  {catFindings.map(f => (
                    <FindingCard
                      key={f.id}
                      finding={f}
                      onApprove={handleApprove}
                      onReject={handleReject}
                      isApproved={approvedIds.has(f.id)}
                      expanded={expandedId === f.id}
                      onToggle={() => setExpandedId(expandedId === f.id ? null : f.id)}
                    />
                  ))}
                  </div>}
                </div>
              );
            })}
            </div>}

            {!loading && findings.length === 0 && (
              <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
                <i className="fas fa-cogs" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
                <div style={{ fontSize: 16, marginBottom: 8 }}>No technical audit run yet</div>
                <div style={{ fontSize: 13 }}>Click "Run Technical Audit" to scan for speed, crawl, link, and security issues.</div>
              </div>
            )}
          </>}

          {/* ====== SPEED & IMAGES TAB ====== */}
          {tab === 'speed' && <>
            {speedLoading && (
              <div className="audit-loading-overlay">
                <span className="spinner-large"></span>
                <div className="audit-loading-text">Running Speed Audit</div>
                <div className="audit-loading-sub">Scanning pages for image issues, WebP, lazy loading, Core Web Vitals...</div>
              </div>
            )}
