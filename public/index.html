    // ============ PROJECT SETTINGS PAGE ============
    function ProjectSettingsPage() {
      const [project, setProject] = useState(null);
      const [loading, setLoading] = useState(false);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState('');
      const [formData, setFormData] = useState({
        name: '',
        domain: '',
        businessName: '',
        industry: '',
        location: '',
        serviceAreas: [],
        competitors: [],
        isLocalBusiness: true,
        isElementorSite: true,
        wordpressUrl: '',
      });
      const [newSuburb, setNewSuburb] = useState('');
      const [newDistance, setNewDistance] = useState(20);
      const [newCompetitor, setNewCompetitor] = useState('');

      useEffect(() => {
        loadProject();
      }, []);

      const loadProject = async () => {
        setLoading(true);
        setError('');
        try {
          const data = await api('/projects/current');
          setProject(data.project);
          setFormData({
            name: data.project.name,
            domain: data.project.domain,
            businessName: data.project.businessName || '',
            industry: data.project.industry || '',
            location: data.project.location || '',
            serviceAreas: data.project.serviceAreas || [],
            competitors: data.project.competitors || [],
            isLocalBusiness: data.project.is_local_business !== false,
            isElementorSite: data.project.is_elementor_site !== false,
            wordpressUrl: data.project.wordpress_url || '',
          });
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleSave = async () => {
        setSaving(true);
        setError('');
        try {
          await api(`/projects/${project.id}`, {
            method: 'PATCH',
            body: formData,
          });
          setError('');
          // Brief success indicator
          setTimeout(() => setError(''), 3000);
        } catch (err) {
          setError(err.message);
        } finally {
          setSaving(false);
        }
      };

      const handleAddSuburb = () => {
        if (!newSuburb.trim()) return;
        setFormData((prev) => ({
          ...prev,
          serviceAreas: [...prev.serviceAreas, { name: newSuburb, distance: newDistance }],
        }));
        setNewSuburb('');
        setNewDistance(20);
      };

      const handleRemoveSuburb = (index) => {
        setFormData((prev) => ({
          ...prev,
          serviceAreas: prev.serviceAreas.filter((_, i) => i !== index),
        }));
      };

      const handleAddCompetitor = () => {
        if (!newCompetitor.trim()) return;
        setFormData((prev) => ({
          ...prev,
          competitors: [...prev.competitors, newCompetitor],
        }));
        setNewCompetitor('');
      };

      const handleRemoveCompetitor = (index) => {
        setFormData((prev) => ({
          ...prev,
          competitors: prev.competitors.filter((_, i) => i !== index),
        }));
      };

      if (loading) {
        return <div className="empty-state"><span className="spinner"></span> Loading...</div>;
      }

      return (
        <>
          <div className="page-header">
            <div className="page-title">
              <i className="fas fa-cog"></i> Project Settings
            </div>
            <div className="page-subtitle">Configure your current project</div>
          </div>

          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

          <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>Basic Information</div>

            <div className="form-group">
              <label className="form-label">Project Name</label>
              <input
                type="text"
                className="form-input"
                value={formData.name}
                onChange={(e) => setFormData((prev) => ({ ...prev, name: e.target.value }))}
                placeholder="My Client Project"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Domain</label>
              <input
                type="text"
                className="form-input"
                value={formData.domain}
                onChange={(e) => setFormData((prev) => ({ ...prev, domain: e.target.value }))}
                placeholder="example.com"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Business Name</label>
              <input
                type="text"
                className="form-input"
                value={formData.businessName}
                onChange={(e) => setFormData((prev) => ({ ...prev, businessName: e.target.value }))}
                placeholder="My Business Inc."
              />
            </div>

            <div className="form-group">
              <label className="form-label">Industry</label>
              <input
                type="text"
                className="form-input"
                value={formData.industry}
                onChange={(e) => setFormData((prev) => ({ ...prev, industry: e.target.value }))}
                placeholder="e.g., Plumbing"
              />
            </div>

            <div className="form-group">
              <label className="form-label">Location</label>
              <input
                type="text"
                className="form-input"
                value={formData.location}
                onChange={(e) => setFormData((prev) => ({ ...prev, location: e.target.value }))}
                placeholder="e.g., Perth, Australia"
              />
            </div>
          </div>

          <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>Project Type</div>

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
              <div>
                <strong>Local Business</strong>
                <div style={{ color: 'var(--text2)', fontSize: '13px' }}>Enable GBP Audit, GBP Actions, Maps Rankings, and service area targeting</div>
              </div>
              <label style={{ position: 'relative', display: 'inline-block', width: '48px', height: '26px', cursor: 'pointer' }}>
                <input
                  type="checkbox"
                  checked={formData.isLocalBusiness}
                  onChange={(e) => setFormData(prev => ({ ...prev, isLocalBusiness: e.target.checked }))}
                  style={{ opacity: 0, width: 0, height: 0 }}
                />
                <span style={{
                  position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                  background: formData.isLocalBusiness ? 'var(--primary)' : 'var(--bg)',
                  borderRadius: '13px', transition: 'background 0.2s',
                  border: '1px solid var(--border)'
                }}>
                  <span style={{
                    position: 'absolute', top: '3px', left: formData.isLocalBusiness ? '24px' : '3px',
                    width: '18px', height: '18px', borderRadius: '50%',
                    background: '#fff', transition: 'left 0.2s'
                  }}></span>
                </span>
              </label>
            </div>

            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--border)' }}>
              <div>
                <strong>Elementor Site</strong>
                <div style={{ color: 'var(--text2)', fontSize: '13px' }}>Use SEO Room Helper plugin for design-safe Elementor content updates</div>
              </div>
              <label style={{ position: 'relative', display: 'inline-block', width: '48px', height: '26px', cursor: 'pointer' }}>
                <input
                  type="checkbox"
                  checked={formData.isElementorSite}
                  onChange={(e) => setFormData(prev => ({ ...prev, isElementorSite: e.target.checked }))}
                  style={{ opacity: 0, width: 0, height: 0 }}
                />
                <span style={{
                  position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                  background: formData.isElementorSite ? 'var(--primary)' : 'var(--bg)',
                  borderRadius: '13px', transition: 'background 0.2s',
                  border: '1px solid var(--border)'
                }}>
                  <span style={{
                    position: 'absolute', top: '3px', left: formData.isElementorSite ? '24px' : '3px',
                    width: '18px', height: '18px', borderRadius: '50%',
                    background: '#fff', transition: 'left 0.2s'
                  }}></span>
                </span>
              </label>
            </div>

            <div className="form-group" style={{ marginTop: '12px' }}>
              <label className="form-label">WordPress URL</label>
              <input
                type="text"
                className="form-input"
                value={formData.wordpressUrl}
                onChange={(e) => setFormData(prev => ({ ...prev, wordpressUrl: e.target.value }))}
                placeholder="https://yoursite.com"
              />
              <div style={{ color: 'var(--text2)', fontSize: '12px', marginTop: '4px' }}>
                {formData.isElementorSite ? 'Requires seoroom-helper.php installed as mu-plugin' : 'Uses standard WP REST API for content updates'}
              </div>
            </div>
          </div>

          {formData.isLocalBusiness && <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>Service Areas</div>

            {formData.serviceAreas.length > 0 && (
              <div style={{ marginBottom: '16px' }}>
                {formData.serviceAreas.map((area, idx) => (
                  <div
                    key={idx}
                    style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      padding: '8px 12px',
                      background: 'var(--bg)',
                      borderRadius: '8px',
                      marginBottom: '8px',
                    }}
                  >
                    <div>
                      <strong>{area.name}</strong> <span style={{ color: 'var(--text2)', fontSize: '12px' }}>({area.distance}km)</span>
                    </div>
                    <button
                      className="btn btn-danger btn-small"
                      onClick={() => handleRemoveSuburb(idx)}
                    >
                      <i className="fas fa-trash"></i>
                    </button>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 120px auto', gap: '8px' }}>
              <input
                type="text"
                className="form-input"
                value={newSuburb}
                onChange={(e) => setNewSuburb(e.target.value)}
                placeholder="Suburb name"
                onKeyPress={(e) => e.key === 'Enter' && handleAddSuburb()}
              />
              <input
                type="number"
                className="form-input"
                value={newDistance}
                onChange={(e) => setNewDistance(Math.max(1, parseInt(e.target.value) || 20))}
                min="1"
                max="100"
                style={{ textAlign: 'center' }}
              />
              <button className="btn btn-secondary btn-small" onClick={handleAddSuburb}>
                <i className="fas fa-plus"></i> Add
              </button>
            </div>
          </div>}

          <div className="card">
            <div className="card-title" style={{ marginBottom: '16px' }}>Competitors</div>

            {formData.competitors.length > 0 && (
              <div style={{ marginBottom: '16px' }}>
                {formData.competitors.map((competitor, idx) => (
                  <div
                    key={idx}
                    style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                      padding: '8px 12px',
                      background: 'var(--bg)',
                      borderRadius: '8px',
                      marginBottom: '8px',
                    }}
                  >
                    <strong>{competitor}</strong>
                    <button
                      className="btn btn-danger btn-small"
                      onClick={() => handleRemoveCompetitor(idx)}
                    >
                      <i className="fas fa-trash"></i>
                    </button>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: '8px' }}>
              <input
                type="text"
                className="form-input"
                value={newCompetitor}
                onChange={(e) => setNewCompetitor(e.target.value)}
                placeholder="Competitor domain"
                onKeyPress={(e) => e.key === 'Enter' && handleAddCompetitor()}
              />
              <button className="btn btn-secondary btn-small" onClick={handleAddCompetitor}>
                <i className="fas fa-plus"></i> Add
              </button>
            </div>
          </div>

          <button className="btn btn-primary mt-24" onClick={handleSave} disabled={saving}>
            {saving ? <span className="spinner"></span> : <i className="fas fa-save"></i>}

          </button>
        </>
      );

                <button
                  className="btn btn-secondary"
                  onClick={() => handleTestConnection('localfalcon')}

                  style={{ flex: 1 }}
                >
                  {testLoading.localfalcon ? <span className="spinner"></span> : <i className="fas fa-check"></i>}

          {/* WordPress */}
          <div className="integration-card">
            <div className="integration-header">
              <div className="integration-title">
                <i className="fas fa-wordpress" style={{ marginRight: '8px', color: '#0073AA' }}></i>
                WordPress
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.wordpress?.connected ? 'connected' : 'disconnected'}`}></div>
                <span>{integrations.wordpress?.connected ? 'Connected' : 'Not Connected'}</span>
              </div>
            </div>
            <div className="integration-fields">
              <input
                type="url"
                className="form-input"

                onChange={(e) => setWpCredentials((prev) => ({ ...prev, url: e.target.value }))}
              />
              <input
                type="text"
                className="form-input"

              <input
                type="password"
                className="form-input"
                placeholder="App Password"
                value={wpCredentials.appPassword}
                onChange={(e) => setWpCredentials((prev) => ({ ...prev, appPassword: e.target.value }))}
              />
              <div className="btn-group">
                <button
                  className="btn btn-primary"
                  onClick={() => handleSaveCredentials('wordpress', wpCredentials)}
                  style={{ flex: 1 }}
                >
                  <i className="fas fa-save"></i> Save
                </button>
                <button
                  className="btn btn-secondary"
                  onClick={() => handleTestConnection('wordpress')}
                  disabled={testLoading.wordpress}
                  style={{ flex: 1 }}

                  {testLoading.wordpress ? <span className="spinner"></span> : <i className="fas fa-check"></i>}

                Ahrefs (Chrome Extension)
              </div>
              <div className="integration-status">
                <div className={`status-dot ${integrations.ahrefs?.active ? 'connected' : 'disconnected'}`}></div>

              Install the SEO Room Chrome extension to sync Ahrefs data directly to your dashboard.
            </div>

      );
    }

    // ============ PROJECTS PAGE ============
    function ProjectsPage({ onProjectSwitch }) {
      const [projects, setProjects] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [showNewModal, setShowNewModal] = useState(false);
      const [newProjectName, setNewProjectName] = useState('');
      const [newProjectDomain, setNewProjectDomain] = useState('');

      useEffect(() => {
        loadProjects();
      }, []);

      const loadProjects = async () => {
        setLoading(true);
        setError('');
        try {
          const data = await api('/projects');
          setProjects(data.projects || []);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleCreateProject = async () => {
        if (!newProjectName.trim() || !newProjectDomain.trim()) return;
        try {
          const data = await api('/projects', {
            method: 'POST',
            body: { name: newProjectName, domain: newProjectDomain },
          });
          setProjects([...projects, data.project]);
          setNewProjectName('');
          setNewProjectDomain('');
          setShowNewModal(false);
        } catch (err) {
          setError(err.message);
        }
      };

      const handleDeleteProject = async (projectId) => {
        if (!window.confirm('Delete this project? This cannot be undone.')) return;
        try {
          await api(`/projects/${projectId}`, { method: 'DELETE' });
          setProjects((prev) => prev.filter((p) => p.id !== projectId));
        } catch (err) {
          setError(err.message);
        }
      };

      const handleSwitchProject = (project) => {
        localStorage.setItem('currentProject', project.id);
        onProjectSwitch(project);
      };

      return (
        <>
          <div className="page-header">
            <div className="page-title">
              <i className="fas fa-folder"></i> Projects
            </div>
            <div className="page-subtitle">Manage your SEO projects</div>
          </div>

          {error && <div className="alert alert-error"><i className="fas fa-exclamation-circle"></i> {error}</div>}

          <button className="btn btn-primary mb-24" onClick={() => setShowNewModal(true)}>
            <i className="fas fa-plus"></i> New Project
          </button>

          {projects.length > 0 && (
            <div>
              {projects.map((proj) => (
                <div key={proj.id} className="project-item">
                  <div className="project-info">
                    <div className="project-name">{proj.name}</div>
                    <div className="project-domain">{proj.domain}</div>
                  </div>
                  <div className="btn-group">
                    <button className="btn btn-secondary btn-small" onClick={() => handleSwitchProject(proj)}>
                      <i className="fas fa-arrow-right"></i> Switch
                    </button>
                    <button className="btn btn-danger btn-small" onClick={() => handleDeleteProject(proj.id)}>
                      <i className="fas fa-trash"></i> Delete
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}

          {!loading && projects.length === 0 && (
            <div className="empty-state">
              <div className="empty-state-icon">
                <i className="fas fa-folder-open"></i>
              </div>
              <div className="empty-state-title">No projects yet</div>
              <div>Create your first project to get started</div>
            </div>
          )}

          {showNewModal && (
            <div className="modal active">
              <div className="modal-content">
                <div className="modal-header">
                  <div className="modal-title">Create New Project</div>
                  <button className="modal-close" onClick={() => setShowNewModal(false)}>
                    <i className="fas fa-times"></i>
                  </button>
                </div>

                <div className="form-group">
                  <label className="form-label">Project Name</label>
                  <input
                    type="text"
                    className="form-input"
                    value={newProjectName}
                    onChange={(e) => setNewProjectName(e.target.value)}
                    placeholder="My Client Project"
                  />
                </div>

                <div className="form-group">
                  <label className="form-label">Domain</label>
                  <input
                    type="text"
                    className="form-input"
                    value={newProjectDomain}
                    onChange={(e) => setNewProjectDomain(e.target.value)}
                    placeholder="example.com"
                  />
                </div>

                <button className="btn btn-primary" onClick={handleCreateProject} style={{ width: '100%' }}>
                  <i className="fas fa-plus"></i> Create Project
                </button>
              </div>
            </div>
          )}
        </>
      );
    }

    // ============ MAIN APP ============
    function App() {
      const [user, setUser] = useState({ id: 1, email: 'preview@seoroom.com', name: 'Preview Mode' });

      const [project, setProject] = useState({ id: 1, name: 'House Works Plumbing', domain: 'houseworksplumbing.com.au', is_local_business: true, is_elementor_site: true });

      const [activeTab, setActiveTab] = useState('gbp-audit');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

      const handleLogout = () => {
        localStorage.removeItem('token');
        localStorage.removeItem('currentProject');
        setUser(null);
      };

      const handleProjectSwitch = (newProject) => {
        setProject(newProject);
        localStorage.setItem('currentProject', newProject.id);
      };

      if (!user) {
        return <LoginPage onLogin={setUser} />;
      }

      const renderPage = () => {
        switch (activeTab) {
          case 'gbp-audit':
            return <GBPAuditPage />;
          case 'gsc-audit':
            return <GSCAuditPage />;
          case 'technical-audit':
            return <TechnicalAuditPage />;
          case 'onpage-audit':
            return <OnPageAuditPage />;
          case 'gbp-actions':
            return <ActionPlanPage type="gbp" title="GBP Actions" icon="fas fa-map-marker-alt" />;
          case 'gsc-actions':
            return <ActionPlanPage type="gsc" title="GSC Actions" icon="fas fa-chart-line" />;
          case 'technical-actions':
            return <ActionPlanPage type="technical" title="Technical Actions" icon="fas fa-cogs" />;
          case 'onpage-actions':
            return <ActionPlanPage type="onpage" title="On-Page Actions" icon="fas fa-file-alt" />;
          case 'content-queue':
            return <CopywriterPage stage="queue" />;
          case 'drafts':
            return <CopywriterPage stage="drafts" />;
          case 'approved-content':
            return <CopywriterPage stage="approved" />;
          case 'published-content':
            return <CopywriterPage stage="published" />;
          case 'maps-rankings':
            return <MapsRankingsPage />;
          case 'serp-rankings':
            return <SERPRankingsPage />;
          case 'monthly-reports':
            return <MonthlyReportsPage />;
          case 'project-settings':
            return <ProjectSettingsPage />;
          case 'integrations':
            return <IntegrationsPage />;
          case 'projects':
            return <ProjectsPage onProjectSwitch={handleProjectSwitch} />;
          default:
            return <GBPAuditPage />;
        }
      };

      const isLocal = project?.is_local_business !== false;

      const allNavItems = [
        { section: 'AUDIT', items: [
          { id: 'gbp-audit', label: 'GBP Audit', icon: 'fas fa-map-marker-alt', localOnly: true },
          { id: 'gsc-audit', label: 'GSC Audit', icon: 'fas fa-chart-line' },
          { id: 'technical-audit', label: 'Technical Audit', icon: 'fas fa-cogs' },
          { id: 'onpage-audit', label: 'On-Page Audit', icon: 'fas fa-file-alt' },
        ]},
        { section: 'ACTION PLAN', items: [
          { id: 'gbp-actions', label: 'GBP Actions', icon: 'fas fa-map-marker-alt', localOnly: true },
          { id: 'gsc-actions', label: 'GSC Actions', icon: 'fas fa-chart-line' },
          { id: 'technical-actions', label: 'Technical Actions', icon: 'fas fa-cogs' },
          { id: 'onpage-actions', label: 'On-Page Actions', icon: 'fas fa-file-alt' },
        ]},
        { section: 'COPYWRITER', items: [
          { id: 'content-queue', label: 'Content Queue', icon: 'fas fa-inbox' },
          { id: 'drafts', label: 'Drafts', icon: 'fas fa-pen' },
          { id: 'approved-content', label: 'Approved', icon: 'fas fa-check-circle' },
          { id: 'published-content', label: 'Published', icon: 'fas fa-paper-plane' },
        ]},
        { section: 'REPORTS', items: [
          { id: 'maps-rankings', label: 'Maps Rankings', icon: 'fas fa-map', localOnly: true },
          { id: 'serp-rankings', label: 'SERP Rankings', icon: 'fas fa-search' },
          { id: 'monthly-reports', label: 'Monthly Reports', icon: 'fas fa-file-pdf' },
        ]},
        { section: 'SETTINGS', items: [
          { id: 'project-settings', label: 'Project Settings', icon: 'fas fa-cog' },
          { id: 'integrations', label: 'Integrations', icon: 'fas fa-plug' },
          { id: 'projects', label: 'Projects', icon: 'fas fa-folder' },
        ]},
      ];

      // Filter out local-only items when project is not a local business
      const navItems = allNavItems.map(group => ({
        ...group,
        items: group.items.filter(item => !item.localOnly || isLocal)
      })).filter(group => group.items.length > 0);

      return (
        <div className="app-wrapper">
          <div className={`sidebar ${mobileMenuOpen ? 'mobile-open' : ''}`}>
            <div className="sidebar-header">
              <i className="fas fa-rocket"></i>
              <span>SEO Room</span>
            </div>

            <div className="sidebar-content">
              {navItems.map((group) => (
                <div key={group.section} className="sidebar-section">
                  <div className="sidebar-section-title">{group.section}</div>
                  {group.items.map((item) => (
                    <div
                      key={item.id}
                      className={`sidebar-item ${activeTab === item.id ? 'active' : ''}`}
                      onClick={() => {
                        setActiveTab(item.id);
                        setMobileMenuOpen(false);
                      }}
                    >
                      <i className={item.icon}></i>
                      <span>{item.label}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>

            <div className="sidebar-footer">
              <select className="project-selector" onChange={(e) => handleProjectSwitch({ id: e.target.value, name: 'Project', domain: 'example.com' })}>
                <option value="1">Current Project</option>
                <option value="2">Project 2</option>
              </select>
              <button className="btn btn-danger" style={{ width: '100%' }} onClick={handleLogout}>
                <i className="fas fa-sign-out-alt"></i> Sign out
              </button>
            </div>
          </div>

          <div className="main-content">
            <div className="topbar">
              <div className="topbar-left">
                <button
                  className="btn btn-secondary"
                  style={{ display: 'none', '@media (max-width: 768px)': { display: 'block' } }}
                  onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                >
                  <i className="fas fa-bars"></i>
                </button>
                <div>
                  <div className="topbar-title">{project?.name || 'SEO Room'}</div>
                  <div className="topbar-domain">{project?.domain || 'No project selected'}</div>
                </div>
              </div>
              <div className="topbar-user">
                <span style={{ fontSize: '13px', color: 'var(--text2)' }}>{user.email}</span>
              </div>
            </div>

            <div className="page-content">
              {renderPage()}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
