    // ============ SPEED & IMAGES PAGE (standalone, moved from Technical Audit) ============
    function SpeedAuditPage({ project }) {
      const [speedResults, setSpeedResults] = useState([]);
      const [speedLoading, setSpeedLoading] = useState(false);
      const [speedError, setSpeedError] = useState('');
      const [sortCol, setSortCol] = useState('score');
      const [sortDir, setSortDir] = useState('asc');

      useEffect(() => {
        if (project?.id) loadExisting();
      }, [project?.id]);

      const loadExisting = async () => {
        try {
          const data = await api(`/projects/${project.id}/audits/speed/latest`);
          if (data.results) setSpeedResults(data.results);
        } catch (e) { /* no previous speed audit */ }
      };

      const runSpeedAudit = async () => {
        setSpeedLoading(true); setSpeedError('');
        try {
          const data = await api(`/speed-audit/${project.id}/run`, { method: 'POST' });
          setSpeedResults(data.results || []);
        } catch (err) { setSpeedError(err.message); }
        finally { setSpeedLoading(false); }
      };

      const scoreColor = (s) => s >= 90 ? '#22c55e' : s >= 50 ? '#f59e0b' : '#ef4444';
      const scoreLabel = (s) => s >= 90 ? 'Good' : s >= 50 ? 'Needs Work' : 'Poor';
      const lcpColor = (v) => { const n = parseFloat(v); return isNaN(n) ? 'var(--text3)' : n <= 2.5 ? '#22c55e' : n <= 4 ? '#f59e0b' : '#ef4444'; };
      const clsColor = (v) => { const n = parseFloat(v); return isNaN(n) ? 'var(--text3)' : n <= 0.1 ? '#22c55e' : n <= 0.25 ? '#f59e0b' : '#ef4444'; };
      const tbtColor = (v) => { const n = parseFloat(v); return isNaN(n) ? 'var(--text3)' : n <= 200 ? '#22c55e' : n <= 600 ? '#f59e0b' : '#ef4444'; };
      const fcpColor = (v) => { const n = parseFloat(v); return isNaN(n) ? 'var(--text3)' : n <= 1.8 ? '#22c55e' : n <= 3 ? '#f59e0b' : '#ef4444'; };
      const siColor = (v) => { const n = parseFloat(v); return isNaN(n) ? 'var(--text3)' : n <= 3.4 ? '#22c55e' : n <= 5.8 ? '#f59e0b' : '#ef4444'; };

      const cwvResults = useMemo(() => speedResults.filter(r => r.cwv && !r.error), [speedResults]);

      const avgScore = useMemo(() => {
        if (!cwvResults.length) return null;
        return Math.round(cwvResults.reduce((s, r) => s + (r.cwv?.score || 0), 0) / cwvResults.length);
      }, [cwvResults]);

      const stats = useMemo(() => {
        if (!cwvResults.length) return null;
        const good = cwvResults.filter(r => (r.cwv?.score || 0) >= 90).length;
        const needsWork = cwvResults.filter(r => { const s = r.cwv?.score || 0; return s >= 50 && s < 90; }).length;
        const poor = cwvResults.filter(r => (r.cwv?.score || 0) < 50).length;
        return { total: cwvResults.length, good, needsWork, poor };
      }, [cwvResults]);

      const sortedResults = useMemo(() => {
        if (!cwvResults.length) return [];
        const getVal = (r) => {
          const cwv = r.cwv || {};
          if (sortCol === 'score') return cwv.score || 0;
          if (sortCol === 'lcp') return parseFloat(cwv.lcp) || 999;
          if (sortCol === 'cls') return parseFloat(cwv.cls) || 999;
          if (sortCol === 'tbt') return parseFloat(cwv.tbt) || 999;
          if (sortCol === 'fcp') return parseFloat(cwv.fcp) || 999;
          if (sortCol === 'si') return parseFloat(cwv.si) || 999;
          return r.title || '';
        };
        return [...cwvResults].sort((a, b) => {
          const va = getVal(a), vb = getVal(b);
          if (typeof va === 'number') return sortDir === 'asc' ? va - vb : vb - va;
          return sortDir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
        });
      }, [cwvResults, sortCol, sortDir]);

      const handleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortCol(col); setSortDir(col === 'page' ? 'asc' : 'asc'); }
      };

      const sortIcon = (col) => sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-tachometer-alt" style={{ marginRight: 10, color: '#ef4444' }} />Core Web Vitals
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Google PageSpeed performance scores per page (mobile)</p>
            </div>
            <button className="btn btn-primary" onClick={runSpeedAudit} disabled={speedLoading} style={{ fontSize: 13 }}>
              {speedLoading ? <><span className="spinner"></span>Scanning...</> : <><i className="fas fa-play" style={{ marginRight: 6 }} />Run CWV Audit</>}
            </button>
          </div>

          {speedLoading && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Running Core Web Vitals Audit</div>
              <div className="audit-loading-sub">Testing each page with Google PageSpeed Insights (mobile). This takes 1-3 minutes depending on page count...</div>
            </div>
          )}

          {speedError && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{speedError}</div>}

          {stats && (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
              {[
                { label: 'Average Score', value: avgScore, color: scoreColor(avgScore) },
                { label: 'Good (90+)', value: stats.good, color: '#22c55e' },
                { label: 'Needs Work (50-89)', value: stats.needsWork, color: '#f59e0b' },
                { label: 'Poor (<50)', value: stats.poor, color: '#ef4444' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--card)', borderRadius: 10, padding: 14, textAlign: 'center', border: '1px solid var(--border)' }}>
                  <div style={{ fontSize: 28, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* CWV thresholds legend */}
          {stats && (
            <div style={{ display: 'flex', gap: 16, marginBottom: 16, fontSize: 11, color: 'var(--text3)', flexWrap: 'wrap' }}>
              <span><strong>LCP:</strong> <span style={{color:'#22c55e'}}>Good &le;2.5s</span> | <span style={{color:'#f59e0b'}}>OK &le;4s</span> | <span style={{color:'#ef4444'}}>Poor &gt;4s</span></span>
              <span><strong>CLS:</strong> <span style={{color:'#22c55e'}}>Good &le;0.1</span> | <span style={{color:'#f59e0b'}}>OK &le;0.25</span> | <span style={{color:'#ef4444'}}>Poor &gt;0.25</span></span>
              <span><strong>TBT:</strong> <span style={{color:'#22c55e'}}>Good &le;200ms</span> | <span style={{color:'#f59e0b'}}>OK &le;600ms</span> | <span style={{color:'#ef4444'}}>Poor &gt;600ms</span></span>
            </div>
          )}

          {sortedResults.length > 0 && (
            <div style={{ background: 'var(--card)', borderRadius: 10, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ borderBottom: '2px solid var(--border)' }}>
                    {[
                      { col: 'page', label: 'PAGE', width: '30%' },
                      { col: 'score', label: 'SCORE', width: '10%' },
                      { col: 'lcp', label: 'LCP', width: '12%' },
                      { col: 'fcp', label: 'FCP', width: '12%' },
                      { col: 'cls', label: 'CLS', width: '12%' },
                      { col: 'tbt', label: 'TBT', width: '12%' },
                      { col: 'si', label: 'SI', width: '12%' },
                    ].map(h => (
                      <th key={h.col} onClick={() => handleSort(h.col)} style={{ padding: '12px 10px', textAlign: h.col === 'page' ? 'left' : 'center', fontSize: 11, fontWeight: 700, color: 'var(--text3)', cursor: 'pointer', userSelect: 'none', width: h.width, whiteSpace: 'nowrap' }}>
                        {h.label}{sortIcon(h.col)}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sortedResults.map((page, idx) => {
                    const cwv = page.cwv || {};
                    const score = cwv.score || 0;
                    return (
                      <tr key={page.page_id} style={{ borderBottom: '1px solid var(--border)', background: idx % 2 === 0 ? 'transparent' : 'var(--bg)' }}>
                        <td style={{ padding: '10px 10px' }}>
                          <div style={{ fontWeight: 600, fontSize: 13 }}>{page.title || page.slug}</div>
                          <div style={{ fontSize: 11, color: 'var(--text3)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 280 }}>/{page.slug}</div>
                        </td>
                        <td style={{ textAlign: 'center', padding: '10px 6px' }}>
                          <div style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 44, height: 44, borderRadius: '50%', border: `3px solid ${scoreColor(score)}`, fontWeight: 800, fontSize: 15, color: scoreColor(score) }}>{score}</div>
                        </td>
                        <td style={{ textAlign: 'center', padding: '10px 6px', fontWeight: 600, color: lcpColor(cwv.lcp) }}>{cwv.lcp || 'N/A'}</td>
                        <td style={{ textAlign: 'center', padding: '10px 6px', fontWeight: 600, color: fcpColor(cwv.fcp) }}>{cwv.fcp || 'N/A'}</td>
                        <td style={{ textAlign: 'center', padding: '10px 6px', fontWeight: 600, color: clsColor(cwv.cls) }}>{cwv.cls || 'N/A'}</td>
                        <td style={{ textAlign: 'center', padding: '10px 6px', fontWeight: 600, color: tbtColor(cwv.tbt) }}>{cwv.tbt || 'N/A'}</td>
                        <td style={{ textAlign: 'center', padding: '10px 6px', fontWeight: 600, color: siColor(cwv.si) }}>{cwv.si || 'N/A'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Show errored pages separately */}
          {speedResults.filter(r => r.error).length > 0 && (
            <div style={{ marginTop: 16 }}>
              <div style={{ fontSize: 12, color: 'var(--text3)', fontWeight: 600, marginBottom: 8 }}>Failed to scan ({speedResults.filter(r => r.error).length} pages):</div>
              {speedResults.filter(r => r.error).map(page => (
                <div key={page.page_id} style={{ padding: '8px 12px', background: 'rgba(239,68,68,0.05)', borderRadius: 6, marginBottom: 4, fontSize: 12, display: 'flex', justifyContent: 'space-between' }}>
                  <span>{page.title || page.slug}</span>
                  <span style={{ color: '#ef4444' }}>{page.error}</span>
                </div>
              ))}
            </div>
          )}

          {!speedLoading && speedResults.length === 0 && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fas fa-tachometer-alt" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
              <div style={{ fontSize: 16, marginBottom: 8 }}>No Core Web Vitals audit run yet</div>
              <div style={{ fontSize: 13 }}>Click "Run CWV Audit" to test all pages with Google PageSpeed Insights.</div>
              <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 8 }}>Scans up to 50 pages via sitemap.xml or WordPress REST API. Shows Performance score, LCP, FCP, CLS, TBT, and Speed Index per page.</div>
            </div>
          )}
        </div>
      );
    }

    // ============ ON-PAGE AUDIT PAGE (with Yoast) ============
    // ============ INDEXING PAGE ============
    function IndexingPage({ project }) {
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [initialLoading, setInitialLoading] = useState(true);
      const [error, setError] = useState('');
      const [stats, setStats] = useState({ total: 0, indexed: 0, notIndexed: 0, errors: 0 });
      const [filter, setFilter] = useState('all');
      const [lastChecked, setLastChecked] = useState(null);

      // Load previous results on mount
      useEffect(() => {
        if (!project?.id) { setInitialLoading(false); return; }
        (async () => {
          try {
            console.log('[indexing] Loading previous results for project', project.id);
            const data = await api(`/projects/${project.id}/audits/indexing/latest`);
            console.log('[indexing] Got data:', data?.total, 'pages,', data?.results?.length, 'results');
            if (data.results && data.results.length > 0) {
              setResults(data.results);
              setStats({ total: data.total || data.results.length, indexed: data.indexed || 0, notIndexed: data.notIndexed || 0, errors: data.errors || 0 });
              if (data.completed_at) setLastChecked(new Date(data.completed_at));
              else if (data.ran_at) setLastChecked(new Date(data.ran_at));
            }
          } catch (err) { console.error('[indexing] Failed to load previous results:', err.message); }
          finally { setInitialLoading(false); }
        })();
      }, [project?.id]);

      const runCheck = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/indexing/check`, { method: 'POST' });
          setResults(data.results || []);
          setStats({ total: data.total, indexed: data.indexed, notIndexed: data.notIndexed, errors: data.errors });
          setLastChecked(new Date());
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const [expandedRow, setExpandedRow] = useState(null);
      const [actionItems, setActionItems] = useState({});
      const [addingAction, setAddingAction] = useState(null);

      // Detect fix type + assignee for indexing issues
      const getIndexingFixType = (page) => {
        const state = (page.coverageState || '').toLowerCase();
        const robots = (page.robotsTxtState || '').toLowerCase();
        const indexing = (page.indexingState || '').toLowerCase();
        // Blocked by robots.txt → Manual (Cloudflare/hosting)
        if (robots === 'disallowed' || /blocked.*robot/i.test(state))
          return { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280', assignee: 'SEO Specialist', assigneeIcon: 'fas fa-user',
            steps: ['Log into Cloudflare or hosting panel', 'Find robots.txt rules', 'Remove or modify the Disallow rule for this path', 'Save and verify at /robots.txt', 'Request indexing in Google Search Console', 'Re-check in 1 week'] };
        // Noindex tag → Plugin (Yoast)
        if (/noindex/i.test(indexing) || /noindex/i.test(state))
          return { type: 'plugin', label: 'Plugin', icon: 'fas fa-wrench', color: '#f59e0b', assignee: 'WordPress Plugin', assigneeIcon: 'fas fa-wrench',
            steps: ['Open page in WordPress editor', 'Go to Yoast SEO → Advanced tab', 'Change "Allow search engines to show this page" to Yes', 'Update the page', 'Request indexing in GSC'] };
        // Redirect → Manual
        if (/redirect/i.test(state))
          return { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280', assignee: 'SEO Specialist', assigneeIcon: 'fas fa-user',
            steps: ['Check if redirect is intentional (301 to new URL)', 'If unintentional: remove redirect in WordPress → Redirection plugin', 'If redirect chain (A→B→C): update to direct A→C', 'Verify the final destination page exists and is indexable', 'Request indexing of correct URL in GSC'] };
        // 404 / Soft 404 → Manual
        if (/404|not.?found/i.test(state))
          return { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280', assignee: 'SEO Specialist', assigneeIcon: 'fas fa-user',
            steps: ['Decide: restore the page OR set up 301 redirect to relevant page', 'If restoring: recreate content with 500+ words', 'If redirecting: add 301 in WordPress → Redirection plugin', 'Update internal links pointing to this URL', 'Request indexing in GSC'] };
        // Crawled but not indexed → Plugin (content improvement)
        if (/crawled/i.test(state))
          return { type: 'plugin', label: 'Plugin', icon: 'fas fa-wrench', color: '#f59e0b', assignee: 'WordPress Plugin', assigneeIcon: 'fas fa-wrench',
            steps: ['Add at least 500+ unique, valuable words to the page', 'Add 3-5 internal links from your highest-traffic indexed pages', 'Add structured data (FAQ schema, LocalBusiness schema)', 'Ensure meta title and description are unique and keyword-optimized', 'Request indexing in Google Search Console', 'Re-check in 2 weeks'] };
        // Discovered but not crawled → API (request crawl)
        if (/discovered/i.test(state))
          return { type: 'api', label: 'Automated', icon: 'fas fa-robot', color: '#3b82f6', assignee: 'SEO Room (Auto)', assigneeIcon: 'fas fa-robot',
            steps: ['Add internal links from homepage and main service pages', 'Verify page is in sitemap.xml', 'Check robots.txt is not blocking', 'Submit URL for indexing via Search Console API', 'Re-check in 1 week'] };
        // Default → Manual
        return { type: 'manual', label: 'Manual', icon: 'fas fa-user', color: '#6b7280', assignee: 'SEO Specialist', assigneeIcon: 'fas fa-user',
          steps: ['Investigate the specific indexing issue', 'Check Google Search Console for details', 'Fix the root cause', 'Request indexing', 'Re-check in 1-2 weeks'] };
      };

      const addIndexingAction = async (page, idx) => {
        setAddingAction(idx);
        const fix = getIndexingFixType(page);
        try {
          const resp = await api(`/projects/${project.id}/action-items`, {
            method: 'POST',
            body: {
              pillar: 'website',
              category: 'indexing',
              title: `Fix indexing: ${page.path}`,
              description: `${page.coverageState || 'Not indexed'} — ${fix.steps.join('; ')}`,
              severity: /crawled/i.test(page.coverageState || '') ? 'medium' : 'critical',
              status: 'pending',
              execution_type: fix.type,
            }
          });
          const item = resp.action_item || {};
          setActionItems(prev => ({ ...prev, [idx]: { id: item.id, ...fix, status: 'pending' } }));
        } catch (err) { setError(err.message); }
        setAddingAction(null);
      };

      const updateIndexingStatus = async (idx, newStatus) => {
        const item = actionItems[idx];
        if (!item?.id) return;
        try {
          await api('/action-items/' + item.id, { method: 'PUT', body: { status: newStatus } });
          setActionItems(prev => ({ ...prev, [idx]: { ...prev[idx], status: newStatus } }));
        } catch (e) { console.error('Failed to update:', e); }
      };

      const resetIndexingAction = (idx) => {
        setActionItems(prev => { const next = { ...prev }; delete next[idx]; return next; });
      };

      const filtered = filter === 'all' ? results
        : filter === 'indexed' ? results.filter(r => r.verdict === 'PASS')
        : filter === 'not-indexed' ? results.filter(r => r.verdict === 'FAIL' || r.verdict === 'NEUTRAL')
        : results.filter(r => r.verdict === 'ERROR');

      const verdictColor = (v) => v === 'PASS' ? '#22c55e' : v === 'FAIL' ? '#ef4444' : v === 'NEUTRAL' ? '#f59e0b' : '#64748b';
      const verdictLabel = (r) => {
        if (r.verdict === 'PASS') return 'Indexed';
        if (r.verdict === 'FAIL') return r.coverageState || 'Not Indexed';
        if (r.verdict === 'NEUTRAL') return r.coverageState || 'Excluded';
        return r.coverageState || 'Error';
      };

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-file-import" style={{ marginRight: 10, color: 'var(--accent)' }} />Indexing Status
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Check which pages are indexed by Google — home, services, and suburb pages</p>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              {lastChecked && <span style={{ fontSize: 12, color: 'var(--text3)' }}>Last checked: {lastChecked.toLocaleDateString()} {lastChecked.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>}
              <button className="btn btn-primary" onClick={runCheck} disabled={loading} style={{ fontSize: 13 }}>
                {loading ? <><span className="spinner"></span>Checking...</> : <><i className="fas fa-sync" style={{ marginRight: 6 }} />{results.length > 0 ? 'Re-check' : 'Check Indexing'}</>}
              </button>
            </div>
          </div>

          {loading && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Checking Indexing Status</div>
              <div className="audit-loading-sub">Inspecting each page via Google Search Console API... this may take a minute</div>
            </div>
          )}

          {error && <div style={{ padding: 12, background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 8, color: '#ef4444', fontSize: 13, marginBottom: 16 }}><i className="fas fa-exclamation-circle" style={{ marginRight: 6 }} />{error}</div>}

          {!loading && results.length > 0 && <>
            {/* Stats */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
              {[
                { label: 'Total Pages', value: stats.total, color: 'var(--primary)', icon: 'fas fa-globe' },
                { label: 'Indexed', value: stats.indexed, color: '#22c55e', icon: 'fas fa-check-circle' },
                { label: 'Not Indexed', value: stats.notIndexed, color: '#ef4444', icon: 'fas fa-times-circle' },
                { label: 'Errors', value: stats.errors, color: '#64748b', icon: 'fas fa-exclamation-triangle' },
              ].map(s => (
                <div key={s.label} style={{ background: 'var(--card)', borderRadius: 12, padding: 16, textAlign: 'center', border: '1px solid var(--border)', cursor: 'pointer' }}
                  onClick={() => setFilter(s.label === 'Total Pages' ? 'all' : s.label === 'Indexed' ? 'indexed' : s.label === 'Not Indexed' ? 'not-indexed' : 'errors')}>
                  <i className={s.icon} style={{ fontSize: 20, color: s.color, marginBottom: 8, display: 'block' }} />
                  <div style={{ fontSize: 32, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2, textTransform: 'uppercase', letterSpacing: 1 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Filter tabs */}
            <div style={{ display: 'flex', gap: 4, marginBottom: 16, background: 'var(--bg)', borderRadius: 8, padding: 3 }}>
              {[
                { id: 'all', label: `All (${stats.total})` },
                { id: 'indexed', label: `Indexed (${stats.indexed})` },
                { id: 'not-indexed', label: `Not Indexed (${stats.notIndexed})` },
                { id: 'errors', label: `Errors (${stats.errors})` },
              ].map(t => (
                <button key={t.id} onClick={() => setFilter(t.id)} style={{
                  flex: 1, padding: '8px 12px', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 12, fontWeight: 600,
                  background: filter === t.id ? 'var(--primary)' : 'transparent',
                  color: filter === t.id ? '#fff' : 'var(--text3)',
                }}>{t.label}</button>
              ))}
            </div>

            {/* Results table */}
            <div style={{ background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '2fr 1.5fr 1fr 1fr 0.8fr 0.3fr', padding: '12px 16px', background: 'var(--bg)', fontSize: 11, fontWeight: 700, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: 0.5, borderBottom: '1px solid var(--border)' }}>
                <span>Page URL</span>
                <span>Status</span>
                <span>Last Crawl</span>
                <span>Mobile</span>
                <span>Robots</span>
                <span></span>
              </div>
              {filtered.map((r, idx) => {
                const isExpanded = expandedRow === idx;
                const isNotIndexed = r.verdict === 'FAIL' || r.verdict === 'NEUTRAL';
                const isCrawled = r.coverageState?.includes('Crawled');
                const isDiscovered = r.coverageState?.includes('Discovered');
                return (
                <div key={idx}>
                  <div onClick={() => isNotIndexed && setExpandedRow(isExpanded ? null : idx)}
                    style={{ display: 'grid', gridTemplateColumns: '2fr 1.5fr 1fr 1fr 0.8fr 0.3fr', padding: '10px 16px', borderBottom: isExpanded ? 'none' : '1px solid var(--border)', fontSize: 13, alignItems: 'center', cursor: isNotIndexed ? 'pointer' : 'default',
                    background: r.verdict === 'FAIL' ? 'rgba(239,68,68,0.05)' : r.verdict === 'NEUTRAL' ? 'rgba(245,158,11,0.05)' : 'transparent' }}>
                    <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      <span style={{ fontWeight: 600 }}>{r.path}</span>
                      {r.googleCanonical && r.googleCanonical !== r.url && (
                        <div style={{ fontSize: 10, color: '#f59e0b', marginTop: 2 }}>Canonical: {r.googleCanonical}</div>
                      )}
                    </div>
                    <div>
                      <span style={{ display: 'inline-block', padding: '3px 10px', borderRadius: 6, fontSize: 11, fontWeight: 700,
                        background: `${verdictColor(r.verdict)}20`, color: verdictColor(r.verdict) }}>
                        {verdictLabel(r)}
                      </span>
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--text3)' }}>
                      {r.lastCrawlTime ? new Date(r.lastCrawlTime).toLocaleDateString() : '—'}
                    </div>
                    <div>
                      {r.mobileVerdict === 'PASS' ? <span style={{ color: '#22c55e', fontSize: 12 }}><i className="fas fa-check" /> OK</span>
                        : r.mobileVerdict === 'FAIL' ? <span style={{ color: '#ef4444', fontSize: 12 }}><i className="fas fa-times" /> Fail</span>
                        : <span style={{ color: 'var(--text3)', fontSize: 12 }}>—</span>}
                    </div>
                    <div style={{ fontSize: 12, color: r.robotsTxtState === 'ALLOWED' ? '#22c55e' : r.robotsTxtState === 'DISALLOWED' ? '#ef4444' : 'var(--text3)' }}>
                      {r.robotsTxtState === 'ALLOWED' ? 'Allowed' : r.robotsTxtState === 'DISALLOWED' ? 'Blocked' : '—'}
                    </div>
                    <div>{isNotIndexed && <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'}`} style={{ color: 'var(--text3)', fontSize: 11 }} />}</div>
                  </div>
                  {isExpanded && (
                    <div style={{ padding: '12px 16px 16px', background: 'rgba(239,68,68,0.03)', borderBottom: '1px solid var(--border)' }}>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12 }}>
                        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4, textTransform: 'uppercase', fontWeight: 700 }}>Why not indexed</div>
                          <div style={{ fontSize: 13 }}>
                            {isCrawled ? 'Google crawled this page but decided the content is not valuable enough to index. Common causes: thin content (<300 words), duplicate content, low internal links, or poor content quality.'
                              : isDiscovered ? 'Google knows this page exists but hasn\'t fully crawled it yet. This means the page has low priority — not enough internal links or authority signals.'
                              : r.coverageState || 'Unknown reason.'}
                          </div>
                        </div>
                        <div style={{ background: 'var(--bg)', borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4, textTransform: 'uppercase', fontWeight: 700 }}>Details</div>
                          <div style={{ fontSize: 12, display: 'flex', flexDirection: 'column', gap: 4 }}>
                            <span><strong>Status:</strong> {r.coverageState}</span>
                            <span><strong>Last Crawl:</strong> {r.lastCrawlTime ? new Date(r.lastCrawlTime).toLocaleDateString() : 'Never'}</span>
                            <span><strong>Crawled As:</strong> {r.crawledAs || '—'}</span>
                            <span><strong>Robots:</strong> {r.robotsTxtState || '—'}</span>
                            <span><strong>Indexing:</strong> {r.indexingState || '—'}</span>
                          </div>
                        </div>
                      </div>
                      {(() => {
                        const fix = getIndexingFixType(r);
                        const ai = actionItems[idx];
                        const st = ai?.status || 'pending';
                        const statusOptions = (ai?.type || fix.type) === 'manual'
                          ? [{ value: 'pending', label: 'Not Started' }, { value: 'in_progress', label: 'In Progress' }, { value: 'done', label: 'Done' }]
                          : [{ value: 'pending', label: 'Ready' }, { value: 'in_progress', label: 'Running' }, { value: 'done', label: 'Done' }];
                        const statusColors = { pending: '#6b7280', in_progress: '#f59e0b', done: '#22c55e' };
                        return (
                          <>
                            {/* Steps + Assignee + Action in one block */}
                            <div style={{ background: 'rgba(34,197,94,0.08)', borderRadius: 8, padding: 12, marginBottom: 12, border: '1px solid rgba(34,197,94,0.2)' }}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                                <div style={{ fontSize: 11, color: '#22c55e', textTransform: 'uppercase', fontWeight: 700 }}>
                                  <i className="fas fa-lightbulb" style={{ marginRight: 4 }} />How to fix
                                </div>
                                <div style={{ fontSize: 12, color: fix.color, fontWeight: 600 }}>
                                  <i className={fix.assigneeIcon} style={{ marginRight: 5, fontSize: 11 }} />{fix.assignee}
                                </div>
                              </div>
                              <ol style={{ fontSize: 13, margin: 0, paddingLeft: 20, display: 'flex', flexDirection: 'column', gap: 4 }}>
                                {fix.steps.map((step, si) => <li key={si}>{step}</li>)}
                              </ol>
                            </div>
                            {/* Action controls */}
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                              {ai ? (
                                <>
                                  <button onClick={() => resetIndexingAction(idx)} style={{ fontSize: 10, padding: '4px 8px', background: 'transparent', border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text3)', cursor: 'pointer' }} title="Reset">
                                    <i className="fas fa-undo" />
                                  </button>
                                  <div style={{ fontSize: 12, color: ai.color || '#6b7280', fontWeight: 600 }}>
                                    <i className={ai.assigneeIcon || 'fas fa-user'} style={{ marginRight: 5, fontSize: 11 }} />{ai.assignee}
                                  </div>
                                  <select value={st} onChange={e => updateIndexingStatus(idx, e.target.value)} style={{
                                    fontSize: 11, fontWeight: 600, padding: '4px 8px', borderRadius: 5,
                                    border: '1px solid ' + statusColors[st] + '50',
                                    background: statusColors[st] + '15', color: statusColors[st],
                                    cursor: 'pointer', outline: 'none'
                                  }}>
                                    {statusOptions.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                                  </select>
                                  {ai.type !== 'manual' && st === 'pending' && (
                                    <button onClick={() => updateIndexingStatus(idx, 'in_progress')} style={{
                                      fontSize: 11, fontWeight: 700, padding: '4px 14px', borderRadius: 5, border: 'none',
                                      background: ai.color || '#3b82f6', color: '#fff', cursor: 'pointer'
                                    }}>
                                      <i className="fas fa-play" style={{ marginRight: 4, fontSize: 9 }} />Start
                                    </button>
                                  )}
                                </>
                              ) : (
                                <button className="btn btn-primary" onClick={() => addIndexingAction(r, idx)} disabled={addingAction === idx} style={{ fontSize: 12 }}>
                                  {addingAction === idx ? <><span className="spinner" style={{ width: 14, height: 14, marginRight: 6 }}></span>Adding...</> : <><i className="fas fa-plus" style={{ marginRight: 6 }} />Add to Actions</>}
                                </button>
                              )}
                            </div>
                          </>
                        );
                      })()}
                    </div>
                  )}
                </div>
                );
              })}
            </div>
          </>}

          {!loading && !initialLoading && results.length === 0 && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fas fa-file-import" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />
              <div style={{ fontSize: 16, marginBottom: 8 }}>No indexing check run yet</div>
              <div style={{ fontSize: 13 }}>Click "Check Indexing" to inspect all pages via Google Search Console API.</div>
              <div style={{ fontSize: 12, marginTop: 8, color: 'var(--text3)' }}>Requires GSC connected in Agency Integrations.</div>
            </div>
          )}
          {initialLoading && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <span className="spinner" style={{ marginBottom: 12, display: 'inline-block' }}></span>
              <div style={{ fontSize: 13 }}>Loading previous results...</div>
            </div>
          )}
        </div>
      );
    }

    // ============ CITATIONS & DIRECTORIES PAGE ============
    function CitationsPage({ project }) {
      const [directories, setDirectories] = useState([]);
      const [stats, setStats] = useState({ total: 0, listed: 0, pending: 0, not_listed: 0 });
      const [loading, setLoading] = useState(true);
      const [editingDir, setEditingDir] = useState(null);
      const [editUrl, setEditUrl] = useState('');
      const [editNotes, setEditNotes] = useState('');
      const [saving, setSaving] = useState(null);
      const [scanning, setScanning] = useState(false);
      const [filter, setFilter] = useState('all');

      useEffect(() => {
        if (project?.id) loadCitations();
      }, [project?.id]);

      const loadCitations = async () => {
        setLoading(true);
        try {
          const data = await api(`/projects/${project.id}/citations`);
          setDirectories(data.directories || []);
          setStats(data.stats || { total: 0, listed: 0, pending: 0, not_listed: 0 });
        } catch (e) { console.error('Load citations:', e); }
        finally { setLoading(false); }
      };

      const scanCitations = async () => {
        setScanning(true);
        try {
          const data = await api(`/projects/${project.id}/citations/scan`, { method: 'POST' });
          // Reload to get fresh data
          await loadCitations();
        } catch (e) { console.error('Scan citations:', e); }
        finally { setScanning(false); }
      };

      const recalcStats = (dirs) => ({
        total: dirs.length,
        listed: dirs.filter(d => d.status === 'listed').length,
        pending: dirs.filter(d => d.status === 'pending').length,
        not_listed: dirs.filter(d => d.status === 'not_listed').length,
      });

      const updateStatus = async (dir, newStatus) => {
        setSaving(dir.name);
        try {
          await api(`/projects/${project.id}/citations/${encodeURIComponent(dir.name)}`, {
            method: 'PUT',
            body: { status: newStatus, listing_url: dir.listing_url, notes: dir.notes },
          });
          const updated = directories.map(d => d.name === dir.name ? { ...d, status: newStatus, updated_at: new Date().toISOString() } : d);
          setDirectories(updated);
          setStats(recalcStats(updated));
        } catch (e) { console.error('Update citation:', e); }
        finally { setSaving(null); }
      };

      const saveDetails = async (dir) => {
        setSaving(dir.name);
        try {
          await api(`/projects/${project.id}/citations/${encodeURIComponent(dir.name)}`, {
            method: 'PUT',
            body: { status: dir.status, listing_url: editUrl, notes: editNotes },
          });
          setDirectories(prev => prev.map(d => d.name === dir.name ? { ...d, listing_url: editUrl, notes: editNotes } : d));
          setEditingDir(null);
        } catch (e) { console.error('Save citation details:', e); }
        finally { setSaving(null); }
      };

      const typeColor = { Essential: '#22c55e', Major: '#3b82f6', Industry: '#f59e0b', Standard: '#64748b' };
      const statusColor = { listed: '#22c55e', pending: '#f59e0b', not_listed: '#64748b' };

      const tiers = [
        { key: 'Essential', label: 'Essential Platforms', desc: 'Must-have listings — direct ranking impact', icon: 'fas fa-star' },
        { key: 'Major', label: 'Major Directories', desc: 'High authority Australian directories', icon: 'fas fa-building' },
        { key: 'Industry', label: 'Industry-Specific', desc: 'Trade & service platforms — leads + citations', icon: 'fas fa-hard-hat' },
        { key: 'Standard', label: 'Standard Directories', desc: 'Additional citation sources for NAP consistency', icon: 'fas fa-list' },
      ];

      if (loading) return (
        <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
          <span className="spinner" style={{ marginBottom: 12, display: 'inline-block' }}></span>
          <div style={{ fontSize: 13 }}>Loading citations...</div>
        </div>
      );

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <div>
              <h2 style={{ fontSize: 22, fontWeight: 700, margin: 0 }}>
                <i className="fas fa-building" style={{ marginRight: 10, color: 'var(--accent)' }} />Citations & Directories
              </h2>
              <p style={{ color: 'var(--text3)', fontSize: 13, marginTop: 4 }}>Track your business listings across Australian directories — NAP consistency is a key local ranking factor</p>
            </div>
            <button className="btn btn-primary" onClick={scanCitations} disabled={scanning} style={{ fontSize: 13 }}>
              {scanning ? <><span className="spinner"></span>Scanning...</> : <><i className="fas fa-search" style={{ marginRight: 6 }} />Scan All Directories</>}
            </button>
          </div>

          {scanning && (
            <div className="audit-loading-overlay">
              <span className="spinner-large"></span>
              <div className="audit-loading-text">Scanning Citations</div>
              <div className="audit-loading-sub">Checking each directory for your business listing via Google... this takes 1-2 minutes</div>
            </div>
          )}

          {/* Stats */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 24 }}>
            {[
              { id: 'all', label: 'Total Directories', value: stats.total, color: 'var(--primary)', icon: 'fas fa-globe' },
              { id: 'listed', label: 'Listed', value: stats.listed, color: '#22c55e', icon: 'fas fa-check-circle' },
              { id: 'pending', label: 'Pending', value: stats.pending, color: '#f59e0b', icon: 'fas fa-clock' },
              { id: 'not_listed', label: 'Not Listed', value: stats.not_listed, color: '#ef4444', icon: 'fas fa-times-circle' },
            ].map(s => (
              <div key={s.id} onClick={() => setFilter(s.id)} style={{ background: 'var(--card)', borderRadius: 12, padding: 16, textAlign: 'center', border: filter === s.id ? `2px solid ${s.color}` : '1px solid var(--border)', cursor: 'pointer', opacity: filter === 'all' || filter === s.id ? 1 : 0.5, transition: 'all 0.2s' }}>
                <i className={s.icon} style={{ fontSize: 20, color: s.color, marginBottom: 8, display: 'block' }} />
                <div style={{ fontSize: 32, fontWeight: 800, color: s.color }}>{s.value}</div>
                <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2, textTransform: 'uppercase', letterSpacing: 1 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text3)', marginBottom: 6 }}>
              <span>Citation Coverage</span>
              <span>{stats.total > 0 ? Math.round((stats.listed / stats.total) * 100) : 0}%</span>
            </div>
            <div style={{ height: 8, background: 'var(--bg)', borderRadius: 4, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${stats.total > 0 ? (stats.listed / stats.total) * 100 : 0}%`, background: 'linear-gradient(90deg, #22c55e, #16a34a)', borderRadius: 4, transition: 'width 0.3s' }} />
            </div>
          </div>

          {/* Directory tiers */}
          {filter !== 'all' && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16, fontSize: 13, color: 'var(--text3)' }}>
              <span>Showing: <strong style={{ color: 'var(--text1)' }}>{filter === 'listed' ? 'Listed' : filter === 'pending' ? 'Pending' : 'Not Listed'}</strong></span>
              <button onClick={() => setFilter('all')} style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: 12 }}>Clear filter</button>
            </div>
          )}

          {tiers.map(tier => {
            const allTierDirs = directories.filter(d => d.type === tier.key).length;
            const tierDirs = directories.filter(d => d.type === tier.key && (filter === 'all' || d.status === filter));
            if (tierDirs.length === 0) return null;
            const tierListed = directories.filter(d => d.type === tier.key && d.status === 'listed').length;
            return (
              <div key={tier.key} style={{ marginBottom: 20 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                  <i className={tier.icon} style={{ color: typeColor[tier.key], fontSize: 16 }} />
                  <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--text1)' }}>{tier.label}</span>
                  <span style={{ fontSize: 12, color: 'var(--text3)' }}>— {tier.desc}</span>
                  <span style={{ marginLeft: 'auto', fontSize: 12, fontWeight: 600, color: tierListed === allTierDirs ? '#22c55e' : 'var(--text3)' }}>
                    {filter === 'all' ? `${tierListed}/${allTierDirs}` : `${tierDirs.length} shown`}
                  </span>
                </div>
                <div style={{ background: 'var(--card)', borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden' }}>
                  {tierDirs.map((dir, idx) => {
                    const isEditing = editingDir === dir.name;
                    return (
                      <div key={dir.name} style={{ borderBottom: idx < tierDirs.length - 1 ? '1px solid var(--border)' : 'none' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 0.8fr', padding: '12px 16px', alignItems: 'center', gap: 12 }}>
                          {/* Directory info */}
                          <div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <span style={{ fontWeight: 600, fontSize: 13 }}>{dir.name}</span>
                              {dir.free ? (
                                <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(34,197,94,0.15)', color: '#22c55e', fontWeight: 600 }}>FREE</span>
                              ) : (
                                <span style={{ fontSize: 10, padding: '2px 6px', borderRadius: 4, background: 'rgba(245,158,11,0.15)', color: '#f59e0b', fontWeight: 600 }}>PAID</span>
                              )}
                              {dir.paid_option && <span style={{ fontSize: 10, color: 'var(--text3)' }}>{dir.paid_option}</span>}
                            </div>
                            <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 2 }}>{dir.description}</div>
                            {dir.listing_url && <a href={dir.listing_url} target="_blank" rel="noopener" style={{ fontSize: 11, color: 'var(--accent)', textDecoration: 'none' }}><i className="fas fa-link" style={{ marginRight: 4, fontSize: 9 }} />{dir.listing_url}</a>}
                          </div>

                          {/* URL */}
                          <div>
                            <a href={`https://${dir.url}`} target="_blank" rel="noopener" style={{ fontSize: 12, color: 'var(--accent)', textDecoration: 'none' }}>
                              <i className="fas fa-external-link-alt" style={{ marginRight: 4, fontSize: 10 }} />{dir.url}
                            </a>
                          </div>

                          {/* Status dropdown */}
                          <div>
                            <select
                              value={dir.status}
                              onChange={(e) => updateStatus(dir, e.target.value)}
                              disabled={saving === dir.name}
                              style={{
                                background: `${statusColor[dir.status]}18`,
                                color: statusColor[dir.status],
                                border: `1px solid ${statusColor[dir.status]}40`,
                                borderRadius: 6, padding: '5px 8px', fontSize: 12, fontWeight: 600, cursor: 'pointer', width: '100%',
                              }}
                            >
                              <option value="not_listed">Not Listed</option>
                              <option value="pending">Pending</option>
                              <option value="listed">Listed</option>
                            </select>
                          </div>

                          {/* Actions */}
                          <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                            <button
                              className="btn btn-secondary btn-small"
                              onClick={() => { setEditingDir(isEditing ? null : dir.name); setEditUrl(dir.listing_url || ''); setEditNotes(dir.notes || ''); }}
                              style={{ fontSize: 11, padding: '4px 8px' }}
                            >
                              <i className={`fas fa-${isEditing ? 'times' : 'edit'}`} />
                            </button>
                          </div>
                        </div>

                        {/* Expanded edit row */}
                        {isEditing && (
                          <div style={{ padding: '8px 16px 14px', background: 'rgba(99,102,241,0.03)', borderTop: '1px dashed var(--border)', display: 'flex', gap: 12, alignItems: 'flex-end' }}>
                            <div style={{ flex: 2 }}>
                              <label style={{ fontSize: 10, color: 'var(--text3)', textTransform: 'uppercase', fontWeight: 600, display: 'block', marginBottom: 4 }}>Listing URL</label>
                              <input type="text" className="form-input" value={editUrl} onChange={e => setEditUrl(e.target.value)} placeholder="https://..." style={{ fontSize: 12 }} />
                            </div>
                            <div style={{ flex: 2 }}>
                              <label style={{ fontSize: 10, color: 'var(--text3)', textTransform: 'uppercase', fontWeight: 600, display: 'block', marginBottom: 4 }}>Notes</label>
                              <input type="text" className="form-input" value={editNotes} onChange={e => setEditNotes(e.target.value)} placeholder="e.g. Listed on 2024-01-15, claimed" style={{ fontSize: 12 }} />
                            </div>
                            <button className="btn btn-primary btn-small" onClick={() => saveDetails(dir)} disabled={saving === dir.name} style={{ fontSize: 11, whiteSpace: 'nowrap' }}>
                              {saving === dir.name ? <span className="spinner" style={{ width: 12, height: 12 }}></span> : <><i className="fas fa-save" style={{ marginRight: 4 }} />Save</>}
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ============ ON-PAGE AUDIT PAGE (with Yoast) ============
    function OnPageAuditPage({ project }) {
      const [pages, setPages] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [expandedPage, setExpandedPage] = useState(null);
      const [sortBy, setSortBy] = useState(null);
      const [sortDir, setSortDir] = useState('asc');
      const [selected, setSelected] = useState(new Set());
      const [fixModal, setFixModal] = useState(null); // null | { pages, suggestions, loading, history: [[...], ...], historyIdx }
      const [fixing, setFixing] = useState(false);
      const [changeHistory, setChangeHistory] = useState([]);
      const [showHistory, setShowHistory] = useState(false);
      const [rollingBack, setRollingBack] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [statFilter, setStatFilter] = useState(null); // null | 'green' | 'orange' | 'red' | 'missingMeta' | 'noFocus'
      const [editingKeyword, setEditingKeyword] = useState({});
      const [savingKeyword, setSavingKeyword] = useState(null);

      const cancelEditKeyword = (pageId) => {
        setEditingKeyword(prev => {
          const next = Object.assign({}, prev);
          delete next[pageId];
          return next;
        });
      };

      const handleSaveKeyword = async (page) => {
        const newKw = (editingKeyword[page.id] || '').trim();
        if (newKw === (page.focusKeyword || '')) { cancelEditKeyword(page.id); return; }
        setSavingKeyword(page.id);
        try {
          await api('/projects/' + project.id + '/onpage-audit/update-keyword', {
            method: 'POST',
            body: { page_id: page.id, keyword: newKw },
          });
          setPages(prev => prev.map(p => p.id === page.id ? Object.assign({}, p, { focusKeyword: newKw }) : p));
          cancelEditKeyword(page.id);
          loadHistory();
        } catch (e) { alert('Failed to save keyword: ' + e.message); }
        setSavingKeyword(null);
      };

      const toggleSort = (col) => {
        if (sortBy === col) { setSortDir(d => d === 'asc' ? 'desc' : 'asc'); }
        else { setSortBy(col); setSortDir('asc'); }
      };

      useEffect(() => {
        if (project) { loadExisting(); loadHistory(); }
      }, [project?.id]);

      const loadExisting = async () => {
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/results`);
          if (data?.pages) setPages(data.pages);
        } catch (e) { /* no previous results */ }
      };

      const loadHistory = async () => {
        try {
          const data = await api(`/projects/${project.id}/wp-changes`);
          if (data?.changes) setChangeHistory(data.changes);
        } catch (e) { /* no history */ }
      };

      const runAudit = async () => {
        setLoading(true); setError('');
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/run`, { method: 'POST' });
          if (data?.pages) { setPages(data.pages); setSelected(new Set()); }
          else if (data?.error) setError(data.error);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };

      const yoastDot = (score) => ({
        green: { color: '#22c55e', icon: 'fas fa-circle' },
        orange: { color: '#f59e0b', icon: 'fas fa-circle' },
        red: { color: '#ef4444', icon: 'fas fa-circle' },
      }[score] || { color: '#6b7280', icon: 'fas fa-circle' });

      const issueIcon = (type) => ({
        problem: { color: '#ef4444', icon: 'fas fa-times-circle' },
        warning: { color: '#f59e0b', icon: 'fas fa-exclamation-circle' },
        good: { color: '#22c55e', icon: 'fas fa-check-circle' },
      }[type] || { color: '#6b7280', icon: 'fas fa-circle' });

      const hasProblems = (p) => (p.issues || []).some(i => i.type === 'problem' || i.type === 'warning');
      const fixablePages = pages.filter(hasProblems);

      const overallStats = useMemo(() => {
        if (!pages.length) return null;
        return {
          green: pages.filter(p => p.yoastScore === 'green').length,
          orange: pages.filter(p => p.yoastScore === 'orange').length,
          red: pages.filter(p => p.yoastScore === 'red').length,
          avgWords: Math.round(pages.reduce((s, p) => s + p.wordCount, 0) / pages.length),
          missingMeta: pages.filter(p => !p.metaDesc || p.metaDescLen < 50).length,
          noFocus: pages.filter(p => !p.focusKeyword).length,
        };
      }, [pages]);

      const sortedPages = useMemo(() => {
        if (!sortBy) return pages;
        const scoreVal = { green: 3, orange: 2, red: 1 };
        return [...pages].sort((a, b) => {
          let av, bv;
          switch (sortBy) {
            case 'seo': av = scoreVal[a.yoastScore] || 0; bv = scoreVal[b.yoastScore] || 0; break;
            case 'words': av = a.wordCount || 0; bv = b.wordCount || 0; break;
            case 'links': av = a.internalLinks || 0; bv = b.internalLinks || 0; break;
            case 'issues': av = (a.issues || []).filter(i => i.type === 'problem').length; bv = (b.issues || []).filter(i => i.type === 'problem').length; break;
            case 'page': av = (a.title || '').toLowerCase(); bv = (b.title || '').toLowerCase(); return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            case 'keyword': av = (a.focusKeyword || '').toLowerCase(); bv = (b.focusKeyword || '').toLowerCase(); return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            default: return 0;
          }
          return sortDir === 'asc' ? av - bv : bv - av;
        });
      }, [pages, sortBy, sortDir]);

      const filteredPages = useMemo(() => {
        let list = sortedPages;
        // Apply stat card filter
        if (statFilter === 'green') list = list.filter(p => p.yoastScore === 'green');
        else if (statFilter === 'orange') list = list.filter(p => p.yoastScore === 'orange');
        else if (statFilter === 'red') list = list.filter(p => p.yoastScore === 'red');
        else if (statFilter === 'missingMeta') list = list.filter(p => !p.metaDesc || p.metaDescLen < 50);
        else if (statFilter === 'noFocus') list = list.filter(p => !p.focusKeyword);
        // Apply search
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          list = list.filter(p =>
            (p.title || '').toLowerCase().includes(q) ||
            (p.url || '').toLowerCase().includes(q) ||
            (p.focusKeyword || '').toLowerCase().includes(q) ||
            (p.metaTitle || '').toLowerCase().includes(q)
          );
        }
        return list;
      }, [sortedPages, searchQuery, statFilter]);

      const toggleSelect = (id, e) => {
        e.stopPropagation();
        setSelected(prev => { const s = new Set(prev); s.has(id) ? s.delete(id) : s.add(id); return s; });
      };
      const selectAllFixable = () => {
        const pool = statFilter ? filteredPages.filter(hasProblems) : fixablePages;
        if (selected.size === pool.length) setSelected(new Set());
        else setSelected(new Set(pool.map(p => p.id)));
      };

      // Open fix modal — get AI suggestions
      const openFixModal = async (targetPages, regenerate) => {
        var placeholder = targetPages.map(function(p) { return { id: p.id, suggested_title: p.metaTitle, suggested_desc: p.metaDesc, suggested_keyword: p.focusKeyword || '' }; });
        if (!regenerate) {
          setFixModal({ pages: targetPages, suggestions: placeholder, loading: true, history: [], historyIdx: -1 });
        } else {
          setFixModal(function(prev) { return Object.assign({}, prev, { loading: true }); });
        }
        try {
          var data = await api('/projects/' + project.id + '/onpage-audit/suggest', {
            method: 'POST',
            body: { pages: targetPages }
          });
          if (data && data.suggestions) {
            setFixModal(function(prev) {
              var newHistory = (prev.history || []).slice(0, (prev.historyIdx >= 0 ? prev.historyIdx + 1 : prev.history.length));
              newHistory.push(data.suggestions.map(function(s) { return Object.assign({}, s); }));
              return Object.assign({}, prev, { suggestions: data.suggestions, loading: false, history: newHistory, historyIdx: newHistory.length - 1 });
            });
          } else {
            setFixModal(function(prev) { return Object.assign({}, prev, { loading: false }); });
          }
        } catch (e) {
          setFixModal(function(prev) { return Object.assign({}, prev, { loading: false }); });
        }
      };

      var navigateFixHistory = function(dir) {
        setFixModal(function(prev) {
          if (!prev || !prev.history || prev.history.length === 0) return prev;
          var newIdx = prev.historyIdx + dir;
          if (newIdx < 0 || newIdx >= prev.history.length) return prev;
          return Object.assign({}, prev, { suggestions: prev.history[newIdx].map(function(s) { return Object.assign({}, s); }), historyIdx: newIdx });
        });
      };

      const handleFixSingle = (page) => openFixModal([page]);
      const handleFixBulk = () => {
        const targetPages = pages.filter(p => selected.has(p.id));
        if (targetPages.length === 0) return;
        openFixModal(targetPages);
      };

      const [addingLinks, setAddingLinks] = React.useState(null); // 'outbound-123' or 'inbound-123'
      const [linksResult, setLinksResult] = React.useState(null); // { pageId, type, links: [] }

      const [linkPreview, setLinkPreview] = useState(null); // { page, type, links, applying }
      const [selectedPreviewLinks, setSelectedPreviewLinks] = useState([]); // indices of selected links

      const handleAddOutboundLinks = async (page) => {
        setAddingLinks('outbound-' + page.id);
        try {
          const data = await api('/projects/' + project.id + '/onpage-audit/add-links', {
            method: 'POST', body: { page_id: page.id, preview: true },
          });
          if (data.success && data.links_added && data.links_added.length > 0) {
            setLinkPreview({ page: page, type: 'outbound', links: data.links_added, applying: false });
            setSelectedPreviewLinks(data.links_added.map(function(_, i) { return i; })); // all selected by default
          } else { alert(data.message || 'No suitable link opportunities found'); }
        } catch (e) { alert('Error: ' + e.message); }
        setAddingLinks(null);
      };

      const handleApplyLinks = async () => {
        if (!linkPreview || selectedPreviewLinks.length === 0) return;
        setLinkPreview(Object.assign({}, linkPreview, { applying: true }));
        var chosen = selectedPreviewLinks.map(function(i) { return linkPreview.links[i]; });

        try {
          var data;
          if (linkPreview.type === 'inbound') {
            var chosenIds = chosen.map(function(l) { return l.source_page_id; });
            data = await api('/projects/' + project.id + '/onpage-audit/add-inbound-links', {
              method: 'POST', body: { page_id: linkPreview.page.id, selected_links: chosenIds },
            });
          } else {
            var chosenUrls = chosen.map(function(l) { return l.url; });
            data = await api('/projects/' + project.id + '/onpage-audit/add-links', {
              method: 'POST', body: { page_id: linkPreview.page.id, selected_links: chosenUrls },
            });
          }

          if (data.success) {
            setLinksResult({ pageId: linkPreview.page.id, type: linkPreview.type, links: data.links_added });
            setExpandedPage(linkPreview.page.id);
            if (linkPreview.type === 'inbound') {
              var addedCount = data.links_added ? data.links_added.length : 0;
              setPages(function(prev) { return prev.map(function(p) {
                if (p.id === linkPreview.page.id) {
                  var newFrom = (p.inboundFrom || []).concat((data.links_added || []).map(function(l) { return { title: l.source_title || '', url: l.source_url || '' }; }));
                  return Object.assign({}, p, { inboundLinks: (p.inboundLinks || 0) + addedCount, inboundFrom: newFrom });
                }
                return p;
              }); });
            } else {
              var addedOut = data.links_added ? data.links_added.length : 0;
              setPages(function(prev) { return prev.map(function(p) {
                if (p.id === linkPreview.page.id) {
                  return Object.assign({}, p, { internalLinks: (p.internalLinks || 0) + addedOut });
                }
                return p;
              }); });
            }
            loadHistory();
            setLinkPreview(null);
            setSelectedPreviewLinks([]);
          } else { alert(data.message || data.error || 'Failed to add links'); }
        } catch (e) { alert('Error: ' + e.message); }
      };

      const handleAddInboundLinks = async (page) => {
        setAddingLinks('inbound-' + page.id);
        try {
          const data = await api(`/projects/${project.id}/onpage-audit/add-inbound-links`, {
            method: 'POST', body: { page_id: page.id, preview: true },
          });
          if (data.success && data.links_added && data.links_added.length > 0) {
            setLinkPreview({ page: page, type: 'inbound', links: data.links_added, applying: false });
            setSelectedPreviewLinks(data.links_added.map(function(_, i) { return i; }));
          } else { alert(data.message || 'No suitable inbound link opportunities found'); }
        } catch (e) { alert('Error: ' + e.message); }
        setAddingLinks(null);
      };

      const [sendingToCopywriter, setSendingToCopywriter] = React.useState(null);
      const handleSendToCopywriter = async (page, contentType = 'rewrite') => {
        setSendingToCopywriter(page.id);
        try {
          const data = await api(`/projects/${project.id}/content-queue`, {
            method: 'POST',
            body: {
              page_id: page.id,
              page_url: page.url,
              page_title: page.title,
              content_type: contentType,
              source: 'onpage-audit',
              priority: page.wordCount < 300 ? 'critical' : page.wordCount < 500 ? 'high' : 'medium',
              brief: page.issues?.filter(i => i.type === 'problem').map(i => i.text).join('; ') || '',
              current_word_count: page.wordCount,
              current_meta_title: page.metaTitle,
              current_meta_desc: page.metaDesc,
              current_focus_keyword: page.focusKeyword,
            },
          });
          if (data && !data.error) {
            alert(`"${page.title}" sent to Copywriter queue`);
          } else {
            alert(data?.error || 'Failed to send');
          }
        } catch (e) { alert('Error: ' + e.message); }
        setSendingToCopywriter(null);
      };

      const updateSuggestion = (id, field, value) => {
        setFixModal(function(prev) {
          var newSugg = prev.suggestions.map(function(s) { return s.id === id ? Object.assign({}, s, { [field]: value }) : s; });
          var newHistory = prev.history.slice();
          if (prev.historyIdx >= 0 && prev.historyIdx < newHistory.length) {
            newHistory[prev.historyIdx] = newSugg.map(function(s) { return Object.assign({}, s); });
          }
          return Object.assign({}, prev, { suggestions: newSugg, history: newHistory });
        });
      };

      const applyFixes = async () => {
        if (!fixModal) return;
        setFixing(true);
        try {
          const fixes = fixModal.suggestions.map(s => {
            const pg = fixModal.pages.find(p => p.id === s.id);
            return {
              id: s.id, url: pg?.url || '', title: pg?.title || '',
              new_meta_title: s.suggested_title,
              new_meta_desc: s.suggested_desc,
              new_focus_keyword: s.suggested_keyword
            };
          });
          const data = await api(`/projects/${project.id}/onpage-audit/fix`, {
            method: 'POST',
            body: { fixes }
          });
          if (data?.results) {
            const successCount = data.results.filter(r => r.success).length;
            const failCount = data.results.filter(r => !r.success).length;
            alert(`Applied fixes: ${successCount} succeeded${failCount > 0 ? `, ${failCount} failed` : ''}`);
            setFixModal(null);
            setSelected(new Set());
            loadHistory();
            // Re-run audit to refresh scores
            runAudit();
          }
        } catch (e) {
          alert('Error applying fixes: ' + e.message);
        }
        setFixing(false);
      };

      const handleRollback = async (changeId) => {
        if (!confirm('Roll back this change? The original value will be restored on WordPress.')) return;
        setRollingBack(changeId);
        try {
          await api(`/projects/${project.id}/wp-changes/rollback/${changeId}`, { method: 'POST' });
          loadHistory();
        } catch (e) { alert('Rollback failed: ' + e.message); }
        setRollingBack(null);
      };

      const handleRollbackPage = async (pageId) => {
        if (!confirm('Roll back ALL changes for this page? All original values will be restored.')) return;
        setRollingBack('page-' + pageId);
        try {
          await api(`/projects/${project.id}/wp-changes/rollback-page/${pageId}`, { method: 'POST' });
          loadHistory();
          runAudit();
        } catch (e) { alert('Rollback failed: ' + e.message); }
        setRollingBack(null);
      };

      const activeChanges = changeHistory.filter(c => !c.rolled_back_at);
      const pageHasChanges = (pageId) => activeChanges.some(c => c.page_id === pageId);

      const charColor = (len, min, max) => len >= min && len <= max ? '#22c55e' : len === 0 ? '#ef4444' : '#f59e0b';

      return (
        <div>

          {!loading && pages.length === 0 && (
            <div style={{ textAlign: 'center', padding: 60, color: 'var(--text3)' }}>
              <i className="fas fa-file-alt" style={{ fontSize: 48, marginBottom: 16, display: 'block', opacity: 0.3 }} />

          {/* Fix Modal */}
          {fixModal && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.6)', zIndex: 9999, display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => !fixing && setFixModal(null)}>

                        {!pg.focusKeyword && <div style={{ fontSize: 11, color: '#ef4444', marginBottom: 4 }}>(not set)</div>}
                        <input type="text" value={s.suggested_keyword || ''} onChange={e => updateSuggestion(s.id, 'suggested_keyword', e.target.value)}
                          style={{ width: '100%', padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--card)', color: '#22c55e', fontSize: 13, boxSizing: 'border-box' }} />
                      </div>
                    </div>
                  );
                })}

                {!fixModal.loading && (
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 16 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <button className="btn" onClick={function() { openFixModal(fixModal.pages, true); }} disabled={fixing || fixModal.loading} style={{ fontSize: 12, padding: '7px 14px', color: '#06b6d4', borderColor: '#06b6d4' }}>
                        <i className="fas fa-sync-alt" style={{ marginRight: 5 }} />Regenerate
                      </button>
                      {fixModal.history && fixModal.history.length > 1 && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                          <button className="btn" onClick={function() { navigateFixHistory(-1); }} disabled={fixModal.historyIdx <= 0} style={{ fontSize: 11, padding: '6px 10px', minWidth: 32 }}>
                            <i className="fas fa-chevron-left" />
                          </button>
                          <span style={{ fontSize: 11, color: 'var(--text3)', minWidth: 40, textAlign: 'center' }}>
                            {(fixModal.historyIdx + 1) + ' / ' + fixModal.history.length}
                          </span>
                          <button className="btn" onClick={function() { navigateFixHistory(1); }} disabled={fixModal.historyIdx >= fixModal.history.length - 1} style={{ fontSize: 11, padding: '6px 10px', minWidth: 32 }}>
                            <i className="fas fa-chevron-right" />
                          </button>
                        </div>
                      )}
                    </div>
                    <div style={{ display: 'flex', gap: 10 }}>
                      <button className="btn" onClick={() => setFixModal(null)} disabled={fixing} style={{ fontSize: 13, padding: '8px 16px' }}>Cancel</button>
                      <button className="btn btn-primary" onClick={applyFixes} disabled={fixing} style={{ fontSize: 13, padding: '8px 20px' }}>
                        {fixing ? <><span className="spinner"></span>Applying...</> : <><i className="fas fa-check" style={{ marginRight: 6 }} />Apply {fixModal.suggestions.length} Fix{fixModal.suggestions.length !== 1 ? 'es' : ''}</>}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {linkPreview && (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}
              onClick={function() { if (!linkPreview.applying) setLinkPreview(null); }}>
              <div style={{ background: 'var(--card)', borderRadius: 12, padding: 24, maxWidth: 650, width: '90%', maxHeight: '80vh', overflow: 'auto', border: '1px solid var(--border)' }}
                onClick={function(e) { e.stopPropagation(); }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--text1)', marginBottom: 4 }}>
                  <i className={linkPreview.type === 'inbound' ? 'fas fa-sign-in-alt' : 'fas fa-link'} style={{ marginRight: 8, color: linkPreview.type === 'inbound' ? '#a855f7' : '#3b82f6' }} />
                  {linkPreview.type === 'inbound' ? 'Review Inbound Links' : 'Review Outbound Links'}
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <div style={{ fontSize: 12, color: 'var(--text3)' }}>
                    {linkPreview.links.length} link{linkPreview.links.length !== 1 ? 's' : ''} suggested for "{linkPreview.page.title}"
                  </div>
                  <label style={{ fontSize: 12, color: 'var(--text2)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input type="checkbox"
                      checked={selectedPreviewLinks.length === linkPreview.links.length}
                      onChange={function() {
                        if (selectedPreviewLinks.length === linkPreview.links.length) {
                          setSelectedPreviewLinks([]);
                        } else {
                          setSelectedPreviewLinks(linkPreview.links.map(function(_, i) { return i; }));
                        }
                      }}
                      style={{ accentColor: '#3b82f6' }}
                    />
                    Select All
                  </label>
                </div>

                {linkPreview.links.map(function(link, i) {
                  var isSelected = selectedPreviewLinks.indexOf(i) !== -1;
                  return (
                    <div key={i} style={{ background: isSelected ? 'var(--bg)' : 'var(--card)', borderRadius: 8, border: '1px solid ' + (isSelected ? '#3b82f6' : 'var(--border)'), padding: 12, marginBottom: 8, opacity: isSelected ? 1 : 0.5, cursor: 'pointer', transition: 'all 0.15s' }}
                      onClick={function() {
                        setSelectedPreviewLinks(function(prev) {
                          var idx = prev.indexOf(i);
                          if (idx !== -1) { return prev.filter(function(x) { return x !== i; }); }
                          return prev.concat([i]);
                        });
                      }}>
                      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                        <input type="checkbox" checked={isSelected} readOnly style={{ marginTop: 2, accentColor: '#3b82f6', flexShrink: 0 }} />
                        <div style={{ flex: 1 }}>
                          {linkPreview.type === 'inbound' && link.source_title && (
                            <div style={{ marginBottom: 6 }}>
                              <div style={{ fontSize: 10, textTransform: 'uppercase', fontWeight: 600, color: 'var(--text3)', marginBottom: 3 }}>Source Page</div>
                              <div style={{ fontSize: 13, fontWeight: 600, color: '#a855f7' }}>{link.source_title}</div>
                              <div style={{ fontSize: 11, color: 'var(--text3)' }}>{link.source_url}</div>
                            </div>
                          )}
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                            <div>
                              <div style={{ fontSize: 10, textTransform: 'uppercase', fontWeight: 600, color: 'var(--text3)', marginBottom: 3 }}>Anchor Text</div>

                              <div style={{ textAlign: 'right' }}>
                                <div style={{ fontSize: 10, textTransform: 'uppercase', fontWeight: 600, color: 'var(--text3)', marginBottom: 3 }}>Target Keyword</div>

                          {linkPreview.type !== 'inbound' && (
                          <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 4 }}>
                            <i className="fas fa-arrow-right" style={{ marginRight: 4, fontSize: 9 }} />
                            {link.url}
                          </div>

                            <div style={{ fontSize: 11, color: 'var(--text2)', fontStyle: 'italic' }}>{link.reason}</div>
